singulars:
  recipes:
    skills:
      cooking:
        name: Cooking recipe
        requirement: Requires a <object id="recipe_cooking" />.
      smithing:
        smelting:
          name: Smelting
          requirement: Requires materials that can be used be used in smelting for <object id="smithing" />.
    products:
      sandwich:
        name: Sandwich recipe
        requirement: Requires a <object id="sandwich" /> be made by a <object id="recipe_cooking" />.
  activities:
    woodcuttingTrees:
      name: Woodcutting trees
      requirement: Requires a <object id="woodcuttingTrees" /> activity.
      requirementLevel: "Requires a tree woodcutting activity that has at least <keywordRequirements /> in its requirements."
    fishing:
      name: Fishing
      requirement: Requires a <object id="activity_fishing" /> activity.
      requirementLevel: "Requires a fishing activity that has at least <keywordRequirements /> in its requirements."
    miningOres:
      name: Mining ores
      requirement: Requires a <object id="activity_mining" /> activity.
      requirementLevel: "Requires an ore mining activity that has at least <keywordRequirements /> in its requirements."
    foragingPlants:
      name: Plant foraging
      requirement: Requires a <object id="activity_foraging" /> activity.
      requirementLevel: "Requires a plant foraging activity that has at least <keywordRequirements /> in its requirements."
  gear:
    skillingGear:
      name: Skilling gear
      requirement: Requires equipped <object id="skillingGear" />.
      requirementLevel: "Requires skilling gear that has at least <keywordRequirements /> in its requirements."
    frisbee:
      name: Skydisc
      desc: Skydiscs are used for certain athletic activities, such as skydisc golf.
      requirement: Requires an equipped <object id="frisbee" />.
      requirementLevel: "Requires a skydisc that has at least <keywordRequirements /> in its requirements."
    skis:
      name: Skis
      desc: Skis allow you to travel snowy areas and unlock you shortcuts in Jarvonia. They are also necessary for certain winter activities.
      requirement: Requires equipped <object id="skis" />.
      requirementLevel: "Requires skis that have at least <keywordRequirements /> in their requirements."
    bellows:
      name: Bellows
      desc: Bellows allow you to feed a fire with oxygen, making the flames go bigger!
      requirement: Requires equipped <object id="bellows" />.
      requirementLevel: "Requires bellows that have at least <keywordRequirements /> in their requirements."
    basket:
      name: Basket
      desc: Baskets are tools that help you carry more items in your inventory.
      requirement: Requires an equipped <object id="basket" />.
      requirementLevel: "Requires a basket that has at least <keywordRequirements /> in its requirements."
    lifeVest:
      name: Life vest
      desc: Keeps you afloat in water! Life vests are required on a boat (so you don't drown).
      requirement: Requires an equipped <object id="lifevest" />.
      requirementLevel: "Requires a life vest that has at least <keywordRequirements /> in its requirements."
    climbing:
      name: Climbing gear
      desc: Climbing gear unlocks shortcuts in mountainous areas and they're required for certain climbing activities.
      requirement: Requires equipped <object id="climbingTool" />.
      requirementLevel: "Requires climbing gear that has at least <keywordRequirements /> in its requirements."
    bugCatchingNet:
      name: Bug catching net
      desc: You can catch bugs with a bug catching net!
      requirement: Requires an equipped <object id="bugCatchingNet" />.
      requirementLevel: "Requires a bug catching net that has at least <keywordRequirements /> in its requirements."
    ring:
      name: Ring
      desc: Goes on a finger.
      requirement: Requires an equipped <object id="item_ring" />.
      requirementLevel: "Requires a ring that has at least <keywordRequirements /> in its requirements."
    amulet:
      name: Amulet
      desc: Amulets are worn around the neck.
      requirement: Requires an equipped <object id="item_amulet" />.
      requirementLevel: "Requires an amulet that has at least <keywordRequirements /> in its requirements."
    socks:
      name: Socks
      desc: Come in many colors and patterns. Finding random socks can help you unlock an achievement.
      requirement: Requires a equipped <object id="item_socks" />.
      requirementLevel: "Requires socks that have at least <keywordRequirements /> in their requirements."
    underwater:
      name: Aquatic
      desc: Aquatic items provide benefits while you're <object id="location_underwater" />.
      requirement: Requires <object id="item_underwater" /> equipment.
      requirementLevel: "Requires underwater equipment that has at least <keywordRequirements /> in its requirements."
    weapon:
      name: Weapon
      desc: Great for offence, and thus for defence.
      requirement: Requires an equipped <object id="weapon" />.
      requirementLevel: "Requires a weapon that has at least <keywordRequirements /> in its requirements."
    shield:
      name: Shield
      desc: Great for a big painting surface and taking a punch.
      requirement: Requires an equipped <object id="shield" />.
      requirementLevel: "Requires a shield that has at least <keywordRequirements /> in its requirements."
    arrows:
      name: Arrows
      desc: Using bows requires arrows when hunting or fighting as ammunition.
      requirement: Requires equipped <object id="arrows" />.
      requirementLevel: "Requires arrows that have at least <keywordRequirements /> in their requirements."
  tools:
    sickle:
      name: Sickle
      desc: A gathering tool used in <object id="foraging" />.
      requirement: Requires an equipped <object id="sickle" />.
      requirementLevel: "Requires a sickle that has at least <keywordRequirements /> in its requirements."
    goldPan:
      name: Gold pan
      desc: Robust sieves used to separate valuable metals from sediment in water.
      requirement: Requires an equipped <object id="goldPan" />.
      requirementLevel: "Requires a gold pan that has at least <keywordRequirements /> in its requirements."
    magnetic:
      name: Magnetic
      desc: Very attractive. Some activities require items with magnetic properties.
      requirement: Requires an equipped <object id="magnetic" /> item.
      requirementLevel: "Requires a magnetic item that has at least <keywordRequirements /> in its requirements."
    cookingPan:
      name: Cooking pan
      desc: Very useful to stir up some food! Cooking pans grant bonuses for <object id="cooking" /> skill.
      requirement: Requires an equipped <object id="cookingPan" />.
      requirementLevel: "Requires a cooking pan that has at least <keywordRequirements /> in its requirements."
    tool:
      name: Tool
      requirement: Requires an equipped <object id="tool" />.
      requirementLevel: "Requires a tool that has at least <keywordRequirements /> in its requirements."
    woodcuttingHatchet:
      name: Hatchet
      desc: Hatchets are required for cutting wood. Needs to be equipped to cut trees.
      requirement: Requires an equipped <object id="woodcuttingHatchet" />.
      requirementLevel: "Requires a woodcutting hatchet that has at least <keywordRequirements /> in its requirements."
    fishingRod:
      name: Fishing rod
      desc: Fishing rods are required for rod fishing. Needs to be equipped to catch fish.
      requirement: Requires an equipped <object id="fishingRod" />.
      requirementLevel: "Requires a fishing rod that has at least <keywordRequirements /> in its requirements."
    fishingSpear:
      name: Fishing spear
      desc: Fishing spears are required for spear fishing. Needs to be equipped to catch fish.
      requirement: Requires an equipped <object id="fishingSpear" />.
      requirementLevel: "Requires a fishing spear that has at least <keywordRequirements /> in its requirements."
    fishingNet:
      name: Fishing net
      desc: Fishing nets are required for net fishing. Needs to be equipped to catch fish.
      requirement: Requires an equipped <object id="fishingNet" />.
      requirementLevel: "Requires a fishing net that has at least <keywordRequirements /> in its requirements."
    fishingCage:
      name: Fishing cage
      desc: Fishing cages are required for cage fishing. Needs to be equipped to catch fish.
      requirement: Requires an equipped <object id="fishingCage" />.
      requirementLevel: "Requires a fishing cage that has at least <keywordRequirements /> in its requirements."
    fishingTool:
      name: Fishing tool
      desc: Fishing tools include fishing rods, spears, nets and cages.
      requirement: Requires an equipped <object id="fishingTool" /> related tool.
      requirementLevel: "Requires a fishing related tool that has at least <keywordRequirements /> in its requirements."
    pickaxe:
      name: Pickaxe
      desc: Pickaxes are required for mining. Needs to be equipped to mine ores and gems.
      requirement: Requires an equipped <object id="pickaxe" />.
      requirementLevel: "Requires a pickaxe that has at least <keywordRequirements /> in its requirements."
    cookingTool:
      name: Cooking tool
      desc: Cooking tools include cooking pans, knives and cutting boards.
      requirement: Requires an equipped <object id="cookingTool" />.
      requirementLevel: "Requires a cooking tool that has at least <keywordRequirements /> in its requirements."
    carpentryTool:
      name: Carpentry tool
      desc: Carpentry tools include saws and chisels.
      requirement: Requires an equipped <object id="carpentryTool" />.
      requirementLevel: "Requires a carpentry tool that has at least <keywordRequirements /> in its requirements."
    craftingTool:
      name: Crafting tool
      desc: Crafting tools include wrenches and screwdrivers.
      requirement: Requires an equipped <object id="craftingTool" />.
      requirementLevel: "Requires a crafting tool that has at least <keywordRequirements /> in its requirements."
    fishingLure:
      name: Fishing lure
      desc: You can use a fishing lure as a tool to attract fish more easily.
      requirement: Requires an equipped <object id="fishingLure" />.
      requirementLevel: "Requires a fishing lure that has at least <keywordRequirements /> in its requirements."
    magnifyingLense:
      name: Magnifying lens
      desc: Magnifying lenses are useful for some <skillType type="artisan"/> skills.
      requirement: Requires an equipped <object id="magnifyingLense" />.
      requirementLevel: "Requires a magnifying lens that has at least <keywordRequirements /> in its requirements."
    cookingKnife:
      name: Cooking knife
      desc: Cooking knives are used to cut ingredients for cooking.
      requirement: Requires an equipped <object id="cookingKnife" />.
      requirementLevel: "Requires a cooking knife that has at least <keywordRequirements /> in its requirements."
    cookingPot:
      name: Cooking pot
      desc: Useful tools for <object id="cooking" />. Also known for calling out kettles.
      requirement: Requires an equipped <object id="cookingPot" />.
      requirementLevel: "Requires a cooking pot that has at least <keywordRequirements /> in its requirements."
    cuttingBoard:
      name: Cutting board
      desc: Used as a surface to chop ingredients on.
      requirement: Requires an equipped <object id="cuttingBoard" />.
      requirementLevel: "Requires a cutting board that has at least <keywordRequirements /> in its requirements."
    cookingSpices:
      name: Spices
      desc: Used to be very expensive back in the day. Nowadays useful for cooking purposes.
      requirement: Requires an equipped <object id="cookingSpices" />.
      requirementLevel: "Requires spices that has at least <keywordRequirements /> in its requirements."
    chisel:
      name: Chisel
      desc: Chisels are used in <object id="carpentry" /> and <object id="trinketry" /> and provide bonuses for those skills.
      requirement: Requires an equipped <object id="chisel" />.
      requirementLevel: "Requires a chisel that has at least <keywordRequirements /> in its requirements."
    saw:
      name: Saw
      desc: Saws are used mainly in <object id="carpentry" /> and provide bonuses for that skill.
      requirement: Requires an equipped <object id="saw" />.
      requirementLevel: "Requires a saw that has at least <keywordRequirements /> in its requirements."
    screwdriver:
      name: Screwdriver
      desc: Screwdrivers are used in <object id="crafting" /> and provide bonuses for that skill.
      requirement: Requires an equipped <object id="screwdriver" />.
      requirementLevel: "Requires a screwdriver that has at least <keywordRequirements /> in its requirements."
    smithingHammer:
      name: Smithing hammer
      desc: A heavy hammer used for pounding metal into shape. Useful for <object id="smithing" />.
      requirement: Requires an equipped <object id="smithingHammer" />.
      requirementLevel: "Requires a smithing hammer that has at least <keywordRequirements /> in its requirements."
    foragingTool:
      name: Foraging tool
      desc: A tool used for foraging activities.
      requirement: Requires an equipped <object id="foragingTool" />.
      requirementLevel: "Requires a foraging tool that has at least <keywordRequirements /> in its requirements."
    agilityTool:
      name: Agility tool
      desc: A tool used for agility activities.
      requirement: Requires an equipped <object id="agilityTool" />.
      requirementLevel: "Requires an agility tool that has at least <keywordRequirements /> in its requirements."
    miningTool:
      name: Mining tool
      desc: A tool used for mining activities.
      requirement: Requires an equipped <object id="miningTool" />.
      requirementLevel: "Requires a mining tool that has at least <keywordRequirements /> in its requirements."
    smithingTool:
      name: Smithing tool
      desc: A tool used for smithing activities.
      requirement: Requires an equipped <object id="smithingTool" />.
      requirementLevel: "Requires a smithing tool that has at least <keywordRequirements /> in its requirements."
    trinketryTool:
      name: Trinketry tool
      desc: A tool used for trinketry activities.
      requirement: Requires an equipped <object id="trinketryTool" />.
      requirementLevel: "Requires a trinketry tool that has at least <keywordRequirements /> in its requirements."
    woodcuttingTool:
      name: Woodcutting tool
      desc: A tool used for woodcutting activities.
      requirement: Requires an equipped <object id="woodcuttingTool" />.
      requirementLevel: "Requires a woodcutting tool that has at least <keywordRequirements /> in its requirements."
    localMap:
      name: Local map
      desc: Provides information on specific area of the world, granting bonuses in that area.
      requirement: Requires an equipped <object id="localMap" />.
      requirementLevel: "Requires a local map that has at least <keywordRequirements /> in its requirements."
    knife:
      name: Knife
      desc: Sharp, so be mindful of your fingers! Useful for cutting things, and thus has many applications.
      requirement: Requires an equipped <object id="knife" />.
      requirementLevel: "Requires a knife that has at least <keywordRequirements /> in its requirements."
    wrench:
      name: Wrench
      desc: A tool used for tightening or loosening bolts and nuts. Useful for <object id="crafting" />.
      requirement: Requires an equipped <object id="wrench" />.
      requirementLevel: "Requires a wrench that has at least <keywordRequirements /> in its requirements."
    ruler:
      name: Ruler
      desc: A measuring tool used for precise measurements. Useful for <object id="carpentry" />.
      requirement: Requires an equipped <object id="ruler" />.
      requirementLevel: "Requires a ruler that has at least <keywordRequirements /> in its requirements."
    logSplitter:
      name: Log splitter
      desc: A tool that can be used for <object id="woodcutting" /> in addition to hatchets. 
      requirement: Requires an equipped <object id="item_log_splitter" />.
      requirementlevel: "Requires a log splitter that has at least <keywordRequirements /> in its requirements."
    skillBook:
      name: Skill book
      desc: Provides both a bonus and a penalty for a specific skill.
      requirement: Requires an equipped <object id="skillBook" />.
      requirementlevel: "Requires a skill book that has at least <keywordRequirements /> in its requirements."
    huntingBow:
      name: Hunting bow
      desc: A bow used for <object id="hunting" /> animals (and other things that may annoy you).
      requirement: Requires an equipped <object id="huntingBow" />.
      requirementLevel: "Requires a hunting bow that has at least <keywordRequirements /> in its requirements."
    huntingTrap:
      name: Hunting trap
      desc: A trap used for <object id="hunting" /> animals.
      requirement: Requires an equipped <object id="huntingTrap" />.
      requirementLevel: "Requires a hunting trap that has at least <keywordRequirements /> in its requirements."
    birdhouse:
      name: Birdhouse
      desc: Birdhouses might make their way to the game later.
      requirement: Requires a <object id="birdhouse" />.
      requirementLevel: "Requires a birdhouse that has at least <keywordRequirements /> in its requirements."
    sander:
      name: Sander
      desc: A tool used for smoothing surfaces. Useful for <object id="trinketry" />.
      requirement: Requires an equipped <object id="sander" />.
      requirementLevel: "Requires a sander that has at least <keywordRequirements /> in its requirements."
    needle:
      name: Needle
      desc: A tool used for sewing. Useful for <object id="tailoring" />.
      requirement: Requires an equipped <object id="needle" />.
      requirementLevel: "Requires a needle that has at least <keywordRequirements /> in its requirements."
    pins:
      name: Pins
      desc: Pins are used for <object id="tailoring" />.
      requirement: Requires equipped <object id="pins" />.
      requirementLevel: "Requires pins that have at least <keywordRequirements /> in their requirements."
    scissors:
      name: Scissors
      desc: Scissors are used for cutting. Useful for <object id="tailoring" />.
      requirement: Requires equipped <object id="scissors" />.
      requirementLevel: "Requires scissors that have at least <keywordRequirements /> in their requirements."
    cuttingMat:
      name: Cutting mat
      desc: Cutting mats are useful for <object id="tailoring" />.
      requirement: Requires equipped <object id="cuttingMat" />.
      requirementLevel: "Requires a cutting mat that has at least <keywordRequirements /> in its requirements."
    pliers:
      name: Pliers
      desc: Pliers are used for precise gripping and bending. Useful for <object id="trinketry" />.
      requirement: Requires equipped <object id="pliers" />.
      requirementLevel: "Requires pliers that have at least <keywordRequirements /> in their requirements."
    toolbox:
      name: Toolbox
      desc: Toolboxes are used to keep your various tools in order. Useful for <skillType type="artisan" /> skills.
      requirement: Requires equipped <object id="toolbox" />
      requirementLevel: "Requires a toolbox that has at least <keywordRequirements /> in its requirements."
    huntingNet:
      name: Hunting net
      desc: A net used for <object id="hunting" /> animals.
      requirement: Requires an equipped <object id="huntingNet" />.
      requirementLevel: "Requires a hunting net that has at least <keywordRequirements /> in its requirements."
    fishingRodRest:
      name: Fishing rod rest
      desc: A Fishing rod rest make fishing a more relaxed experience. Useful for <object id="fishing" />.
      requirment: Requires equipped <object id="fishingRodRest" />.
      requirementLevel: "Requires a fishing rod rest that has at least <keywordRequirements /> in its requirements."
  materials:
    logs:
      name: Log
      desc: Can be processed into a <object id="plank" />. Basic ingredient gained from <object id="woodcutting" />.
      requirement: Requires a wooden <object id="logs" />.
      requirementLevel: "Requires a wooden log that has at least <keywordRequirements /> in its requirements."
    fish:
      name: Fish
      desc: Can be used in various <object id="cooking" /> recipes. Basic ingredient gained from <object id="fishing" />.
      requirement: Requires a <object id="fish" />.
      requirementLevel: "Requires a fish that has at least <keywordRequirements /> in its requirements."
    plant:
      name: Plant
      desc: Can be used in various <skillType type="artisan" /> recipes. Basic ingredient gained from <object id="foraging" />.
      requirement: Requires a <object id="plant" />.
      requirementLevel: "Requires a plant that has at least <keywordRequirements /> in its requirements."
    ore:
      name: Ore
      desc: Can be processed into a <object id="bar" />. Basic ingredient gained from <object id="mining" />.
      requirement: Requires an <object id="ore" />.
      requirementLevel: "Requires an ore that has at least <keywordRequirements /> in its requirements."
    nugget:
      name: Nugget
      desc: Can be processed into a <object id="bar" />. Basic ingredient gained from <object id="mining" />.
      requirement: Requires a <object id="nugget" />.
      requirementLevel: "Requires a nugget that has at least <keywordRequirements /> in its requirements."
    bar:
      name: Bar
      desc: Can be used in various <object id="smithing" /> and <skillType type="artisan" /> recipes. Processed from <object id="ore" />.
      requirement: Requires a <object id="bar" />.
      requirementLevel: "Requires a bar that has at least <keywordRequirements /> in its requirements."
    plank:
      name: Plank
      desc: Can be used in various <object id="crafting" /> recipes. Processed from <object id="logs" />.
      requirement: Requires a <object id="plank" />.
      requirementLevel: "Requires a plank that has at least <keywordRequirements /> in its requirements."
    gem:
      name: Gem
      desc: Can be used in various <object id="trinketry" /> recipes.
      requirement: Requires a <object id="gem" />.
      requirementLevel: "Requires a gem that has at least <keywordRequirements /> in its requirements."
    roughGem:
      name: Rough gem
      desc: Can be processed into a <object id="cut_gem" />. Basic ingredient gained from <object id="mining" />.
      requirement: Requires a <object id="rough_gem" />.
      requirementLevel: "Requires a rough gem that has at least <keywordRequirements /> in its requirements."
    cutGem:
      name: Cut gem
      desc: Can be used in various <object id="trinketry" /> recipes. Processed from a <object id="rough_gem" />.
      requirement: Requires a <object id="cut_gem" />.
      requirementLevel: "Requires a cut gem that has at least <keywordRequirements /> in its requirements."
    mushroom:
      name: Mushroom
      desc: Can take you to a whole new world! Mushrooms are used in various <object id="cooking" /> recipes.
      requirement: Requires a <object id="mushroom" />.
      requirementLevel: "Requires a mushroom that has at least <keywordRequirements /> in its requirements."
    trinket:
      name: Trinket
      desc: Trinkets are used in various <object id="trinketry" /> recipes.
      requirement: Requires a <object id="trinket" />.
      requirementLevel: "Requires a trinket that has at least <keywordRequirements /> in its requirements."
    ingredient:
      name: Ingredient
      desc: Used as ingredients in recipes.
      ingredient: Requires an <object id="ingredient" />.
      requirementLevel: "Requires an ingredient that has at least <keywordRequirements /> in its requirements."
    misc:
      name: Misc.
      desc: A miscellaneous material that can be used in various recipes.
      requirement: Requires a <object id="misc" /> item.
      requirementLevel: "Requires a miscellaneous item that has at least <keywordRequirements /> in its requirements."
    processed:
      name: Processed
      desc: A material that has been processed from a raw material, such as a <object id="bar" />, <object id="plank" />, <object id="fabric" />, or <object id="leather" />.
      requirement: Requires a <object id="processed" /> material.
      requirementLevel: "Requires a processed material that has at least <keywordRequirements /> in its requirements."
    offcut:
      name: Offcut
      desc: An offcut is a leftover piece of material that can be processed into new materials.
      requirement: Requires an <object id="offcut" />.
      requirementLevel: "Requires an offcut that has at least <keywordRequirements /> in its requirements."
    crustacean:
      name: Crustacean
      desc: A shellfish that can be used in various <object id="cooking" /> recipes.
      requirement: Requires a <object id="crustacean" />.
      requirementLevel: "Requires a crustacean that has at least <keywordRequirements /> in its requirements."
    fabric:
      name: Fabric
      desc: A sheet of fabric that will typically be used in <object id="tailoring" /> recipes.
      requirement: Requires <object id="fabric" />.
      requirementLevel: "Requires fabric that has at least <keywordRequirements /> in its requirements."
    fibrousPlant:
      name: Fibrous plant
      desc: Can be used in <object id="tailoring" /> recipes to make <object id="fabric" />. Can typically be found from <object id="foraging" />.
      requirement: Requires a <object id="fibrousPlant" />.
      requirementLevel: "Requires a fibrous plant that has at least <keywordRequirements /> in its requirements."
    hide:
      name: Hide
      desc: A piece of animal hide that can be used in <object id="tailoring" /> recipes to make <object id="leather" />. Can be obtained from <object id="hunting" />.
      requirement: Requires <object id="hide" />.
      requirementLevel: "Requires hide that has at least <keywordRequirements /> in its requirements."
    leather:
      name: Leather
      desc: A piece of leather that will typically be used in <object id="tailoring" /> recipes.
      requirement: Requires <object id="leather" />.
      requirementLevel: "Requires leather that has at least <keywordRequirements /> in its requirements."
  consumables:
    cookedFish:
      name: Cooked fish
      desc: Cooked from <object id="fish" />. Can be consumed for temporary bonuses.
      requirement: Requires a <object id="cookedFish" />.
      requirementLevel: "Requires a cooked fish that has at least <keywordRequirements /> in its requirements."
    food:
      name: Food
      desc: Food can be consumed for temporary bonuses.
      requirement: Requires a <object id="food" />.
      requirementLevel: "Requires a food that has at least <keywordRequirements /> in its requirements."
    fruit:
      name: Fruit
      desc: Fruits can be consumed for temporary bonuses.
      requirement: Requires a <object id="fruit" />.
      requirementLevel: "Requires a fruit that has at least <keywordRequirements /> in its requirements."
    beverage:
      name: Beverage
      desc: Beverages can be consumed for temporary bonuses.
      requirement: Requires a <object id="beverage" />.
      requirementLevel: "Requires a beverage that has at least <keywordRequirements /> in its requirements."
    alcohol:
      name: Alcohol
      desc: Alcoholic beverages can be consumed for temporary bonuses, but be careful not to overdo it!
      requirement: Requires <object id="alcohol" />.
      requirementLevel: "Requires alcohol that has at least <keywordRequirements /> in its requirements."
    water:
      name: Water
      desc: Basic requirement of life.
      requirement: Requires <object id="water" />.
      requirementLevel: "Requires water that has at least <keywordRequirements /> in its requirements."
    memosphere:
      name: Memosphere
      desc: Help you remember long forgotten lost arts. Memospheres can be consumed for instant experience.
      requirement: Requires a <object id="memosphere" />.
      requirementLevel: "Requires a memosphere that has at least <keywordRequirements /> in its requirements."
    sandwich:
      name: Sandwich
      desc: Everything that is between two slices of bread is a sandwich! Can be consumed for temporary bonuses, and is required for certain achievements.
      requirement: Requires a <object id="sandwich" />.
      requirementLevel: "Requires a sandwich that that has at least <keywordRequirements /> in its requirements."
  containers:
    chest:
      name: Chest
      desc: Chests contain treasures. Open and find out!
      requirement: Requires a <object id="chest" />.
      requirementLevel: "Requires a chest that has at least <keywordRequirements /> in its requirements."
    regionalChest:
      name: Regional chest
      desc: Regional chests contain treasures from a certain region.
      requirement: Requires a <object id="regionalChest" />.
      requirementLevel: "Requires a regional chest that has at least <keywordRequirements /> in its requirements."
