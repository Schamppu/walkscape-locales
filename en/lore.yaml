singulars:
  firstBirthdayLetter:
    p1: > 
      Hey there!
      

      It's your good pal, Herbert! I can't believe it has been a whole year already since you first showed up here in Arenum.
      

      I bet you have had some good progress and will only continue to improve. While you might no longer have much use for them, know that the spare wooden sticks, stones, and twine I find each day are here for you to take whenever you need.
      

      If you come by, you can always warm yourself at my hearth and catch me up on your adventures. I am sure you need to get back to those now, so I will wrap it up here.
      

      Take care of yourself <icon i="Favorited" />, we will talk more later! 
      

      - *Herbert*
  secondBirthdayLetter:
    p1: >
      Welcome back!
      
      
      Has it already been another year? These go by quick, I am sure it will be another in no time.
      

      Hopefully you've been making some good progress and improving yourself. You should come on by sometime to give me some firsthand tales of your adventures.
      

      I bet you've gone farther than most merchants have dared to wander at this point. Speaking of merchants, the local ones have come by again trying to buy my hut. They say it would be a great spot for some kind of large scale general store, but I don't plan on going anywhere, you might need a place to rest during your journey!
      
      
      Well that's enough of an old man's ramblings for now, take care!
      
      - *Herbert*
  thirdBirthdayLetter:
    p1: > 
      Well look at that!
      
      
      It's your third year here already! Most of the others don't keep going this long, so you've done well to keep going.
      
      
      They usually give up by now and beg me to finally end their suffering, it gets quite disheartening when it comes down to that.
      
      
      Would you like to come by some time to assure me that you still have managed fine with some stories of your adventures? We can celebrate your anniversary over some delicious tea and pastries.
      
      
      Take care and keep yourself from giving into the darkness, it creeps in slowly even if you fight it.
      
      
      - *Herbert*