singulars:
  agility:
    gdte:
      kayaking:
        desc: >-
          Je controleert de peddels, het zitje en de gehele staat van de kajak
          voordat je hem te water laat. Op jezelf, helm en waterdichte kleding.
          Het weer kon niet beter: zonneschijn, aangename temperatuur en een
          licht briesje. Laten we genieten van een goede vaart!
        name: Kajakken
      rooftopJumpingIntermediate:
        desc: >-
          Met katachtige sierlijkheid reis je door de stad en gebruik je elk
          architectonisch element als hulp: muren, daken, balkons,
          straatlantaarns. Ze buigen zich allemaal naar jouw wensen.
        name: Daken springen (gemiddeld)
      swimmingBeginner:
        desc: >-
          Er is je verteld dat zwemmen een manier is om gezond te blijven, dus
          na een paar lessen voel je je zeker om het zelf te proberen.
        name: Zwemmen (beginner)
      swimmingIntermediate:
        desc: >-
          Voordat je het water opgaat, controleer je de omstandigheden:
          windsterkte en -richting, aanwezigheid en grootte van rotsen, vissers,
          boten of gevaarlijke dieren. Je hebt zelfs met de lokale bevolking
          gepraat. Alles klopt. Je gaat zwemmen tussen de golven.
        name: Zwemmen (gemiddeld)
    global:
      birdWatching:
        desc: >-
          Vogelspotten is een kijkje in het vogelrijk. Je observeert geduldig en
          leert over de verschillende soorten die de bomen, het luchtruim en het
          land sieren, terwijl je hun schoonheid en gedrag bewonderd.
        name: Vogelspotten
      crossCountrySkiingBeginner:
        desc: >-
          Op je langlaufreis voor beginners is elke glijding vol verwondering.
          De besneeuwde sporen zijn je speeltuin, waar je het ritme van de ski's
          leert en de serene schoonheid van het winterse bos omarmt.
        name: Langlaufen (Beginner)
      crossCountrySkiingDifficult:
        desc: >-
          Bij zwaar langlaufen verleg je de grenzen van je uithoudingsvermogen
          en vaardigheid. Je bedwingt steile hellingen en trotseert barre
          omstandigheden en vindt opwinding in de hartverscheurende tocht door
          het ongetemde winterlandschap.
        name: Langlaufen (Moeilijk)
      crossCountrySkiingIntermediate:
        desc: >-
          Langlaufen met gemiddelde moeilijkheidsgraad brengt een gevoel van
          avontuur met zich mee. Je neemt gevarieerd terrein onder handen met
          een nieuwe dosis vertrouwen, elke stap sterker en zekerder, terwijl je
          de uitgestrekte besneeuwde vlaktes verkent.
        name: Langlaufen (Gemiddeld)
      frisbeeGolfingBeginner:
        desc: >-
          Als beginner in het frisbeegolfen is elke worp een nieuwe ontdekking.
          Je leert de wind te peilen en om bomen heen te navigeren, terwijl je
          geniet van de eenvoud van het spel en het plezier om de schijf naar de
          basket te zien zweven.
        name: Frisbee golfen (Beginner)
      frisbeeGolfingDifficult:
        desc: >-
          Als doorgewinterde speler in moeilijk frisbee golfen is elke baan een
          tactisch slagveld. Je voert complexe shots uit, beheerst de kunst van
          spin en precisie en zet uitdagende landschappen om in triomfantelijke
          overwinningen.
        name: Frisbee golfen (Moeilijk)
      frisbeeGolfingIntermediate:
        desc: >-
          Bij diskgolf op gemiddeld niveau ontwikkel je een scherp gevoel voor
          strategie. Elke parcours biedt een nieuwe uitdaging, terwijl je kundig
          je frisbee om obstakels heen buigt, waardoor je met elke gecalculeerde
          worp weer een beetje beter wordt.
        name: Frisbee golfen (Gemiddeld)
      guardDuty:
        desc: >-
          Als bewaker van het Wallisische Rijk moet je je rekeningen zien te
          betalen en dit is hoe. Je waakt over het koninkrijk, waardoor je
          betaald wordt voor je waakzame ogen.
        name: Wachtdienst
      sandcastleBuilding:
        desc: >-
          Zandkastelen bouwen op het strand is creativiteit in een handomdraai.
          Je zandcreaties blijven wellicht niet lang staan, maar het is een
          simpele vorm van entertainment voor jezelf.
        name: Zandkastelen bouwen
      scientificTinkering:
        desc: >-
          Op het gebied van wetenschappelijk sleutelen word je een ijverige
          enthousiasteling die ideeën omzet in tastbare experimenten. Je omarmt
          de animo van ontdekking met een open geest.
        name: Wetenschappelijk sleutelen
      sledding:
        desc: >-
          Terwijl je de handvatten van de slee vastpakt en jezelf afzet, voel je
          de adrenaline door je aderen stromen. De wereld vervaagt om je heen en
          voor even ben je een winterse snelheidsduivel die de besneeuwde heuvel
          bedwingt.
        name: Sleeën
    jarvonia:
      mountainClimbing:
        desc: >-
          Met de koele bergwind op je gezicht beklim je de ruige berghellingen,
          elke stap weldoordacht, en je geniet van het adembenemende uitzicht
          dat zich ontvouwt terwijl je klimt.
        name: Bergbeklimmen
      mountainClimbingBeginner:
        desc: >-
          Je bereidt je voor op je klim. Het is een prachtige dag met zon en
          geen wind. Toch slaat je hart over als je langzaam omhoog klimt en
          verlies je de grip op één voet. Wat een schrik! Uiteindelijk bereik je
          de top en kijk je trots naar de wereld onder je voeten.
        name: Bergbeklimmen (beginner)
      mountainClimbingIntermediate:
        desc: >-
          Nou hebben we het ergens over. Deze muur is bijna verticaal en er zijn
          geen makkelijk bereikbare grijppunten. Je houdt je stevig vast aan de
          muur, en voelt je spieren lijden onder de kracht die je nodig hebt. De
          top smaakt naar bloed en glorie. Je schreeuwt met de lucht die je nog
          over hebt.
        name: Bergbeklimmen (gemiddeld)
      rooftopJumping:
        desc: >-
          Met gedurfde precisie spring je van het ene dak naar het andere en
          voel je de adrenaline stromen, terwijl je met acrobatische elegantie
          door het stadslandschap navigeert.
        name: Daken springen
      rooftopJumpingBeginner:
        desc: >-
          Je beklimt een lantaarnpaal die uit staat, en scant de omgeving. Je
          hoort voetstappen dichtbij, dus je haast je met een sprongetje naar
          het aangrenzende dak. Een dakpan laat los en valt op de grond, met een
          flink gekletter als gevolg. De volgende keer zal je voorzichtiger
          moeten zijn.
        name: Daken springen (beginner)
  carpentry:
    gdte:
      shipRepairIntermediate:
        desc: >-
          Je bent geen leerling-timmerman meer, dus je repareert nu grotere
          schepen zonder problemen. Je voorman vertrouwt je vaardigheden en
          gezond verstand.  Je weet wanneer je effectief en efficiënt moet zijn.
          Je gereedschapskist is professioneel, net als jij.
        name: Scheepsreparatie (gemiddeld)
    jarvonia:
      shipRepairBeginner:
        desc: >-
          Je neemt deel aan reparaties aan versleten kleine schepen. Timmerhout,
          spijkers, tuigage, beslag, fittingen, en touwen staan tot je
          beschikking. De voorman geeft jou de orders en je voert ze meesterlijk
          uit. Misschien ben jij op een dag wel degene die de orders geeft.
        name: Scheepsreparatie (beginner)
      woodCarving:
        desc: >-
          Hout bewerken met een scherp voorwerp, zoals een mes, is een
          eeuwenoude vorm van vakmanschap. Er is een grote verscheidenheid aan
          kunst en iconografie: van kleine beeldjes en speelgoed, tot
          ceremoniële of oorlogsmaskers, tot grote mozaïeken en torenhoge
          totempalen.
        name: Houtsnijwerk
  cooking:
    gdte:
      wineGrapeStomping:
        desc: >-
          Met blote voeten om de zaden niet te breken, stap je op de druiven. Je
          beweegt van het midden van de pers naar de uiteinden, waardoor de
          gisting wordt bevorderd, omdat de druk die op het fruit wordt
          uitgeoefend contact mogelijk maakt met de gisten die nodig zijn voor
          het proces.
        name: Wijndruiven Stampen
    jarvonia:
      soupKitchenVolunteering:
        desc: >-
          Nog steeds in je gewone kleren trek je een schort aan en tijdens het
          opvolgen van de instructies van de kok begin je warme soep te serveren
          aan degenen die het het hardst nodig hebben. Als iedereen zijn portie
          heeft gekregen, voel je een mix van trots, bescheidenheid en
          gemeenschapszin.
        name: Vrijwilligerswerk in de soepkeuken
  crafting:
    jarvonia:
      iceSculpting:
        desc: >-
          Gewapend met beitel, handzaag en een klein pikhouweel verander je een
          ijsblokje in iets anders, iets functioneels of artistieks. De
          vluchtigheid van dit kunstwerk is proportioneel met de
          omgevingstemperatuur, de duur varieert van minuten tot permanent.
        name: IJssculpturen
      tinkering:
        desc: >-
          Je krabt aan je kin terwijl je nadenkt over hoe je deze rommel kunt
          repareren. Je bedenkt duizend manieren om het te doen, maar voor de
          meeste daarvan mis je onderdelen. Je kijkt de werkplaats rond, op zoek
          naar iets specifieks. Daar is het! Laten we aan de slag gaan.
        name: sleutelen
  fishing:
    gdte:
      magnetFishing:
        desc: >-
          Met een sterke magneet spullen uit een waterlichaam halen betaalt
          zelden de rekeningen, maar helpt een paar goede doelen: het reinigt
          het milieu en het helpt bij het oplossen van misdaden. Houd rekening
          met de regels eromheen en veel plezier! Je kunt van alles omhoog
          halen!
        name: Magneetvissen
    jarvonia:
      lakeFishing:
        desc: >-
          Met bevroren vingers bevestig je voorzichtig het aas en werpt het uit
          over het kalme oppervlak van het meer.
        name: Vissen op het meer
      pondFishing:
        desc: >-
          In het midden van het winterlandschap is de rustige vijver met een
          serene schoonheid aan het glinsteren. Het stille water is uitnodigend
          en veelbelovend.
        name: Vissen in de vijver
      seaFishing:
        desc: >-
          Langs de winterse kustlijn vind je een afgelegen plekje en gooi je je
          lijn uit in het kalme, kille water, genietend van de vredige
          eenzaamheid van het vissen in zee.
        name: Zeevissen
      seaFishingNet:
        desc: >-
          Langs de winterse kustlijn vind je een afgelegen plek en werp je je
          visnet uit in het kalme, kille water, genietend van de vredige
          eenzaamheid van het zeevissen.
        name: Zeevissen (net)
      seaFishingRod:
        desc: >-
          Langs de winterse kustlijn zoek je een afgelegen plekje en gooi je je
          hengel uit in het kalme, kille water, genietend van de vredige
          eenzaamheid van het zeevissen.
        name: Zeevissen (hengel)
  foraging:
    gdte:
      butterflyCatching:
        desc: >-
          Vlinders vangen vereist geduld en een goed net. Hoewel het leuk is om
          ze te achtervolgen, is de meest efficiënte optie om ze te vangen als
          ze stilzitten. Door ze te bewonderen en daarna weer vrij te laten,
          behoud je hun rol in het delicate natuurlijke evenwicht.
        name: Vlinders vangen
      dumpsterDiving:
        desc: >-
          In de doolhofachtige steegjes van de stad verken je de vergeten
          hoekjes, doorzoek je afgedankte spullen in de hoop verborgen schatten
          tussen de afdankertjes te vinden.
        name: Dumpster diving
      forestForaging:
        desc: >-
          Terwijl je door de rustige omhelzing van het bos wandelt, dompel je
          jezelf onder in de harmonie van het bos en verzamel je de geschenken
          van de natuur die gedijen onder het zachte bladerdak.
        name: Verzamelen in het bos
      plainsForaging:
        desc: >-
          Terwijl je door de vlaktes slingert, ga je op ontdekkingsreis door een
          landschap waar de schatten van de natuur wachten onder de zachte zon
          en azuurblauwe hemel.
        name: Verzamelen op de vlakten
      swampForaging:
        desc: >-
          In de ijle mist en mysterieuze kluwen van boomwortels stap je door
          plassen en dichte begroeiing om op zoek te gaan naar de mysteries die
          verborgen liggen in het mos en verlaten boten, in de hoop vergeten
          herinneringen en overblijfselen van een ooit vruchtbaar leven te
          vinden.
        name: Verzamelen in het moeras
    global:
      dumpsterDiving:
        desc: >-
          In de vele steegjes van de stad verken je de vergeten hoekjes en
          doorzoek je weggegooide spullen in de hoop verborgen schatten tussen
          de afdankertjes te vinden.
        name: Dumpster diving
      litterLooting:
        desc: >-
          Je kamt door de afgedankte spullen in de drukte van de stad, in de
          hoop om een verborgen schat te vinden tussen al het puin.
        name: Rommel roven
    jarvonia:
      cliffForaging:
        desc: >-
          Op de rand van de torenhoge klif verken je voorzichtig het ruige
          terrein, op zoek naar wilde bergkruiden, veerkrachtige paddenstoelen,
          en andere eetbare schatten die goed groeien in deze hoge omgeving.
        name: Verzamelen op kliffen
      coastForaging:
        desc: >-
          Terwijl je door de winterse kustlandschappen wandelt, word je één met
          de kou, op zoek naar voedsel en warmte tussen de besneeuwde rotsen en
          ijzige wateren.
        name: Jutten
      forestForaging:
        desc: >-
          In het winterse bos ga je met een scherp oog proberen verborgen
          schatten te vinden onder het deken van sneeuw, en omarm je de sensatie
          van het ontdekken van wat voor eetbaars de natuur te bieden heeft.
        name: Verzamelen in het bos
      glacierForaging:
        desc: >-
          Je zoekt ver en breed door de lege gletsjer. Je leert veel over
          jezelf, maar is er hier ook iets te vinden?
        name: Gletsjer verzamelen
      litterLooting:
        desc: >-
          In de levendige stad kam je door de afgedankte spullen in de hoop een
          verborgen juweeltje te vinden tussen het afval.
        name: Rommel roven
      plainsForaging:
        desc: >-
          Met elke zachte stap over de vlakten dompel je jezelf onder in de
          natuurlijke overvloed, en verzamel je wilde bessen, zaden, en
          kwetsbare jonge scheuten die goed gedijen in de grond onder je voeten.
        name: Verzamelen op de vlakten
      seashellSearching:
        desc: <PLAATSHOLDER>
        name: Schelpen zoeken
  mining:
    global:
      mineCoal:
        desc: >-
          Elke slag van je trouwe houweel legt aders steenkool bloot, essentieel
          als brandstof voor de smeden van het rijk om wapens en pantsers te
          smeden waarmee het koninkrijk verdedigd wordt.
        name: Steenkool mijnen
      mineCopperOre:
        desc: >-
          Het ritmische gerinkel van je pikhouweel tegen het rotsachtige
          oppervlak vult de lucht terwijl je hardnekkig kopererts blijft mijnen.
        name: Kopererts mijnen
      mineFarganiteOre:
        desc: >-
          Met bloed, zweet, en tranen lukt het je ondanks de ontzettende
          hardheid van het verganiet om af en toe wat los te krijgen.
        name: Verganieterts mijnen
      mineIronOre:
        desc: >-
          Elke zwaai onthult de nederige schoonheid van ijzererts, een
          betrouwbare grondstof met ontzettend veel praktische toepassingen.
        name: IJzererts mijnen
      mineTarsiliumOre:
        desc: >-
          Door je expertise weet je het donkere erts goed te vinden tussen de
          rotsen en hak je er kundig op los.
        name: Teerziliumerts mijnen
      mineTinOre:
        desc: >-
          Het geluid van je pikhouweel galmt door de mijn heen terwijl je
          onvermoeibaar doorhakt en de verbogen aderen met tinerts blootlegt die
          liggen te wachten om ontdekt te worden.
        name: Tinerst mijnen
    jarvonia:
      goldPanning:
        desc: >-
          Dit is een rudimentaire goudwinningstechniek die gebruik maakt van
          sedimentaire afzettingen in rivieren. Eerst wordt de pan
          ondergedompeld in het bodemzand. Door de pan met de hand te schudden,
          wordt het grind losgemaakt totdat alleen het zand en mogelijke
          goudklompjes overblijven.
        name: Goud wassen
      mineCoal:
        desc: >-
          Elke slag van je trouwe houweel legt aders steenkool bloot, dat
          essentieel is als brandstof voor de smeden van het rijk om wapens en
          pantsers te smeden waarmee het koninkrijk verdedigd wordt.
        name: Steenkool mijnen
      mineCopperOre:
        desc: >-
          Het ritmische gerinkel van je pikhouweel tegen het rotsachtige
          oppervlak vult de lucht terwijl je hardnekkig naar kopererts blijft
          zoeken.
        name: Kopererts mijnen
      mineFarganiteOre:
        desc: >-
          Met bloed, zweet, en tranen lukt het je ondanks de ontzettende
          hardheid van het verganiet om af en toe wat los te krijgen.
        name: Verganieterts mijnen
      mineIronOre:
        desc: >-
          Elke zwaai onthult de nederige schoonheid van ijzererts, een
          betrouwbare grondstof met ontzettend veel praktische toepassingen.
        name: IJzererts mijnen
      mineTarsiliumOre:
        desc: >-
          Tijdens je poging om teerziliumerts te mijnen, worden de diepe
          echoënde kamers van de aarde je canvas, en de ontdekking van elke
          nieuwe ader voelt als het opgraven van een stukje geschiedenis.
        name: Teerziliumerts mijnen
      mineTinOre:
        desc: >-
          Het geluid van je pikhouweel galmt door de mijn heen terwijl je
          onvermoeibaar doorhakt en de verbogen aderen met tinerts blootlegt die
          liggen te wachten om ontdekt te worden.
        name: Tinerts mijnen
      spelunking:
        desc: >-
          Je kruipt hard over de grond als een hagedis. Onheilspellende
          gedachten vertroebelen je geest en verlammen je bijna. Het lukt je om
          ze even opzij te schuiven en verder te gaan. Al snel openbaart zich
          een nieuw onontdekt pad dat je vervult met vreugde.
        name: Speleologie
      surfaceSaltMining:
        desc: >-
          Zout winnen in een mijn is zwaar werk omdat je snel uitgedroogd raakt
          door het constante contact met het zout. Gelukkig voor jou liggen deze
          halietkristallen (zoutsteen) op het goed geventileerde oppervlak en
          komen ze gemakkelijk los als je er met een houweel op slaat.
        name: Oppervlaktezoutwinning
  smithing:
    jarvonia:
      horseshoeMaking:
        desc: >-
          Met behulp van sterk metaal smeed je een hoefijzer dat de hoef van een
          paard beschermt op middelzwaar tot zwaar terrein. Hoewel er nagels
          worden gebruikt voor de bevestiging, heeft het paard er geen last van
          omdat de hoef niet gevoelig is, vergelijkbaar met een hele dikke
          menselijke vingernagel.
        name: Hoefijzers maken
  woodcutting:
    jarvonia:
      cutBirchTrees:
        desc: >-
          Je zwaait je bijl met al je kracht tegen de torenhoge berken,
          vastbesloten om ze om te hakken.
        name: Berken kappen
      cutMangroveTrees:
        desc: >-
          Terwijl je oppast om niet over hun verstrikkende wortels te
          struikelen, werk je hard om wat boomstammen van deze fascinerend
          gevormde bomen te pakken te krijgen.
        name: Mangrovebomen kappen
      cutMapleTrees:
        desc: >-
          Met flinke zwaaien van je bijl ga je aan de slag om de veerkrachtige
          esdoorns om te hakken, wat doorzettingsvermogen vereist door hun
          stevige stammen.
        name: Esdoorns kappen
      cutOakTrees:
        desc: >-
          Vastberaden hak je in op de torenhoge eikenbomen, waarvan de
          uitgespreide takken zich vormen tot een omhelzing van de natuur.
        name: Eiken kappen
      cutPineTrees:
        desc: Je zwaait vastberaden met je bijl om de dennenbomen om te hakken.
        name: Dennenbomen kappen
      cutSpruceTrees:
        desc: >-
          Je houdt je bijl stevig vast en gebruikt al je kracht om de torenhoge
          sparren omver te krijgen.
        name: Sparren kappen
      cutTeakTrees:
        desc: >-
          Zweet op je voorhoofd, blaren op je vingers, maar je bent vastberaden
          om een aantal boomstammen van dit duurzame en sterke hout te krijgen.
        name: Teakbomen kappen
      cutWillowTrees:
        desc: >-
          De brede stammen van deze wilgen blijken een uitdaging te zijn, maar
          met je behendige en krachtige zwaaien slaag je erin om ze een voor een
          omver te werpen.
        name: Wilgenbomen kappen
      firewoodMaking:
        desc: >-
          Met geduld, zweet, moeite en je trouwe bijl splijt je de boomstammen
          genadeloos. Kon je ze maar met je blote handen splijten, maar hier
          moet je op z'n minst een superheld voor zijn.
        name: Brandhout Maken
