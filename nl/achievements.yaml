singulars:
  cards:
    aFriendLikeMe:
      desc: 'Fenomenale kosmische krachten, piepkleine leefruimte'
      name: Een Vriend Als Ik
    anIdiotSandwhich:
      desc: '-"What are you?"\n- "An idiot sandwich."'
      name: An Idiot Sandwich
    andMyAxe:
      desc: >-
        Laat ze maar komen. Er is in ieder geval één Dwerg in Moria die nog
        ademhaalt.
      name: En Mijn Bijl!
    barbarianVillage:
      desc: >-
        Als je een leeg bierglas bij de vaten gebruikte voor de
        Gunnarsgrunn-update, zou een Barbaar je aangevallen hebben. Zodra je de
        Barbaar doodde, werd het glas gevuld.
      name: Barbaars Dorp
    goldDigger:
      desc: >-
        Toen ik zei dat je mijn liefde niet kunt kopen, bedoelde ik dat je daar
        te weinig voor verdient.
      name: Goudzoeker
    hellsKitchen:
      desc: Er is hier genoeg knoflook om iedere vampier in Europa mee te doden.
      name: Hell's Kitchen
    ifItIsBrokenFixIt:
      desc: In je eentje ontwikkelen is moeilijk.
      name: 'Als Het Kapot is, Repareer Het Dan.'
    infinityStones:
      desc: 'Perfect in balans, zoals alles zou moeten zijn.'
      name: Infinity Stones
    itsAMarathonNotASprint:
      desc: Dit is nog maar het begin. Doe hetzelfde nog een keer.
      name: 'Het Is Een Marathon, Geen Sprint'
    makeAManOutOfYou:
      desc: Geheimzinniger dan de keerzij van de <hl>MAAN!</hl>!
      name: Ik Maak Jullie Elk Tot Een Man
    masterHasGivenDobbyASock:
      desc: Dobby is... vrij
      name: Meester Heeft Dobby Een Sok Gegeven
    masterchef:
      desc: Jammie! Zo te zien ben je een prima kok.
      name: Meesterchef
    myPrecious:
      desc: >-
        Vervloekt die Balings! Het is weg! Wat heeft 't in zijn zakskes? O wij
        raden, wij raden het, m'n liefje. Hij heeft het gevonden, ja dat moet
        wel
      name: Mijn Lieveling
    oneCannotSimplyWalkToMordor:
      desc: >-
        Heb je je ooit afgevraagd hoe eenvoudig het zou zijn om Mordor binnen te
        lopen? Nou, <hl>nu weet je het</hl>.
      name: Je Loopt Mordor Niet Zomaar Binnen
    onlyYouCanPreventForestFires:
      desc: 'Door alle bomen om te hakken, is er letterlijk... nul procent kans?'
      name: Alleen Jij Kunt Bosbranden Voorkomen
    rockAndStone:
      desc: 'Zonder rots en steen, ga je nergens heen!'
      name: Rots en Seen!
    rockstar:
      desc: Hard rock hallelujah!
      name: Rockster
    thatsXcomBaby:
      desc: RNG kan soms erg frustrerend zijn.
      name: That's XCOM Baby
    touchTheGrass:
      desc: Nu ben je toch weer aan het buitenspelen.
      name: Buiten Spelen
    underTheSea:
      desc: >-
        Bij ons is een vis gelukkig\nAl krijgt ie hier niet veel zon\nAan land
        heeft de vis de pest in\nWant daar zwemt ie in een kom
      name: Diep In De Zee
    visitorOfTheFarLands:
      desc: >-
        De hoeveelheid blokken waar je over moet lopen om in Minecraft de "Far
        Lands" te bereiken.
      name: Bezoeker van de Far Lands
    walkOfShame:
      desc: >-
        \*kling\* Schaam je. \*kling\* Schaam je. \*kling\* Schaam je. \*kling\*
        Schaam je.
      name: Wandeling Van Schaamte
    whatATrip:
      desc: >-
        Als je er wat van eet, kun je gaan trippen. Kan het best in goed
        gezelschap geconsumeerd worden.
      name: Wat Een Trip
    winniePooh:
      desc: Soms nemen de kleinste dingen in je hart de meeste ruimte in.
      name: Winnie de Poeh
    youShallNotPass:
      desc: >-
        Ik dien het Geheime Vuur en draag de Vlam van Anor. Het duistere vuur
        kan je niet helpen, Vlam van Udûn. Ga terug naar de schaduw. <hl>Je komt
        er niet langs!<hl>
      name: Je Komt Er Niet Langs!
  requirements:
    catchCrabs: Vang <numberProgress /> krabben tijdens het vissen.
    chop5kTrees: Hak <numberProgress /> bomen om.
    collect1kMushrooms: Verzamel <numberProgress /> paddenstoelen.
    cook20DifferentRecipes: Kook <numberProgress /> verschillende recepten.
    craftAxeOfHighestQuality: Maak een bijl van de hoogste kwaliteit. <numberProgress />
    craftPickaxeOfHighestQuality: Maak een pikhouwel van de hoogste kwaliteit. <numberProgress />
    fail99PercentChance: Faal met 99% kans op succes. <numberProgress />
    failCooking100Times: |-

      Laat een kookpoging <numberProgress /> keer mislukken.
    findMysteriousG: Vind de mysterieuze "G". <numberProgress />
    gain100Honey: Verzamel <numberProgress /> honing.
    gain99Agility: Verhoog je behendigheid naar niveau <numberProgress />.
    gainRingWhileFishing: Vind een ring tijdens het vissen. <numberProgress />
    gainSocksRandomly: Vind sokken als willekeurige buit. <numberProgress />
    goToBarbantok: Ga naar het dorp Barbantok. <numberProgress />
    goToNoiselessPass: |
      Bezoek de Geruisloze Pas. <numberProgress />
    have5DifferentGems: Heb <numberProgress /> verschillende edelstenen in je inventaris.
    levelUpAnySkill: Verhoog een vaardigheidsniveau. <numberProgress />
    makeASandwich: Maak een boterham. <numberProgress />
    mine10kOres: Mijn <numberProgress /> ertsen.
    mine1kGoldOres: Mijn <numberProgress /> goudertsen.
    useALamp: Gebruik een XP-lamp. <numberProgress />
    walkSteps: Loop <numberProgress /> stappen.
    walkStepsWithoutGear: Loop <numberProgress /> stappen zonder uitrusting te dragen.
