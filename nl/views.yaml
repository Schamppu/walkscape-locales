singulars:
  achievements:
    info:
      pointsNeeded: >-
        <iconText name="achievement_point"
        text="@views.plurals.achievements.phrases.achievementPoint"
        color="${color}"/> totdat de volgende beloning is vrijgespeeld.
      viewDescription: >-
        Speel prestaties vrij om <hl>Beloningsvoortgang</hl> te verdienen. Als
        de Beloningsvoortgang vol is, krijg je een beloning voor al je
        personages. Sommige prestaties geven ook beloningen voor het vrijspelen
        ervan.
    phrases:
      notUnlocked: Vergrendelde prestatie
      rewardProgress: Beloningsvoortgang
  crafting:
    phrases:
      materials: Materialen
      recipes: Recepten
      requirements: Vereisten
      requirementsNotMet: Je voldoet niet aan de vereisten.
      requiresMaterial: Vereist een materiaal.
      requiresOneOfTheFollowing: Vereist een van de volgende materialen.
      rewards: Beloningen
  inventory:
    info:
      noItemEquipped: >-
        Geen voorwerp aan het dragen.\n\nJe kunt een voorwerp dragen door er een
        te selecteren in de onderstaande lijst en op "Dragen" te drukken.
      noItemSelected: >-
        Geen voorwerp geselecteerd.\n\nSelecteer hieronder een voorwerp om het
        te vergelijken met het huidige voorwerp en het te dragen.
    phrases:
      treasury: Schatkamer
  location:
    phrases:
      activities: Activiteiten
      services: Diensten
  pfpCreation:
    buttons:
      choose: Kiezen
      hideHat: Hoofddeksels verbergen
      randomize: Willekeurig
      showHat: Hoofddeksels tonen
    phrases:
      currentSelection: Huidige selectie
