singulars:
  consumables:
    cooking:
      bagel:
        desc: >-
          Een rond broodje met een gat erin. Eigenlijk gewoon een suikervrije
          donut.
        name: Bagel
      beer:
        desc: >-
          Fermentatie was misschien wel een belangrijkere ontdekking dan vuur.
          Geniet, maar drink met mate.
        name: Bier
      bread:
        desc: Onderdeel van de schijf van vijf. Ook de korstjes opeten!
        name: Brood
      cheese:
        desc: >-
          Er zitten aardig wat gaten in dit blok kaas. Jammer, want meer gaten
          betekent minder kaas.
        name: Kaas
      chocolate:
        desc: >-
          Een grote reep van heerlijke melkchocolade, zo zacht dat elke hap
          wegsmelt op je tong.
        name: Chocolade
      cookedEgg:
        desc: >-
          Gebakken precies zoals jij het wilt hebben: niet te zacht en niet te
          hard.
        name: Gebakken ei
      cookedMushrooms:
        desc: >-
          De nootachtige geur maakt je erg hongerig. Snoep je ze zo op, of
          bewaar je ze voor in een ander gerecht?
        name: Gebakken paddenstoelen
      cookedPotato:
        desc: 'Uit de grond, de oven in!'
        name: Gebakken aardappel
      cookedTomato:
        desc: >-
          Het is erg discutabel of dit beter is dan rauwe tomaat, maar het
          leverde in ieder geval wat kookervaring op.
        name: Gebakken tomaat
      fishSoup:
        desc: >-
          Gefeliciteerd, je hebt een vis uit het ene waterlichaam gehaald en in
          een andere gestopt.
        name: Vissoep
      friedFishSandwich:
        desc: Een boterham met wat gebakken vis erop. Pas op voor de graatjes!
        name: Boterham met gebakken vis
      friedNoodles:
        desc: >-
          Pittig gekruid en nog kokend heet. Hopelijk kan je met eetstokjes
          overweg.
        name: Gebakken noedels
      fruitCake:
        desc: >-
          Een machtige cake rijkelijk gevuld met gedroogd fruit, nootjes en
          specerijen!
        name: Fruitcake
      jam:
        desc: 'Jammie, jam. Een smeerbare combinatie van fruit en suiker.'
        name: Jam
      jellySandwich:
        desc: >-
          Een boterham met een flinke laag zoete jam erop. Een klassieker voor
          jong en oud.
        name: Boterham met jam
      mushroomCurry:
        desc: >-
          Een aromatische mix van kruiden en paddenstoelen. Perfect voor een
          stevige maaltijd.
        name: Paddenstoelencurry
      pancake:
        desc: >-
          Zoals een wijze man ooit zei: "Pannenkoek, pannenkoek, pannenkoek in
          m'n onderbroek."
        name: Pannenkoek
      pickles:
        desc: >-
          Een van de zuurste snacks, waardoor ze ook wel zure bommen worden
          genoemd.
        name: Augurken
      pie:
        desc: >-
          Taart gemaakt van rode bessen, zoals grootmoeder hem maakte. Er is een
          legende over een uitgestorven dwergenstam waarvan dit de absolute
          favoriet was.
        name: Taart
      porridge:
        desc: 'Prima ontbijtje! Tenminste, als er echt niets anders te vinden is...'
        name: Pap
      spicyPumpkinJuice:
        desc: Het perfecte drankje voor mensen uit Arenum in de herfst.
        name: Kruidig pompoensap
      tofu:
        desc: >-
          Het heeft een beetje een sponzige structuur en zit vol met eiwitten,
          vitamines, en mineralen.
        name: Tofu
      veggieSoup:
        desc: >-
          Een kom groentesoep, een bescheiden maar vullend gerecht dat door
          velen in Arenum wordt genuttigd.
        name: Groentesoep
      wine:
        desc: >-
          De nectar van zowel edelen als avonturiers. Het belooft een smaak van
          het verleden en het heden voor degenen die hun bekers heffen om te
          proosten.
        name: Wijn
  containers:
    skilling:
      foraging:
        foragingChest:
          desc: >-
            Een handig assortiment van gereedschap en voorwerpen die met
            verzamelen te maken hebben.
          name: Verzamelkist
      regional:
        galeforgeChest:
          desc: >-
            Het gerucht gaat dat deze kist rond is zodat deze door de stad
            gerold kan worden. Wat ingenieus!
          name: Kist van Raasoven
  crafted:
    equipmentSets:
      bronze:
        chest:
          desc: >-
            Een formidabele borstplaat ter verdediging, draagt de tijdloze
            erfenis van tradities in het maken van harnassen.
          name: Bronzen borstplaat
        gloves:
          desc: >-
            Meesterlijk gemaakt en erg stevig, omhullen de handen van
            avonturiers in een geruststellende omhelzing.
          name: Bronzen handschoenen
        heavyHelmet:
          desc: >-
            Gesmeed met geweldige vastberadenheid vormt het een eenvoudig schild
            voor de schedel van de drager.
          name: Bronzen zware helm
        legs:
          desc: >-
            Deze bronzen beenbescherming biedt feilloze bescherming voor elke
            opdracht.
          name: Bronzen beenstukken
        lightHelmet:
          desc: >-
            Het is duidelijk dat dit gemaakt is door meesters in het maken van
            defensieve hoofddeksels die niet ten koste gaan van snelheid en
            mobiliteit.
          name: Bronzen lichte helm
        shoes:
          desc: Ze zijn in ieder geval lichter dan de ijzeren uitvoering!
          name: Bronzen schoenen
      copper:
        chest:
          desc: >-
            Er was erg veel koper voor nodig, maar het beschermt wel de meest
            vitale delen van het lichaam.
          name: Koperen borstplaat
        gloves:
          desc: Koperen bedekking voor je handen.
          name: Koperen handschoenen
        heavyHelmet:
          desc: >-
            De koperen zware helm, een gezicht van veerkracht, offert alle
            behendigheid op voor maximale verdediging.
          name: Koperen zware helm
        legs:
          desc: >-
            Voorzien van een mix van stevigheid en bewegingsvrijheid om een
            basisniveau van bescherming te bieden.
          name: Koperen beenstukken
        lightHelmet:
          desc: >-
            Een glanzende kroon van bescherming, biedt een balans tussen lichte
            verdediging en behendigheid.
          name: Koperen lichte helm
        shoes:
          desc: >-
            Een paar zware laarzen die een kleine hoeveelheid bescherming
            bieden.
          name: Koperen schoenen
      farganite:
        chest:
          desc: >-
            Een ondoordringbaar fort op je borst. Je tegenstander kan zichzelf
            zien in het weerspiegelende blauwe oppervlak.
          name: Verganieten borstplaat
        gloves:
          desc: >-
            Een wonderbaarlijk paar handschoenen die de kleur van de lucht lijkt
            te reflecteren.
          name: Verganieten handschoenen
        heavyHelmet:
          desc: >-
            Een teken van de meest ervaren krijgers van het Westelijke
            Continent.
          name: Verganieten zware helm
        legs:
          desc: >-
            Een perfect balans tussen bescherming en gewicht, waardoor de drager
            goede mobiliteit en verdediging behoudt.
          name: Verganieten beenstukken
        lightHelmet:
          desc: >-
            Een raadselachtig meesterwerk van smeedswerk dat je gezicht omhult
            met een glinsterend blauwe kleur.
          name: Verganieten lichte helm
        shoes:
          desc: Ze zijn in ieder geval lichter dan de zwarte uitvoering!
          name: Verganieten schoenen
      iron:
        chest:
          desc: >-
            Het fungeert als een onverzettelijk bolwerk tegen gevaar en
            beschermt het torso van de drager met feilloze vastberadenheid.
          name: IJzeren borstplaat
        gloves:
          desc: >-
            Deze fijn gedetailleerde en stevige handschoenen bieden een
            geruststellende omhelzing voor de handen van avonturiers.
          name: IJzeren handschoenen
        heavyHelmet:
          desc: >-
            Deze helm dient als beschermer voor zij die het hart van gevaar in
            marcheren en geven de drager een ijzersterk zelfvertrouwen.
          name: IJzeren zware helm
        legs:
          desc: >-
            Ze zijn zwaar, maar bieden een redelijk goede bescherming voor je
            ledematen.
          name: IJzeren beenstukken
        lightHelmet:
          desc: >-
            Het glinstert met de belofte om avonturiers die hun opdracht
            beginnen te beschermen.
          name: IJzeren lichte helm
        shoes:
          desc: >-
            Je voeten hebben nog nooit zo zwaar gevoeld, maar je hebt er
            enigszins vertrouwen in dat er een zware kar overheen kan rijden
            zonder er iets aan over te houden.
          name: IJzeren schoenen
      steel:
        chest:
          desc: >-
            Een machtig bastion voor het torso en een bewijs van de ontembare
            geest van strijders en ridders.
          name: Stalen borstplaat
        gloves:
          desc: >-
            Gemaakt met de grootste zorgvuldigheid, waardoor ze zowel veerkracht
            als behendigheid bieden en de drager wapens en gereedschap met
            meesterlijke vaardigheid kan hanteren.
          name: Stalen handschoenen
        heavyHelmet:
          desc: >-
            Je raakt een beetje verblind door de schittering ervan op de rest
            van je harnas, maar je voelt je wel veilig.
          name: Stalen zware helm
        legs:
          desc: >-
            Ze glinsteren met de belofte om helden te beschermen terwijl zij de
            gevaren van hun epische opdrachten confronteren.
          name: Stalen beenstukken
        lightHelmet:
          desc: >-
            Een stralende beschermer van het hoofd die een middelmatige
            bescherming maar hoge zichtbaarheid biedt.
          name: Stalen lichte helm
        shoes:
          desc: Ze zijn in ieder geval lichter dan de ijzeren uitvoering!
          name: Stalen schoenen
      tarsilium:
        chest:
          desc: Een zwarte borstplaat.
          name: Teerzilium borstplaat
        gloves:
          desc: Een zwart paar handschoenen.
          name: Teerzilium handschoenen
        heavyHelmet:
          desc: Een zware zwarte helm.
          name: Teerzilium zware helm
        legs:
          desc: Een paar zwarte beenstukken.
          name: Teerzilium beenstukken
        lightHelmet:
          desc: Een lichte zwarte helm.
          name: Lichte teerzilium helm
        shoes:
          desc: >-
            Een zwart paar schoenen. Ze zijn in ieder geval lichter dan de
            stalen uitvoering!
          name: Teerzilium schoenen
    skilling:
      fishing:
        basicFishingPole:
          desc: >-
            Je weet wat ze zeggen, een slechte dag aan het meer is beter dan een
            goede dag aan het werk.
          name: Basis vishengel
        fishingSpear:
          desc: >-
            Het belichaamt de dans van roofdier en prooi onder het
            wateroppervlak en biedt een direct en betrouwbaar middel om voedsel
            uit het water te halen.
          name: Visspeer
        largeFishingNet:
          desc: >-
            Een creatie van kustgemeenschappen, een web van aspiraties die wijd
            uitgespreid zijn over de constant veranderende getijden.
          name: Groot visnet
        oakFishingRod:
          desc: >-
            Een meesterwerk van doorgewinterde ambachtslieden dat de kern van
            eeuwenoude bomen en hun blijvende wijsheid met zich meedraagt.
          name: Eiken vishengel
        pineFishingRod:
          desc: Een fris ruikende hengel die bestand is tegen de zwaarste vissen.
          name: Dennenhouten vishengel
        smallFishingNet:
          desc: >-
            Het basisnet, een bescheiden stuk gereedschap van een eenvoudige
            visser. Niet veel meer dan een paar samengebonden stukjes touw.
          name: Klein visnet
      mining:
        basicPickaxe:
          desc: >-
            Het basis pikhouwel, een nederig gereedschap van een mijnwerker.
            Niet veel meer dan een stok, een steen, en wat touw om alles vast te
            binden.
          name: Basis pikhouweel
        bronzePickaxe:
          desc: >-
            Het bronzen pikhouweel straalt rustieke charme en doorgrondende
            kracht uit.
          name: Bronzen pikhouweel
        copperPickaxe:
          desc: Een breekbaar en licht houweel om te mijnen. Doet wat het moet doen.
          name: Koperen pikhouweel
        farganitePickaxe:
          desc: >-
            Een perfecte reflectie van de kleuren van de lucht door de dag heen,
            zeker een zeldzaam pikhouweel.
          name: Verganieten pikhouweel
        ironPickaxe:
          desc: >-
            Met zijn zware houweel dient het als een trouwe partner voor degenen
            die de wildernis willen temmen of het onbekende willen trotseren.
          name: IJzeren pikhouweel
        steelPickaxe:
          desc: >-
            Het stalen pikhouweel glanst met de vastberadenheid van zijn maker,
            klaar om bevelen uit te voeren.
          name: Stalen pikhouweel
        tarsiliumPickaxe:
          desc: Een zwart pikhouweel.
          name: Teerzilium pikhouweel
      woodcutting:
        basicHatchet:
          desc: >-
            De basis hakbijl, een nederig gereedschap van een boswachter. Amper
            meer dan een stok, een steen, en wat touw om alles vast te binden.
          name: Basis hakbijl
        bronzeHatchet:
          desc: Goed om te beginnen met houthakken.
          name: Bronzen hakbijl
        copperHatchet:
          desc: >-
            Breekbaar en vrij licht om te gebruiken voor houthakken. Maar doet
            wat het moet doen.
          name: Koperen hakbijl
        farganiteHatchet:
          desc: >-
            Een perfecte reflectie van de kleuren van de lucht door de dag heen,
            zeker een zeldzame hakbijl.
          name: Verganieten hakbijl
        ironHatchet:
          desc: >-
            Met zijn zware lemmet dient het als een trouwe partner voor degenen
            die de wildernis willen temmen of het onbekende willen trotseren.
          name: IJzeren hakbijl
        steelHatchet:
          desc: >-
            De stalen hakbijl glanst met de vastberadenheid van de smit die hem
            gemaakt heeft, klaar om bevelen uit te voeren.
          name: Stalen hakbijl
        tarsiliumHatchet:
          desc: Een zwarte hakbijl.
          name: Teerzilium hakbijl
    woodcutting:
      bronzeHatchet:
        desc: Goed om te beginnen met houthakken.
        name: Bronzen hakbijl
  looted:
    equipmentSets:
      dimensional:
        chest:
          desc: >-
            De kraag en manchetten van dit overhemd zijn bedekt met sterrenstof.
            Golven van nietigheid spoelen langzaam over de rest van het shirt.
          name: Dimensionaal shirt
        feet:
          desc: >-
            Een tovenaar genaamd Tarhiel beweerde dat je met deze schoenen op
            sterrenstof kunt lopen. Sommigen zeggen dat hij tot op deze dag aan
            het vallen is.
          name: Dimensionale schoenen
        head:
          desc: >-
            Sterrenbeelden stippelen de rand van deze hoed uit. Overdag fonkelen
            ze zachtjes en 's nachts bewegen ze als wervelingen van leegte.
          name: Dimensionale hoed
        legs:
          desc: >-
            Sterrenstof en pailletten lijken deze stijlvolle broek eenvoudig bij
            elkaar te houden.
          name: Dimensionale broek
      enchanted:
        chest:
          desc: >-
            Elke keer dat je de kraag omhoog doet, zie je er een beetje cooler
            uit. Vooral met de bovenste knoop vast.
          name: Betoverd shirt
        feet:
          desc: >-
            Twee keer op de hakken klikken zorgt er niet echt voor dat je naar
            huis gaat, maar het klinkt wel cool als je erin loopt.
          name: Betoverde schoenen
        head:
          desc: >-
            Deze hoed kan wel 10 liter dragen. Waarvan? Dat heeft nog niemand
            ontdekt.
          name: Betoverde hoed
        legs:
          desc: Deze broek past altijd perfect en heeft zelfs zakken!
          name: Betoverde broek
    skilling:
      agility:
        exerciseHeadband:
          desc: >-
            Deze hoofdband herinnert je er aan dat kracht uit toewijding
            voortkomt en dat je innerlijke strijder elke uitdaging kan
            overwinnen, hoe fantasierijk of veeleisend dan ook.
          name: Hoofdzweetband
        medievalSneakers:
          desc: >-
            Met elke stap bieden ze de drager een stille en behendige reis door
            zowel oude als huidige rijken, waarbij de kloof tussen tijdperken
            wordt overbrugd.
          name: Middeleeuwse sneakers
      carpentry:
        handsaw:
          desc: >-
            Deze zaag belichaamt de harmonie tussen vakman en natuur, en
            verzekert de vaardigheid om hout met precisie en elegantie vorm te
            geven.
          name: Handzaag
        protectiveGloves:
          desc: >-
            Het is beter als de kans om je vingers er af te zagen verkleind
            worden naar 0%.
          name: Beschermende handschoenen
        toolbelt:
          desc: >-
            Een veelzijdig accessoire dat een partij aan
            houtbewerkingsinstrumenten draagt.
          name: Gereedschapsgordel
        woodworkingGlasses:
          desc: >-
            Als deze bril gedragen wordt, worden de ingewikkelde patronen en
            verhalen die in elk bord zitten onthuld.
          name: Houtbewerking bril
      cooking:
        chefsApron:
          desc: >-
            Met dit schort wordt elke maaltijd een meesterwerk en elk gerecht
            een kunstwerk.
          name: Keukenschort
        chefsHat:
          desc: >-
            Deze grillige hoed lijkt de magie van de keuken brengen en geeft
            inspiratie om met elke beweging van de spatel culinaire wonderen te
            produceren.
          name: Koksmuts
        meatCleaver:
          desc: >-
            Zijn scherpe stalen lemmet kan stukken vlees in kleinere stukjes
            hakken. Zoals je vingers, als je niet oppast.
          name: Hakmes
      crafting:
        candlehat:
          desc: Het is een hoed met een kaars eraan vast. Wat wil een mens nog meer?
          name: Kaarsenhoed
        craftingGuidebook:
          desc: >-
            Een boek vol grenzeloze creativiteit en een schat van kennis die
            generaties lang is doorgegeven door ambachtslieden en klussers.
          name: Ambachtshandleiding
        grippyGloves:
          desc: >-
            Ze bieden een stevige grip op de wereld en er gaan geruchten rond
            dat ze je helpen om nooit een schroef of andere kleine onderdelen te
            laten vallen.
          name: Griphandschoenen
        magnifyingLens:
          desc: >-
            Een gereedschap van meester-ambachtslieden die pogen de geheimen van
            complexe machines te ontrafelen en de wereld willen bestuderen op
            microscopisch niveau.
          name: Vergrootglas
      fishing:
        fishermansHat:
          desc: >-
            Symbool van het geduld van een visser en hun connectie met de
            eeuwige stromingen van de natuur.
          name: Vissershoed
        fishermansTrousers:
          desc: >-
            Gemaakt van veerkrachtig, waterdicht materiaal, waardoor ze
            bescherming bieden tegen de elementen terwijl je er toch soepel in
            kunt bewegen.
          name: Vissersbroek
      foraging:
        halflingsFeetSlippers:
          desc: >-
            Speels gemaakte slippers die op grote harige halvelingsvoeten
            lijken, inclusief kleine tenen en grillige details.
          name: Slippers van halvelingsvoeten
        hatWithAFeather:
          desc: >-
            Zijn aanwezigheid roept de geest van avontuur en de allure van verre
            landen op en belooft dat waar het ook gedragen wordt, verhalen over
            gedurfde escapades zeker zullen volgen.
          name: Hoed met veer
      mining:
        miningHelm:
          desc: >-
            Een baken in de diepten van de aarde. Straalt een constante gloed
            uit die de duisternis van ondergrondse gebieden doorboort.
          name: Mijnbouwhelm
        shovelAxe:
          desc: >-
            Een onmisbare metgezel voor avonturiers die begraven geheimen willen
            ontaarden en zich willen verdedigen tegen de gevaren die zouden
            kunnen verschijnen.
          name: Schepbijl
      smithing:
        smeltingGoggles:
          desc: >-
            Een schild voor de ogen om naar de brandende pracht van gesmolten
            metaal te staren.
          name: Lasbril
        smithsApron:
          desc: >-
            Een beschermende mantel van de smid en een tapijt van veerkracht en
            vakmanschap.
          name: Smidschort
      woodcutting:
        lumberjackShirt:
          desc: >-
            Een stevig en geruit schild tegen de elementen en bewijs van
            veerkracht van de houthakker.
          name: Houthakkershemd
        lumberjackTrousers:
          desc: >-
            Een fusie van duurzaamheid en praktisch nut, en het is het favoriete
            kledingstuk van zij die Ontgoochelde en andere bossen trotseren.
          name: Houthakkersbroek
    versatile:
      backpack:
        desc: Een eersteklas leren rugzak met extra vakken en veel opbergruimte.
        name: Rugzak
      bugCatchingNet:
        desc: >-
          Erg handig voor het vangen van vele soorten insecten, of zelfs...
          Kwallen?
        name: Insectenvangnet
      comfySlippers:
        desc: Elke stap genomen in deze sloffen voelt alsof je op wolken loopt.
        name: Comfortabele slippers
      fishingLure:
        desc: >-
          Handgemaakt door ervaren ambachtslieden, glinstert het met kleuren en
          patronen die dansen als iriserende schubben in het zonlicht.
        name: Kunstaas
      hatOfWisdom:
        desc: >-
          Wanneer deze hoed gedragen wordt, laat het de drager de wereld beter
          begrijpen.
        name: Hoed der wijsheid
      mosquitoNethat:
        desc: >-
          Deze hoed laat zijn drager in alle rust door de meest insectenrijke
          gebieden reizen, zodat diegene zijn focus houdt op de wonderen van de
          natuur.
        name: Klamboehoed
      pantsOfHaste:
        desc: Ik moet snel gaan!
        name: Haastbroek
      protectiveEarmuffs:
        desc: >-
          Een symbool voor gezond verstand dat de mogelijkheid biedt om de rust
          te bewaren midden in de chaos.
        name: Beschermende oorwarmers
      recipeBook:
        desc: >-
          Een culinair metgezel voor aspirant-koks die de sleutels biedt tot het
          ontgrendelen van de smaken van de wereld en het maken van gerechten
          die niets minder dan betoverend zijn.
        name: Receptenboek
      snowshoes:
        desc: >-
          Hiermee kan de drager zelfs in de zwaarste sneeuwstormen ongehinderd
          de ijzige wonderen van de wereld verkennen.
        name: Sneeuwschoenen
      utilityPants:
        desc: Ik wil ook zo'n broek met van die zakken aan de zijkant!
        name: Werkbroek
      veryLongBootS:
        desc: >-
          Afhankelijk van je lengte kunnen deze tot je schenen, boven je knieën,
          of zelfs tot je heupen komen.
        name: Erg lange laarzen
      warmBeanie:
        desc: >-
          Geweven met vorstbestendigde draden omarmt het het hoofd van de drager
          als een troostende knuffel van een haardvuur.
        name: Warme muts
      warmJacket:
        desc: Een erg warm jasje voor erg koud weer.
        name: Warme jas
      waterproofPants:
        desc: >-
          Ze verzekeren dat de drager droog en comfortabel blijft in zelfs de
          heftigste stortbuien of tijdens het navigeren door verraderlijke
          moerasgebieden.
        name: Waterdichte broek
  materials:
    carpentry:
      birchPlank:
        desc: >-
          De gladde en bleke berkenplank is een toonbeeld van eenvoud en
          elegantie door zijn zuivere en lichte houtuiterlijk.
        name: Berken plank
      maplePlank:
        desc: >-
          De esthetische en uitnodigende esdoornplank heeft een glad en
          lichtgekleurd oppervlak wat een vleugje verfijning toevoegt aan elk
          project.
        name: Essenhout plank
      oakPlank:
        desc: >-
          Een tijdloze keuze voor houtbewerkingsprojecten die zich onderscheidt
          door zijn rijke, aardse kleurtonen en prominente, ingewikkelde
          houtnerfpatronen.
        name: Eiken plank
      pinePlank:
        desc: >-
          Door zijn warme aardse kleurtonen straalt de dennenhouten plank een
          rustieke charme uit met zijn natuurlijke houtnerfpatroon.
        name: Dennenhouten plank
      sprucePlank:
        desc: >-
          Met een fijne houtnerfstructuur belichaamt de dennenhouten plank een
          gevoel van elegantie met zijn strakke en klassieke uiterlijk.
        name: Sparrenhouten plank
    cooking:
      milk:
        desc: 'Rechtstreeks van de koe, geit, of kameel. Of geperst uit wat noten?'
        name: Melk
      salt:
        desc: >-
          Elke korrel is een fragment van vergeten oceanen, doordrenkt met de
          kracht om te zuiveren, beschermen, en een vleugje betovering toe te
          voegen aan elk gerecht.
        name: Zout
    foraging:
      acidSapling:
        desc: >-
          Hoewel het amper zo groot is als een twijgje, verbrandt het
          okerkleurige jonge boompje bijna je huid als je ermee in aanraking
          komt.
        name: Zuur stekje
      catsBell:
        desc: Want er is zo veel te doen.
        name: Kattenbel
      cotton:
        desc: Zacht en donzig materiaal dat fijn aanvoelt en comfort biedt.
        name: Katoen
      deathsToll:
        desc: >-
          Het ziet er misschien uitnodigend uit, maar ik zou het niet in deze
          vorm consumeren.
        name: Tol van de Dood
      flax:
        desc: >-
          Delicate blauwe bloesems die sterke draden opleveren. Perfect voor het
          maken van linnen.
        name: Vlas
      hemp:
        desc: >-
          Lange en bladrijke plant met slanke stengels, bekend om zijn
          veelzijdige vezels en praktische toepassingen.
        name: Hennep
      iceplum:
        desc: >-
          Kleine vruchten met een ijzige buitenkant, glinsterend in paarse
          tinten.
        name: IJspruim
      moondaisy:
        desc: >-
          Een fragiele bloem die gloeit in het maanlicht op de donkerste
          nachten.
        name: Maandeliefje
      nettle:
        desc: 'Hoge, slanke plant met hartvormige bladeren die flink prikt.'
        name: Brandnetel
      nightgem:
        desc: >-
          De donkere edelsteen lijkt al het licht om zich heen op een
          magnetische manier te absorberen.
        name: Nachtkristal
      rotbud:
        desc: >-
          Zoals een truffel een varken roept, roept de bodrut de halvelingen van
          de Grote Moerassen.
        name: Knopsrot
      shadowLeaf:
        desc: >-
          Het donkere blad verkruimelt bijna bij aanraking of licht. Op een
          donkere plek bewaren.
        name: Schaduwblad
      silkwormSilk:
        desc: >-
          Een zijde zo fijn dat er misschien wel een handelsroute over het hele
          continent voor nodig is.
        name: Zijderups zijde
      snowdrop:
        desc: >-
          Kleine witte bloem die bloeit in de winter, een zachte herinnering aan
          hoop en een nieuw begin.
        name: Sneeuwklokje
      starflower:
        desc: >-
          Een gloeiende vijfpuntige ster bovenop een bladerige stengel. Het is
          gebruikelijk om een wens te doen wanneer je er een vindt.
        name: Sterbloem
      stone:
        desc: Misschien kan je er iets mee maken wat je helpt om te overleven?
        name: Steen
      sunblossom:
        desc: >-
          Prachtige bloesem van gouden bloemblaadjes, die helder stralen door de
          schittering van de zon.
        name: Zonnebloesem
      thistle:
        desc: >-
          Robuuste plant met stekelige bladeren die een beschermend schild
          vormen rond de kleurrijke bloemen.
        name: Distel
      widowsKiss:
        desc: >-
          De roze bol nodigt uit om dichterbij te komen, maar het is beter om
          afstand te houden.
        name: Weduwskus
      woodenStick:
        desc: >-
          Een puntig stuk hout. Misschien kun je er iets mee maken wat je helpt
          om te overleven?
        name: Houten stok
    mining:
      coal:
        desc: >-
          Bescheiden en zonder poeha, bewijst steenkool zich als een essentële
          energiebron.
        name: Steenkool
      copperOre:
        desc: >-
          Met zijn roodachtige kleur onderscheid de kopererts zich van andere
          mineralen
        name: Kopererts
      farganiteOre:
        desc: >-
          Het verganiet dankt zijn naam aan zijn ondoordingbare hardheid, wat
          het erts met zijn blauwe gloed een symbool heeft gemaakt van
          onbreekbare vastberadenheid.
        name: Verganieterts
      ironOre:
        desc: >-
          Het ijzererts voelt korrelig en dicht aan, wat de robuuste en
          ongeraffineerde aard ervan weerspiegelt.
        name: IJzererts
      tarsiliumOre:
        desc: >-
          Het gladde en reflecterende oppervlak van het teerziliumerts
          weerkaatst de omringende wereld met een bijna magische schittering.
        name: Teerziliumerts
      tinOre:
        desc: >-
          Het eenvoudige en bescheiden tinerts laat zijn ongecompliceerde
          minerale samenstelling zien.
        name: Tinerts
    rawFish:
      rawCarp:
        desc: >-
          De milde smaak van de karper leent zich goed voor verschillende
          culinaire bereidingen. Deze vissen springen graag.
        name: Rauwe karper
      rawCrayfish:
        desc: >-
          Rivierkreeften zijn een sappig genot voor liefhebbers van vis en
          schaaldieren.
        name: Rauwe rivierkreeft
      rawJellyfish:
        desc: >-
          Als culinaire curiositeit nodigt de kwal uit tot verkenning en daagt
          hij chef-koks uit om de vreemde textuur te omarmen.
        name: Rauwe kwal
      rawLobster:
        desc: >-
          De kreeft heeft een taaie schaal en sterke scharen. Brengt je terug in
          de tijd, nietwaar?
        name: Rauwe kreeft
      rawMoray:
        desc: >-
          De murene heeft een lang, slangachtig lichaam en unieke kaken,
          waardoor hij er mysterieus uitziet vanuit de diepzee.
        name: Rauwe murene
      rawPerch:
        desc: >-
          De slanke en beweeglijke baars is een prima vis voor nieuwe
          visliefhebbers om te vangen.
        name: Rauwe baars
      rawPike:
        desc: >-
          Met zijn vlokkerige en malse vlees leent rauwe snoek zich goed om
          gekookt te worden.
        name: Rauwe snoek
      rawSalmon:
        desc: >-
          Met zijn sappige en boterachtige vlees verrukt zalm het gehemelte met
          zijn rijke en fluweelzachte textuur.
        name: Rauwe zalm
      rawSeabass:
        desc: Zeebaars glanst met zilveren schubben.
        name: Rauwe zeebaars
      rawShrimp:
        desc: >-
          Met hun ongerepte uiterlijk verleiden de garnalen met het vooruitzicht
          van een heerlijk zeevruchtenfestijn.
        name: Rauwe garnalen
      rawSquid:
        desc: De inktvis verrast met zijn talent voor verdwijntrucs.
        name: Rauwe inktvis
      rawStreamEel:
        desc: >-
          De gestroomlijnde vorm van de paling weerspiegelt zijn
          aanpassingsvermogen aan stromende rivieren en beken.
        name: Rauwe paling
      rawTrout:
        desc: >-
          De forel laat een betoverend tapijt van meerkleurige schubben zien,
          met tinten zilver, roze en gespikkelde patronen.
        name: Rauwe forel
    smithing:
      bronzeBar:
        desc: >-
          Dit overblijfsel uit dwergen-smederijen straalt rustieke charme en
          duurzaamheid uit en draagt de geheimen van door ervaren handen
          samengesmolten koper en tin.
        name: Bronzen staaf
      copperBar:
        desc: >-
          Reflecteert zijn metalen kracht en veelzijdigheid in verschillende
          toepassingen met een rood-oranje glans.
        name: Koperen staaf
      farganiteBar:
        desc: >-
          Een blauwtint tussen de zee en de lucht, die er cool uit ziet zelfs
          als het heet en klaar is om mee te werken.
        name: Verganieten staaf
      ironBar:
        desc: 'Het bewijs van de kracht van de aardkern, zwaar en onverzettelijk.'
        name: IJzeren staaf
      steelBar:
        desc: >-
          Gesmeed in het vuur van vastberadenheid, de stalen staaf glinsterend
          met een etherische glans.
        name: Stalen staaf
      tarsiliumBar:
        desc: >-
          Door de olie-achtige textuur glinstert de teerzilium staaf als de
          nachtelijke hemel.
        name: Teerzilium staaf
    woodcutting:
      birchLogs:
        desc: Gladde en bleke berkenstammen die een elegante eenvoud uitstralen.
        name: Berkenstammen
      mapleLogs:
        desc: >-
          De esdoornstammen hebben een rijke en gegroefde nerf, waardoor de
          kunstzinnigheid van de natuur in elk stuk zichtbaar is.
        name: Esdoornstammen
      oakLogs:
        desc: >-
          De eikenstammen, versierd met een uitgesproken karakter, stralen een
          gevoel van nobele aanwezigheid en blijvende gratie uit.
        name: Eikenstammen
      pineLogs:
        desc: >-
          De dennenstammen zijn sterk en harsachtig en verspreiden een
          uitgesproken en prettige aroma.
        name: Dennenstammen
      spruceLogs:
        desc: >-
          De sparrenhouten stammen hebben een rijke en warme toon, waardoor hun
          natuurlijke schoonheid en aantrekkingskracht goed tot hun recht komen.
        name: Sparrenstammen
