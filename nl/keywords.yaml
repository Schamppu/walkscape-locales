singulars:
  activities:
    fishing:
      name: Vissen
      requirementLevel: Vereist een visactiviteit met ten minste <keywordRequirements
        /> in zijn vereisten.
      requirement: Vereist een <object id="activity_fishing" /> activiteit.
    miningOres:
      requirementLevel: Vereist een ertsdelf-activiteit met ten minste <keywordRequirements
        /> in zijn vereisten.
      name: Erts delven
      requirement: Vereist een <object id="activity_mining" /> activiteit.
    woodcuttingTrees:
      requirementLevel: Vereist een houthakactiviteit met tenminste <keywordRequirements
        /> in zijn vereisten.
      name: Houthakken
      requirement: Vereist een <object id="woodcuttingTrees" />-activiteit.
    foragingPlants:
      name: Planten foerageren
      requirement: Vereist een <object id="activity_foraging" /> activiteit.
      requirementLevel: Vereist een plantenverzamel-activiteit met ten minste <keywordRequirements
        /> in zijn vereisten.
  materials:
    fish:
      name: Vis
      requirement: Vereist een <object id="fish" />.
      requirementLevel: Vereist een vis welke op z'n minst <keywordRequirements />
        vereist.
    logs:
      name: Hout
      requirement: Vereist <object id="logs" />.
      requirementLevel: Vereist hout met minstens <keywordRequirements /> in zijn
        vereisten.
    plant:
      name: Plant
      requirement: Vereist een <object id="plant" />.
      requirementLevel: Vereist een plant welke op z'n minst <keywordRequirements
        /> vereist.
    ore:
      name: Erts
      requirement: Vereist <object id="ore" />.
      requirementLevel: Vereist erts welke op z'n minst <keywordRequirements /> vereist.
    bar:
      name: Staaf
      requirement: Vereist een <object id="bar" />.
      requirementLevel: Vereist een staaf welke op z'n minst <keywordRequirements
        /> vereist.
    plank:
      name: Plank
      requirement: Vereist een <object id="plank" />.
      requirementLevel: Vereist een plank welke op z'n minst <keywordRequirements
        /> vereist.
    gem:
      name: Juweel
      requirement: Vereist een <object id="gem" />.
      requirementLevel: Vereist een juweel welke op z'n minst <keywordRequirements
        /> vereist.
    mushroom:
      name: Paddenstoel
      requirement: Vereist een <object id="mushroom" />.
      requirementLevel: Vereist een paddenstoel welke op z'n minst <keywordRequirements
        /> vereist.
    nugget:
      requirement: Vereist een <object id="nugget" />.
      name: Klompje
      requirementLevel: Vereist een klompje met minstens <keywordRequirements /> in
        zijn vereisten.
    processed:
      requirement: Vereist een <object id="processed" /> materiaal.
      name: Bewerkt
      requirementLevel: Vereist een verwerkt materiaal met minstens <keywordRequirements
        /> in zijn vereisten.
    offcut:
      name: Restant
      requirement: Vereist een <object id="offcut" />.
      requirementLevel: Vereist een overblijfsel met minstens <keywordRequirements
        /> in zijn vereisten.
    roughGem:
      name: Ruwe edelsteen
      requirement: Vereist een <object id="rough_gem" />.
      requirementLevel: Vereist een ruwe edelsteen met minstens <keywordRequirements
        /> in zijn vereisten.
    cutGem:
      name: Geslepen edelsteen
      requirement: Vereist een <object id="cut_gem" />.
      requirementLevel: Vereist een geslepen edelsteen met minstens <keywordRequirements
        /> in zijn vereisten.
    trinket:
      name: Snuisterij
      requirement: Vereist een <object id="trinket" />.
      requirementLevel: Vereist een snuisterij met minstens <keywordRequirements />
        in zijn vereisten.
    ingredient:
      name: Ingrediënt
      ingredient: Vereist een <object id="ingredient" />.
      requirementLevel: Vereist een ingrediënt dat tenminste <keywordRequirements
        /> in zijn vereisten heeft.
    misc:
      name: Diversen.
      requirementLevel: Vereist een overig voorwerp met minstens <keywordRequirements
        /> in zijn vereisten.
      requirement: Vereist een <object id="misc" /> voorwerp.
  tools:
    ruler:
      requirement: Vereist het dragen van een <object id="ruler" />.
      name: Liniaal
      requirementLevel: Vereist een liniaal welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Een meetinstrument voor nauwkeurige metingen. Handig voor <object id="carpentry"
        />.
    cookingPan:
      requirementLevel: Vereist een pan welke op z'n minst <keywordRequirements />
        vereist.
      name: Pan
      requirement: Vereist het dragen van een <object id="cookingPan" />.
      desc: Heel handig om eten in te roeren! Pannen geven bonussen voor de vaardigheid
        <object id="cooking" />.
    woodcuttingHatchet:
      requirementLevel: Vereist een houthakkersbijl welke op z'n minst <keywordRequirements
        /> vereist.
      name: Bijl
      requirement: Vereist het dragen van een <object id="woodcuttingHatchet" />.
      desc: Bijlen zijn nodig om hout te hakken. Je moet ermee uitgerust zijn om bomen
        te kappen.
    carpentryTool:
      requirementLevel: Vereist timmergereedschap welke op z'n minst <keywordRequirements
        /> vereist.
      name: Timmergereedschap
      requirement: Vereist het dragen van een <object id="carpentryTool" />.
      desc: Tot het timmermansgereedschap behoren zagen en beitels.
    knife:
      requirementLevel: Vereist een mes welke op z'n minst <keywordRequirements />
        vereist.
      name: Mes
      requirement: Vereist het dragen van een <object id="knife" />.
      desc: Scherp, dus pas op voor je vingers! Handig om dingen mee te snijden, en
        dus ook voor <object id="cooking" />.
    sickle:
      requirementLevel: Vereist een sikkel welke op z'n minst <keywordRequirements
        /> vereist.
      name: Sikkel
      requirement: Vereist het dragen van een <object id="sickle" />.
      desc: Een hulpmiddel dat wordt gebruikt bij het <object id="foraging" />.
    pickaxe:
      requirementLevel: Vereist een pikhouweel welke op z'n minst <keywordRequirements
        /> vereist.
      name: Pikhouweel
      requirement: Vereist het dragen van een <object id="pickaxe" />.
      desc: Pikhouweels zijn nodig voor het delven. Je moet deze bij je hebben om
        ertsen en edelstenen te delven.
    fishingNet:
      requirementLevel: Vereist een visnet welke op z'n minst <keywordRequirements
        /> vereist.
      name: Visnet
      requirement: Vereist het dragen van een <object id="fishingNet" />.
      desc: Voor het vissen met netten zijn visnetten nodig. Je moet hierover beschikken
        om vis te kunnen vangen.
    screwdriver:
      requirementLevel: Vereist een schroevendraaier welke op z'n minst <keywordRequirements
        /> vereist.
      name: Schroevendraaier
      requirement: Vereist het dragen van een <object id="screwdriver" />.
      desc: Schroevendraaiers worden gebruikt bij <object id="crafting" /> en leveren
        bonussen op voor die vaardigheid.
    cookingSpices:
      requirementLevel: Vereist specerijen welke op z'n minst <keywordRequirements
        /> vereist.
      name: Specerijen
      requirement: Vereist het dragen van <object id="cookingSpices" />.
      desc: Vroeger was het erg duur. Tegenwoordig is het handig om mee te koken.
    goldPan:
      name: Goudpan
      requirement: Vereist het dragen van een <object id="goldPan" />.
      requirementLevel: Vereist een goudpan welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Robuuste zeven die worden gebruikt om waardevolle metalen uit sediment
        in water te scheiden.
    magnetic:
      name: Magnetisch
      requirement: Vereist het dragen van een <object id="magnetic" /> voorwerp.
      requirementLevel: Vereist een magneet welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Heel aantrekkelijk. Voor sommige activiteiten zijn voorwerpen met magnetische
        eigenschappen nodig.
    tool:
      name: Gereedschap
      requirement: Vereist het dragen van <object id="tool" />.
      requirementLevel: Vereist gereedschap welke op z'n minst <keywordRequirements
        /> vereist.
    fishingRod:
      name: Vishengel
      requirement: Vereist het dragen van een <object id="fishingRod" />.
      requirementLevel: Vereist een vishengel welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Voor het vissen met een hengel heb je een vishengel nodig. Je moet de
        juiste uitrusting hebben om vis te kunnen vangen.
    fishingSpear:
      name: Visspeer
      requirement: Vereist het dragen van een <object id="fishingSpear" />.
      requirementLevel: Vereist een visserij speer welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Voor het speervissen zijn speerharpoenen nodig. Je moet deze bij je hebben
        om vis te kunnen vangen.
    fishingCage:
      name: Visserij kooi
      requirement: Vereist het dragen van een <object id="fishingCage" />.
      requirementLevel: Vereist een visserij kooi welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Voor het vissen met kooien zijn viskooien nodig. Deze moeten zijn uitgerust
        om vis te vangen.
    fishing:
      name: Vissen
      requirement: Vereist een hulpmiddel voor vissen.
      requirementLevel: Vereist een hulpmiddel voor vissen welke op z'n minst <keywordRequirements
        /> vereist.
    cookingTool:
      requirement: Vereist het dragen van <object id="cookingTool" />.
      name: Kookgereedschap
      requirementLevel: Vereist kookgereedschap welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Kookgerei bestaat uit pannen, messen en snijplanken.
    craftingTool:
      name: Vervaardigingsgereedschap
      requirement: Vereist het dragen van een <object id="craftingTool" />.
      requirementLevel: Vereist vervaardigingsgereedschap met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Tot gereedschap om dingen te vervaardigen behoren moersleutels en schroevendraaiers.
    fishingLure:
      name: Kunstaas
      requirement: Vereist het dragen van een <object id="fishingLure" />.
      requirementLevel: Vereist lokaas welke op z'n minst <keywordRequirements />
        vereist.
      desc: Je kunt een kunstaas gebruiken om vissen gemakkelijker aan te trekken.
    magnifyingLense:
      name: Vergrootglas
      requirement: Vereist het dragen van een <object id="magnifyingLense" />.
      requirementLevel: Vereist een vergrootglas met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Vergrootglazen zijn handig bij bepaalde <skillType type="artisan"/> vaardigheden.
    cookingKnife:
      name: Mes
      requirement: Vereist het dragen van een <object id="cookingKnife" />.
      requirementLevel: Vereist een mes welke op z'n minst <keywordRequirements />
        vereist.
      desc: Kookmessen worden gebruikt om ingrediënten voor het koken te snijden.
    cookingPot:
      name: Kookpot
      requirement: Vereist het dragen van een <object id="cookingPot" />.
      requirementLevel: Vereist een kookpot welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Handige hulpmiddelen voor <object id="cooking" />. Ook bekend om het verwijten
        van ketels.
    cuttingBoard:
      name: Snijplank
      requirement: Vereist het dragen van een <object id="cuttingBoard" />.
      requirementLevel: Vereist een snijplank welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Wordt gebruikt als werkblad om ingrediënten op te snijden.
    chisel:
      name: Beitel
      requirement: Vereist het dragen van een <object id="chisel" />.
      requirementLevel: Vereist een beitel met minstens <keywordRequirements /> in
        zijn vereisten.
      desc: Beitels worden gebruikt bij <object id="carpentry" /> en <object id="trinketry"
        /> en leveren bonussen op voor die vaardigheden.
    saw:
      name: Zaag
      requirement: Vereist het dragen van een <object id="saw" />.
      requirementLevel: Vereist een zaag welke op z'n minst <keywordRequirements />
        vereist.
      desc: Zagen worden voornamelijk gebruikt bij <object id="carpentry" /> en leveren
        bonussen op voor die vaardigheid.
    smithingHammer:
      name: Smeedhamer
      requirement: Vereist het dragen van een <object id="smithingHammer" />.
      requirementLevel: Vereist een smeedhamer welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Een zware hamer die wordt gebruikt om metaal in vorm te slaan. Handig
        voor <object id="smithing" />.
    localMap:
      name: Lokale kaart
      requirement: Vereist het dragen van een <object id="localMap" />.
      requirementLevel: Vereist een lokale kaart met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Geeft informatie over een specifiek deel van de wereld en levert bonussen
        op in dat gebied.
    wrench:
      name: Moersleutel
      requirement: Vereist het dragen van een <object id="wrench" />.
      requirementLevel: Vereist een moersleutel welke op z'n minst <keywordRequirements
        /> vereist.
      desc: Een stuk gereedschap om bouten en moeren vast of los te draaien. Handig
        voor <object id="crafting" />.
    foragingTool:
      requirement: Vereist het dragen van een <object id="foragingTool" />.
      requirementLevel: Vereist een verzamelgereedschap met minstens <keywordRequirements
        /> in zijn vereisten.
      name: Verzamelgereedschap
      desc: Een hulpmiddel dat wordt gebruikt bij het foerageren.
    logSplitter:
      requirement: Vereist het dragen van een <object id="item_log_splitter" />.
      name: Houtklover
      requirementlevel: Vereist een houtklover met minstens <keywordRequirements />
        in zijn vereisten.
      desc: Een stuk gereedschap dat, naast bijlen, ook gebruikt kan worden voor <object
        id="woodcutting" /> .
    fishingTool:
      name: Visgerei
      requirement: Vereist het dragen van <object id="fishingTool" /> gerelateerd
        gereedschap.
      requirementLevel: Vereist visgerei met minstens <keywordRequirements /> in zijn
        vereisten.
      desc: Tot de visuitrusting behoren vishengels, harpoenen, netten en kooien.
    agilityTool:
      name: Behendigheidsgereedschap
      requirement: Vereist het dragen van een <object id="agilityTool" />.
      requirementLevel: Vereist een behendigheidsgereedschap met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Een hulpmiddel dat wordt gebruikt bij behendigheidsactiviteiten.
    sander:
      name: Schuurpapier
      requirement: Vereist het dragen van <object id="sander" />.
      requirementLevel: Vereist schuurpapier met minstens <keywordRequirements />
        in zijn vereisten.
      desc: Een gereedschap dat wordt gebruikt om oppervlakken glad te maken. Handig
        voor <object id="trinketry" />.
    woodcuttingTool:
      requirement: Vereist het dragen van een <object id="woodcuttingTool" />.
      name: Houthakkersgereedschap
      requirementLevel: Vereist een houthakkersgereedschap met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Een gereedschap dat wordt gebruikt voor het houthakken.
    miningTool:
      name: Delfgereedschap
      requirement: Vereist het dragen van een <object id="miningTool" />.
      requirementLevel: Vereist een delfgereedschap met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Een gereedschap dat wordt gebruikt bij het delven.
    trinketryTool:
      name: Sierraderijgereedschap
      requirement: Vereist het dragen van een <object id="trinketryTool" />.
      requirementLevel: Vereist een sierraderijgereedschap met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Een hulpmiddel dat wordt gebruikt in de sierraderij.
    smithingTool:
      requirement: Vereist het dragen van een <object id="smithingTool" />.
      name: Smeedgereedschap
      requirementLevel: Vereist een smeedgereedschap met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Een gereedschap dat wordt gebruikt bij het smeden.
    huntingBow:
      name: Jachtboog
      requirement: Vereist uitgerust te zijn met een <object id="huntingBow" />.
      requirementLevel: Vereist een jagersboog met minstens <keywordRequirements />
        in zijn vereisten.
      desc: Een boog die wordt gebruikt voor het <object id="hunting" /> van dieren
        (en andere dingen die je kunnen irriteren).
    skillBook:
      name: Vaardigheidsboek
      requirement: Vereist uitgerust te zijn met een <object id="skillBook" />.
      requirementlevel: Vereist een vaardigheidsboek met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Geeft zowel een bonus als een straf voor een bepaalde vaardigheid.
    huntingTrap:
      name: Jachtval
      requirement: Vereist het dragen van een <object id="huntingTrap" />.
      requirementLevel: Vereist een jagersval met minstens <keywordRequirements />
        in zijn vereisten.
      desc: Een val die wordt gebruikt voor het <object id="hunting" /> van dieren.
    pliers:
      desc: Een tang wordt gebruikt om voorwerpen nauwkeurig vast te pakken en te
        buigen. Handig voor <object id="trinketry" />.
      requirementLevel: Vereist een tang welke op z'n minst <keywordRequirements />
        vereist.
      name: Tang
      requirement: Vereist het dragen van een <object id="pliers" />.
    birdhouse:
      requirement: Hiervoor is een <object id="birdhouse" /> nodig.
      name: Vogelhuisje
      desc: Vogelhuisjes worden misschien later aan het spel toegevoegd.
      requirementLevel: Vereist een vogelhuisje met minstens <keywordRequirements
        /> in zijn vereisten.
    needle:
      desc: Een hulpmiddel dat wordt gebruikt bij het naaien. Handig voor <object
        id="tailoring" />.
      name: Naald
      requirement: Vereist het dragen van een <object id="needle" />.
      requirementLevel: Vereist een naald met minstens <keywordRequirements /> in
        zijn vereisten.
  recipes:
    skills:
      cooking:
        name: Kookrecept
        requirement: Vereist een <object id="recipe_cooking" />.
      smithing:
        smelting:
          name: Smelten
          requirement: Vereist materialen die gebruikt kunnen worden om te smelten
            met <object id="smithing" />.
    products:
      sandwich:
        name: Boterhamrecept
        requirements: Vereist het maken van een <object id="sandwich" /> volgens een
          <object id="recipe_cooking" />.
        requirement: Vereist het maken van een <object id="sandwich" /> volgens een
          <object id="recipe_cooking" />.
  gear:
    frisbee:
      name: Luchtschijf
      requirementLevel: Vereist een luchtschijf met ten minste <keywordRequirements
        /> in zijn vereisten.
      requirement: Vereist het dragen van een <object id="frisbee" />.
      desc: Luchtschijven worden gebruikt voor bepaalde sportactiviteiten, zoals luchtschijf
        golf.
    skillingGear:
      name: Vaardigheidsuitrusting
      requirement: Vereist het dragen van <object id="skillingGear" />.
      requirementLevel: Vereist vaardigheidsuitrusting met minstens <keywordRequirements
        /> in zijn vereisten.
    skis:
      name: Ski's
      requirement: Vereist het dragen van <object id="skis" />.
      requirementLevel: Vereist ski's met minstens <keywordRequirements /> in hun
        vereisten.
      desc: Met ski's kun je door besneeuwde gebieden reizen en kun je afkortingen
        in Jarvonië vrijspelen. Ze zijn ook nodig voor bepaalde winteractiviteiten.
    lifeVest:
      name: Reddingsvest
      requirement: Vereist het dragen van een <object id="lifevest" />.
      requirementLevel: Vereist een reddingsvest met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Zorgt ervoor dat je blijft drijven in het water! Reddingsvesten zijn verplicht
        op een boot (zodat je niet verdrinkt).
    climbing:
      requirement: Vereist het dragen van <object id="climbingTool" />.
      name: Klimuitrusting
      requirementLevel: Vereist klimuitrusting met minstens <keywordRequirements />
        in zijn vereisten.
      desc: Klimuitrusting maakt het mogelijk om in bergachtige gebieden kortere routes
        te nemen en is onmisbaar voor bepaalde klimactiviteiten.
    bugCatchingNet:
      name: Insectenvangnet
      requirement: Vereist het dragen van een <object id="bugCatchingNet" />.
      requirementLevel: Vereist een insectenvangnet met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Je kunt insecten vangen met een insecten vangnet!
    ring:
      requirement: Vereist het dragen van een <object id="item_ring" />.
      name: Ring
      requirementLevel: Vereist een ring met minstens <keywordRequirements /> in zijn
        vereisten.
      desc: Gaat om de vinger.
    socks:
      name: Sokken
      requirement: Vereist het dragen van <object id="item_socks" />.
      requirementLevel: Vereist sokken met minstens <keywordRequirements /> in hun
        vereisten.
      desc: Ze zijn er in allerlei kleuren en patronen. Als je willekeurige sokken
        vindt, kun je een prestatie vrijspelen.
    bellows:
      requirementLevel: Vereist een blaasbalg met minstens <keywordRequirements />
        in zijn vereisten.
      name: Blaasbalg
      requirement: Vereist het dragen van <object id="bellows" />.
      desc: Met een blaasbalg kun je zuurstof aan het vuur toevoegen, waardoor de
        vlammen hoger oplaaien!
    basket:
      name: Mand
      requirement: Vereist het dragen van een <object id="basket" />.
      requirementLevel: Vereist een mand met minstens <keywordRequirements /> in zijn
        vereisten.
      desc: Manden zijn hulpmiddelen waarmee je meer voorwerpen in je inventaris kunt
        meenemen.
    amulet:
      name: Amulet
      requirement: Vereist het dragen van een <object id="item_amulet" />.
      requirementLevel: Vereist een amulet met minstens <keywordRequirements /> in
        zijn vereisten.
      desc: Amuletten worden om de nek gedragen.
    arrows:
      requirementLevel: Vereist pijlen met minstens <keywordRequirements /> in hun
        vereisten.
      name: Pijlen
      requirement: Vereist het dragen van <object id="arrows" />.
      desc: Bij het jagen of vechten heb je pijlen nodig als munitie.
    underwater:
      requirement: Vereist <object id="item_underwater" /> uitrusting.
      name: Onderwater
      requirementLevel: Vereist onderwateruitrusting met minstens <keywordRequirements
        /> in zijn vereisten.
      desc: Onderwatervoorwerpen bieden voordelen terwijl je onder water bent.
    weapon:
      name: Wapen
      requirement: Vereist het dragen van een <object id="weapon" />.
      requirementLevel: Vereist een wapen met minstens <keywordRequirements /> in
        zijn vereisten.
      desc: Uitstekend voor de aanval, en dus voor de verdediging.
    shield:
      name: Schild
      requirement: Vereist het dragen van een <object id="shield" />.
      requirementLevel: Vereist een schild met minstens <keywordRequirements /> in
        zijn vereisten.
      desc: Ideaal voor een groot schilderoppervlak en tegen stoten.
  consumables:
    cookedFish:
      requirementLevel: Vereist een gebakken vis welke op z'n minst <keywordRequirements
        /> heeft.
      name: Gebakken vis
      requirement: Vereist een <object id="cookedFish" />.
    food:
      name: Voedsel
      requirement: Vereist <object id="food" />.
      requirementLevel: Vereist voedsel met minstens <keywordRequirements /> in zijn
        vereisten.
    sandwich:
      requirement: Vereist een <object id="sandwich" />.
      name: Boterham
      requirementLevel: Vereist een boterham met minstens <keywordRequirements />
        in zijn vereisten.
    fruit:
      name: Vrucht
      requirement: Vereist een <object id="fruit" />.
      requirementLevel: Vereist fruit met minstens <keywordRequirements /> in zijn
        vereisten.
    beverage:
      name: Drankje
      requirement: Vereist een <object id="beverage" />.
      requirementLevel: Vereist drinken met minstens <keywordRequirements /> in zijn
