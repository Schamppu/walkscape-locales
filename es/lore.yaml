singulars:
  firstBirthdayLetter:
    p1: "¡Hola!\n\n¡Soy tu buen amigo, Sergio! No me puedo creer que ya haya pasado
      un año entero desde que apareciste por primera vez aquí en Arenum.\n\nSeguro
      que has progresado mucho y que no vas a dejar de mejorar. Aunque ahora no te
      valgan de mucho, recuerda que los palos de madera, las piedras y el cordel que
      me sobran cada día están aquí para que los cojas siempre que los necesites.\n\
      \nSi te pasas por aquí, siempre podrás calentarte junto al fuego de mi hogar
      y ponerme al día sobre tus aventuras. Seguro que ahora tienes que volver a ellas,
      así que voy a dejarlo aquí.\n\nCuídate mucho <icon i=\"Favorited\" />, ¡ya hablaremos
      más adelante!\n\n- *Sergio*\n"
  secondBirthdayLetter:
    p1: "¡Bienvenido de nuevo!\n\n¿Ya ha pasado otro año? Se pasan volando. Seguro
      que, antes de darnos cuenta, habrá pasado otro más.\n\nEspero que hayas seguido
      progresando y mejorando. Deberías pasarte algún día para contarme de primera
      mano las aventuras que has vivido.\n\nApuesto a que has llegado más lejos de
      lo que la mayoría de los mercaderes se ha atrevido a viajar. Hablando de mercaderes,
      los de la zona han vuelto a intentar comprarme la cabaña. Dicen que sería un
      lugar perfecto para montar una gran tienda de todo tipo de mercancías, pero
      no tengo intención de irme a ninguna parte. ¡Puede que necesites un sitio donde
      descansar durante tu viaje!\n\nBueno, ya está bien de los desvaríos de este
      viejo por hoy. ¡Cuídate!\n- *Sergio*\n"
  thirdBirthdayLetter:
    p1: "¡Pero mira eso!\n\n¡Ya llevas aquí tres años! La mayoría de los demás no
      aguanta tanto tiempo, así que has hecho bien en seguir adelante.\n\nNormalmente,
      a estas alturas ya se han rendido y me suplican que ponga fin de una vez a su
      sufrimiento. Es bastante desalentador cuando las cosas llegan a ese punto.\n\
      \n¿Te gustaría pasarte algún día para demostrarme que sigues llevando todo bien
      y contarme algunas de tus aventuras? Podemos celebrar tu aniversario con un
      delicioso té y unos pasteles.\n\nCuídate y no dejes que la oscuridad se apodere
      de ti. Se abre paso poco a poco, incluso cuando luchas contra ella.\n\n- *Herbert*"
