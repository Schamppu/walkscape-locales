singulars:
  materials:
    fish:
      name: Pescado
      requirement: Requiere un <object id="fish" />.
      requirementLevel: Requiere un pescado que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Se puede usar en diversas recetas de <object id="cooking" />. Ingrediente
        básico que se obtiene de la <object id="fishing" />.
    logs:
      name: Tronco
      requirement: Requiere un <object id="logs" /> de madera.
      requirementLevel: Requiere un tronco de madera que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Se puede convertir en un <object id="plank" />. Ingrediente básico que
        se obtiene de la <object id="woodcutting" />.
    plant:
      name: Planta
      requirement: Requiere una <object id="plant" />.
      requirementLevel: Requiere una planta que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Se puede usar en diversas recetas de <skillType type="artisan" />. Ingrediente
        básico que se obtiene de la <object id="foraging" />.
    bar:
      requirementLevel: Requiere un lingote que tenga al menos <keywordRequirements
        /> de requisito.
      name: Lingote
      requirement: Requiere un <object id="bar" />.
      desc: Puede usarse en varias recetas de <object id="smithing" /> y <skillType
        type="crafting" />. Se obtiene a partir de <object id="ore" />.
    gem:
      requirementLevel: Requiere una gema que tenga al menos <keywordRequirements
        /> de requisito.
      name: Gema
      requirement: Requiere una <object id="gem" />.
      desc: Se puede usar en varias recetas de <object id="trinketry" />.
    mushroom:
      requirementLevel: Requiere una seta que tenga al menos <keywordRequirements
        /> de requisito.
      name: Seta
      requirement: Requiere una <object id="mushroom" />.
      desc: ¡Te pueden llevar a un mundo totalmente nuevo! Las setas se usan en varias
        recetas de <object id="cooking" />.
    ore:
      name: Mineral
      requirement: Requiere un <object id="ore" />.
      requirementLevel: Requiere un mineral que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Se puede convertir en un <object id="bar" />. Ingrediente básico que se
        obtiene de la <object id="mining" />.
    plank:
      name: Tablón
      requirement: Requiere un <object id="plank" />.
      requirementLevel: Requiere un tablón que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Puede usarse en varias recetas de <object id="crafting" />. Se obtiene
        a partir de <object id="logs" />.
    roughGem:
      name: Gema en bruto
      requirement: Requiere una <object id="rough_gem" />.
      requirementLevel: Requiere una gema en bruto que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Se puede convertir en <object id="cut_get" />. Ingrediente básico obtenido
        de la <object id="mining" />.
    cutGem:
      name: Gema tallada
      requirement: Requiere una <object id="cut_gem" />.
      requirementLevel: Requiere una gema tallada que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Se puede usar en varias recetas de <object id="trinketry" />. Se obtiene
        a partir de una <object id="rough_gem" />.
    misc:
      name: Misceláneo
      requirement: Requiere un objeto <object id="misc" />.
      requirementLevel: Requiere un objeto misceláneo que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Un material misceláneo que se puede usar en varias recetas.
    processed:
      name: Procesado
      requirementLevel: Requiere un material procesado que tenga al menos <keywordRequirements
        /> de requisito.
      requirement: Requiere un material <object id="processed" />.
      desc: Un material que ha sido procesado a partir de una materia prima, como
        un lingote o un tablón.
    nugget:
      name: Pepita
      requirement: Requiere una <object id="nugget" />.
      requirementLevel: Requiere una pepita que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Se puede convertir en un <object id="bar" />. Ingrediente básico que se
        obtiene de la <object id="mining" />.
    ingredient:
      name: Ingrediente
      requirementLevel: Requiere un ingrediente que tenga al menos <keywordRequirements
        /> de requisito.
      ingredient: Requiere un <object id="ingredient" />.
      desc: Se usan como ingredientes en recetas.
    trinket:
      requirement: Requiere una <object id="trinket" />.
      requirementLevel: Requiere una figurita que tenga al menos <keywordRequirements
        /> de requisito.
      name: Figurita
      desc: Las figuritas se usan en varias recetas de <object id="trinketry" />.
    offcut:
      requirement: Requiere <object id="offcut" />.
      requirementLevel: Requiere restos que tengan al menos <keywordRequirements />
        de requisito.
      name: Restos
      desc: Los restos son partes sobrantes de un material que pueden ser procesados
        en nuevos materiales.
    crustacean:
      name: Crustáceo
      desc: Un molusco que puede usarse en varias recetas de <object id="cooking"
        />.
      requirement: Requiere un <object id="crustacean" />.
      requirementLevel: Requiere un crustáceo que tenga al menos <keywordRequirements
        /> de requisito.
    fabric:
      name: Tela
      desc: Un trozo de tela que se usa normalmente en recetas de <object id="tailoring"
        />.
      requirement: Requiere una <object id="fabric" />.
      requirementLevel: Requiere una tela que tenga al menos <keywordRequirements
        /> de requisito.
  tools:
    fishing:
      name: Pesca
      requirement: Requiere una herramienta relacionada con la pesca.
      requirementLevel: Requiere una herramienta relacionada con la pesca que tenga
        al menos <keywordRequirements /> en sus requisitos.
    fishingCage:
      name: Jaula de pesca
      requirement: Requiere llevar una <object id="fishingCage" />.
      requirementLevel: Requiere una jaula de pesca que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Las jaulas de pesca son necesarias para la pesca con jaula. Se requieren
        para atrapar peces.
    fishingNet:
      name: Red de pesca
      requirement: Requiere llevar una <object id="fishingNet" />.
      requirementLevel: Requiere una red de pesca que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Las redes de pesca son necesarias para la esca con red. Se requieren para
        atrapar peces.
    fishingRod:
      name: Caña de pescar
      requirement: Requiere llevar una <object id="fishingRod" />.
      requirementLevel: Requiere una caña de pescar que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Las cañas de pescar son necesarias para pescar. Se requieren para atrapar
        peces.
    fishingSpear:
      name: Arpón de pesca
      requirement: Requiere llevar un <object id="fishingSpear" />.
      requirementLevel: Requiere un arpón de pesca que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Los arpones de pesca son necesarios para la pesca con arpón. Se requieren
        para atrapar peces.
    tool:
      name: Herramienta
      requirement: Requiere llevar una <object id="tool" />.
      requirementLevel: Requiere una herramienta que tenga al menos <keywordRequirements
        /> de requisito.
    woodcuttingHatchet:
      name: Hacha
      requirement: Requiere llevar un <object id="woodcuttingHatchet" />.
      requirementLevel: Requiere un hacha para madera que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Las hachas son necesarias para cortar madera. Se requieren para talar
        árboles.
    sickle:
      requirementLevel: Requiere una hoz que tenga al menos <keywordRequirements />
        de requisito.
      name: Hoz
      requirement: Requiere llevar una <object id="sickle" />.
      desc: Una herramienta de recogida usada en <object id="foraging" />.
    goldPan:
      name: Batea
      requirement: Requiere llevar una <object id="goldPan" />.
      requirementLevel: Requiere una batea que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Tamices resistentes usados para separar metales valiosos del sedimento
        en el agua.
    magnetic:
      name: Magnético
      requirement: Requiere llevar un objeto <object id="magnetic" />.
      requirementLevel: Requiere un objeto magnético que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Muy atractivo. Algunas actividades requieren objetos con propiedades magnéticas.
    cookingPan:
      name: Sartén
      requirement: Requiere llevar una <object id="cookingPan" />.
      requirementLevel: Requiere una sartén que tenga al menos <keywordRequirements
        /> de requisito.
      desc: ¡Muy útil para remover la comida! Las sartenes otorgan bonificaciones
        para la habilidad de <object id="cooking" />.
    craftingTool:
      requirementLevel: Requiere una herramienta de fabricación que tenga al menos
        <keywordRequirements /> de requisito.
      name: Herramienta de fabricación
      requirement: Requiere llevar una <object id="craftingTool" />.
      desc: Las herramientas de fabricación incluyen llaves y destornilladores.
    saw:
      requirement: Requiere llevar una <object id="saw" />.
      name: Sierra
      requirementLevel: Requiere una sierra que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Las sierras se usan principalmente en <object id="carpentry" /> y aportan
        un bonus a esa habilidad.
    screwdriver:
      requirementLevel: Requiere un destornillador que tenga al menos <keywordRequirements
        /> de requisito.
      name: Destornillador
      requirement: Requiere llevar un <object id="screwdriver" />.
      desc: Los destornilladores se usan en <object id="crafting" /> y aportan un
        bonus a esa habilidad.
    cookingKnife:
      requirementLevel: Requiere un cuchillo de cocina que tenga al menos <keywordRequirements
        /> de requisito.
      name: Cuchillo de cocina
      requirement: Requiere llevar un <object id="cookingKnife" />.
      desc: Los cuchillos de cocina se usan para cortar ingredientes para cocinar.
    foragingTool:
      requirementLevel: Requiere una herramienta de recolección que tenga al menos
        <keywordRequirements /> de requisito.
      name: Herramienta de recolección
      requirement: Requiere llevar una <object id="foragingTool" />.
      desc: Una herramienta usada en actividades de recolección.
    cuttingBoard:
      requirementLevel: Requiere una tabla de cortar que tenga al menos <keywordRequirements
        /> de requisito.
      name: Tabla de cortar
      requirement: Requiere llevar una <object id="cuttingBoard" />.
      desc: Superficie utilizada para cortar ingredientes.
    wrench:
      requirementLevel: Requiere una llave fija que tenga al menos <keywordRequirements
        /> de requisito.
      name: Llave fija
      requirement: Requiere llevar una <object id="wrench" />.
      desc: Una herramienta usada para apretar o aflojar tornillos y tuercas. Útil
        para <object id="crafting" />.
    ruler:
      requirementLevel: Requiere una regla que tenga al menos <keywordRequirements
        /> de requisito.
      name: Regla
      requirement: Requiere llevar una <object id="ruler" />.
      desc: Una herramienta de medición para tomar medidas precisas. Útil para <object
        id="carpentry" />.
    pickaxe:
      name: Pico
      requirement: Requiere llevar un <object id="pickaxe" />.
      requirementLevel: Requiere un pico que tenga al menos <keywordRequirements />
        de requisito.
      desc: Los picos son necesarios para la minería. Se requieren para extraer minerales
        y gemas.
    cookingTool:
      name: Herramienta de cocina
      requirement: Requiere llevar una <object id="cookingTool" />.
      requirementLevel: Requiere una herramienta de cocina que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Las herramientas de cocina incluyen sartenes, cuchillos y tablas de cortar.
    carpentryTool:
      name: Herramienta de carpintería
      requirement: Requiere llevar una <object id="carpentryTool" />.
      requirementLevel: Requiere una herramienta de carpintería que tenga al menos
        <keywordRequirements /> de requisito.
      desc: Las herramientas de carpintería incluyen sierras y cinceles.
    fishingLure:
      name: Cebo de pesca
      requirement: Requiere llevar un <object id="fishingLure" />.
      requirementLevel: Requiere un cebo de pesca que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Puedes usar cebos de pesca para atraer a los peces más fácilmente.
    cookingPot:
      name: Cazuela
      requirement: Requiere llevar una <object id="cookingPot" />.
      requirementLevel: Requiere una cazuela que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Herramientas útiles para <object id="cooking" />. Lugar donde van las
        aves que vuelan.
    cookingSpices:
      name: Especias
      requirement: Requiere llevar <object id="cookingSpices" />.
      requirementLevel: Requiere especias que tengan al menos <keywordRequirements
        /> de requisito.
      desc: Solían ser muy caras hace años. Ahora son útiles para uso culinario.
    chisel:
      name: Cincel
      requirementLevel: Requiere un cincel que tenga al menos <keywordRequirements
        /> de requisito.
      requirement: Requiere llevar un <object id="chisel" />.
      desc: Los cinceles se usan en <object id="carpentry" /> y <object id="trinketry"
        /> y aportan un bonus a esas habilidades.
    smithingHammer:
      name: Martillo de herrería
      requirement: Requiere llevar un <object id="smithingHammer" />.
      requirementLevel: Requiere un martillo de herrería que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Un martillo pesado usado para moldear el metal. Útil para la <object id="smithing"
        />.
    localMap:
      name: Mapa local
      requirement: Requiere llevar un <object id="localMap" />.
      requirementLevel: Requiere un mapa local que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Aporta información de un área específica del mundo, otorgando un bonus
        en ese área.
    knife:
      name: Cuchillo
      requirement: Requiere llevar un <object id="knife" />.
      requirementLevel: Requiere un cuchillo que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Afilado, ¡cuidado con tus dedos! Útil para cortar cosas y, por tanto,
        para <object id="cooking" />.
    magnifyingLense:
      name: Lupa
      requirement: Requiere llevar una <object id="magnifyingLense" />.
      requirementLevel: Requiere una lupa que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Las lupas son útiles para alguna habilidad de <skillType type="artisan"/>
        skills.
    fishingTool:
      name: Herramienta de pesca
      requirementLevel: Requiere una herramienta de pesca relacionada que tenga al
        menos <keywordRequirements /> de requisito.
      requirement: Requiere llevar una <object id="fishingTool" /> relacionado.
      desc: Las herramientas de pesca incluyen cañas, arpones, redes y jaulas.
    huntingBow:
      name: Arco de caza
      requirement: Requiere llevar un <object id="huntingBow" />.
      requirementLevel: Requiere un arco de caza que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Un arco usada para la <object id="hunting" /> de animales (y otras cosas
        que te puedan molestar).
    huntingTrap:
      name: Trampa de caza
      requirement: Requiere llevar una <object id="huntingTrap" />.
      requirementLevel: Requiere una trampa de caza que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Una trampa usada para la <object id="hunting" /> de animales.
    skillBook:
      name: Libro de habilidades
      requirement: Requiere llevar un <object id="skillBook" />.
      requirementlevel: Requiere un libro de habilidades que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Aporta a la vez un bonus y una penalización a una habilidad específica.
    sander:
      name: Lijadora
      requirementLevel: Requiere una lijadora que tenga al menos <keywordRequirements
        /> de requisito.
      requirement: Requiere llevar una <object id="sander" />.
      desc: Una herramienta usada para pulir superficies. Útil para <object id="trinketry"
        />.
    woodcuttingTool:
      requirement: Requiere llevar una <object id="woodcuttingTool" />.
      name: Herramienta de tala
      requirementLevel: Requiere una herramienta de tala que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Una herramienta usada en actividades de tala.
    smithingTool:
      requirementLevel: Requiere una herramienta de herrería que tenga al menos <keywordRequirements
        /> de requisito.
      requirement: Requiere llevar una <object id="smithingTool" />.
      name: Herramienta de herrería
      desc: Una herramienta usada en actividades de herrería.
    logSplitter:
      requirement: Requiere llevar un <object id="item_log_splitter" />.
      name: Cortador de troncos
      requirementlevel: Requiere un cortador de troncos que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Una herramienta que se puede usar para <object id="woodcutting" /> junto
        con las hachas.
    agilityTool:
      requirement: Requiere llevar una <object id="agilityTool" />.
      name: Herramienta de agilidad
      requirementLevel: Requiere una herramienta de agilidad que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Una herramienta usada en actividades de agilidad.
    miningTool:
      requirement: Requiere llevar una <object id="miningTool" />.
      name: Herramienta de minería
      requirementLevel: Requiere una herramienta de minería que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Una herramienta usada en actividades de minería.
    trinketryTool:
      requirement: Requiere llevar una <object id="trinketryTool" />.
      name: Herramienta de joyería
      requirementLevel: Requiere una herramienta de joyería que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Una herramienta usada en actividades de joyería.
    birdhouse:
      name: Casa para pájaros
      requirementLevel: Requiere una casa para pájaros que tenga al menos <keywordRequirements
        /> de requisito.
      requirement: Requiere una <object id="birdhouse" />.
      desc: Las casas para pájaros pueden aparecer más adelante en el juego.
    needle:
      name: Aguja
      desc: Una herramienta usada para coser. Útil para <object id="tailoring" />.
      requirement: Requiere llevar una <object id="needle" />.
      requirementLevel: Requiere una aguja que tenga al menos <keywordRequirements
        /> de requisito.
    pins:
      desc: Los alfileres se usan para <object id="tailoring" />.
      requirementLevel: Requiere alfileres que tengan al menos <keywordRequirements
        /> de requisito.
      requirement: Requiere llevar <object id="pins" />.
      name: Alfileres
    scissors:
      name: Tijeras
      desc: Las tijeras se usan para cortar. Útiles para <object id="tailoring" />.
      requirement: Requiere llevar unas <object id="scissors" />.
      requirementLevel: Requiere unas tijeras que tengan al menos <keywordRequirements
        /> de requisito.
    cuttingMat:
      desc: Los tapetes de corte son útiles para <object id="tailoring" />.
      name: Tapete de corte
      requirement: Requiere llevar un <object id="cuttingMat" />.
      requirementLevel: Requiere una tapete de corte que tenga al menos <keywordRequirements
        /> de requisito.
    pliers:
      name: Alicates
      desc: Los alicates se usan para agarrar y doblar con precisión. Útiles para
        <object id="trinketry" />.
      requirement: Requiere llevar unos <object id="pliers" />.
      requirementLevel: Requiere unos alicates que tengan al menos <keywordRequirements
        /> de requisito.
    toolbox:
      name: Caja de herramientas
      requirement: Requiere llevar una <object id="toolbox" />
      requirementLevel: Requiere una caja de herramientas que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Las cajas de herramientas se usan para mantener tus herramientas ordenadas.
        Útiles para las habilidades de <skillType type="artisan" />.
    huntingNet:
      name: Red de caza
      desc: Una red usada en la <object id="hunting" /> de animales.
      requirementLevel: Requiere una red de caza que tenga al menos <keywordRequirements
        /> de requisito.
      requirement: Requiere llevar una <object id="huntingNet" />.
    fishingRodRest:
      desc: El soporte de caña de pescar hace de la pesca una experiencia más relajada.
        Útil para la <object id="fishing" />.
      name: Soporte de caña de pescar
      requirment: Requiere llevar un <object id="fishingRodRest" />.
      requirementLevel: Requiere un soporte de caña de pescar que tenga al menos <keywordRequirements
        /> de requisito.
  recipes:
    products:
      sandwich:
        name: Receta de sándwich
        requirements: Requiere un <object id="sandwich" /> hecho con una <object id="recipe_cooking"
          />.
        requirement: Precisa un <object id="sandwich" /> hecho con <object id="recipe_cooking"
          />.
    skills:
      cooking:
        name: Receta de cocina
        requirement: Requiere una <object id="recipe_cooking" />.
      smithing:
        smelting:
          name: Fundición
          requirement: Precisa materiales que se usen en fundición para <object id="smithing"
            />.
  activities:
    woodcuttingTrees:
      name: Talar árboles
      requirement: Requiere una actividad de <object id="woodcuttingTrees" />.
      requirementLevel: Requiere una actividad de talar árboles que tenga al menos
        <keywordRequirements /> de requisito.
    fishing:
      name: Pesca
      requirement: Requiere una actividad de <object id="activity_fishing" />.
      requirementLevel: Requiere una actividad de pesca que tenga al menos <keywordRequirements
        /> de requisito.
    miningOres:
      name: Extracción de minerales
      requirement: Requiere una actividad de <object id="activity_mining" />.
      requirementLevel: Requiere una actividad de extracción de minerales que tenga
        al menos <keywordRequirements /> de requisito.
    foragingPlants:
      name: Recolección de plantas
      requirement: Requiere una actividad de <object id="activity_foraging" />.
      requirementLevel: Requiere una actividad de recolección de plantas que tenga
        al menos <keywordRequirements /> de requisito.
  gear:
    skillingGear:
      requirement: Requiere llevar un <object id="skillingGear" />.
      requirementLevel: Requiere equipo de entrenamiento que tenga al menos <keywordRequirements
        /> de requisito.
      name: Equipo de entrenamiento
    frisbee:
      name: Discogolf
      requirement: Requiere llevar un <object id="frisbee" />.
      requirementLevel: Requiere un disco que tenga al menos <keywordRequirements
        /> de requisito.
      desc: Los discos se usan para ciertas actividades atléticas, como el discogolf.
    skis:
      name: Esquís
      requirement: Requiere llevar unos <object id="skis" />.
      requirementLevel: Requiere esquís que tengan al menos <keywordRequirements />
        de requisito.
      desc: Los esquís te permiten desplazarte por zonas nevadas y te desbloquean
        atajos en Jarvonia. También son necesarios para ciertas actividades de invierno.
    lifeVest:
      name: Chaleco salvavidas
      requirement: Requiere llevar un <object id="lifevest" />.
      requirementLevel: Requiere un chaleco salvavidas que tenga al menos <keywordRequirements
        /> de requisito.
      desc: ¡Te mantiene a flote en el agua! Los chalecos salvavidas son obligatorios
        en un barco (para que no te ahogues).
    climbing:
      name: Equipo de escalada
      requirement: Requiere llevar un <object id="climbingTool" />.
      requirementLevel: Requiere un equipo de escalada que tenga al menos <keywordRequirements
        /> de requisito.
      desc: El equipo de escalada desbloquea atajos en zonas montañosas y es necesario
        para ciertas actividades de escalada.
    bugCatchingNet:
