singulars:
  memospheres:
    foraging:
      completed: Tocas el orbe brillante y tienes una rápida visión de un bosque lleno
        de bayas y setas. Sientes que podrás encontrarlas más fácilmente.
      text: Otorga experiencia en <skill skill="foraging"/>.
    agility:
      text: Otorga experiencia en <skill skill="agility"/>.
      completed: Tocas el orbe brillante y te das cuenta de que estás en mejor forma
        que antes.
    cooking:
      text: Otorga experiencia en <skill skill="cooking"/>.
      completed: Tocas el orbe que contiene una olla de cocina y casi te quemas los
        dedos. Sientes que has aprendido algo nuevo sobre cocina.
    carpentry:
      text: Otorga experiencia en <skill skill="carpentry"/>.
      completed: Tocas el orbe y comienzas a reflexionar sobre cómo hacer mejores
        muebles y cortar tablones de forma más eficiente.
    crafting:
      text: Otorga experiencia en <skill skill="crafting"/>.
      completed: Tocas el orbe brillante y de repente sientes cómo podrías fabricar
        mejor las cosas.
    fishing:
      text: Otorga experiencia en <skill skill="fishing"/>.
      completed: Pones la mano sobre el orbe y sientes como si tu cabeza fuera una
        pecera. Ahora entiendes mejor a los peces.
    mining:
      text: Otorga experiencia en <skill skill="mining"/>.
      completed: Tocas el orbe brillante y empiezas a oír el sonido de los picos golpeando
        las rocas. Sientes que podrás picar con mayor eficiencia.
    smithing:
      text: Otorga experiencia en <skill skill="smithing"/>.
      completed: Tocas el orbe y empiezas a sentirte como un lingote de hierro convirtiéndose
        a golpes en una espada. Duele un poco, pero te da la sensación de que ahora
        podrás forjar mejor.
    woodcutting:
      text: Otorga experiencia en <skill skill="woodcutting"/>.
      completed: Pones la mano sobre el orbe y experimentas la vida de un árbol, desde
        que brota hasta convertirse en tronco. Te secas una lágrima del ojo e sientes
        que ahora podrás talar árboles de forma más eficiente.
    trinketry:
      text: Otorga experiencia en <skill skill="trinketry"/>.
      completed: Colocas la mano sobre el orbe y empiezas a ver un caleidoscopio de
        gemas flotando justo encima de ti. Puedes ver patrones y planos que nunca
        antes habías considerado.
  items:
    axeOfDestruction:
      completed: Blandes el Blandes el <item id="_source" /> y los árboles frente
        a ti caen de un solo golpe. Sientes que podrías cortar un bosque entero con
        esta hacha. y los árboles frente a ti caen de un solo golpe. Sientes que podrías
        cortar un bosque entero con esta hacha.
      text: Completa _count acciones de <skill skill="woodcutting"/> al instante.
    algaeRing:
      text: Teletranspórtate a <location i="_location" /> mientras pescas donde sea.
      completed: Frotas el <item id="_source" /> y de repente te das cuenta de que
        estás en <location i="_location" />.
    ringOfHomesickness:
      text: Teletranspórtate a <location i="_location" />
      completed: Frotas el <item id="_source" /> y de repente te das cuenta de que
        estás en <location i="_location" />.
    shoesOfEscape:
      text: Completa _count acciones de <hl>Viajar</hl> al instante.
      completed: Saltas un par de veces en el sitio y, de repente, los <item id="_source"
        /> te dan una velocidad casi incontrolable. Sientes que podrías correr eternamente,
        hasta que tu rapidez demencial se desvanece.
    rockStarAmulet:
      text: Crea 5 <hl>gemas en bruto</hl> aleatorias.
      completed: Tocas el amuleto estrellado y <hl>este crea unas pocas gemas</hl>
        en tu mano.
  sliderTexts:
    grantExperience:
      text: Otorga {experience} de experiencia en <skill skill="{skill}"/>.
