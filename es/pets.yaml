      "6": As
      "8": Jengibre
  gecko:
    rareName: Lagarto Crestado
    rareDesc: Este lagarto parece un poco más rebelde que el resto. ¡Tiene una <c>cresta
      espinosa</c>!
    name: Lagarto
    defaultNames:
      "2": Pincho
      "4": Lisa
      "1": Óscar
      "3": Barto
      "0": Draco
      "5": Juana
      "6": Esteban
      "7": Julián
      "8": Guille
      "9": Vanesa
    desc: Un lagarto misterioso, tiene todo tipo de secretos cuyo silencio está asegurado.
  goose:
    name: Ganso
    rareName: Ganso Cuellilargo
    defaultNames:
      "1": Lucía
      "2": Piñón
      "3": Mazorca
      "4": Zeus
      "0": Manso
    desc: Un ganso amistoso, este puede que sea de los pocos que no atacan nada más
      verte.
    rareDesc: Este ganso parece ser extremadamente amistoso, e incluso ¡puede que
      <c>se juegue el cuello por ti</c>!
  snake:
    name: Serpiente
    desc: Una serpiente traviesa, ¿Puedes tenerla escondida?
    rareName: Serpiente Cornuda
    defaultNames:
      "0": Edu
      "1": Metal
      "2": Silvia
      "3": Fideo
      "4": Oro
    rareDesc: Una serpiente como está no planes nada bueno, ¡hasta tiene <c>cuernos
      con pinchos</c>!
  tiger:
    name: Tigre
    desc: Un tigre poderoso, ostenta fuerza, sigilo y velocidad todo en uno.
    rareName: Tigre Regio
    defaultNames:
      "0": Currupipi
      "1": Jesulín
      "2": Cris
      "3": Manchas
      "4": Elena
    rareDesc: ¡Un tigre <c>dorado</c>! Deberías sentirte afortunado de estar de buenas
      con un animal como este.
  tortoise:
    name: Tortuga
    desc: Una tortuga reservada, que se mantiene firme. Lenta, pero firmemente.
    rareName: Tortuga Incrustada
    defaultNames:
      "0": Alfredo
      "1": Donato
      "2": Enriqueta
      "3": Cañón
      "4": Tanque
      "6": Chorro
      "7": Felisa
      "8": Mercedes
      "9": Miguel Ángel
      "5": Celestino
    rareDesc: ¡El caparazón de esta tortuga tiene el brillo de <c>metales preciosos
      en forma de flor</c>!
  reindeer:
    defaultNames:
      "2": Esme
      "0": Rodolfo
