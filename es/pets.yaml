  chicken:
    name: Pollo
    desc: Un pollo vivaz, de renombre por sus excelentes huevos y talento recolector.
    rareName: Pollo Enamorado
    rareDesc: ¡Este pollo está perdidamente <c>enamorado de ti</c>! No puede evitar
