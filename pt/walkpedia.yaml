singulars:
  pages:
    home:
      info:
        title: WalkPedia
        tabText: Inicio
        description: WalkPedia é o diário pessoal da tua personagem. Aqui pode acompanhar
          o conhecimento adquirido pela sua personagem, os seus atributos e navegar
          pelo conteúdo do jogo com facilidade.
    itemList:
      info:
        title: Items
        description: Os itens são objetos que podem ser colecionados, usados ou vendidos.
          Podem ser encontrados no mundo, comprados a vendedores ou criados por jogadores.
        tabText: Lista de item
    locationList:
      info:
        title: Locais
        tabText: Lista de locais
        description: Os locais são lugares no mundo que podem ser visitados. Oferecem
          serviços e atividades com os quais o seu personagem pode interagir.
    skillList:
      info:
        title: Habilidades
        description: As Habilidade são aprimoradas ao realizar atividades relacionadas
          com as mesmas. Isto desbloqueia novos conteúdos e aumenta a sua eficiência.
        tabText: Lista de habilidades
    activityList:
      info:
        title: Atividades
        tabText: Lista de atividades
        description: As atividades são tarefas repetitivas que podem ser realizadas
          no mundo real, caminhando. São a principal forma de obter itens e melhorar
          as suas habilidades.
    serviceList:
      info:
        title: Serviços
        description: Os serviços oferecem benefícios num determinado local. Na maioria
          das vezes, permitem que faça trabalhos manuais.
        tabText: Lista de serviços
    recipeList:
      info:
        title: Receitas
        description: As receitas são a forma de criar você mesmo os itens. Geralmente,
          exigem materiais e um serviço.
        tabText: Lista de receitas
    characterList:
      info:
        title: Personagens
        description: As personagens são as pessoas que pode encontrar no mundo. Podem
          dar-te missões, vender itens e muito mais.
        tabText: Lista de personagens
    buildingList:
      info:
        tabText: Lista de edifícios
        title: Edifícios
        description: Os edifícios são estruturas no mundo que geralmente oferecem
          lojas e serviços, como bancos.
    shopList:
      info:
        title: Lojas
        description: As lojas são locais onde se podem comprar e vender produtos.
          Geralmente, estão localizadas em edifícios.
