maps:
  tips:
    "1": A probabilidade base de encontrar materiais <hl>FINE</hl> é de <hl>1/100</hl>,
      que pode aumentar com equipamentos e ferramentas melhores.
    "8": Os colecionáveis que encontrares concedem 1 ponto de <hl>conquista extra</hl>
      por item!
    "9": Muitos NPCs podem dizer-te <h1>rumores</h1> para ajudar a encontrar coisas
      no jogo.
    "10": O <hl>menu hambúrguer</hl> no canto inferior direito (ou inferior esquerdo
      no modo canhoto) contém o seu <hl>WalkPedia</hl> para o ajudar a acompanhar
      o seu progresso total.
    "11": Tem atenção aos detalhes de uma conquista - algumas só contam para o desbloqueio
      se o item obtido vier diretamente de uma atividade.
    "12": Certifica-te de <hl>equipar</hl> os teus itens para obter os seus efeitos,
      a maioria não funciona apenas a partir do inventário.
    "15": Consulte o nosso <c c="green">Portal</c>, <c c="red">Reddit</c> e <c c="purple">Discord</c>
      para anúncios, atualizações e blogues de desenvolvimento.
    "16": Encontrou algum problema ou tem alguma sugestão? Reporte-nos no <c c="purple">Discord</c>!
      Os teus relatos ajudam a melhorar o jogo!
    "18": Os níveis de habilidade que excedem o requisito de habilidade principal
      de uma <hl>atividade</hl> concedem +1,25% de <hl>eficiência de trabalho</hl>
      extra para o que está a fazer, até um máximo de 20 níveis.
    "19": Os níveis de competência que excedem o requisito de competência principal
      de uma <hl>receita</hl> na <hl>interface de criação</hl> fornecem um resultado
      de <hl>Qualidade</hl> adicional.
    "0": Estar sobrecarregado apenas atrasa as suas atividades, mas não afeta a viagem.
    "4": Premir e segurar um item abre as opções de seleção múltipla no inventário.
    "2": A probabilidade base de encontrar a maioria dos baús é de <hl>1/250</hl>,
      que podes aumentar com melhor equipamento e ferramentas.
    "7": Pode encontrar <hl>conquistas e colecionáveis</hl> obtidos tocando no seu
      personagem no canto superior esquerdo.
    "13": O espaço bancário é ilimitado; se estiver preocupado com o uso de algo,
      deposite-o no banco!
    "3": 'Os atributos que envolvem o símbolo de percentagem <hl>%</hl> são multiplicativos
      (por exemplo: +10% para materiais finos resulta em 1,1/100).'
    "17": <hl>Os resultados de qualidade</hl> ajudarão a aumentar as probabilidades
      de os artigos de melhor qualidade serem apresentados na parte inferior das <hl>receitas</hl>
      na <hl>interface de criação</hl>.
    "14": Se houver manutenção, não se preocupe, geralmente os seus passos ainda serão
      contabilizados durante o período de inatividade. Consulte os anúncios no <c
      c="purple">Discord</c> para ter a certeza!
    "20": Equipar um conjunto de equipamentos enquanto se está num banco fará com
      que todos os itens sejam automaticamente retirados do banco.
    "5": O botão verde em forma de pinça na parte inferior do ecrã abre a <hl>interface
      de criação</hl>.
    "6": Ao clicar no minimapa no canto superior direito, será aberto o mapa completo
      com as opções de viagem.
  skillTypes:
    "utility": As habilidades utilitárias incluem <skill skill="agility"/>.
    "gathering": As competências de recolha incluem <skill skill="foraging"/>, <skill
      skill="fishing"/>, <skill skill="mining"/> e <skill skill="woodcutting"/>.
    "artisan": As habilidades de artesão incluem <skill skill="cooking"/>, <skill
      skill="crafting"/>, <skill skill="carpentry"/>, <skill skill="smithing"/> e
      <skill skill="tinkering"/>.
singulars:
  info:
    claimPet: Assim que reivindicar o seu animal de estimação, este será adicionado
      à sua lista de animais de estimação e poderá chocá-lo e invocá-lo a qualquer
      momento. Não pode trocar animais de estimação reclamados, pois ficam <c>ligados
      à sua personagem</c>.
    inventoryFull: O teu inventário está cheio! Para todas as atividades, exceto viajar,
      estar sobrecarregado irá diminuir a sua velocidade de ação. Podes ir ao banco
      para guardar itens ou descartar alguns itens do teu inventário para libertar
      espaço.
    lockFavoriteItem: "<icon i=\"Favorited\"/> <c i=0>Favorite</c>: Não pode descartar
      ou vender este artigo. Pode ainda usá-lo para fabrico, trabalhos e outras ações.\n\
      \n<icon i=\"Locked\"/> <c i=1>Locked</c>: Não pode vender, descartar ou depositar
      este artigo enquanto estiver bloqueado. Pode ainda usá-lo para fabrico, trabalhos
      e outras ações.\n\nBloquear ou adicionar um item aos favoritos aplica-se a todos
      os itens semelhantes no seu inventário e banco. Também pode desbloquear ou remover
      itens dos favoritos do seu inventário ou banco."
    bankUsage: "Premir e manter premidos os botões de depósito ou levantamento permite
      depositar ou levantar até <c i=0>1000</c> artigos de cada vez. Pode usar a pesquisa
      do banco para encontrar itens rapidamente. É possível pesquisar por <c i=0>nome,
      palavras-chave, competências ou espaços</c>.\n\n<c i=0>O seu banco tem espaço
      ilimitado!</c>\n\nTambém pode utilizar o ícone <icon i=\"Favorited\"/> <c i=1>Favoritos</c>
      para apresentar apenas os seus itens favoritos."
    inventoryUsage: "Um toque longo numa pilha de itens <c i=0>abrirá o modo de seleção
      múltipla</c>, permitindo-lhe selecionar várias pilhas de uma só vez para descartar
      ou depositar.\n\nO botão <c i=0>Options</c> na parte inferior permite alterar
      a forma como as pilhas de itens são apresentadas.\n\n<bp /><icon i=\"Deposit\"\
      \ /> <hl>Tudo</hl>: Deposita todos os itens do seu inventário no banco, caso
      exista algum disponível na sua localização.\n\n<bp /><icon i=\"Bank small\"\
      \ /> <hl>Banco</hl>: Abre o seu banco e permite-lhe fazer depósitos ou levantamentos,
      se disponíveis na sua localização.\n\n<bp /><icon i=\"Sort\" /> <hl>Ordenar</hl>:
      Ordena o teu inventário.\n"
