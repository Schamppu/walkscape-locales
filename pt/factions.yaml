singulars:
  realms:
    jarvonia:
      desc: Um reino gelado e frio no canto noroeste de Arenum.
      name: Jarvonia
    gdte:
      name: Grão-Ducado de Trellin-Erdwise
      desc: Um grão-ducado localizado em redor dos Grandes Pântanos, com uma diarquia
        de dois ducados.
    syrenthia:
      name: Syrenthia
      desc: Um reino subaquático situado entre Jarvonia e o Grão-Ducado de Trellin-Erdwise.
    wallisia:
      name: Wallisia
      desc: O Império de Wallisia, um poderoso império que conquistou o Grão-Ducado,
        Forjaval e Wrentmark.
    galeforge:
      name: Forjaval
      desc: Uma cidade-estado conquistada por Wallisia, conhecida pelas suas inovações
        e tecnologia.
    wrentmark:
      name: Wrentmark
      desc: Um reino mais pequeno a sul, que foi conquistado por Wallisia. Wrentmark
        é conhecido pelos seus desertos escaldantes e minas de gemas preciosas.
  factions:
    trellin:
      name: Trellin
