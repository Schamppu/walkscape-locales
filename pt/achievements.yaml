singulars:
  cards:
    areYouSickleOfItYet:
      desc: 'Andando como você andou pelas geleiras vazias fez você nutrir uma grande
        amizade com os pinguins. Um deles te olha ansiosamente, na esperança de que
        você coloque-o no ombro.'
      name: 'Sua Perna Foice Embora?'
    aFriendLikeMe:
      desc: 'Poderes cósmicos fenomenais, espaço vital minúsculo.'
      name: 'Um Amigo Como Eu'
    anIdiotSandwhich:
      desc: '— "O que é que você é?"\n- "Uma sanduíche idiota."'
      name: 'Um Sanduba Idiota'
    andMyAxe:
      desc: 'Que venham! Ainda há um anão em Moria que respira!'
      name: 'E o meu machado!'
    barbarianVillage:
      desc: 'Se usasse um copo de cerveja vazio nos barris antes da actualização de
        Gunnarsgrunn, um bárbaro atacava-o. Se matasse o bárbaro, usar o copo de cerveja
        nos barris voltava a enchê-los.'
      name: 'Vila Bárbara'
    goldDigger:
      desc: "Quando disse que não pode comprar o meu amor, quis dizer que não é possível
        com o seu salário."
      name: 'Interesseiro'
    hellsKitchen:
      desc: 'Há aqui alho suficiente para matar todos os vampiros da Europa.'
      name: 'Hell''s Kitchen'
    ifItIsBrokenFixIt:
      desc: 'Ser um desenvolvedor solo é difícil.'
      name: 'Se estiver avariado, conserte.'
    infinityStones:
      desc: 'Perfeitamente equilibrado, como tudo deve ser.'
      name: 'Joias do Infinito'
    itsAMarathonNotASprint:
      desc: 'Está apenas no começo. Agora faça o mesmo novamente.'
      name: "É uma maratona, não uma corrida de 100 metros."
    makeAManOutOfYou:
      desc: 'Misterioso como o lado obscuro da <hl>LUA!</hl>'
      name: ''
    masterHasGivenDobbyASock:
      desc: 'Dobby é... livre'
      name: 'Mestre deu uma meia ao Dobby'
    masterchef:
      desc: 'Que delícia! Parece que tem jeito para a cozinha.'
      name: 'Masterchef'
    myPrecious:
      desc: "Malditos Baggins! Sumiu! O que será que ele tem nos bolsos? Ah, imaginamos,
        imaginamos, meu precioso. Encontrou, sim, deve ter encontrado."
      name: 'Meu Precioso'
    oneCannotSimplyWalkToMordor:
      desc: 'Já pensou em como seria fácil entrar em Mordor? Bem, <hl>agora já sabe.</hl>'
      name: 'Não se entra em Mordor assim tão facilmente'
    onlyYouCanPreventForestFires:
      desc: "Ao cortar todas as árvores, a probabilidade é literalmente... zero por
        cento de chance?"
      name: 'Só você pode prevenir os incêndios florestais'
    rockAndStone:
      desc: "Se não gosta do \"Rock and Stone\", não voltas para casa!"
      name: 'Rock and Stone!'
    rockstar:
      desc: 'Hard rock hallelujah!'
      name: 'Rockstar'
    thatsXcomBaby:
      desc: 'Por vezes, o RNG pode ser muito frustrante.'
      name: 'That''s XCOM Baby'
    touchTheGrass:
      desc: "Eu fiz-te tocar na relva, não fiz?"
      name: 'Toque na relva'
    underTheSea:
      desc: 'No mar todos estão contentes\nA nossa vida é brincar\nNa terra é bem
        diferente\nServimos só p''ra fritar'
      name: 'Debaixo do Mar'
    visitorOfTheFarLands:
      desc: 'Este número representa a quantidade de blocos que precisavas de atravessar
        para chegar às "Terras Distantes" no Minecraft.'
      name: 'Visitante das Terras Distantes'
    walkOfShame:
      desc: '\*cling\* Vergonha. \*cling\ * Vergonha. \*cling\* Vergonha. \*cling\*
        Vergonha.'
      name: 'Caminhada da Vergonha'
    whatATrip:
      desc: 'Comer um pouco pode levá-lo numa viagem alucinante. Melhor apreciado
        em boa companhia.'
      name: 'Que viagem!'
    winniePooh:
      desc: 'Por vezes, as coisas mais simples ocupam o maior espaço no seu coração.'
      name: 'Ursinho Pooh'
    youShallNotPass:
      desc: 'Sou um servo do Fogo Secreto, portador da Chama de Anor. O fogo negro
        não lhe servirá de nada, Chama de Udun! Regresse às sombras. <hl>"You Shall
        Not Pass!"</hl>'
      name: 'You Shall Not Pass!'
    fullyPrepared:
      desc: "Com todo o equipamento, está pronto para conquistar o mundo!"
      name: 'Totalmente preparado'
    helanGor:
      desc: 'Felicidades, kippis, saúde, cin cin, prost, kanpai, ganbei!'
      name: 'Helan Går!'
    iSmellDeadMiners:
      desc: 'Esta história é contada no conto "De minas e monstros". Leia mais na
        wiki do WalkScape!'
      name: 'Sinto cheiro de mineiros mortos'
    myBackHurts:
      desc: 'Hora de desistir ou vender antes que se lesione gravemente.'
      name: 'As minhas costas doem'
    noTrashing:
      desc: "É melhor apanhar o que deixou cair! Ah, espera, não pode."
      name: 'Proibido deitar lixo para o chão!'
    onlyTwoFingers:
      desc: 'É um facto bem conhecido que apenas um dedo em cada cinco pode beneficiar
        das propriedades mágicas dos anéis.'
      name: 'Apenas dois dedos?'
    oohShiny:
      desc: 'Como se costuma dizer, a probabilidade de encontrar esta preciosidade
        é de 1 em 100.'
      name: 'Uau, que brilhante!'
    treasureHunter:
      desc: 'Nada é melhor do que um baú de tesouro grátis!'
      name: 'Caçador de Tesouros'
    arcticExplorer:
      desc: 'Agora pode considerar-se um orgulhoso cidadão de Jarvonian, conhece este
        país como a palma da sua mão.'
      name: 'Explorador do Ártico'
    comrade:
      desc: 'Têm uma foice e um martelo? Temos uma foice e um martelo!'
      name: 'Camarada'
    hoarder:
      desc: 'O armazenamento bancário ilimitado é o sonho de qualquer acumulador.
        E todos os bancos estão interligados. Aproveite!'
      name: 'Acumulador'
    theRockstar:
      desc: 'Hard rock hallelujah!'
      name: 'A estrela do rock'
    doomsdayPrepper:
      desc: 'Quando o apocalipse chegar, você e as suas 1000 latas de sopa de tomate
        estarão preparados!'
      name: 'Preparador para o Apocalipse'
    jackOfAllTrades:
      desc: "Parabéns, já alcançou metade de todas as competências! Ou será que não?"
      name: '"Jóquer"'
    prideAndAccomplishment:
      desc: 'Por vezes, é mais famoso por ser o pior.'
      name: 'Orgulho e Realização'
    timeToParty:
      desc: 'Este chapéu de festa poderia alimentar gerações.'
      name: 'Hora da festa'
    iJustFeltLikeRunning:
      desc: "Nem acreditas se te contasse, mas eu conseguia correr como o vento sopra.
        A partir desse dia, se ia a algum lado, ia a correr!"
      name: 'Simplesmente senti vontade de correr'
    spaceCarsAndBirds:
      desc: 'Ganhar uma fortuna num jogo mudará para sempre a minha vida...'
      name: 'Todas as coisas que eu poderia fazer'
    tutorialComplete:
      desc: "Está finalmente pronto para sair da zona de partida, certo?"
      name: 'Tutorial Completo'
    thanksHerbert:
      desc: 'Herbert é um homem de coração de ouro, venderá de bom grado as suas antigas
        roupas de aventureiro por pouco dinheiro.'
      name: 'Obrigado, Herbert!'
    trenchExplorer:
      desc: 'Dizem que existe um espaço infinito para explorar entre as estrelas,
        mas porquê dar-se ao trabalho quando mais de 95% do oceano permanece inexplorado?'
      name: 'Explorador de Trincheiras'
    nonAcademicElectives:
      desc: 'Quem diria que assuntos que parecem passatempos são necessários para
        expandir o intelecto?'
      name: ''
    underseaChef:
      desc: 'Pelo menos não corre o risco de cozinhar demasiado os ovos debaixo de
        água.'
      name: 'Chef Submarino'
    anotherMansTreasure:
      desc: 'Só um verdadeiro avaliador consegue distinguir o lixo comum do lixo de
        alta qualidade.'
      name: 'O Tesouro de Outro Homem'
    gottaCollectThemAll:
      desc: 'Quero ser o melhor, como nunca ninguém foi. Colecioná-los é o meu verdadeiro
        teste!'
      name: 'Tenho que os colecionar todos!'
    tasteTheRainbow:
      desc: 'Dizem que o sabor do arco-íris faz lembrar pó de chifre de unicórnio,
        mas lembre-se que é ilegal moer um chifre de unicórnio até se transformar
        em pó.'
      name: 'Prove o arco-íris'
    fashionista:
      desc: 'Um vestido maravilhoso pode fazer com que se lembre do que há de belo
        na vida.'
      name: 'Fashionista'
    humanFish:
      desc: 'Ser metade humano, metade peixe pode ser muito divertido. Só depende
        de qual das metades herda.'
      name: 'Peixe Humano'
    oohShinier:
      desc: 'A coisa mais rara do mundo, depois do espírito de discernimento, é uma
        pérola brilhante e reluzente em forma de estrela.'
      name: 'Uau, brilhante!'
