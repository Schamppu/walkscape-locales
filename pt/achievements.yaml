singulars:
  cards:
    areYouSickleOfItYet:
      desc: 'Andando como você andou pelas geleiras vazias fez você nutrir uma grande
        amizade com os pinguins. Um deles te olha ansiosamente, na esperança de que
        você coloque-o no ombro.'
      name: 'Sua Perna Foice Embora?'
    aFriendLikeMe:
      desc: 'Poderes cósmicos fenomenais, espaço vital minúsculo.'
      name: 'Um Amigo Como Eu'
    anIdiotSandwhich:
      desc: '— "O que é que você é?"\n- "Uma sanduíche idiota."'
      name: 'Um Sanduba Idiota'
    andMyAxe:
      desc: 'Que venham! Ainda há um anão em Moria que respira!'
      name: 'E o meu machado!'
    barbarianVillage:
      desc: 'Se usasse um copo de cerveja vazio nos barris antes da actualização de
        Gunnarsgrunn, um bárbaro atacava-o. Se matasse o bárbaro, usar o copo de cerveja
        nos barris voltava a enchê-los.'
      name: 'Vila Bárbara'
    goldDigger:
      desc: "Quando disse que não pode comprar o meu amor, quis dizer que não é possível
        com o seu salário."
      name: 'Interesseiro'
    hellsKitchen:
      desc: 'Há aqui alho suficiente para matar todos os vampiros da Europa.'
      name: 'Hell''s Kitchen'
    ifItIsBrokenFixIt:
      desc: 'Ser um desenvolvedor solo é difícil.'
      name: 'Se estiver avariado, conserte.'
    infinityStones:
      desc: 'Perfeitamente equilibrado, como tudo deve ser.'
      name: 'Joias do Infinito'
    itsAMarathonNotASprint:
      desc: 'Está apenas no começo. Agora faça o mesmo novamente.'
      name: "É uma maratona, não uma corrida de 100 metros."
    makeAManOutOfYou:
      desc: 'Misterioso como o lado obscuro da <hl>LUA!</hl>'
      name: ''
    masterHasGivenDobbyASock:
      desc: 'Dobby é... livre'
      name: 'Mestre deu uma meia ao Dobby'
    masterchef:
      desc: 'Que delícia! Parece que tem jeito para a cozinha.'
      name: 'Masterchef'
    myPrecious:
      desc: "Malditos Baggins! Sumiu! O que será que ele tem nos bolsos? Ah, imaginamos,
        imaginamos, meu precioso. Encontrou, sim, deve ter encontrado."
      name: 'Meu Precioso'
    oneCannotSimplyWalkToMordor:
      desc: 'Já pensou em como seria fácil entrar em Mordor? Bem, <hl>agora já sabe.</hl>'
      name: 'Não se entra em Mordor assim tão facilmente'
    onlyYouCanPreventForestFires:
      desc: "Ao cortar todas as árvores, a probabilidade é literalmente... zero por
        cento de chance?"
      name: 'Só você pode prevenir os incêndios florestais'
    rockAndStone:
      desc: "Se não gosta do \"Rock and Stone\", não voltas para casa!"
      name: ''
