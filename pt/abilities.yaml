singulars:
  navigateDesert:
    name: Navegue pelo Deserto
    desc: Permite navegar e interagir em <object id="location_desert" /> ambientes.
  iMissTheSun:
    name: Sinto falta do sol
    desc: Teletransporta-o para <object id="ed6a76d4-5135-459e-a6d7-bbd7cb1af1b6"
      />.
    completed: Sentes o calor do sol ao chegar a <object id="ed6a76d4-5135-459e-a6d7-bbd7cb1af1b6"
      />.
  takeMeHome:
    name: Leva-me para casa
    desc: Teletransporta-o para <object id="location-kallaheim-094c9ec8-fdd2-4471-bacc-fabb71e6d654"
      />.
    completed: Tu esfregas o <item id="item-ring_of_homesickness-dfd0d52b-c064-4860-ae77-2f9c0cab7382"
      /> e de repente percebes que está em <location i="location-kallaheim-094c9ec8-fdd2-4471-bacc-fabb71e6d654"
      />.
  downGoesTheTrees:
    desc: Conclui {count}<skill skill="woodcutting"/> instantaneamente.
    completed: Tu balanças o <item id="item-axe_of_destruction-a493952f-18b1-442b-be16-0385a014c01c"
      /> e as árvores à tua frente caem com um só golpe. Sentes que poderias derrubar
      uma floresta inteira com este machado.
    name: Caem as árvores
  rockAndRoll:
    name: Rock And Roll
    desc: Cria 5 <hl>gemas brutas</hl> aleatórias.
    completed: Tocas no amuleto em forma de estrela e <hl>ele cria algumas gemas</hl>
      na palma da tua mão.
  needToGoFast:
    name: Preciso de ir rápido
    desc: Conclui instantaneamente as ações de {count} <hl>Viagens</hl>
    completed: Saltas algumas vezes no teu lugar e, de repente, <item id="item-shoes_of_escape-bd6be47c-373b-4557-ba9f-35fb62e7d390"
      /> deixam-te quase incontrolavelmente rápido. Sente que poderia correr para
      sempre, até que o efeito da velocidade insana passe.
  peckingOrder:
    name: Hierarquia
    desc: Conclui {count} <skill skill="foraging"/> ações instantaneamente.
    completed: Com uma velocidade estonteante, observas a tua <h1>Galinha</h1> a procurar
      alimento na área para ti, trazendo de volta parte do que foi caçado.
  torpedoAway:
    name: Torpedo Lançado
    desc: Conclui instantaneamente as ações de {count} <hl>Viagem Subaquática</hl>.
    completed: O seu <h1>Dolphin</h1> impulsiona-se à sua frente enquanto se dirige
      para o seu próximo destino aquático. A corrente puxa-o para dentro, permitindo-lhe
      chegar lá sem esforço e em pouco tempo.
  mermaidsNeedMe:
    desc: Teletransporta-o para <object id="location-vastalume-cf2f38ec-88d4-4129-a164-4deb5f0955d5"
      />.
    name: As Sereias Precisam de Mim
    completed: Esfrega o <item id="item-algae_ring-751c337a-cb19-4243-abae-ba6468446ab8"
      /> e, de repente, apercebe-se que está em <object id="location-vastalume-cf2f38ec-88d4-4129-a164-4deb5f0955d5"
      />.
  memospheres:
    cooking:
      name: 'Memosfera: Cozinhar'
      desc: Concede experiência em <skill skill="cooking"/>.
      completed: Toca na esfera que contém uma panela e quase queima os dedos. Sente
        que aprendeu algo novo sobre culinária.
    agility:
      desc: Concede experiência em <skill skill="agility"/>.
      name: 'Memosfera: Agilidade'
      completed: Toca na esfera brilhante e percebe que está em melhor forma do que
        antes.
    crafting:
      name: 'Memosfera: Fabricar'
      desc: Concede experiência em <skill skill="crafting"/>.
      completed: Tocas no orbe brilhante e, de repente, sentes que talvez consigas
        crias mais coisas.
    carpentry:
      name: 'Memosfera: Carpintaria'
      completed: Cutuca a esfera e começa a refletir sobre como fazer móveis melhores
        e cortar tábuas de forma mais eficiente.
      desc: Concede experiência em <skill skill="carpentry"/>.
    foraging:
      completed: Tocas no orbe brilhante e tens uma visão rápida de uma floresta cheia
        de bagas e cogumelos. Sentes que agora conseguirias encontrá-los com mais
        facilidade.
      name: 'Memosfera: Apanhar'
      desc: Concede <skill skill="foraging"/>experiência.
    mining:
      name: 'Memosfera: Minar'
      completed: Tocas no orbe brilhante e começas a ouvir o som de picaretas a bater
        nas rochas. Sentes que conseguirias minerar de forma mais eficiente.
      desc: Concede<skill skill="mining"/> experiência.
    smithing:
      desc: Concede <skill skill="smithing"/>experiência.
      name: 'Memosfera: Forja'
      completed: Espetas o dedo no orbe e começas a sentir-te como uma barra de ferro
        a ser martelada até virar uma espada. Dói um pouco, mas sentes que agora consegues
        forjar melhor.
    fishing:
      name: 'Memosfera: Pesca'
      desc: Concede <skill skill="fishing"/>experiência.
      completed: Pões a mão no orbe e sentes que a tua cabeça é como um aquário. Agora
        compreendes melhor os peixes.
    woodcutting:
      name: 'Memosfera: Lenhador'
      desc: Concede<skill skill="woodcutting"/>experiência.
      completed: Pões a mão no orbe e vives a vida de uma árvore, desde rebento até
        se tornar num tronco. Limpas uma lágrima do olho e sentes que agora consegues
        cortar árvores de forma mais eficiente.
  presentRain:
    name: Chuva atual
    desc: Oferece 5 <hl>presentes</hl> aleatórios contendo itens.
    completed: A sua <h1>Rena</h1> olha para o céu e abana os chifres. Vários presentes
      parecem cair do céu, pousando aos seus pés. Com um pequeno empurrão da tua rena,
      abre-los para revelar os itens no seu interior!
  shellForge:
    completed: A sua <h1>Tartaruga</h1> pega num feixe dos seus materiais de fundição
      e recolhe-se com eles para dentro da sua carapaça junto à fornalha. Sente uma
      súbita onda de calor e vê-a regressar com os materiais resultantes da fundição.
    name: Forja de Conchas
    desc: Conclui {count} <object id="recipe_smelting"/> ações instantaneamente.
