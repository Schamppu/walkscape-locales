singulars:
  camel:
    rareName: Camelo de duas bossas
    defaultNames:
      "0": Sandy
      "1": Duna
      "2": Cleo
      "3": Amber
      "4": Avelã
      "5": Nala
      "6": Rex
      "7": Ziggy
      "8": Max
      "9": Leo
      "10": Jasper
      "11": Omar
      "12": Especiarias
      "13": Melchior
      "14": Caspar
      "15": Baltazar
      "16": Lourenço
      "17": Zé
    desc: Um camelo robusto, perfeito para viagens no deserto.
    name: Camelo
    rareDesc: Os camelos comuns têm apenas uma bossa, mas que raridade! Este camelo
      <c>tem o dobro</c>!
  chicken:
    desc: Uma galinha vivaz, conhecida pelos seus ovos excecionais e pela sua capacidade
      de forragear.
    name: Galinha
    rareName: Galinha apaixonada
    defaultNames:
      "0": Xeque
      "1": Kin
      "2": Gertrudes
      "3": Hennessy
      "4": Chuck
      "5": Clucky
      "6": Ace
      "7": Camila
      "8": Gengibre
      "9": Pedro
    rareDesc: Esta galinha <c>ama-te</c> demais! Ela não consegue esconder isso, nem
      mesmo por fora.
  gecko:
    name: Lagartixa
    desc: Uma lagartixa misteriosa guarda todo o tipo de segredos que são mantidos
      em absoluto segredo.
    rareName: Geco-de-crista
    defaultNames:
      "0": Meko
      "1": Oscar
      "2": Pico
      "3": Gex
      "4": Liz
    rareDesc: Esta lagartixa tem um aspeto um pouco mais rebelde do que as outras.
      Ela possui uma <c>crista espinhosa</c>!
  goose:
    name: Ganso
    rareName: Ganso comprido
    rareDesc: Este ganso parece ser muito simpático, parece até <c>esticar o pescoço</c>
      para si!
    defaultNames:
      "0": Groose
      "1": Lucy
      "3": Rudy
      "4": Zeus
    desc: Um ganso mais amigável, talvez um dos poucos gansos que não atacam à primeira
      vista.
  snake:
    name: Cobra
    rareName: Cobra com chifres
    rareDesc: Uma cobra destas só pode estar a tramar alguma, até tem <c>chifres pontiagudos</c>!
    defaultNames:
      "0": Edd
      "1": Sólido
      "2": Jessie
      "3": Noodle
      "4": Ouro
    desc: Uma cobra traquina, consegue mantê-la escondida?
  tiger:
    name: Tigre
    rareName: Tigre Real
    rareDesc: Um tigre <c>dourado</c>! Deve sentir-se muito sortudo por estar nas
      boas graças de um como este.
    defaultNames:
      "0": Tony
      "1": Reggie
      "2": Tina
      "3": Mancha
      "4": Lena
    desc: Um tigre poderoso, que reúne força, furtividade e velocidade num só ser.
  tortoise:
    name: Tartaruga
    rareName: Tartaruga Preciosa
    rareDesc: O casco desta tartaruga tem o brilho dos <c>metais preciosos em forma
      de flor</c>!
    defaultNames:
      "0": Mort
      "1": Donnie
      "2": Harriet
      "4": Tanque
      "5": Sheldon
      "7": Michelle
    desc: Uma tartaruga reservada, mantendo-se firme. Lentamente, mas com firmeza.
