singulars:
  materials:
    woodcutting:
      birchLogs:
        name: Toras de Bétula
        desc: Lisas e alvas, as toras de bétula exalam elegância e simplicidade.
      pineLogs:
        name: Toras de Pinheiro
        desc: Rígidas e levemente viscosas, as toras de pinheiro têm um aroma único
          e aconchegante.
      spruceLogs:
        name: Toras de Abeto
        desc: Os troncos de abeto exibem um tom rico e quente, realçando a sua beleza
          e encanto naturais.
      teakLogs:
        name: Toras de Teca
        desc: Muito resistente e pesado, com uma casca muito grossa que, no seu interior,
          tem uma cor muito mais clara do que o resto do tronco.
      mapleLogs:
        name: Toras de Bordo
        desc: Os troncos de bordo exibem uma textura rica e convidativa, revelando
          a arte da natureza em cada peça.
      oakLogs:
        name: Toras de Carvalho
        desc: Dotados de um carácter distinto, os troncos de carvalho exalam uma sensação
          de presença nobre e de graça duradoura.
      willowLogs:
        name: Toras de Salgueiro
        desc: Estes troncos rústicos são bastante leves, o que os torna muito confortáveis
          de manusear e de trabalhar.
      sturdyBranch:
        name: Galho rígido
        desc: Um galho estranhamente rígido.
      coral:
        name: Coral
        desc: Os corais são diversificados não apenas em formato, mas também em cor.
          Entretanto, cada um deles parece ter um bom uso para manufatura.
      elmLogs:
        name: Toras de Olmo
        desc: Estas toras são conhecidas pela sua flexibilidade e capacidade de compressão.
      root:
        name: Raiz
        desc: Raízes úteis de plantas que podem ser utilizadas para diversos fins.
      mangroveLogs:
        name: Troncos de mangais
        desc: Ainda húmidas devido ao ambiente onde cresceram, exibem um belo brilho.
      heartwood:
        name: Cerne
        desc: Esta é a parte interior da madeira, é mais escura que as restantes.
      bambooLogs:
        name: Troncos de bambu
        desc: O bambu é flexível, mas resistente, o que permite uma variedade de utilizações.
      mahoganyLogs:
        name: Troncos de mogno
        desc: Troncos de uma árvore estável. Devem servir para criar itens e construir
          coisas poderosas.
      ectoLogs:
        desc: Estes troncos estão impregnados e repletos de ectoplasma, o que lhes
          confere um aspeto fantasmagórico e propriedades únicas. Precisará de uma
          serração amaldiçoada para processá-las.
        name: Troncos de Ectoplasma
      yewLogs:
        name: Troncos de teixo
        desc: Esta madeira de teixo é densa e resistente, o que a torna ideal para
          a fabricar objetos duráveis.
    mining:
      copperOre:
        name: Minério de cobre
        desc: Com a sua coloração avermelhada, o minério de cobre destaca-se como
          um mineral singular.
      tinOre:
        name: Minério de estanho
        desc: Simples e despretensioso, o minério de estanho exibe a sua composição
          mineral direta.
      coal:
        desc: Modesto e despretensioso, o carvão simboliza a sua praticidade como
          recurso energético vital.
        name: Carvão
      tarsiliumOre:
        desc: A superfície lisa e refletora do minério de tarsílio reflete o mundo
          circundante com um brilho quase mágico.
        name: Minério de Tarsílio
      farganiteOre:
        name: Minério de farganite
        desc: Com a sua força inabalável e o seu brilho azul cativante, o minério
          de farganite tornou-se um símbolo de determinação inabalável.
      saltCrystal:
        name: Cristal de sal
        desc: Versátil quando finamente moído, apresenta belas formas intrincadas
          no seu estado bruto.
      silverNugget:
        name: Pepita de prata
        desc: A prata é um metal muito valorizado, frequentemente utilizado na criação
          de joias como anéis, amuletos e brincos.
      opal:
        name: Opala bruta
        desc: Ainda envolvida pela areia e lama onde se formou, esta delicada jóia
          guarda um fogo interior à espera de ser revelado.
      ethernite:
        name: Eternite áspera
        desc: Um cristal roxo irregular que cresce dentro de uma geode. Observá-lo
          durante muito tempo é perturbador.
      jade:
        name: Jade bruto
        desc: Esta rocha ultramáfica dura produz um som nítido e cristalino quando
          atingida por uma picareta.
      ironOre:
        name: Minério de ferro
        desc: O minério de ferro tem uma textura áspera e densa, refletindo a sua
          natureza robusta e não refinada.
      topaz:
        name: Topázio bruto
        desc: Uma gema em bruto com um ligeiro tom dourado, à espera de ser lapidada
          em algo deslumbrante.
      sunStone:
        name: Pedra solar áspera
        desc: Esta rara gema bicolor assemelha-se a um fragmento do próprio sol, emitindo
          um brilho ténue, mesmo no seu estado bruto.
      volcanicRock:
        desc: A rocha é um remanescente de um antigo vulcão que permaneceu submerso
          durante milhares de anos.
        name: Rocha vulcânica
      volcanicAsh:
        name: Cinzas vulcânicas
        desc: Estas cinzas são uma lembrança da violência de uma antiga erupção, parte
          da qual ainda está contida no local.
      goldOre:
        name: Minério de ouro
        desc: Um pedaço de minério de ouro. Altamente valorizado e precioso em praticamente
          qualquer lugar. Brilha com potencial.
      silverOre:
        name: Minério de prata
        desc: Um pedaço de minério de prata. Não tão valioso como o ouro, mas brilha
          com um fulgor especial.
      violiteOre:
        name: Minério Violeta
        desc: Uma massa mineral violeta que parece quase inacreditável. Emana uma
          força, mesmo ainda não estando na sua forma final.
      crystalShards:
        desc: Pedaços de cristal que transportam consigo uma ténue energia. Talvez
          o desejo de se transformarem em algo mais.
        name: Carvão cristalino
      crystallizedFlame:
        name: Chama cristalizada
        desc: Um grande pedaço de cristal que parece conter a essência do próprio
          fogo. É possível ver chamas a dançar na sua superfície e parece extremamente
          quente, embora não esteja realmente em chamas.
      ectoRock:
        name: Rocha ectoplasmática
        desc: Este grande pedaço de rocha está impregnado de ectoplasma, irradiando
          uma aura fantasmagórica e transmitindo uma sensação estranha. Precisará
          de uma forja amaldiçoada para o processar.
      starPearl:
        name: Pérola estrela bruta
        desc: Uma pérola em bruto e não polida, mas com potencial para se tornar em
          algo verdadeiramente precioso.
      wrentmarine:
        desc: Ao olhar para esta rocha áspera, vislumbra um lampejo de azul no seu
          interior, como a luz do sol refletida numa onda.
      adamantOre:
        name: Minério de Adamante
        desc: Uma pedra verde que parece um pouco mais pesada e resistente do que
          outras que já manuseou. Ela implora para ser derretida e tornar-se ainda
          mais forte.
      goldNugget:
        name: Pepita de ouro
        desc: O ouro é um dos metais mais valiosos, frequentemente utilizado no fabrico
          de joias.
      largeStone:
        name: Pedra grande
        desc: Uma pedra maior que o normal.
      ruby:
        name: Rubi bruto
        desc: Um mineral vermelho-escuro emerge da rocha, cativando pela sua beleza
          e simplicidade
    rawFish:
      rawShrimp:
        name: Camarão cru
        desc: Com o seu aspeto impecável, os camarões seduzem com a promessa de um
          delicioso banquete de marisco.
      rawCrayfish:
        name: Lagostins crus
        desc: O lagostim oferece uma iguaria suculenta para os apreciadores de marisco.
      rawCarp:
        name: Carpa crua
        desc: O sabor suave da carpa combina bem com diversas preparações culinárias.
          Estes peixes gostam de saltar.
      rawPerch:
        name: Perca crua
        desc: Com as suas curvas graciosas e agilidade, a perca é um peixe excelente
          para os iniciantes na pesca.
      rawJellyfish:
        name: Alforreca crua
        desc: Como curiosidade culinária, a alforreca convida à exploração, desafiando
          os chefs a abraçar a sua textura peculiar.
      rawSwordfish:
        desc: Este peixe prateado é comprido e possui uma extensão em forma de espada
          no nariz, que utiliza para atordoar as suas presas.
        name: Espadarte cru
      rawShark:
        name: Tubarão cru
        desc: O enorme peixe tem muitos dentes afiados alinhados em várias fileiras.
          Já deve ter visto a cabeça de um deles empalhada na parede do Frosthook
          Emporium.
      rawCrab:
        name: Caranguejo cru
        desc: Este crustáceo de ampla distribuição possui um corpo curto e arredondado,
          dois olhos escuros e pequenos e grandes garras que utiliza para beliscar.
          Ai!
      rawSeaBass:
        name: Robalo cru
        desc: O robalo brilha com as suas escamas prateadas.
      rawPike:
        name: Lúcio cru
        desc: Com a sua carne macia e que se desfaz em lascas, o lúcio cru presta-se
          muito bem à cozedura.
      rawTrout:
        name: Truta crua
        desc: A truta exibe uma tapeçaria fascinante de escamas iridescentes, refletindo
          tons de prata, rosa e padrões salpicados.
      rawSalmon:
        name: Salmão cru
        desc: Com a sua carne suculenta e amanteigada, o salmão delicia o paladar
          com a sua textura rica e aveludada.
      rawMoray:
        name: Moreia crua
        desc: A moreia possui um corpo longo e serpentiforme e mandíbulas únicas,
          o que lhe confere um aspeto misterioso nas profundezas do mar.
      rawLobster:
        name: Lagosta crua
        desc: A lagosta tem uma carapaça resistente e pinças fortes. Faz-nos viajar
          no tempo, não é?
      rawSquid:
        name: Lula crua
        desc: A lula surpreende com a sua capacidade de desaparecer misteriosamente.
      rawStreamEel:
        name: Enguia-europeia crua
        desc: O formato hidrodinâmico da enguia-europeia reflete a sua adaptabilidade
          às correntes dos rios.
      rawStingray:
        name: Arraia crua
        desc: Um peixe em forma de panqueca que utiliza todo o seu corpo para deslizar
          na água.
      rawAnglerfish:
        name: Tamboril cru
        desc: Este peixe estranho tem uma boca enorme com longos dentes afiados como
          adagas. Os seus olhos parecem ser cegos. Há uma mancha brilhante a crescer
          na sua testa.
      rawLargemouthBass:
        name: Robalo cru
        desc: O peixe verde tem uma boca muito grande em relação ao corpo, que utiliza
          para engolir coisas.
      ectoFish:
        name: Peixe ectoplasmático
        desc: Estes peixes variados estão impregnados de ectoplasma e têm uma aparência
          fantasmagórica peculiar. Vai precisar de uma cozinha amaldiçoada para prepará-los.
    foraging:
      flax:
        name: Linho
        desc: Delicadas flores azuis que produzem fios resistentes. Perfeitas para
          a produção de linho.
      snowdrop:
        name: Campânula
        desc: Pequena flor branca que desabrocha no inverno, uma suave lembrança de
          esperança e novos começos.
      cotton:
        name: Algodão
      nettle:
        name: Urtiga
        desc: Planta alta e esguia com folhas em forma de coração e um veneno potente.
      thistle:
        name: Cardo
        desc: Planta robusta com folhas pontiagudas, que formam um escudo protetor
          em torno das suas flores coloridas.
      hemp:
        name: Cânhamo
        desc: Planta alta e folhosa com caules finos, conhecida pelas suas fibras
          versáteis e utilizações práticas.
      moondaisy:
        name: Margarida da Lua
        desc: Uma flor frágil que brilha ao luar nas noites mais escuras.
      sunblossom:
        name: Flor de Sol
        desc: Uma bela flor que reflete o brilho do sol, com as suas pétalas douradas
          a reluzir intensamente.
      iceplum:
        desc: Frutinho com casca gelada, a brilhar em tons de roxo.
