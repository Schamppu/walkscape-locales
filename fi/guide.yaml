maps:
  tips:
    "3": Ominaisuudet joissa on prosenttimerkki <hl>%</hl> kertautuvat - esimerkiksi
      +10% oivien materiaalien löytämiseen tarkoittaa 1.1/100.
    "8": Löytämäsi keräilyesineet tuovat sinulle kukin 1 ylimääräisen <hl>saavutuspisteen</hl>!
    "9": Monet ei-pelaajahahmot voivat kertoa sinulle kuulemiaan <hl>huhuja</hl>,
      jotka auttavat löytämään asioita pelissä.
    "12": Varmista, että olet <hl>pukenut</hl> esineet, joiden vaikutukset haluat
      käyttöön, koska suurin osa ei auta sinua repussasi kykkiessään.
    "13": Pankin talletustila on rajaton - jos jonkin asian käyttötarkoitus mietityttää,
      talleta se pankkiin!
    "10": Kolmiviivainen <hl>"hampurilaisvalikko"</hl> näytön oikeassa (tai vasenkätistilassa
      vasemmassa) alakulmassa vie sinut <hl>WalkPediaasi</hl>, jonka avulla voit seurata
      kokonaisedistymistäsi.
    "0": Repun ylitäyttyminen hidastaa aktiviteettejasi, muttei vaikuta matkustamiseen.
    "1": Perustodennäköisyys löytää <hl>oiva</hl> materiaali on <hl>1/100</hl>, ja
      voit parantaa sitä paremmilla varusteilla ja työkaluilla.
    "17": <hl>Käsityön laatu</hl> auttaa parantamaan todennäköisyyttä, että valmistat
      korkealaatuisemman esineen, ja kokonaisjakauman näkee <hl>valmistusnäkymän</hl>
      <hl>Reseptit</hl>-välilehdeltä.
    "6": Pienoiskartan painallus näytön oikeassa yläkulmassa avaa täysikokoisen kartan,
      jolla voi valita matkustusreittejä.
    "11": Kiinnitä huomiota tietyn saavutuksen tarkkoihin ehtoihin - joissakin esimerkiksi
      esineen tulee pudota suoraan tietystä aktiviteetista, eikä sitä saa vastaanottaa
      muuta kautta.
    "2": Perustodennäköisyys useimpien arkkujen löytämiseen on <hl>1/250</hl>, ja
      voit parantaa sitä paremmilla varusteilla ja työkaluilla.
    "18": Jos taitosi ylittää <hl>aktiviteetin</hl> pääasiallisen taidon minimivaatimuksen,
      saat jokaisesta ylittävästä tasosta +1,25% lisää <hl>Työtehokkuutta</hl> toimintaasi,
      kuitenkin korkeintaan 20 tason verran.
    "4": Kun painat esinettä pitkään, siirryt tilaan, jossa voit valita monta esinettä
      kerralla.
    "5": <hl>Valmistusnäkymä</hl> aukeaa näytön alalaidalla olevasta napista, jossa
      on tongit.
    "7": Saat näkyviin <hl>saavutuksesi</hl> ja löytämäsi <hl>keräilyesineet</hl>
      painamalla hahmosi kuvaa näytön vasemmassa yläkulmassa.
    "14": Jos peli tarvitsee ylläpitotauon, älä huoli, askeleesi lasketaan yleensä
      myös huoltokatkon aikana. Voit varmistaa asian <a href="https://discord.gg/Kk6VecJFEk"
      c="lightPurple">Discordin</a> ilmoituksista.
    "15": Tiedotteet, päivitykset ja kehittäjäblogit näet <a href="https://portal.walkscape.app"
      c="lightGreen">pelin omilta sivuilta</a>, <a href="https://www.reddit.com/r/walkscape"
      c="lightRed">Redditistä</a>, ja <a href="https://discord.gg/Kk6VecJFEk" c="lightPurple">Discordista</a>.
    "16": Löysitkö jotain, mikä on rikki, tai onko sinulla muita ehdotuksia? Kerro
      meille <a href="https://discord.gg/Kk6VecJFEk" c="lightPurple">Discordissa</a>!
      Raporttisi auttavat parantamaan peliä!
    "19": <hl>Käsityön laatu</hl> paranee, jos taitosi ylittää <hl>reseptin</hl> vaatiman
      ensisijaisen taidon minimirajan; näet rajan <hl>valmistusnäkymässä</hl>.
    "20": Jos puet päällesi varustesetin ollessasi sijainnissa, jossa on pankki, nostat
      automaattisesti kaikki settiin tarvittavat ja repustasi puuttuvat esineet pankista.
    "24": Syötteitä vaativat metsästysaktiviteetit antavat <hl>tuplapalkkiot</hl>
      mahdollisten tuottojensa valikoimasta!
    "21": Syötteitä vaativat metsästystoiminnot saavat <hl>bonuksia</hl> käyttämällä
      <hl>oivia</hl> syötteitä! Tarkista ominaisuuslistasta, miten niistä hyödyt!
    "22": Haluatko selvittää jonkin tietyn asian? Vilkaise pelin <a href="https://wiki.walkscape.app"
      c="yellow">wikiä</a> - voit tosin oppia jotain odottamatonta samalla!
    "23": Nautitko pelistä? Sen mahdollistavat kaikki tukijamme <a href="https://www.patreon.com/WalkScape"
      c="yellow">Patreonin</a> ja <a href="https://buymeacoffee.com/walkscape" c="yellow">Buy
      Me A Coffee</a> -palvelun kautta!
  skillTypes:
    "gathering": Keräilytaitoihin kuuluvat <skill skill="foraging"/>, <skill skill="fishing"/>,
      <skill skill="hunting"/>, <skill skill="mining"/> ja <skill skill="woodcutting"/>.
    "artisan": Luoviin taitoihin kuuluvat <skill skill="cooking"/>, <skill skill="crafting"/>,
      <skill skill="carpentry"/>, <skill skill="smithing"/>, <skill skill="tailoring"/>
      ja <skill skill="tinkering"/>.
    "utility": Muihin taitoihin kuuluu <skill skill="agility"/>.
singulars:
  info:
    inventoryFull: Reppusi on täynnä! Jos reppusi kantokyky ylittyy, kaikki toiminnot
      matkustamista lukuunottamatta hidastuvat. Voit joko mennä pankkiin säilömään
      esineitäsi, tai pudottaa niitä repustasi tehdäksesi tilaa.
    lockFavoriteItem: "<icon i=\"Favorited\"/> <c i=0>Suosikki</c>: Et voi pudottaa
      etkä myydä tällaista esinettä. Voit silti käyttää sitä valmistukseen, työtehtäviin
      ja muissa toiminnoissa.\n\n<icon i=\"Locked\"/> <c i=1>Lukittu</c>: Et voi myydä,
      pudottaa, etkä tallettaa tätä esinettä pankkiin niin kauan kuin se on lukittuna.
      Voit silti käyttää sitä valmistukseen, työtehtäviin tai muissa toiminnoissa.\n\
      \nEsineen lukitseminen tai suosikiksi merkitseminen vaikuttaa yhtäaikaisesti
      kaikkiin repussasi ja pankissa oleviin samanlaisiin esineisiin. Voit myös poistaa
      lukituksen tai suosikkimerkinnän esineistä sekä repustasi että pankista."
    bankUsage: "Painamalla talletus- tai nostonappia pitkään voit nostaa tai tallettaa
      korkeintaan <c i=0>1000</c> esinettä kerrallaan. Voit käyttää pankin hakutoimintoa
      löytääksesi esineitä nopeammin. Voit etsiä c i=0>nimen, avainsanojen, taitojen
      tai varustepaikkojen</c> perusteella.\n\n<c i=0>Pankkisi talletustila on rajaton!</c>\n\
      \nVoit painaa <icon i=\"Favorited\"/> <c i=1>suosikki</c>-painiketta vaihtaaksesi
      näkymän näyttämään vain suosikkiesineesi tai palauttaa kaikki näkyviin."
    inventoryUsage: "Jos painat esinepinoa pitkään, <c i=0>avaat monivalintatilan</c>,
      jossa voit valita useamman pinon esineitä kerrallaan pudotettavaksi tai talletettavaksi.\n\
      \n<c i=0>Valinnat</c>-napista näkymän pohjalla voit vaihtaa, miten pinot näytetään.\n\
      \n<bp /><icon i=\"Deposit\" /> <hl>Kaikki</hl>: Tallettaa kaikki esineet repustasi
      pankkiin, jos nykysijainnissasi on pankki.\n\n<bp /><icon i=\"Bank small\" />
      <hl>Pankki</hl>: Avaa pankikinäkymän, josta voit nostaa esineitä tai tallettaa
      niitä, mikäli nykysijainnissasi nämä toiminnot ovat saatavilla.\n\n<bp /><icon
      i=\"Sort\" /> <hl>Järjestä</hl>: Järjestää reppusi esineiden harvinaisuuden
      mukaan.\n"
    claimPet: Kun adoptoit lemmikkisi, se lisätään lemmikkinäkymääsi ja voit hautoa
      munan, jonka kuoriutumisen jälkeen voit kutsua lemmikin luoksesi milloin vain.
      Et voi käydä kauppaa adoptoiduilla lemmikeillä, koska ne <c>sidotaan hahmoosi</c>.
    attributeTypes: "<bp /><icon i=\"Gear alt\"/>  <c i=0>Käytetyt varusteet</c>:
      ominaisuudet tällä hetkellä ylläsi olevista varusteista.\n\n<bp /><icon i=\"\
      Tools alt\"/>  <c i=1>Käytetyt työkalut</c>: ominaisuudet käyttämistäsi työkaluista.\n\
      \n<bp /><icon i=\"Collectible\"/>  <c i=2>Keräilyesineet</c>: pysyvät ominaisuudet
      keräilyesineistä.\n\n<bp /><icon i=\"Dev services\"/>  <c i=3>Palvelut</c>:
      ominaisuudet tämänhetkisen sijaintisi palveluista.\n\n<bp /><icon i=\"Pets\"\
      />  <c i=4>Lemmikit</c>: ominaisuudet läsnäolevasta lemmikistäsi.\n\n<bp /><icon
      i=\"Fine material\"/>  <c i=5>Oivan syötteen etu</c>: hyöty oivien syötemateriaalien
      käytöstä.\n\n<bp /><icon i=\"Material\"/>  <c i=6>Syötteen vaikutus</c>: ominaisuudet
      toimintaan valitsemistasi syötteistä.\n\n<bp /><icon i=\"Consumables\"/>  <c
      i=7>Hyödykkeet</c>: ominaisuudet hyödykkeistä, joita tällä hetkellä kulutat
      toiminnassa.\n\n<bp /><icon i=\"Level up\"/>  <c i=8>Taitotaso</c>: ominaisuudet
      nykyisestä taidon tasostasi (esim. vaadittavan taitotason ylittymisen hyöty).\n\
      \n<bp /><icon i=\"Abilities\"/>  <c i=9>Kyvyt</c>: ominaisuudet kyvyistäsi.\n\
      \n<bp /><icon i=\"Player effect\"/>  <c i=10>Aktiiviset vaikutukset</c>: ominaisuudet
      tällä hetkellä aktiivisena olevista vaikutuksistas.\n"
