singulars:
  agility:
    name: Ketteryys
    desc: Happihyppele samalla kun liikut luonnossa, seikkailet Arenumissa ja löydät
      aarteita!
  carpentry:
    desc: Työstä raakapöllejä määrämittaisiksi kappaleiksi, joista voi valmistaa hyödyllisiä
      esineitä.
    name: Puutyö
  cooking:
    desc: Valitse huolellisesti luonnon ainesosia ja muuta ne herkullisiksi aistien
      ilotulituksiksi, jotka saavat mahat murisemaan ja vedet kielille.
    name: Ruoanlaitto
  crafting:
    desc: Yhdistä erilaisia osia loputtoman luovuutesi ja käsityötaitosi avulla luodaksesi
      hyödyllisiä ja näyttäviä työkaluja ja varusteita.
    name: Käsityö
  fishing:
    desc: Heitä verkkosi ja siimasi veteen narraamaan lukemattomia lajeja, jotka elävät
      Arenumin erilaisten vesistöjen pinnan alla.
    name: Kalastus
  foraging:
    desc: Jokainen askel on uusi löytö, kun luonnon antimet paljastavat itsensä ainutlaatuisen
      villeinä herkkuina, muokaten maaston elioisaksi ja syötäväksi taideteokseksi.
    name: Poiminta
  mining:
    desc: Raivaa itsellesi väylä yli vuorten ja läpi luolien kaivaaksesi esiin arvokkaita
      malmeja ja jalokiviä.
    name: Louhinta
  smithing:
    desc: Käytä ahjojen tulta sulattaaksesi malmia metalliharkoiksi, ja takoaksesi
      niistä suojahaarniskoja tai hyödyllisiä työkaluja.
    name: Taonta
  woodcutting:
    desc: Kerää puuta Arenumin loppumattomista metsistä, jolloin saat keskeisiä valmistusaineksia
      koko maailman teollisuudelle.
    name: Puunhakkuu
  trinketry:
    desc: Jalokivien muovaaminen, tuntemus ja valmistamisen taito - kauniiden ja arvokkaiden
      esineiden luomisen kulminoituma.
    name: Korutyö
  hunting:
    name: Metsästys
    desc: Sukella luontoon ja metsästä kaikenlaisia otuksia käsin tai jousella, jäljestäen,
      ansastaen tai tähtäillen jos jonkinlaista riistaa.
  tailoring:
    name: Räätälöinti
    desc: Hyödynnä kangaspuita, neulaa, lankaa ja kangasta luodaksesi vaatteita erilaisiin
      ympäristöihin.
