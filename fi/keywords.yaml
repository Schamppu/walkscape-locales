singulars:
  consumables:
    alcohol:
      name: Alkoholi
      requirement: 'Edellytys: <object id="alcohol" />.'
      requirementLevel: Vaatii alkoholia, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Alkoholijuomia voi juoda, josta voi saada toimintoihin väliaikaisia etuja,
        kunhan käyttö pysyy kohtuudessa!
    food:
      name: Ruoka
      requirement: 'Edellytys: <object id="food" />.'
      requirementLevel: Vaatii ruokaa, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Ruokaa voi syödä, jolloin saa aktiviteetteihin väliaikaisia etuja.
    water:
      name: Vesi
      requirement: 'Edellytys: <object id="water" />.'
      requirementLevel: Vaatii vettä, jonka vaatimukset ovat vähintään <keywordRequirements
        />.
      desc: Elämän perusedellytys.
    sandwich:
      requirement: 'Edellytys: <object id="sandwich" />.'
      name: Voileipä
      requirementLevel: Vaatii voileivän, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Kaikki kahden leipäpalan väliin mahtuva on voileipä! Näitä voi syödä väliaikaisten
        etujen saavuttamiseksi, ja onpa jonkin saavutuksenkin edellytyksenä voileipä.
    fruit:
      requirementLevel: Vaatii hedelmän, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      name: Hedelmä
      requirement: 'Edellytys: <object id="fruit" />.'
      desc: Hedelmiä voi syödä, josta voi saada toimintohin väliaikaisia etuja.
    memosphere:
      requirementLevel: Vaatii muistosfäärin, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      requirement: 'Edellytys: <object id="memosphere" />.'
      name: Muistosfääri
      desc: Auttaa sinua muistamaan kauan sitten kadonneita taitoja. Muistosfäärit
        voi käyttää, josta saa välitöntä kokemusta.
    cookedFish:
      name: Kypsennetty kala
      requirement: 'Edellytys: <object id="cookedFish" />.'
      requirementLevel: Vaatii kypsennettyä kalaa, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      desc: Jalostettu materiaali, jonka raaka-aineena on <object id="fish" />. Voidaan
        syödä, josta saa väliaikaisia etuja.
    beverage:
      name: Juoma
      requirement: 'Edellytys: <object id="beverage" />.'
      requirementLevel: Vaatii juoman, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Juomia voi juoda, mistä saa toimintoihin väliaikaisia etuja.
  gear:
    lifeVest:
      name: Pelastusliivi
      requirement: 'Edellytys: <object id="lifevest" /> käytössä.'
      requirementLevel: Vaatii pelastusliivin, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Pelastusliivi pitää sinut veden pinnalla! Ne pitää olla yllä veneessä
        (ettet hukkuisi).
    skis:
      name: Sukset
      requirement: 'Edellytys: <object id="skis" /> käytössä.'
      requirementLevel: Vaatii sukset, joiden vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Sukset mahdollistavat lumisilla alueilla matkustamisen, ja avaavat oikoteitä
        Jarvoniassa. Niitä tarvitaan myös tiettyihin talvisiin harrastuksiin.
    climbing:
      requirementLevel: Vaatii kiipeilyvälineen, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      requirement: 'Edellytys: <object id="climbingTool" /> käytössä.'
      name: Kiipeilyvarusteet
      desc: Kiipeilyvälineet avaavat oikopolkuja vuoristoalueilla, ja niitä tarvitaan
        tiettyihin kiipeilytoimintoihin.
    skillingGear:
      name: Taitovarusteet
      requirement: 'Edellytys: <object id="skillingGear" /> käytössä.'
      requirementLevel: Vaatii skilling gear, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
    frisbee:
      name: Liitokiekko
      requirement: 'Edellytys: <object id="frisbee" /> käytössä.'
      requirementLevel: Vaatii liitokiekon, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Liitokiekkoja käytetään tietyissä urheilusuorituksissa, kuten liitokiekkogolfissa.
    bugCatchingNet:
      name: Ötökkäverkko
      requirement: 'Edellytys: <object id="bugCatchingNet" /> käytössä.'
      requirementLevel: Vaaditaan hyönteisverkko, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      desc: Voit saada ötököitä kiinni ötökkäverkolla!
    ring:
      name: Sormus
      requirement: 'Edellytys: <object id="item_ring" /> käytössä.'
      requirementLevel: Vaaditaan sormus, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Sopii sormeen.
    socks:
      name: Sukat
      requirement: 'Edellytys: <object id="item_socks" /> käytössä.'
      requirementLevel: Vaatii sukat, joiden vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Sukille on erilaisia värejä ja kuvioita. Satunnaisten sukkien löytäminen
        voi avata saavutuksen.
    bellows:
      requirementLevel: Vaatii palkeet joissa on vähintään <keywordRequirements />
        niiden vaatimuksissa.
      name: Palkeet
      requirement: 'Edellytys: <object id="bellows" /> käytössä.'
      desc: Palkeilla voi ruokkia tulelle happea, jolloin lieskat palavat kirkkaammin!
    basket:
      name: Kori
      requirement: 'Edellytys: <object id="basket" /> käytössä.'
      requirementLevel: Vaatii korin, jossa on vähintään <keywordRequirements /> vaatimuksena.
      desc: Korit ovat työkaluja, joilla voit kantaa enemmän esineitä mukanasi.
    amulet:
      requirement: 'Edellytys: <object id="item_amulet" /> käytössä.'
      requirementLevel: Vaaditaan amuletti, jonka vaatimuksissa on vähintään <keywordRequirements
        /> .
      name: Amuletti
      desc: Riipukset puetaan kaulaan.
    arrows:
      requirement: 'Edellytys: <object id="arrows" /> käytössä.'
      name: Nuolet
      requirementLevel: Vaaditaan nuolia, joiden vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Jousen käyttö vaatii nuolia metsästyksessä tai taistelukäytössä ammuksiksi.
    weapon:
      name: Ase
      requirementLevel: Vaaditaan ase, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      requirement: 'Edellytys: <object id="weapon" /> käytössä.'
      desc: Hyvä hyökkäykseen ja siten myös puolustautumiseen.
    shield:
      name: Kilpi
      requirement: 'Edellytys: <object id="shield" /> käytössä.'
      requirementLevel: Vaaditaan kilpi, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Erinomainen paitsi laajan maalauspinnan kannalta, mutta myös iskun vastaanottamiseen.
    underwater:
      requirement: 'Edellytys: <object id="item_underwater" /> varustettuna.'
      requirementLevel: Vaatii vedenalaisvarusteet joissa on vähintään <keywordRequirements
        /> vaatimuksissaan.
      name: Uimaväline
      desc: Vedessä toimiista helpottavat esineet auttavat, kun tilanteesi on <object
        id="location_underwater" />.
  general:
    fuel:
      name: Polttoaine
      requirement: Vaatii polttoainetta.
      requirementLevel: Vaatii polttoainetta, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
    lightSource:
      name: Valonlähde
      requirement: 'Edellytys: <object id="lightSource" /> käytössä.'
      requirementLevel: Edellyttää, että käyttäjällä on <keywordRequirements /> käytössä.
      desc: Valaisee hämäriä paikkoja. Vaaditaan tiettyihin paikkoihin ja aktiviteetteihin.
    heatResist:
      name: Kuumansieto
      requirement: 'Edellytys: jokin, jolla on <object id="heat_resistant" />.'
      requirementLevel: 'Edellytys: Käyttäjällä on oltava yllään jotain, jolla on
        <keywordRequirements />.'
      desc: Pitää sinut viileänä kuumilla alueilla. Vaaditaan tiettyihin toimintoihin
        ja tietyissä paikoissa.
  materials:
    bar:
      name: Harkko
      requirement: 'Edellytys: <object id="bar" />.'
      requirementLevel: Vaatii harkon, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Soveltuu moneen, <object id="smithing" /> ja moni muukin <skillType type="artisan"
        /> vaatii resepteissään tätä jalostettua materiaalia. Perusmuotoinen <object
        id="ore" /> jalostetaan harkoiksi ahjossa.
    fish:
      name: Kala
      requirement: 'Edellytys: <object id="fish" />.'
      requirementLevel: Tarvitset kalan, jossa on ainakin <keywordRequirements />
        sen vaatimuksissa.
      desc: Moni <object id="cooking" />resepti käyttää kalaa. <object id="fishing"
        /> on varmin tapa saada tällaista saalista.
    gem:
      name: Jalokivi
      requirement: 'Edellytys: <object id="gem" />.'
      requirementLevel: Vaatii jalokiven, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Monenlaiset <object id="trinketry" />reseptit käyttävät jalokiviä.
    logs:
      name: Pölli
      requirement: 'Edellytys: <object id="logs" /> puumateriaaliksi.'
      requirementLevel: Tarvitset puisen pöllin, jossa on ainakin <keywordRequirements
        /> sen vaatimuksissa.
      desc: Voidaan jatkojalostaa, jonka tuloksena on <object id="plank" />. <object
        id="woodcutting" /> tuottaa tällaisia perusraaka-aineita.
    plant:
      name: Kasvi
      requirement: 'Edellytys: <object id="plant" />.'
      requirementLevel: Tarvitset kasvin, jossa on ainakin <keywordRequirements />
        sen vaatimuksissa.
      desc: Monenlainen <skillType type="artisan" /> voi hyödyntää kasvimateriaalia.
        <object id="foraging" /> tuottaa usein tätä perusraaka-ainetta.
    ore:
      name: Malmi
      requirement: 'Edellytys: <object id="ore" />.'
      requirementLevel: Vaatii malmia, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Voidaan jatkojalostaa, jolloin tuloksena on <object id="bar" />. <object
        id="mining" /> tuottaa tätä perusraaka-ainetta.
    plank:
      name: Lankku
      requirement: 'Edellytys: <object id="plank" />.'
      requirementLevel: Vaatii lankun, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Toimii materiaalina monenlaisissa <object id="crafting" />resepteissä.
        Lähdemateriaalina toimii jostakin puusta leikattu <object id="logs" />.
    mushroom:
      name: Sieni
      requirement: 'Edellytys: <object id="mushroom" />.'
      requirementLevel: Vaatii sienen, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Voi viedä sinut uusiin maailmoihin, syö vain sieniä jotka tunnet! Monenlainen
        <object id="cooking" /> käyttää sieniä osana reseptiä.
    misc:
      name: Sekal.
      requirement: 'Edellytys: <object id="misc" /> esine.'
      requirementLevel: Vaatii sekalaisen esineen, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      desc: Sekalainen materiaali, joka soveltuu erinäisiin resepteihin.
    nugget:
      requirement: 'Edellytys: <object id="nugget" />.'
      requirementLevel: Vaatii hipun, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      name: Hippu
      desc: Voidaan jatkojalostaa, jolloin tuloksena on <object id="bar" />. <object
        id="mining" /> tuottaa tätä perusraaka-ainetta.
    roughGem:
      requirement: 'Edellytys: <object id="rough_gem" />.'
      requirementLevel: Vaatii hiomattoman jalokiven, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      name: Hiomaton jalokivi
      desc: Voidaan jatkojalostaa, jolloin tuloksena on <object id="cut_gem" />. <object
        id="mining" /> tuottaa tätä perusraaka-ainetta.
    cutGem:
      requirement: 'Edellytys: <object id="cut_gem" />.'
      name: Viimeistelty jalokivi
      requirementLevel: Vaatii viimeistellyn jalokiven, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      desc: Soveltuu monenlaiseen <object id="trinketry" />reseptiin. Jatkojalostettu
        muoto, jonka perusraaka-aine on <object id="rough_gem" />.
    trinket:
      name: Hely
      requirement: 'Edellytys: <object id="trinket" />.'
      requirementLevel: Vaatii helyn, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Helyjä käytetään monenlaisissa <object id="trinketry" />resepteissä.
    ingredient:
      ingredient: 'Edellytys: <object id="ingredient" />.'
      requirementLevel: Vaatii ainesosan, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      name: Ainesosa
      desc: Käytetään materiaalina jonkinlaisessa reseptissä.
    processed:
      name: Prosessoitu
      requirement: 'Edellytys: <object id="processed" /> materiaali.'
      requirementLevel: Vaatii prosessoidun materiaalin, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      desc: Materiaali, joka on jalostettu toisesta raakamateriaalista, esimerkiksi
        <object id="bar" />, <object id="plank" />, <object id="fabric" /> tai <object
        id="leather" />.
    offcut:
      requirement: 'Edellytys: <object id="offcut" />.'
      name: Jämäpala
      requirementLevel: Vaatii jämäpalan, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Jämäpala on pienempi ylijäämäpalanen materiaalia, josta voi jalostaa muita
        materiaaleja.
    crustacean:
      name: Äyriäinen
      requirement: Ainesosana oltava <object id="crustacean" />.
      desc: Äyriäinen, jota moni <object id="cooking" />resepti käyttää.
      requirementLevel: Vaatii äyriäisen, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
    fabric:
      name: Kudos
      desc: Pala kangasta, jonka tyypillinen käyttötarkoitus on <object id="tailoring"
        />.
      requirement: Materiaalina oltava <object id="fabric" />.
      requirementLevel: Vaatii kudoksen, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
    fibrousPlant:
      name: Kuitukasvi
      requirement: Ainesosana oltava <object id="fibrousPlant" />.
      desc: <object id="tailoring" /> jalostaa kuitukasveja, ja tuloksena on <object
        id="fabric" />. <object id="foraging" /> tuottaa yleisimmin tätä perusraaka-ainetta.
      requirementLevel: Vaatii kuitukasvin, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
    hide:
      name: Talja
      desc: Pala eläimen nahkaa, jota <object id="tailoring" /> jatkojalostaa, ja
        sen tuloksena on <object id="leather" />. <object id="hunting" /> tuottaa
        tätä perusraaka-ainetta.
      requirement: Ainesosana vaaditaan <object id="hide" />.
      requirementLevel: Vaatii taljan, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
    leather:
      name: Nahka
      desc: Pala nahkaa, josta <object id="tailoring" /> voi valmistaa esimerkiksi
        vaatekappaleita.
      requirement: Ainesosana oltava <object id="leather" />.
      requirementLevel: Vaatii nahkaa, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
  tools:
    chisel:
      name: Taltta
      requirement: 'Edellytys: <object id="chisel" /> käytössä.'
      requirementLevel: Vaatii taltan, jossa on ainakin <keywordRequirements /> sen
        vaatimuksissa.
      desc: Talttojen avulla <object id="carpentry" /> ja <object id="trinketry" />
        sujuu sutjakkaammin ja jälki näyttää paremmalta.
    fishing:
      name: Kalastus
      requirement: Vaatii kalastukseen liittyvän työkalun.
      requirementLevel: Tarvitset kalastukseen liittyvän työkalun, jossa on ainakin
        <keywordRequirements /> sen vaatimuksissa.
    fishingCage:
      name: Merta
      requirement: 'Edellytys: <object id="fishingCage" /> käytössä.'
      requirementLevel: Tarvitset merran, jossa on ainakin <keywordRequirements />
        sen vaatimuksissa.
      desc: Mertoja tarvitaan mertakalastukseen. Niiden tulee olla käytössä kalojen
        nappaamiseksi.
    fishingNet:
      name: Kalastusverkko
      requirement: 'Edellytys: <object id="fishingNet" /> käytössä.'
      requirementLevel: Tarvitset kalastus verkon, jossa on ainakin <keywordRequirements
        /> sen vaatimuksissa.
      desc: Kalaverkkoja tarvitaan verkkokalastukseen. Niiden tulee olla käytössä
        kalojen nappaamiseksi.
    fishingRod:
      name: Onkivapa
      requirement: 'Edellytys: <object id="fishingRod" /> käytössä.'
      requirementLevel: Tarvitset ongen, jossa on ainakin <keywordRequirements />
        sen vaatimuksissa.
      desc: Onkivapoja tarvitaan ongella kalastamiseen. Vavan tulee olla käytössä
        kalan nappaamiseksi.
    fishingSpear:
      name: Kalastuskeihäs
      requirement: 'Edellytys: <object id="fishingSpear" /> käytössä.'
      requirementLevel: Tarvitset kalastusseipään, jossa on ainakin <keywordRequirements
        /> sen vaatimuksissa.
      desc: Kalastuskeihäitä tarvitaan keihäskalastukseen. Niiden tulee olla käytössä
        kalojen nappaamiseksi.
    localMap:
      name: Paikallinen kartta
      requirement: 'Edellytys: <object id="localMap" /> käytössä.'
      requirementLevel: Vaatii paikallisen kartan, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      desc: Antaa tietoa tietystä maailman alueesta, ja helpottaa toimimista kyseisellä
        alueella.
    magnetic:
      name: Magneettinen
      requirement: 'Edellytys: <object id="magnetic" /> esine käytössä.'
      requirementLevel: Vaatii magneettisen esineen, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      desc: Erittäin puoleensavetävä. Jotkin aktiviteetit vaativat esineitä, joilla
        on magneettisia ominaisuuksia.
    pickaxe:
      name: Hakku
      requirement: 'Edellytys: <object id="pickaxe" /> käytössä.'
      requirementLevel: Vaatii hakun, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Hakku tarvitaan louhimiseen. Sen tulee olla käytössä malmia ja jalokiviä
        louhiessa.
    saw:
      name: Saha
      requirement: 'Edellytys: <object id="saw" /> käytössä.'
      requirementLevel: Vaatii sahan, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Sahan avulla <object id="carpentry" /> tehostuu ja jälki paranee.
    screwdriver:
      name: Ruuvimeisseli
      requirement: 'Edellytys: <object id="screwdriver" /> käytössä.'
      requirementLevel: Vaatii ruuvimeisselin, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Ruuvimeisselin avulla <object id="crafting" /> sujuu paremmin ja tehokkaammin.
    tool:
      name: Työkalu
      requirement: 'Edellytys: <object id="tool" /> käytössä.'
      requirementLevel: Tarvitset työkalun, jossa on ainakin <keywordRequirements
        /> sen vaatimuksissa.
    woodcuttingHatchet:
      name: Kaatokirves
      requirement: 'Edellytys: <object id="woodcuttingHatchet" /> käytössä.'
      requirementLevel: Tarvitset puutyö kirveen, jossa on ainakin <keywordRequirements
        /> sen vaatimuksissa.
      desc: Kirves vaaditaan puun hakkaamiseen. Sen pitää olla käytössä, kun puita
        kaadetaan.
    sickle:
      requirement: 'Edellytys: <object id="sickle" /> käytössä.'
      requirementLevel: Vaatii sirpin, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      name: Sirppi
      desc: Työkalu, jolla <object id="foraging" /> sujuu sutjakkaammin.
    cookingPan:
      requirementLevel: Vaatii paistinpannun, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      name: Paistinpannu
      requirement: 'Edellytys: <object id="cookingPan" /> käytössä.'
      desc: Hyödyllinen ruokaa sekoittaessa ja paistaessa! Paistinpannilla <object
        id="cooking" /> sujuu tehokkaammin.
    fishingLure:
      requirementLevel: Vaatii uistimen, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      requirement: 'Edellytys: <object id="fishingLure" /> käytössä.'
      name: Viehe
      desc: Voit käyttää viehettä narrataksesi kaloja paremmin kalastaessasi.
    cookingSpices:
      requirement: 'Edellytys: <object id="cookingSpices" /> käytössä.'
      name: Mauste
      requirementLevel: Vaatii mausteita, joiden vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Mausteet olivat aikoinaan kovin kalliita. Nykyään niitä käytetään laajemminkin
        ruoanlaitossa.
    cuttingBoard:
      requirementLevel: Vaatii leikkuulaudan, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      name: Leikkuulauta
      requirement: 'Edellytys: <object id="cuttingBoard" /> käytössä.'
      desc: Leikkuulautaa käytetään pintana, jota vasten aineksia voi leikata.
    ruler:
      name: Mittanauha
      requirement: 'Edellytys: <object id="ruler" /> käytössä.'
      requirementLevel: Vaatii viivottimen, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: 'Mittalaite, jolla saa tarkkoja mittauksia. <object id="carpentry" />
        hyötyy tällaisesta erityisesti: mittaa kahdesti, sahaa vain kerran.'
    goldPan:
      name: Kullanhuuhdontapannu
      requirement: 'Edellytys: <object id="goldPan" /> käytössä.'
      requirementLevel: Vaatii kultapannun, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Kestäviä seulontavälineitä, joilla erotellaan arvometalleja veden maa-ainekerroksista.
    cookingTool:
      name: Ruoanlaittoväline
      requirement: 'Edellytys: <object id="cookingTool" /> käytössä.'
      requirementLevel: Vaatii ruoanlaittovälineen, jonka vaatimuksissa on vähintään
        <keywordRequirements />.
      desc: Ruoanlaittovälineisiin kuuluvat paistinpannut, veitset ja leikkuulaudat.
    carpentryTool:
      name: Puutyökalu
      requirement: 'Edellytys: <object id="carpentryTool" /> käytössä.'
      requirementLevel: Vaatii puutyökalun, jonka vaatimuksissa on vähintään <keywordRequirements
        />.
      desc: Puutyökaluihin kuuluu sahoja ja talttoja.
    craftingTool:
      name: Käsityöväline
      requirement: 'Edellytys: <object id="craftingTool" /> käytössä.'
