singulars:
  firstBirthdayLetter:
    p1: "Morjes!\n\nTerveisiä vanhalta kamultasi Herbertiltä! Voi tokkiisa, en millään
      usko että siitä on jo vuosi kun ilmaannuit tänne Arenumiin.\n\nOlet varmaankin
      edistynyt jo vaikka kuinka ja jatkat vain kasvamista. Kerään sinulle vieläkin
      varuiksi keppejä, kiviä ja narunpätkiä varuiksi ja ne odottavat täällä, vaikket
      ehkä niitä enää niin tarvitsekaan.\n\nJos liikut täällä päin, niin käy peremmälle,
      lämmittele takkani luona samalla kun kerrot kuulumisia seikkailuiltasi. Niiden
      pariin sinulla lieneekin kova palo, joten lopettelen tältä erää.\n\nPidähän
      huolta itsestäsi <icon i=\"Favorited\" /> ja palaillaan!\n\n- *Herbert*\n"
  secondBirthdayLetter:
    p1: "Tervetuloa takaisin!\n\nOnko tässä mennyt jo taas vuosi! Kylläpä ne rientävät,
      kohta varmaan taas on vierähtänyt yksi lisää.\n\nToivon, että olet edistynyt
      mukavasti ja jatkanut kasvuasi. Tulehan käymään joku päivä ja kerro tarinoita
      seikkailuistasi.\n\nUskonpa että olet tähän mennessä ehtinyt kauemmas kuin moni
      kauppamatkustaja. Kaupankävijöistä puheenollen, paikalliset ovat käyneet taas,
      yrittävät ostaa mökkini. Sanovat että siitä tulisi hieno isompi yleinen kauppa,
      mutta en minä ole tästä mihinkään muuttamassa, koska sinähän voit tarvita lepopaikkaa
      matkallasi!\n\nNo, ehkä tässä on riittävästi vanhan jäärän höpinöitä, pidähän
      huolta itsestäsi!\n- *Herbert*\n"
  thirdBirthdayLetter:
    p1: "Hyvät hyssykät!\n\nOlet ollut täällä jo kolme vuotta! Moni ei pysy liikkeessä
      näin pitkään, joten sinulla kyllä sinnikkyyttä riittää.\n\nTähän mennessä moni
      on ollut valmis luovuttamaan ja anelee minulta jo lopulliseen rauhaan pääsyä,
      mikä on kyllä turkasen harmillista.\n\nTulehan joku päivä käymään ja tarinoimaan
      vähän seikkailuistasi, niin kuulen ettet ole ihan mennyt tärviölle? Juhlitaan
      samalla vuosipäivääsi herkullisen teen ja leivonnaisten kera.\n\nPidä ittes
      seikkailijana äläkä vajoa pimeyteen, vaikka sitä vastaan taistelisi niin se
      ruutana hiipii hitaasti kimppuusi.\n\n- *Herbert*"
