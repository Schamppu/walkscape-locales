singulars:
  gdte:
    bilgemontPort:
      name: Bilgemont Havn
      desc: Ofte bruker denne havnen den Røde Overgangen for å handle med en annen
        by i nærheten, selv om nærheten til havet synes å fylle byen med den salte
        luften fra de friske bølgene som sakte strømmer sørover.
    blackspellPort:
      name: Blackspell Havn
      desc: En liten øy med et fyrtårn ligger rett utenfor havneområdet. Innbyggerne
        i denne byen virker svært dedikerte til havnen og varehandelen; tidlig om
        morgenen kan man se mange kasser med varer stablet langs kaiene.
    everhaven:
      name: Everhaven
      desc: En halvøyby, ikke avskåret av steinmurer eller skoger. I stedet hviler
        et massivt slott bak byen. Denne byen virker mye roligere enn de fleste andre.
        Innbyggerne går om sin dag, handler og arbeider i nesten stillhet.
    farsandCoast:
      name: Farsand Kyst
      desc: Mange elver skjærer seg gjennom kanten av denne kysten og renner sakte
        ut i havet. Den nærliggende skogen er tett med trær og dyreliv, og bare bølgene
        som slår mot stranden ser ut til å bevege seg i et mye roligere tempo enn
        resten av verden.
    granfiddich:
      name: Granfiddich
      desc: En stor mur og et slott viser at denne byen er velstående i sine sysler.
        Et travelt marked fylt med glade ansikter, og hymner som gjaller fra kirken,
        kan høres hver morgen etter kirkeklokkens siste slag.
    halflingCampgrounds:
      name: Halvling Campingområde
      desc: Midt i skogens kratt ligger en ydmyk leir, liten og nesten ubemerket i
        naturen rundt. Bål brenner, mat tilberedes, og festligheter ser ut til å finne
        sted når solen synker under trekronenes linje.
    mangroveForest:
      name: Mangroveskog
      desc: Elver gir næring til denne store mengden trær, men et uhyggelig stille
        hviler over stedet. Tykke røtter kveler alt gress og annen vegetasjon, fuglene
        synger ikke, og vinden rører ikke et eneste blad.
    oldArenaRuins:
      name: Gammel Arenaruiner
      desc: Kampene er risset inn i arenaens steingulv. Naturen har gjenerobret området.
        Det sies at når vinden blåser på akkurat riktig måte, kan ekkoene fra gamle
        kamper høres.
    redCoast:
      name: Rød Kyst
      desc: Store bølger slår mot sanden langs kysten. Den salte luften som fritt
        blåser over de små sandhaugene, er et vitnesbyrd om sjøens egen frihet. Alltid
        foranderlig, men alltid til stede.
    salsfirth:
      name: Salsfirth
      desc: En stødig by, full av både bønder og handelsfolk. Bygningene er laget
        av tykk stein, og mange av takene har røde fliser som er solide og holdbare.
        Akkurat som folket i denne beskjedne og fredelige byen.
    warrenField:
      name: Warrenfeldt
      desc: En sildrende elv, omkranset av tettvokste siv og gress. Lyden av frosker
        og sirisser er nesten overveldende om kvelden. Mange hvisker om at man nesten
        blir blendet av mengden stjerner som kan sees om natten.
    witchsForest:
      desc: En mørk og trist myr, der vridde trær kaster lange, uhyggelige skygger.
        En heksestue, plassert høyt i et krokete tre, vokter over de stillestående
        vannene. Luften, tung av lukt av forfall, fylles av sørgmodige klager.
      name: Forheksede Skoger
    bogTop:
      desc: En varm, grumsete sump. Den tykke, svampete bakken gynger under føttene
        dine, og luften er tung av den fuktige lukten av forråtnelse. Høye, spinkle
        trær med knudrete røtter henger over mørkt, stille vann. Merkelige, kuleformede
        planter pryder landskapet og speiler den dystre, overskyede himmelen.
      name: Myrhøyden
    granfiddichShores:
      name: Granfiddich-stranden
      desc: Den store stranden brenner under den lyse solen, full av halvlinger og
        mennesker.
    treetops:
      desc: Dette er et mørkt og truende sted med høye, vridde trær. Repbroer og slyngplanter
        forbinder trekronene og danner et farlig nettverk høyt over bakken. Skogbunnen
        er mørk og ugjennomtrengelig, fylt med merkelige lyder og skjulte farer.
      name: Kronglete Tretopper
    halfmawHideout:
      desc: Et skjult sumpområde er territoriet til den beryktede slangen, Halvkjeft.
        En sjarmerende tømmerhytte, dypt inne i sumpens hjerte, tilbyr et fredelig
        tilfluktssted. Hytta, med sitt værbitte treverk og skorstein av stein, smelter
        sømløst inn i de naturlige omgivelsene.
      name: Halvkjeft Skjulested
    bogBottom:
      name: Myrgropa
      desc: Vannet er grumsete og grønt, noe som reduserer sikten. Grunnen er myk
        og ujevn, dekket av et tykt lag med råtnende plantemateriale. Merkelige, kuleformede
        planter og lange, trådaktige alger svaier i strømmen.
  jarvonia:
    azurazera:
      name: Azurazera
      desc: En massiv mur er ikke nok til å skjule den store og magiske bygningen
        i denne byen. Kjøpmannsutsalg fyller gatehjørner, og magi virker å være vanlig
        her. Mumlende magiske ord streifer knapt ens sinn før byens travle liv drukner
        dem.
    barbantok:
      name: Barbantok
      desc: Gjemt bort i en skog ligger denne bygden, utskåret av skogen som omslutter
        den. Fruktbar jordbruksmark og et kapell er synlige når man nærmer seg. Mange
        trestubber står langs kanten av skogen.
    casbrantFields:
      name: Casbrant Feldt
      desc: Gigantiske bein, et vakttårn, og snirklete veier utgjør de vidstrakte
        markene. Lommer med grønt titter ut fra et dekke med snø. Det er nesten ikke
        vind her, bortsett fra et og annet trekk.
    centaham:
      name: Centaham
      desc: Den første bydgen i Jarvonina som mange snubler over, har vokst mye siden
        den ble formet. Bygninger oppført rundt veiene som tilknytter alle byene i
        dette kalde landet. Handelsfolk og kjøpmenn stopper ofte her for å gjøre forretninger.
    coldington:
      name: Kaldtington
      desc: Et lite kapell er hovedbygningen i denne beskjedne bygden. Hymner og musikk
        gjaller mykt gjennom gatene. Folkene her kan virke kalde, men deres sjeler
        varmes av håp og opplysning.
    disenchantedForest:
      name: Defortryllende Skog
      desc: Den Fortapte Skogen er et vinterskogsområde dekket i snø og kulde. Trærne
        er knytt sammen og isete, luften er skarp med et hint av mysterie. Det ser
        ut som et perfekt sted å hugge trær.
    fortOfPermafrost:
      name: Fort Permafrost
      desc: En stor bro, like kald som jorden rundt den. Fortet foran plystrer stille,
        og holder sterkt på sin iskalde rustning og mektige aura som et vitnesbyrd
        om de som bygde det.
    frostbiteMountain:
      name: Frostbittfjellet
      desc: Ett fjell står høyere enn alle andre, et fyrtårn i Jarvonia. Tykk, rød
        stein stikker frem fra sine snødekte tepper. Alle som kommer til landet kan
        ikke unngå å stå i ærefrykt foran fjellet som strekker seg mot himmelen.
    frusenholm:
      name: Frusenholm
      desc: En bygd gjemt langs en av de mange veiene. Fjellene bak denne bygden synger
        med arbeidersangene fra Frusenholm, som gjaller langs foten. Mange mennesker
        kommer hit for å bytte både sanger og varer.
    kallaheim:
      name: Kallaheim
      desc: Kallaheim er hovedstaden for det nordlige riket Jarvonia, kjent for sitt
        kalde og snøfylte klima. Selv om det er krevende værforhold, er byen et livlig
        senter for aktivitet, med et blomstrende market, velkjente smeder, og erfarne
        trearbeidere. Byen er den politiske hovedstaden til Jarvonia, mens Azurazera
        er den religiøse hovedstaden.
    noiselessPass:
      name: Lydløs Pass
      desc: En lang passasje fylt med åser. Fjellene på begge sider skjermer for mesteparten
        av de harde vindene, men snøskavlene bringer ofte med seg frostens kalde omfavnelse.
        En uhyggelig stillhet fyller veien, ikke engang lyden av vinden ser ut til
        å nå bunnen.
    nomadWoods:
      name: Nomadeskogen
      desc: En tett skog. Den gir ly til alle som vandrer inn fra de kjølige vindene
        på de åpne områdene. Snøen på grenene fanger lyden fra omverdenen. Fredelig
        og stille.
    norsackPlains:
      name: Norsacksletten
      desc: En blanding av gresskantede elver og frosne fjelltopper, selv om kulden
        ofte sveiper over den dype dalen, og lar de som bor der være uberørt av et
        isete grep.
    portSkildar:
      name: Skildar Havn
      desc: Hjertelige mennesker holder til i denne havnebyen, kledd i tykke klær
        og pelsverk. Byens veier er alltid ryddet eller godt tråkket av fottrinn og
        spader. Den mest fremtredende bygningen er et tårnende fyrtårn som leder sjøfarere
        trygt tilbake til land.
    sanguineHills:
      name: Sanguine Bakker
      desc: En stor fjellkjede, med noen topper dekket med snø. Vinden uler, og blåser
        vekk løssnø og varmen fra solen med store vindkast.
    solitudeRock:
      name: Ensomhetssteinen
      desc: En liten øy dekket i snø, og en liten med tett skog. Selv om den er isolert,
        kan man finne et nivå med ro og komfort her.
    winterWavesGlacier:
      desc: Denne isbreen er hjemmet til pingvinene som bor her. En igloo kan sees
        i horisonten. Mange eventyrere drar hit i søken etter den legendariske skatten
        som er ryktet til å ligge i det endeløse isfeltet.
      name: Vinterbølgebreen
    hornOfRespite:
      desc: En gammel, solid trehytte ligger ved kysten på denne snødekte halvøya.
        Vinduene sender ut et varmt lys, og fra skorsteinen stiger hvit røyk opp i
        luften. Luften rundt er frisk og kald.
      name: Hviletinden
    wintersEnd:
      desc: Den sterke duften av vårblomster i full blomst fyller luften. Et gammelt
        tårn, som markerer Jarvonias sydligste punkt, står på de høye klippene. Når
        man ser utover havet, kan man skimte silhuetten av Wallisia i det fjerne.
      name: Vinterslutt
    nurturingNookSprings:
      desc: Vannet glitrer i en levende blåfarge og omslutter området i en tett, svovelluktende
        damp. Kildene er for øyeblikket under reparasjon, men åpner snart igjen!
      name: Den helbredende vannkilden
    beachOfWoes:
      name: Sorgens strand
      desc: Den steinete stranden er dekket i snø. Kalde bølger kaster seg mot kysten,
        som skaper en beroligende lyd. Den salte luften gir en oppfriskende følelse.
    blackEyePeak:
      name: Svarteøyetoppen
      desc: I hjertet av disse farlige fjellene ligger munningen til en gammel vulkan.
        Dens aktive dager er lenge glemt, nå er den helt dekket av is. Den mørke gropen
        føles uhyggelig innbydende.
    pitOfPittance:
      name: Smålighetens grop
      desc: En stor grop midt i den snødekte skogen. Den har et vidstrakt nettverk
        av taggete utspring og steinete vegger. Man kan se at den kan inneholde utvinnbare
        mengder kobber, tinn, og kanskje til og med salt?
  wrentmark:
    myriadianArc:
      desc: Hovedstaden i Wrentmark, som fungerer som en oase for de som krysser ørkenene.
        Byen myldrer av aktivitet, med folk som haster forbi for å hente og levere
        varer mellom butikker og tjenester. De travle arbeiderne trenger stadig friske
        materialer for å fullføre sine avanserte håndverk.
      name: Myriadians buen
    crownOfCinders:
      name: Kronen av Aske
      desc: Store ørkensanddyner som gir ingen flukt fra ørkenens stekende varme.
        Historier om eventyrere som våget seg hit og aldri kom tilbake, er vanlige,
        men fristelsen av å finne sjeldne malmer og juveler trekker fortsatt mange
        til dette området.
  syrenthia:
    vastalumeCity:
      desc: Ulike bygninger er bygget inn i den undersjøiske steinrike dalen. Midt
        i dalen flyter en stor stein med et palass på toppen. Broer forbinder den
        med resten av byen. Både fisk og havfolk svømmer gjennom den travle undersjøiske
        byen.
      name: Vastalume
    kelpForest:
      name: Tareskogen
      desc: Havbunnen er rik på tare i mange ulike former og størrelser. Små fisk
        beveger seg stadig gjennom tarefeltene på jakt etter å nippe til mindre planter
        eller fisk.
    darkDepths:
      name: Mørketide-gropen
      desc: Når man stiger ned i en grøft utenfor grensene til Vastalume, blir havet
        mørkt. Hva kan skjule seg i dypet under?
    casbrantsGrave:
      name: Casbrants Grav
      desc: Et enormt skipsvrak ligger i sanden. Hvem vet hvor lenge det har vært
        her? Noen fisk og andre skapninger har tatt det i bruk som sitt hjem. Fargerike
        undervannsplanter vokser på og rundt skipsvraket og skaper et spektakulært
        syn.
    underwaterCave:
      desc: Den undersjøiske hulen har en stor åpning fylt med verdifulle malmer og
        steiner. Vakre undervannsplanter vokser langs hulens vegger. Mange stier leder
        dypere inn i hulene, men å utforske dem er farlig.
      name: Undervannshule
    fertileShallows:
      name: Elaras Lagune
      desc: I de grunne områdene lar solen livet blomstre. Vil du svømme i de fristende
        strømmene, eller jobbe frivillig på havfolkets gård?
  wallisia:
    tentenWetriceFields:
      name: Senenes Våtmarker
      desc: Noen gamle oversvømte åkerområder. Frodig vegetasjon og litt akvatisk
        liv sprer seg rundt i de fuktige, slyngete vannområdene. På utkanten av åkrene
        ligger en bolig.
    blackwaterFields:
      desc: Vide marker strekker seg ut og viser stier i forskjellige retninger, hver
        med sitt helt unike landskap. Området rundt byr på varme briser, mens øyenstikkere
        suser lekent omkring deg.
      name: Svartvannsfeltene
    kildomeCross:
      desc: Hovedhandelsveien mellom Wallisia og Wrentmark. Langs den travle ruten
        er Wallisiske soldater spredt omkring. Veien virker godt vedlikeholdt, men
        vannet på begge sider er fortsatt fullt av liv.
      name: Kildome Cross
    stalkingYewWoods:
      name: Snikende Eføysskog
      desc: Store barlindtrær omkranser området tydelig i denne skogen. Mange forvillede
        skapninger vandrer rundt her, noe som gir en følelse av at du til enhver tid
        er omringet av øyne som følger med på deg.
    blackrane:
      name: Blackrane
      desc: En krigsherjet by på vei mot reparasjon. Glemte av omverdenen, men klarer
        fortsatt å opprettholde butikker og tjenester. Gatene kan se dystre ut, men
        man ser at de som har drivkraft fortsatt beveger seg gjennom dem for å holde
        ting i gang.
    wraithwater:
      name: Spøkelsesvann
      desc: En gammel druknet by, en gang tatt over av pirater fra de hjemsøkte innbyggerne,
        som nå også har gått over til sin egen spøkelsesaktige tilstand. Deres nærvær
        har fylt området med ektoplasma.
