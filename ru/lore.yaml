singulars:
  firstBirthdayLetter:
    p1: "Привет!\n\nЭто твой верный друг, Герберт! Не верится, что прошел уже целый
      год с тех пор, как ты впервые появился здесь, в Аренуме.\n\nДержу пари, ты добился
      неплохих успехов и будешь только продолжать совершенствоваться. И хотя они могут
      быть тебе уже не так нужны, знай: лишние деревянные палки, камни и верёвка,
      которые я нахожу каждый день, всегда здесь, и ты можешь взять их, когда захочешь.\n\
      \nЕсли заглянешь, ты всегда сможешь согреться у моего очага и рассказать мне
      о своих приключениях. Тебе, наверное, уже надо бежать по делам, так что я буду
      закругляться.\n\nБереги себя <icon i=\"Favorited\" />, ещё увидимся!\n\n— *Герберт*\n"
  secondBirthdayLetter:
    p1: "С возвращением!\n\nНеужели прошел еще один год? Время летит быстро, и я уверен,
      что следующий пролетит ещё быстрее.\n\nНадеюсь, ты добиваешься хороших успехов
      и продолжаешь совершенствоваться. Как-нибудь обязательно загляни ко мне, чтобы
      рассказать о своих приключениях.\n\nДержу пари, ты забрался так далеко, куда
      большинство торговцев и сунуться не смеют. Кстати о торговцах: местные снова
      приходили, пытаясь купить мою хижину. Они говорят, что это отличное место для
      какого-нибудь крупного универсального магазина, но я никуда не собираюсь уходить
      — вдруг тебе понадобится место для отдыха во время путешествия!\n\nНу, на сегодня
      с меня достаточно ворчания, береги себя!\n— *Герберт*\n"
  thirdBirthdayLetter:
    p1: "Ну надо же! \n\nУже третий год, как ты здесь! Большинство других не выдерживают
      так долго, так что ты большой молодец, что держишься.\n\nОбычно к этому времени
      они уже сдаются и просят прекратить их мытарства. И когда доходит до такого,
      на душе становится очень тяжело.\n\nНе хочешь как-нибудь заглянуть ко мне и
      рассказать о своих приключениях, чтобы я знал, что ты всё ещё в порядке? Мы
      могли бы отметить твою годовщину за чашкой вкусного чая с выпечкой.\n\nБереги
      себя и не давай тьме овладеть тобой, она подкрадывается незаметно, даже если
      ты с ней сражаешься.\n\n— *Герберт*"
