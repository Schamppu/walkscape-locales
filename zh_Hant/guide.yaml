maps:
  tips:
    "0": 負荷過重令你活動效率下降，但不影響旅行。
    "6": 點擊右上角的小地圖以開啟完整地圖並查看更多旅行路。
    "7": 點擊左上角的角色查看<hl>成就</hl>及已獲得的<hl>收藏品</hl>。
    "8": 每找到一個收藏品就可以獲得一個<hl>成就點數</hl>！
singulars:
  info:
    inventoryFull: 你的背包已滿！除了旅行之外，所有活動的進度都會因超出負荷而變慢。你可以到銀行儲存物品，或丟棄背包的物品以騰出空間。
    claimPet: 一旦領取寵物，牠就會加入你的寵物清單，你可以隨時孵化及召喚。你將無法交易已領取的寵物，因為牠們<c>會與角色綁定</c>。
