singulars:
  confirmations:
    travelAndStartActivity:
      title: 先旅行然後開始活動？
      text: 你並不在正確的地點進行活動。你是否想先旅行到正確地點然後開始活動？
    changeRoute:
      title: 更改路程？
      text: 更改路徑會取消現在的旅行並回到旅行前的地點。你確定嗎？
    changingStepSource:
      title: 更改步數來源？
      lastSyncText: 步數於{time}同步。
      neverSyncedText: 步數未曾同步。
      text: 更改步數來源可能讓你失去還未同步的步數，請在更改來源前先確定你已同步你的步數。
