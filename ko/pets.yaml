singulars:
  camel:
    name: 낙타
    rareName: 쌍봉 낙타
    defaultNames:
      "0": 샌디
      "1": 듄
      "2": 클레오
      "3": 앰버
      "4": 헤이즐
      "6": 렉스
      "7": 지기
      "8": 맥스
      "9": 레오
      "11": 오마르
      "12": 스파이스
      "13": 멜키오
      "16": 로렌스
      "5": 날라
      "14": 캐스파
      "15": 발타잘
      "17": 조
      "10": 재스퍼
    rareDesc: 하나의 혹만 가진 일반 낙타와는 다르게 이 희귀한 낙타는 <c>혹이 두개이다</c>!
    desc: 강인한 낙타. 사막지역 이동에 적합하다.
  chicken:
    name: 닭
    desc: 활기가 넘치는 닭. 훌륭한 품질의 달걀과 먹이 탐색능력은 익히 알려져 있다.
    rareName: 사랑에 빠진 닭
    defaultNames:
      "0": 쉬크
      "2": 게트루드
      "3": 헤네시
      "4": 척
      "5": 클러키
      "6": 에이스
      "8": 진저
      "1": 킨
      "7": 카밀리아
      "9": 로키
    rareDesc: 이 닭은 <c>정체모를 누군가를 사모하고 있다</c>! 숨길 수 없는 닭의 모습이 이를 증명한다.
  gecko:
    name: 게코 도마뱀
    defaultNames:
      "0": 메코
      "2": 스파이크
      "3": 게스
      "5": 질다
      "6": 드라질
      "7": 오르소
      "8": 오리온
      "4": 리즈
      "1": 오스카
      "9": 바네사
    desc: 신비스러운 게코 도마뱀. 게코 도마뱀의 침묵 뒤에는 온갖 비밀들이 감추어져 있다.
    rareDesc: 이 조금 강렬한 인상의 도마뱀은 일반 게코 도마뱀들과는 다르게 <c>독특한 색상과 뾰족한 볏</c>을 소유하였다.
    rareName: 가넷 게코 도마뱀
  goose:
    name: 기러기
    defaultNames:
      "0": 그루스
      "1": 루시
      "2": 콥
      "3": 루디
      "4": 제우스
    rareName: 긴목 기러기
    desc: 좀 처럼 찾기 힘든, 사람에게 우호적인 기러기다.
    rareDesc: 당신을 위해 무려 <c>목을 내밀고 있는</c> 이 기러기는 매우 우호적인 것으로 보인다.
  snake:
    name: 뱀
    rareName: 뿔뱀
    desc: 교활한 뱀. 꼬아진 속내를 파악하기 힘들다.
    defaultNames:
      "0": 에드
      "1": 솔리드
      "2": 제시
      "3": 누들
      "4": 오루
    rareDesc: 어딘가 꿍꿍이가 있어 보이는 뱀. 게다가<c>가시돋친 뿔도 가지고 있다</c>!
  tiger:
    name: 호랑이
    desc: 힘, 은신, 속도를 모두 겸비한 강력한 호랑이.
    rareName: 리갈 타이거
    defaultNames:
      "0": 토니
      "1": 레지
      "2": 티나
      "4": 레나
      "7": 티거
      "8": 자라
      "9": 더피
      "5": 아르테미스
      "6": 홉스
      "3": 스팟
    rareDesc: <c>황금빛</c> 호랑이. 이 존재에게 총애를 받는 것은 믿기지 않을 정도의 행운이다.
  tortoise:
    name: 육지거북이
    rareName: 귀중한 육지거북이
    defaultNames:
      "1": 도니
      "3": 크러쉬
      "4": 탱크
      "5": 쉘던
      "6": 꼬북이
      "7": 미쉘
      "9": 마이키
      "0": 몰트
      "8": 아디
      "2": 해리엇
    desc: 내성적인 육지거북이. 느리지만 묵묵히 나아간다.
    rareDesc: 이 육지거북이의 등갑은 <c>꽃의 형상을 한귀중한 금속마냥 찬란하게 빛난다</c>.
  dolphin:
    name: 돌고래
    desc: 지능 높은 돌고래. 물 속에서 빠르게 이동이 가능하다. 생선은 언제나 환영!
    rareName: 재주꾼 돌고래
    defaultNames:
      "0": 플리퍼
      "2": 버블
      "3": 조조
      "4": 윈터
      "6": 트릭키
      "7": 스노키
      "8": 알파
      "9": 베타
      "1": 에코
      "5": 스노우플레이크
    rareDesc: 항상 무언가를 가져와 묘기를 부리는 <c>통통튀는</c> 돌고래.
  reindeer:
    rareName: 축제 순록
    defaultNames:
      "0": 디어셔
      "1": 댄서
      "2": 프라네서
      "4": 코맷
      "6": 다우너
      "7": 블리츠헨
      "3": 빅센
      "5": 큐피드
      "8": 루돌프
      "9": 스팬
    name: 순록
    rareDesc: <c>축제</c> 분위기의 순록. 이들이 하늘을 날 수 있다고 주장하는 사람들이 있었지만 돌아온 사람은 없다.
    desc: 생기발랄한 순록. 넘치는 에너지로 설원 지형을 막힘없이 누빌 수 있다.
  mummy:
    name: 미라
    rareDesc: 귀한 <c>비단</c>을 두루고 있는 미라. 나이에 비해 패션 감각이 뛰어나다.
    rareName: 비단 미라
    defaultNames:
      "0": 멈포드
      "2": 임호텝
      "3": 틸크
      "4": 네퍼르타리
      "5": 클레오파트라
      "6": 하트셉수트
      "7": 세틸크
      "9": 붕대무새
      "1": 람세스
      "8": 셰셰셰트
    desc: 침착한 미라. 누더기를 걸쳤지만 이를 보존하는 방법을 누구보다 잘 알기에 가장 침착하다.
  pixie:
    name: 픽시
    rareName: 파티 픽시
    defaultNames:
      "0": 채드
      "1": 요르겐
      "2": 죠니
      "3": 팅크
      "4": 킴
      "6": 목시
      "7": 나비
      "8": 퍽
      "9": 트릭시
      "5": 프란시스
    desc: 인생 최대의 파티를 맞이할 준비가 된 픽시,혹은 요정. 무슨 일이 벌어질지 모르니 마음의 준비를 추천한다.
    rareDesc: 이 픽시와 눈이 마주치게 된다면 다음날 파티 휴유증은 미리 예약이다.
