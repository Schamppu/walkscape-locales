singulars:
  camel:
    name: 낙타
    rareName: 쌍봉 낙타
    defaultNames:
      "0": 샌디
      "1": 듄
      "2": 클레오
      "3": 앰버
      "4": 헤이즐
      "6": 렉스
      "7": 지기
      "8": 맥스
      "9": 레오
      "11": 오마르
      "12": 스파이스
      "13": 멜키오
      "16": 로렌스
      "5": 날라
      "14": 캐스파
      "15": 발타잘
      "17": 조
      "10": 재스퍼
    rareDesc: 하나의 혹만 가진 일반 낙타와는 다르게 이 희귀한 낙타는 <c>혹이 두개이다</c>!
    desc: 강인한 낙타. 사막지역 이동에 적합하다.
  chicken:
    name: 닭
    desc: 활기가 넘치는 닭. 훌륭한 품질의 달걀과 먹이 탐색능력은 익히 알려져 있다.
    rareName: 사랑에 빠진 닭
    defaultNames:
      "0": 쉬크
      "2": 게트루드
      "3": 헤네시
      "4": 척
      "5": 클러키
      "6": 에이스
      "8": 진저
      "1": 킨
      "7": 카밀리아
      "9": 로키
    rareDesc: 이 닭은 <c>당신을 매우 사랑합니다</c>! 숨길 수 없는 닭의 모습이 이를 증명합니다.
  gecko:
    name: 게코 도마뱀
    defaultNames:
      "0": 메코
      "2": 스파이크
      "3": 게스
      "5": 질다
      "6": 드라질
      "7": 오르소
      "8": 오리온
      "4": 리즈
      "1": 오스카
      "9": 바네사
    desc: 신비스러운 게코 도마뱀. 게코 도마뱀의 침묵 뒤에는 온갖 비밀들이 감추어져 있다.
    rareDesc: 이 조금 강렬한 인상의 도마뱀은 일반 게코 도마뱀들과는 다르게 <c>독특한 색상과 뾰족한 볏</c>을 소유하였다.
    rareName: 가넷 게코 도마뱀
  goose:
    name: 기러기
    defaultNames:
      "0": 그루스
      "1": 루시
      "2": 콥
      "3": 루디
      "4": 제우스
    rareName: 긴목 기러기
    desc: 좀 처럼 찾기 힘든, 사람에게 우호적인 기러기다.
    rareDesc: 당신을 위해 무려 <c>목을 내밀고 있는</c> 이 기러기는 매우 우호적인 것으로 보인다.
  snake:
    name: 뱀
    rareName: 뿔뱀
    desc: 교활한 뱀. 꼬아진 속내를 파악하기 힘들다.
