        d0:
          "p0": 새로운 하루! 새로운 거래! 기억하라구, <c>프로즌 캐피탈</c>에서 저금하지 않는다면 바깥 어딘가에서 돈을 잃고 말거야.
        d4:
          "p0": 어서 서두르시게나! <c>물품들을 이곳에 보관</c>해야지. 또<c>통나무</c> 와 <c>물고기들</c> 이라면 사양하겠어.
            고약한 냄새는 더 이상 사양이야!
