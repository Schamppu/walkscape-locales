singulars:
  agility:
    name: 민첩
    desc: 아레눔의 신선한 공기를 마시며 탐험하다 보면 숨겨진 보물들을 찾아낼 수 있을지도 모른다.
  carpentry:
    name: 목공
    desc: 원목을 정밀하게 가공하여 유용한 아이템을 만들 수 있다.
  cooking:
    name: 요리
    desc: 자연에서 엄선된 재료들로 둘이 먹다 하나가 죽어도 모를 환상적인 요리를 만든다.
  crafting:
    name: 제작
    desc: 창의성과 장인정신을 발휘하여 다양한 부품들로 도구와 장비를 만든다.
  fishing:
    name: 낚시
    desc: 그물과 낚시줄을 던져 아레놈의 다양한 해양생물을 획득할 수 있다.
  foraging:
    name: 채집
    desc: 무성한 수풀 사이와 모래 속을 뒤지며 아레눔 대륙 곳곳의 풍부한 자원과 보물을 탐색한다.
  mining:
    name: 채광
    desc: 높은 산과 깊은 동굴들을 탐험하며 희귀한 광석과 원석들을 캐낼 수 있다.
  smithing:
    name: 제련
    desc: 불길이 치솟는 용광로에서 광석을 금속 주괴로 제련하고, 다양한 금속 장비와 도구들을 제작한다.
  woodcutting:
    name: 벌목
