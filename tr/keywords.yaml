singulars:
  consumables:
    alcohol:
      name: Alkol
      requirement: <object id="alcohol" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan alkol gerekli.
      desc: Alkollü içecekler geçici avantajlar için tüketilebilir. Ancak sakın dozunu
        kaçırmayasın!
    beverage:
      name: İçecek
      requirement: <object id="beverage" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan içecek gerekli.
      desc: İçecekler geçici avantajlar için tüketilebilir.
    cookedFish:
      name: Pişmiş balık
      requirement: <object id="cookedFish" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan pişmiş balık
        gerekli.
      desc: <object id="fish" />la pişirilir. Geçici avantajlar için tüketilebilir.
    food:
      name: Yiyecek
      requirement: <object id="food" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan yiyecek gerekli.
      desc: Yiyecekler geçici avantajlar için tüketilebilir.
    fruit:
      name: Meyve
      requirement: <object id="fruit" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan meyve gerekli.
      desc: Meyveler geçici avantajlar için tüketilebilir.
    water:
      name: Su
      requirement: <object id="water" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan su gerekli.
      desc: Yaşamın temel ihtiyacı.
    memosphere:
      name: Bilyuvar
      requirement: <object id="memosphere" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan bilyuvar gerekli.
      desc: Unutulmaya yüz tutmuş sanatları hatırlamana yardımcı olur. Bilyuvarlar
        çabucak tecrübe kazanmak için kullanılabilir.
    sandwich:
      name: Sandviç
      requirement: <object id="sandwich" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan sandviç gerekli.
      desc: İki dilim ekmeğin arasına konulan her şey sandviç olur! Geçici avantajlar
        için tüketilebilir ve bazı başarımlar için gereklidir.
  containers:
    chest:
      name: Sandık
      requirement: <object id="chest" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan sandık gerekli.
      desc: Sandıklardan hazineler çıkar. Aç da öğren!
    regionalChest:
      name: Bölgesel sandık
      requirement: <object id="regionalChest" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan bölgesel sandık
        gerekli.
      desc: Bölgesel sandıklardan belirli bölgelerin hazineleri çıkar.
    skillingChest:
      requirement: <object id="skillingChest" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan beceri sandığı
        gerekli.
      name: Beceri sandığı
      desc: Beceri sandıklarından belirli becerilerle ilgili hazineler çıkar.
  gear:
    bugCatchingNet:
      name: Böcek yakalama ağı
      requirement: <object id="bugCatchingNet" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan böcek yakalama
        ağı gerekli.
      desc: Böcek yakalama ağıyla böcekleri yakalayabilirsin!
    climbing:
      name: Tırmanma teçhizatı
      requirement: <object id="climbingTool" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan tırmanma teçhizatı
        gerekli.
      desc: Tırmanma teçhizatlarıyla dağlık bölgelerdeki kestirmeleri kullanabilirsin.
        Ayrıca bazı tırmanma faaliyetleri için gereklidirler.
    frisbee:
      name: Uçandisk
      requirement: <object id="frisbee" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan uçandisk gerekli.
      desc: Uçandiskler, uçandisk golfü gibi bazı sportif faaliyetlerde kullanılır.
    lifeVest:
      name: Can yeleği
      requirement: <object id="lifevest" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan can yeleği gerekli.
      desc: Bununla suya batmazsın! Can yelekleri gemilerde zorunludur. (Boğulmayasın
        diye.)
    skis:
      name: Kayak
      requirement: <object id="skis" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan kayak gerekli.
      desc: Kayaklarla karlı arazilerde ilerleyebilir ve Jarvonya'daki kestirmeleri
        kullanabilirsin. Ayrıca bazı kış faaliyetleri için gereklidirler.
    arrows:
      name: Ok
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan ok gerekli.
      requirement: <object id="arrows" /> kuşanılması gerekli.
      desc: Avcılık yaparken veya savaşırken okları mühimmat olarak kullanmak için
        yay gereklidir.
    weapon:
      name: Silah
      requirement: <object id="weapon" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan silah gerekli.
      desc: Saldırı için mükemmel. Böylece savunma için de.
    ring:
      name: Yüzük
      requirement: <object id="item_ring" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan yüzük gerekli.
      desc: Parmağa takılır.
    amulet:
      name: Kolye
      requirement: <object id="item_amulet" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan kolye gerekli.
      desc: Kolyeler boyna takılır.
    underwater:
      name: Sucul
      requirement: <object id="item_underwater" /> ekipmanı kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan su altı ekipmanı
        gerekli.
      desc: Sucul eşyalar <object id="location_underwater" /> konumlarında avantajlar
        sağlar.
    shield:
      name: Kalkan
      requirement: <object id="shield" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan kalkan gerekli.
      desc: Hem üzerine resim yapmak hem de darbelere dayanmak için ideal.
    socks:
      name: Çorap
      requirement: <object id="item_socks" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan çorap gerekli.
      desc: Pek çok renk ve desenlisi vardır. Rastgele bir çorap bulmak bir başarımı
        açmanı sağlayabilir.
    bellows:
      name: Körük
      requirement: <object id="bellows" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan körük gerekli.
      desc: Körüklerin yardımıyla ateşi oksijenle besleyerek alevleri yükseltebilirsin!
    skillingGear:
      name: Beceri teçhizatı
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan beceri teçhizatı
        gerekli.
      requirement: <object id="skillingGear" /> kuşanılması gerekli.
    basket:
      requirement: <object id="basket" /> kuşanılması gerekli.
      name: Sepet
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan sepet gerekli.
      desc: Sepetler envanterinde daha fazla eşya taşımana yardımcı olan aletlerdir.
  general:
    fuel:
      name: Yakıt
      requirement: Yakıt gerekli.
      requirementLevel: En az <keywordRequirements /> olan yakıt gerekli.
    lightSource:
      name: Işık kaynağı
      requirement: <object id="lightSource" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> kuşanılması gerekli.
      desc: Loş yerleri aydınlatır. Bazı faaliyetler ve konumlar için gereklidir.
    heatResist:
      name: Isıya dayanıklı
      requirement: <object id="heat_resistant" /> bir şey gerekli.
      requirementLevel: <keywordRequirements /> bir şey kuşanılması gerekli.
      desc: Sıcak yerlerde serin tutar. Bazı faaliyetler ve konumlar için gereklidir.
  materials:
    bar:
      name: Külçe
      requirement: <object id="bar" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan külçe gerekli.
    fish:
      name: Balık
      requirement: <object id="fish" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan balık gerekli.
    gem:
      name: Cevher
      requirement: <object id="gem" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan cevher gerekli.
    logs:
      name: Kütük
      requirement: Tahta <object id="logs" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan tahta kütük gerekli.
    ore:
      name: Maden
      requirement: <object id="ore" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan maden gerekli.
    plank:
      name: Kereste
      requirement: <object id="plank" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan kereste gerekli.
    plant:
      name: Bitki
      requirement: <object id="plant" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan bitki gerekli.
    ingredient:
      name: Yemek malzemesi
      ingredient: <object id="ingredient" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan yemek malzemesi
        gerekli.
      desc: Çeşitli tariflerde kullanılır.
    nugget:
      name: Parça
      requirement: <object id="nugget" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan parça gerekli.
    cutGem:
      requirement: <object id="cut_gem" /> gerekli.
      name: Kesilmiş cevher
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan kesilmiş cevher
        gerekli.
    trinket:
      name: Süs
      requirement: <object id="trinket" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan süs gerekli.
      desc: Süsler çeşitli <object id="trinketry" /> tariflerinde kullanılır.
    misc:
      name: Çeşitli
      requirement: <object id="misc" /> eşya gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan çeşitli eşya
        gerekli.
      desc: Farklı tariflerde kullanılabilen çeşitli malzemeler.
    processed:
      name: İşlenmiş
      requirement: <object id="processed" /> malzeme gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan işlenmiş malzeme
        gerekli.
      desc: Ham maddenin işlenmesiyle elde edilen, <object id="bar" />, <object id="plank"
        />, <object id="fabric" />, veya <object id="leather" /> gibi işlenmiş bir
        malzeme.
    offcut:
      name: Fazlalık
      requirement: <object id="offcut" /> eşya gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan fazlalık eşya
        gerekli.
      desc: İşlenerek yeni malzemelere dönüştürülebilen bir malzeme fazlası.
    roughGem:
      name: Doğal cevher
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan doğal cevher
        gerekli.
      requirement: <object id="rough_gem" /> gerekli.
    mushroom:
      requirement: <object id="mushroom" /> gerekli.
      name: Mantar
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan mantar gerekli.
    crustacean:
      name: Kabuklu
      desc: Kabuklular çeşitli <object id="cooking" /> tariflerinde kullanılır.
      requirement: <object id="crustacean" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan kabuklu gerekli.
    fabric:
      name: Kumaş
      requirement: <object id="fabric" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan kumaş gerekli.
      desc: Genellikle <object id="tailoring" /> tarifleri için kullanılan bir kat
        kumaş.
    fibrousPlant:
      name: Lifli bitki
      requirement: <object id="fibrousPlant" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan bir lifli bitki
        gerekli.
    hide:
      name: Post
      requirement: <object id="hide" /> gerekli.
      desc: <object id="tailoring" /> tarifleriyle <object id="leather" /> yapmak
        için kullanılabilen bir hayvan postu parçası. <object id="hunting" /> yaparak
        elde edilebilir.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan post gerekli.
    leather:
      name: Deri
      requirement: <object id="leather" /> gerekli.
      desc: Genellikle <object id="tailoring" /> tariflerinde kullanılabilen bir deri
        parçası.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan deri gerekli.
  misc:
    trash:
      name: Çöp
      requirement: <object id="trash" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan çöp gerekli.
      desc: Başkası için hazine değerinde olabilir.
    currency:
      name: Para
      requirement: <object id="currency" /> gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan para gerekli.
      desc: Dükkanlardan bir şeyler almak için kullanılır.
    spectral:
      name: Ruhani
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan ruhani bir şey
        gerekli.
      requirement: <object id="spectral" /> bir şey gerekli.
      desc: Ruhani eşyalara <object id="c7a75c46-f140-4116-b0b6-f74e5d763ef5" />nın
        hayaletsi özellikleri işlemiştir.
    cursed:
      name: Lanetli
      requirement: <object id="cursed" /> bir şey gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan lanetli bir şey
        gerekli.
      desc: Negatif etkileri olan lanetli bir hizmet.
  tools:
    carpentryTool:
      name: Marangozluk aleti
      requirement: <object id="carpentryTool" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan marangozluk aleti
        gerekli.
      desc: Marangozluk aletleri testereler ve keskilerden oluşur.
    chisel:
      name: Keski
      requirement: <object id="chisel" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan keski gerekli.
      desc: Keskiler <object id="carpentry" /> ve <object id="trinketry" /> yaparken
        kullanılır ve bu becerilere çeşitli bonuslar verir.
    cookingKnife:
      name: Mutfak bıçağı
      requirement: <object id="cookingKnife" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan mutfak bıçağı
        gerekli.
      desc: Mutfak bıçakları yemek malzemelerini kesmek için kullanılır.
    cookingPan:
      name: Tava
      requirement: <object id="cookingPan" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan tava gerekli.
      desc: Biraz yemek hazırlamak için çok kullanışlı! Tavalar <object id="cooking"
        /> becerisine çeşitli bonuslar verir.
    cookingPot:
      name: Tencere
      requirement: <object id="cookingPot" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan tencere gerekli.
      desc: <object id="cooking" /> için çok kullanışlı bir alet. Yuvarlanarak kapağını
        bulmasıyla da bilinir.
    cookingSpices:
      name: Baharat
      requirement: <object id="cookingSpices" /> kuşanılması gerekir.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan baharat gerekli.
      desc: Eskiden bir hayli pahalı bir şeymiş. Günümüzde ise yemek yaparken sık
        kullanılır.
    cookingTool:
      name: Aşçılık aleti
      requirement: <object id="cookingTool" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan aşçılık aleti
        gerekli.
      desc: Aşçılık aletleri tavalar, bıçaklar ve kesme tahtalarından oluşur.
    craftingTool:
      name: Zanaatkarlık aleti
      requirement: <object id="craftingTool" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan zanaatkarlık
        aleti gerekli.
      desc: Zanaatkarlık aletleri somun anahtarları ve tornavidalardan oluşur.
    cuttingBoard:
      name: Kesme tahtası
      requirement: <object id="cuttingBoard" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan kesme tahtası
        gerekli.
      desc: Üzerinde yemek malzemesi kesmek için kullanılır.
    fishing:
      name: Balıkçılık
      requirement: Balıkçılık aleti gerekli.
      requirementLevel: En az <keywordRequirements /> olan balıkçılık aleti gerekli.
    fishingCage:
      name: Balık kafesi
      requirement: <object id="fishingCage" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan balık kafesi
        gerekli.
      desc: Balık kafesleri, kafesli balıkçılık yapmak için gereklidir. Balık yakalamak
        için kuşanılmaları gerekir.
    fishingLure:
      name: Zoka
      requirement: <object id="fishingLure" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan zoka gerekli.
      desc: Zoka kullanarak balıkları daha kolay çekebilirsin.
    fishingNet:
      name: Balık ağı
      requirement: <object id="fishingNet" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan balık ağı gerekli.
      desc: Balık ağları, ağlı balıkçılık yapmak için gereklidir. Balık yakalamak
        için kuşanılmaları gerekir.
    fishingRod:
      name: Olta
      requirement: <object id="fishingRod" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan olta gerekli.
      desc: Oltalar, oltalı balıkçılık yapmak için gereklidir. Balık yakalamak için
        kuşanılmaları gerekir.
    fishingSpear:
      name: Balık mızrağı
      requirement: <object id="fishingSpear" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan balık mızrağı
        gerekli.
      desc: Balık mızrakları, mızraklı balıkçılık yapmak için gereklidir. Balık yakalamak
        için kuşanılmaları gerekir.
    foragingTool:
      name: Toplayıcılık aleti
      requirement: <object id="foragingTool" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan toplayıcılık
        aleti gerekli.
      desc: Toplayıcılık faaliyetlerinde kullanılan bir alet.
    goldPan:
      name: Altın eleği
      requirement: <object id="goldPan" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan altın eleği gerekli.
      desc: Değerli metalleri sudaki tortudan ayırmak için kullanılan sağlam süzgeç.
    knife:
      name: Bıçak
      requirement: <object id="knife" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan bıçak gerekli.
      desc: Öyle keskin ki aman parmaklarına dikkat et! Bir şeyleri kesme konusunda
        bayağı iyi olduğu için pek çok alanda işine yarar.
    localMap:
      name: Yöre haritası
      requirement: <object id="localMap" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan yöre haritası
        gerekli.
      desc: Dünyanın belirli bir bölgesi hakkında bilgi vererek o bölgede faydalar
        sağlar.
    magnetic:
      name: Manyetik
      requirement: <object id="magnetic" /> eşya kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan manyetik eşya
        gerekli.
      desc: Bayağı çekici. Bazı faaliyetler için manyetik eşyalar gereklidir.
    magnifyingLense:
      requirement: <object id="magnifyingLense" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan büyüteç gerekli.
      name: Büyüteç
      desc: Büyüteçler bazı <skillType type="artisan"/> beceriler için kullanışlıdır.
    pickaxe:
      requirement: <object id="pickaxe" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan kazma gerekli.
      name: Kazma
      desc: Kazmalar madencilik yapmak için gereklidir. Maden ve cevher çıkarmak için
        kuşanılmaları gerekir.
    saw:
      requirement: <object id="saw" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan testere gerekli.
      name: Testere
      desc: Testereler genellikle <object id="carpentry" /> için kullanılır ve bu
        beceriye çeşitli bonuslar verir.
    screwdriver:
      requirement: <object id="screwdriver" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan tornavida gerekli.
      name: Tornavida
      desc: Tornavidalar <object id="crafting" /> için kullanılır ve bu beceriye çeşitli
        bonuslar verir.
    sickle:
      requirement: <object id="sickle" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan orak gerekli.
      name: Orak
      desc: <object id="foraging" /> yaparken kullanılan toplama aleti.
    smithingHammer:
      requirement: <object id="smithingHammer" /> kuşanılması gerekli.
      requirementLevel: En az <keywordRequirements /> koşulu taşıyan demircilik çekici
        gerekli.
      name: Demircilik çekici
      desc: Metale vurarak şekil vermek için kullanılan ağır bir çekiç. <object id="smithing"
        /> yaparken bayağı kullanışlı.
    tool:
      name: Alet
      requirement: <object id="tool" /> kuşanılması gerekli.
