singulars:
  buildings:
    gdte:
      bilgemontCastle:
        name: Sintinetepe Kalesi
        desc: Bu koskocaman kalenin oldukça gösterişli ve neredeyse kusursuz olduğunu
          söyleyebiliriz. Taşlarında ne bir çatlak ne de bir is izi bulunur. Kalenin
          bu tertemiz görüntüsü sanki içinde kimse yaşamıyormuş gibi bir his uyandırsa
          da bu görkemli yerde yaşayan hükümdarlar zenginlikleri ve güzel mücevherleriyle
          herkesçe tanınmaktadırlar.
      bogsideBankOfProsperity:
        name: Batakyanı Refah Bankası
        desc: Bankanın zeminindeki yosun renkli halı, üzerinde yürürken şapır şapır
          ses çıkartıyor. Kirişlerin ardında pusuya yatmış bekleyen birkaç kurbağa,
          sivrisinekleri uzak tutuyor. Ufak bir baş hareketiyle seni selamlayan görevlilerden
          birinin şapkasının altından, sırf etrafta uçuşan kocaman güveyi yakalamaya
          teşebbüs etmek için ara sıra başka bir kurbağa fırlıyor.
      animalShelter:
        name: Pati Pati Pençe
        desc: Dükkanın içi rengarenk kürkleri veya pullarıyla adeta bir yelpaze oluşturan
          bir sürü farklı hayvan türüyle dolu. Duvardaki bir panoda bu hayvanların
          çoğunun terk edildikten ya da kaybolduktan sonra bataklıktan kurtarılmış
          oldukları yazıyor.
      bureauOfMoss:
        name: Yosun Bürosu
        desc: Tavernanın içindekiler, yemek takımları hariç, yosun ve bataklık temalı
          süslemelerle dolu. Ocağın bitişiğindeki köşede birkaç kurbağanın güzel vakit
          geçirdiği küçük bir havuz bulunur. Bir halk ozanının gitara benzeyen ancak
          içi su dolu olan acayip enstrümanından hafif bir melodi çıkar.
      fishMarketStall:
        name: Balık Tezgahı
        desc: Görünüşe göre buzun üzerinde sürüsüne bereket kocaman balıkların yattığı
          bu tezgahın başında bir kadın bulunuyor. Ayrıca bu kadının etrafında çeşitli
          balıklarla ve hatta balık yemleriyle dolu birkaç kova daha olduğu görülebilmektedir.
      quagmireCouture:
        name: Çıkmaz Modaevi
        desc: Muhaliç'te bulunan Çıkmaz Modaevi, bataklıktan ilham alan kıyafetlerle
          dolu bir butiktir. Her ortama uygun son moda giysilerden oluşan bir koleksiyonun
          içinde ne ararsan bulabilirsin.
      goldnGrailEverhaven:
        name: Altın Kase Bengiyuva
        desc: Sevilen taverna zincirinin Bengiyuva'daki şubesi, meşhur yiyecek ve
          içeceklerini altın kaselerde sunar. Elindeki kase niyeyse diğer kaselerin
          aksine peynir gibi kokuyor.
      mossyMerchantsBreezeMart:
        name: Yosunlu Tüccar Meltemi Dükkanı
        desc: Birkaç penceresi her zaman açık duran Yosunlu Tüccar Meltemi Dükkanı'nın
          içinde usul usul esen rüzgar, dışarıdaki serinliği ve gürültüyü de beraberinde
          getirir. Buradaki rafların büyük çoğunluğu enteresan ve benzersiz eşyalarla
          doludur.
      maritimeFortuneBank:
        name: Bahri Servet Bankası
        desc: Altın süsler, mermer yerler ve hatta tavandan sarkan devasa bir avize.
          Görünüşe göre o da altından yapılmış ve ufak bir alevin etrafında birkaç
          cevher parıltısı seçilebiliyor. Burada, görevlileri çağırmak için çalınabilen
          ziller bile altından yapılmadır.
      bogAndBlade:
        name: Batak & Bıçak
        desc: Batak & Bıçak, Muhaliç'te uzman saç kesimi hizmeti sunar. Upuzun çizmeler
          giyen berberler birinci sınıf kuaförlük becerilerinin yanında mizahlarını
          da konuştururlar. Rahat sandalyelere kendini bırakıp çayını yudumlarken
          saçınla ilgilenilmesinin keyfini çıkar.
      goldnGrailBilgemont:
        name: Altın Kase Sintinetepe
        desc: Sevilen taverna zincirinin Sintinetepe Limanı'ndaki şubesi, meşhur yiyecek
          ve içeceklerini altın kaselerde sunar. Elindeki kase etraftaki tuzlu hava
          gibi kokuyor, hem de içerideki müşterilerin kullandığı onca pahalı parfüme
          rağmen.
      goldnGrailBlackspell:
        name: Altın Kase Karabüyü
        desc: Sevilen taverna zincirinin Karabüyü Limanı'ndaki şubesi, meşhur yiyecek
          ve içeceklerini altın kaselerde sunar. Elindeki kasenin kokusu hani şu kokulu
          mu kokulu koku gibi, hani şu kokuşmuş koku kokusu var ya?
      halfmawOutpost:
        name: Macera Loncası Batakolu
        desc: Macera Loncası'nın bu kolu, Yarımçene'yi insanlardan uzak tutmaya çalışmak
          için kurulmuştur. Buranın en büyük farkı kendine has adı, kocaman banka
          sandığı ve değişik dekorasyonu, ayrıca Jarvonya'dakinden çok daha yeşil
          ve dökük olmasıdır. Bir de hani şu bataklık meselesi var.
      foodMarketStall:
        name: Yiyecek Tezgahı
        desc: Yiyecek tezgahındaki taze ekmek ve böreğin mis kokusu havayı dolduruyor.
          Bunların yanı sıra çeşitli turşular ve kavanozlara doldurulmuş başka yiyecekler
          de satıyorlarmış. Şükürler olsun ki ellerinde hiç Surströmming kalmamış.
      toolMarketStall:
        name: Alet Tezgahı
        desc: Eski bir deri örtüyle kaplanmış olan alet tezgahının üzerindeki aletler
          belirli bir düzene göre dizilmiş. Tezgahın üst tarafında, satıcının başının
          etrafında asılı duran birkaç lamba, iplerle sarkan aletler ve de sepetler
          görülebiliyor.
      witchsHut:
        name: Cadı Kulübesi
        desc: İçi çeşit çeşit bitkiler ve iksirlerle dolu bu kulübe kocaman bir ağaca
          yapılmıştır. Tam ortasında baloncuklar çıkararak kaynayan kazanın yanı başında
          gelip geçen sinekleri yakalayan bir kurbağa oturur. Cadı ise bir yandan
          kazanı karıştırırken diğer yandan elindeki kitaba dalıp gitmiş görünüyor.
    jarvonia:
      fortofPermafrost:
        name: Buzuldaim Hisarı
        desc: Jarvonya ile Görkemli Düklük Trellin-Erdwise arasında bulunan bu ihtişamlı
          hisar işte karşında dikiliyor. Bu yer, Jarvonya'nın donmuş topraklarına
          girmeden önce burada bir oyun oynanması zorunluluğuyla bilinir.
      frosthookEmporium:
        name: Karkanca Mağazası
        desc: Görmüş geçirmiş bir korsan hanım seni başıyla selamlıyor. Tezgahın arkasına
          geçerken tahta bacağı zeminde takırdıyor. Duvarlar ve raflar çeşit çeşit
          balıkçılık malzemesiyle dolu. Hayret verici derecede büyük bir köpek balığı
          kafası ise bu duvarlardan birine asılmış. Altındaki tabelada "Bruce" yazısı
          okunuyor.
      frozenCapital:
        name: Donmuş Sermaye Bankası
        desc: Jarvonya'da herkesçe bilinen nüfuzlu bir banka. Donmuş Sermaye, eşyalarını
          güvende tutar.
      icyGoblet:
        name: Buzlu Kadeh
        desc: Buzlu Kadeh Tavernası'nda içecekler sınırsızca akar. Soğuk serüvenlerini
          anlatan maceracıların kahkahaları havayı doldururken efsaneler gerçeklikle
          buluşur.
      templeOfAzurazera:
        name: Azurazera Tapınağı
        desc: Tütsü dumanı ve kutsal sözlerin fısıltılarıyla dolup taşan bu devasa
          tapınakta insanlar mavi renkte parlayan kocaman taşın yanına giderek dua
          ediyorlar. Bu kocaman taş yerden göğe kadar uzanarak sanki gökyüzünü delecekmiş
          gibi görünüyor. Tapınak kadar devasa boyutuna rağmen, taşın tamamen pürüzsüz
          yüzeyi güç dolu bir sesle uğulduyor.
      tutorialCabin:
        name: Yardımsever Herbert'ın Kulübesi
        desc: Büyüsüz Orman'ın hemen dışında mütevazı bir kulübe bulunuyor. Kulübenin
          önünde ise birkaç kütüğün ardındaki masanın yanındaki iki sandalyeden birinde
          bir adam oturuyor. Görünüşe göre bu adam, dikkatini masanın üzerindeki satranç
          tahtasına tamamen vermiş.
      woodcuttersCabin:
        name: Oduncu Barakası
        desc: Sık bir ormanın içindeki ufak bir alanın ortasında, devrilmiş ağaçlardan
          yapılma bir baraka dikiliyor. Etrafı ise kesilmiş ağaç kütükleriyle çevrilmiş.
          Ufacık çalı çırpı yığınları bu kütüklerin yanına ya özenle dizilmiş ya da
          bir ip yardımıyla birbirine bağlanmış bir şekilde bekliyor.
      hornOfRespiteOutpost:
        name: Macera Loncası Karakolu
        desc: Macera Loncası Karakolu, maceracıların hikayelerini paylaştıkları, tavsiye
          aradıkları ve bir sonraki yolculuklarına hazırlık yapabildikleri bir yerdir.
          Duvarları eski keşif gezilerinden kalma haritalar, silahlar ve ödüllerle
          kaplıdır.
      jarvoJoy:
        name: JarvoŞen
        desc: Tıknaz bir cüce, tezgahın arkasındaki taburenin üzerinde dikiliyor.
          Yüzünde daha yeni iyileşmişe benzeyen yaraların izleri var. Sakalı ise yer
          yer yanmış. Etrafında çeşitli kayaklar, uçandiskler ve başka pek çok spor
          ekipmanı bulunuyor.
      frostyFinds:
        name: Kallaheim'ın Soğuk Malları
        desc: Bir gezginin maceralarında ihtiyaç duyabileceği her türlü şey bulunur.
      northstarMercantile:
        name: Demirkazık Ticarethanesi
        desc: Birçok insanın girip çıktığı görülebilen Demirkazık Ticarethanesi, mevcut
          konumunda başarıyla gelişiyor. Karşı duvardaki ocakta ateş yavaşça çatırdarken
          özenle dizilmiş satılık mallar raflarda alıcılarını bekliyor.
      bigloo:
        name: İriglu
        desc: Şaşırtıcı derecede geniş bir iglu olan İriglu, şirin papyonu ve paytaklığıyla
          meşhur sevimli bir penguen tarafından sergilenen buz kaplı eserlerden seçme
          bir koleksiyonla birlikte sıcacık misafirperverliğin bulunabileceği bir
          yerdir.
      polarPruning:
        name: Polar Perukar
        desc: Polar Perukar, Azurazera'nın kalbinde bulunan samimi bir berber dükkanıdır.
          İçeri adımını attığın anda becerikli berber saçını dikkatlice şekillendirmeye
          başlar. Duvarlar çeşitli eşyalarla dekore edilmiştir ve içerideki hava ferah
          bir çam kokusuyla doludur.
      tundraTrends:
        name: Tundra Trendi
        desc: Tundra Trendi en yeni kış modasını oyunbaz bir tarz katarak sunar. Göz
          alıcı atkıları, acayip şapkaları ve rengarenk kabanları keşfederek kar beyazlığının
          ortasında kendini göster.
      notAShop:
        name: Dükkan Değil
        desc: Köyün geri kalanından ayrık durarak göze çarpan ilgi çekici bir yapı.
          İçeri girenlere hemen meyan kökü içeceği ikram edilir. Duvardaki afişte
          ne anlama geldiği meçhul olan bir "WalkScape" yazısı okunabilir. İçerisi
          ise bir kanban tablosu, yüksek bir masa ve Boraocak malı yepyeni bir yürüyüş
          bandı bulunan bir ofis gibi görünmektedir.
      azurazeraBank:
        name: Adanmışlığın Soğuk Deposu
        desc: Dışarıda yağan karın nasıl oluyorsa içeriye doluşmadığı tertemiz görünümlü
          bir banka. Meşaleler bile mavi renkte yandığı için etrafa mavi camlı bir
          gözlükle baktığına neredeyse yemin edebilirsin. Yalnızca Jarvonyalılar arasındaki
          en saygın kimseler böyle bir yere adım atabilir.
    syrenthia:
      casbrantsSunkenShip:
        name: Kasbrant'ın Batık Gemisi
      vastalumeBank:
        name: Dalgalı Derya Bankası
        desc: Kocaman, parlak sarı bir yılan kumlu zeminde sürünür. Su altı taşlarından
          yapılmış duvarların birinde, üzerinde devasa bir anahtar deliği olan yuvarlak
          bir kasa kapısı bulunur.
      throneOfTheNeverdrown:
        name: Boğulmaz'ın Tahtı
      vastalumeSpecializedStore:
        name: Altakıntı
      vastalumeTavern:
        name: Deniz İncisi
        desc: Zemin tamamen kumla kaplı. Barın arka tarafında içecekleri karıştırıp
          bardaklara dolduran turuncu bir ahtapot var. Bir köşede ise hayatında görmüş
          olduğun en büyük inci bulunuyor.
      vastalumeGeneralStore:
        name: Batık Çıpa
        desc: Kumda yatan paslı bir çıpa. Ufak dükkan yalnızca birkaç raf ve fıçıdan
          ibaret. Duvardaki çatlak ve deliklerden baloncuklar çıkıp duruyor. Duvardaki
          tabloda gördüğün dağları ise bir yerden çıkaracaksın sanki.
      vastalumeBarber:
        name: Akışına Bırak Kuaför Salonu
        desc: İçerisi tıklım tıklım olan kuaför salonunda aynı anda birçok koltukta
          hizmet veriliyor. İçeri girip çıkan müşteri sayısının haddi hesabı yok.
          Vastalum'da saç kestirebileceğin en meşhur yer burası anlaşılan.
      vastalumeClothingShop:
        name: Pulazzam Moda
    wallisia:
      lostSoulsourcing:
        name: Kayıp Ruhlar Tedarikçisi
        desc: Dışarıdan bakınca yıkık dökük dursa da içerisi... Evet, içerisi de yıkık
          dökükmüş, ama hayalet bir kasabadan ne beklersin ki? Bu ticaret merkezine
          girip çıkan hayalet kasaba halkının geride bıraktığı dışplazma izlerini
          yerlerde görebiliyorsun.
      innerPeaceEats:
        name: İç Huzur Sofrası
      theFinalDeposit:
        name: Son Emanet
      brokenSpiritSavings:
        name: Yıkılmış Ruhlar Mevduatı
      restoredSpiritSavings:
        name: Toparlanmış Ruhlar Mevduatı
    wrentmark:
      jeweledOasisBank:
        name: Vaha Mücevheri Bankası
      southernGem:
        name: Güney Cevheri
