  crafting:
    tools:
      basicHatchet:
        activityDesc: Dikkatlice yonttuğun taşı çubuğa takarak ilkel bir nacak yapıyorsun.
        desc: Çubuk ve taş kullanarak, ağaç kesmek için basit bir alet yapabilirsin.
        name: Basit nacak yapımı
      basicPickaxe:
        activityDesc: Olabildiğince sivrilttiğin taşı sopaya takarak basit bir kazma
          yapıyorsun.
        desc: Sıradan bir sopa ve biraz taş kullanarak maden çıkarmak için basit bir
          alet yapabilirsin.
        name: Basit kazma yapımı
      bronzeHatchet:
        desc: Ağır odunculuk işleri için sağlam bir bronz nacak üret.
        name: Bronz nacak yapımı
        activityDesc: Özenle şekil verdiğin bronzu bir odunculuk aleti haline getirerek
          bronz bir nacak üretiyorsun.
      stoneSickle:
        desc: Toprağın cömertliğini toplamaya başlamak için basit bir taş orak üret.
        name: Basit orak yapımı
        activityDesc: Bilediğin bir taşı çubuğun birine bağlayarak basit bir toplama
          aleti yapıyorsun.
      tarsiliumHatchet:
        desc: Gece semasının karanlığına benzeyen bir nacak üret.
        name: Katrilyum nacak yapımı
        activityDesc: Ocağın alevlerinde şekil alan metal, ağaçları kolaylıkla kesmek
          için dövülüp bileniyor.
      tarsiliumPickaxe:
        desc: Keşiflerini toprağın daha derinlerine taşımak için katrilyum kazma üret.
        name: Katrilyum kazma yapımı
        activityDesc: Kara metal ile sıcak kömürlere indirdiğin ağır darbeler yeni
          aletini yapmana yardımcı oluyor. Katrilyum kazma işe başlamaya hazır.
      hydriliumHatchet:
        name: Hidrilyum nacak yapımı
        desc: Odun kesip yontmak için tasarlanmış, hidrilyum külçeden yapılan çok
          yönlü bir alet.
        activityDesc: Hidrilyum külçeyi yumuşatmak için demirhanede ısıtıyor, dikkatlice
          nacak başı şekline sokuyorsun. Daha sonra tahtadan bir sap takıyor, güçlü
          bir odunculuk aleti olması için kenarını güzelce biliyorsun.
      hydriliumPickaxe:
        name: Hidrilyum kazma yapımı
        desc: Yer altındaki keşiflerin cefalarına dayanabilecek şekilde tasarlanmış,
          hidrilyum külçesinden yapılan sağlam bir madencilik aleti.
        activityDesc: Hidrilyum külçeyi yumuşatmak için demirhanede ısıtıyor, dikkatlice
          kazma başı şekline sokuyorsun. Daha sonra mercandan bir sap takıyor, güçlü
          bir madencilik aleti olması için ucunu güzelce sivritiyorsun.
      hydriliumSickle:
        name: Hidrilyum orak yapımı
        desc: Mükemmel şekil verilen hidrilyum külçesinden yapılmış keskin ve dayanıklı
          bir toplama aleti.
        activityDesc: Hidrilyum külçeyi yumuşatmak için demirhanede ısıtıyor, orağın
          kıvrımını vererek dikkatlice şekillendiriyorsun. Soğuduktan sonra ise kenarını
          bileyerek keskin ve etkili bir toplama aleti yapıyorsun.
      copperSickle:
        name: Bakır orak yapımı
        desc: Çayır çimeni kesmek için basit bir alet olan bir bakır orak döv.
        activityDesc: Bakırı ısıtıp şekillendirerek, senin ellerinde biraz daha verimli
          olacağını vadeden bir orak yapıyorsun.
      ironSickle:
        name: Demir orak yapımı
        desc: Sıradan toplayıcılık işleri için güvenebileceğin sağlam bir demir orak
          üret.
        activityDesc: Demirhanenin sıcağında demir bir orağa şekil vererek hem sağlam
          hem de keskin bir alet üretiyorsun.
      steelSickle:
        name: Çelik orak yapımı
        desc: Daha geniş kullanım alanları olan keskin ve etkili bir çelik orak üret.
        activityDesc: Kızıl yıldızın altındaki tarlaları selamlayarak toplumsal emeğin
          yardımına hazır bir orağı dikkatlice dövüyorsun.
      copperPickaxe:
        name: Bakır kazma yapımı
        desc: Verimli bir madencilik aleti için sağlam bir bakır kazma döv.
        activityDesc: Bakırı dikkatlice muhteşem bir madencilik aletine çevirerek
          bir bakır kazma üretiyorsun.
      bronzePickaxe:
        name: Bronz kazma yapımı
        desc: Ağır madencilik işleri için ideal olan dayanıklı bir bronz kazma üret.
        activityDesc: Bronzu büyük maharetle dayanıklı bir madencilik aletine çevirerek
          bronz bir kazma üretiyorsun.
      ironPickaxe:
        name: Demir kazma yapımı
        desc: Derinlerdeki madencilik maceraları için güvenilir bir demir kazma döv.
        activityDesc: Demiri ustalıkla eritip itimatlı bir madencilik aletine çevirerek
          demir bir kazma üretiyorsun.
      copperHatchet:
        name: Bakır nacak yapımı
        desc: Verimli şekilde odunculuk yapmak için bakır bir nacak tasarla.
        activityDesc: Titizlikle bakırı keskin bir odunculuk aletine çevirerek bakır
          bir nacak üretiyorsun.
      ironHatchet:
        name: Demir nacak yapımı
        desc: Titiz odunculuk işleri için demir bir nacak döv.
        activityDesc: Hünerli bir şekilde, demiri güvenilir bir odunculuk aleti haline
          getirerek demir bir nacak üretiyorsun.
      farganiteHatchet:
        name: Farganit nacak yapımı
        desc: En büyük ağaçların bile kudretine üstün gelebilecek bir nacak yap.
        activityDesc: Ter dökerek nacak yaptığın bu metal, ağaç uzmanı olmaktaki kararlılığının
          gerçek sembolüdür.
      jellyfishingNet:
        name: Denizanası ağı yapımı
        desc: Sağlam malzemeler ve güzel bir ağ kullanılarak yapılmış olan bir denizanası
          yakalama aleti.
      hydriliumLogSplitter:
        name: Hidrilyum odun yarıcı yapımı
      steelPickaxe:
        name: Çelik kazma yapımı
        desc: En sert madenleri çıkarabilmek için sapasağlam bir çelik kazma üret.
        activityDesc: Çeliğe titizlikle şekil verip kuvvetli bir madencilik aletine
          çevirerek çelik bir kazma üretiyorsun.
      farganitePickaxe:
        name: Farganit kazma yapımı
        activityDesc: Alevler metalin üzerinde dans ederken onun toprağa değmeye yeniden
          layık olacağı bir alete dönüşmesini sağlarlar.
        desc: Yer altındaki yolculuklarında daha verimli keşiflerde bulunmanı sağlayacak
          bir farganit kazma üret.
      steelHatchet:
        name: Çelik nacak yapımı
        activityDesc: Çeliğe dikkatlice şekil vererek keskin bir odunculuk aleti yapıyor,
          çelik bir nacak üretiyorsun.
        desc: Hızlı odunculuk işleri için kuvvetli bir çelik nacak üret.
