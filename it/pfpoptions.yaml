singulars:
  backAccessories:
    arrows:
      desc: Ottime per gli arcieri.
      name: Frecce
    dwarvenAxe:
      desc: Ma non dirlo all'elfo, ok?
      name: Ascia nanica
    hatchet:
      name: Accetta
      desc: Per dimostrare la tua determinazione nel macinare il taglio del legno.
    iceStaff:
      desc: Un bastone magico che sembra possa congelare alcune persone.
      name: Bastone del ghiaccio
    staff:
      desc: Un bastone di legno dall'aspetto essenziale. La scelta migliore per un
        viaggiatore.
      name: Bastone
    twoHandedSword:
      name: Spada a due mani
      desc: Una spada a due mani dall'aspetto epico!
    backShield:
      name: Scudo
      desc: Un grande scudo per proteggersi dalle minacce.
    stickAndABottle:
      name: Bastone e bottiglia
      desc: C'è una bottiglia appesa con dentro una specie di liquido.
    oneHandedSword:
      name: Spada a una mano
      desc: Una spada a una mano per fare sul serio.
    pickaxe:
      desc: Il piccone che hai sulla schiena può rompere qualsiasi roccia e pietra.
      name: Piccone
    lightshine:
      desc: Una piccola sfera che brilla leggermente dalla parte superiore della tua
        spalla.
      name: Sfera luminosa
    largeIcicle:
      name: Grande ghiacciolo
      desc: Il grande ghiacciolo sulla tua schiena stupirà anche i fashionisti che
        hanno visto di tutto.
    rodOfMoss:
      name: Bastone di muschio
      desc: Un pezzo di muschio raro è attaccato all'estremità della corda.
    birdCompanion:
      name: Compagno uccello
      desc: Un uccellino che ti segue ovunque.
    floatingOrb:
      name: Sfera fluttuante
      desc: Una sfera fluttuante che ti fa sentire un vero vincitore.
    penguinCompanion:
      name: Compagno pinguino
      desc: Un piccolo pinguino è seduto sulla tua spalla. Di tanto in tanto emette
        un verso che suona così:\n\n<i>“Malik! Malik!”</i>
    merfolkFishWings:
      name: Ali di pesce delle sirene
      desc: Le ali sintetiche sulla tua schiena assomigliano a quelle dei pesci volanti.
    jarvonianBanner:
      name: Stendardo jarvoniano
      desc: Il banner con le due tonalità di blu ricorda i colori della Jarvonia.
    trellinBanner:
      name: Stendardo di Trellin
      desc: Il verde e il viola ricordano i colori di Trellin.
    erdwiseBanner:
      name: Stendardo di Erdwise
      desc: Il rosso e il giallo ricordano i colori di Erdwise.
    syrenthiaBanner:
      name: Stendardo di Syrenthia
      desc: Lo stendardo blu e giallo pallido ricorda i colori di Syrenthia.
    halflingRebelsBanner:
      name: Stendardo dei Ribelli Halfling
      desc: Lo stendardo con le due tonalità di verde ricorda i colori dei ribelli
        halfling.
    iceHockeyStick:
      name: Bastone da hockey su ghiaccio
      desc: Il tuo bastone da hockey su ghiaccio preferito che si aggancia alla schiena.
    tinyShark:
      name: Piccolo squalo
      desc: È stranamente simile allo squalo appeso alla parete del Emportio di Frosthook.
        Deve trattarsi di uno dei bisnonni squali di Bruce.
    dragonCompanion:
      name: Compagno drago
      desc: Un piccolo drago amichevole è seduto sulla tua spalla ed è pronto a giocare.
    batCompanion:
      name: Compagno pipistrello
      desc: Un pipistrello amichevole che vola proprio accanto a te. Non preoccuparti,
        non morde!
    loongDragon:
      name: Piccolo drago Loong
      desc: Un amico snello, sinuoso e serpentino con possenti corna sulla testa ancora
        in fase di crescita.
    huskyPup:
      name: Cucciolo di husky
      desc: Un piccolo cucciolo di husky, sempre fedele, ma non ancora pronto per
        trainare una slitta.
    iceMaul:
      name: Mazza di ghiaccio
      desc: Un grande martello di ghiaccio che può portare una fresca brezza ad ogni
        colpo.
    frogCompanion:
      name: Compagno rana
      desc: Una rana che non aveva vita facile prima che tu la trovassi, a cui veniva
        sempre detto di sbrigarsi, doveva saltellare di corsa.
    wombat:
      name: Wombat non combattente
      desc: Di natura pacifista, non ama la violenza e preferisce nascondersi sulla
        tua spalla, lontano dai pericoli.
  bodyTypes:
    a: A - Maschile
    b: B - Femminile
  eyeAccessory:
    fancyEarring:
      desc: Un brillante orecchino d'argento.  Molto bello.
      name: Orecchino raffinato
    goggles:
      name: Occhialoni
    goldenGlasses:
      desc: Occhiali da vista dorati, molto brillanti!
      name: Occhiali dorati
  faceAccessories:
    fancyEarring:
      desc: Un brillante orecchino d'argento. Molto bello.
      name: Orecchino raffinato
    goldenEarring:
      desc: Un piercing per orecchie dorato.
      name: Piercing per orecchie dorato
    goldenEyebrowPiercing:
      desc: Un piercing per sopracciglia dorato.
      name: Piercing per sopracciglia dorato
    goldenPiercings:
      desc: Due piercing dorati, uno all'orecchio e uno al sopracciglio.
      name: Due piercing dorati
    carrot:
      desc: Quando devi interpretare un pupazzo di neve, prendi una carota!
      name: Carota
    hearingAid:
      name: Apparecchio acustico
      desc: Progettato in Galeforge.
    pearlEarring:
      name: Orecchini con perle raffinate
      desc: Con questo elegante orecchino sembri quasi un quadro.
  facepaints:
    manyStripes:
      desc: Striscie multiple che coprono quasi completamente l'intera faccia!
      name: Molte striscie
    stripeOverCheeks:
      desc: Una striscia che attraversa entrambe le guance.
      name: Striscia sulle guance
    ringAroundEye:
      desc: Un anello che circonda uno dei tuoi occhi.
      name: Cerchio intorno agli occhi
    stipeOverEye:
      name: Striscia sopra l'occhio
      desc: Una striscia che attraversa l'occhio.
    stripeOverBothEyes:
      name: Striscia su entrambi gli occhi
      desc: Una striscia che copre entrambi gli occhi.
  faces:
    agedFace:
      desc: Un volto che mostra più anni.
      name: Volto invecchiato
    agedWithBeardFace:
      desc: Un volto che mostra più anni, e ha anche una barba.
      name: Volto invecchiato con barba
    basic:
      desc: Un volto generico.
      name: Volto di base
    beardAndMoustache:
      desc: Un volto che ha entrambi, barba e baffi!
      name: Volto con barba e baffi
    chiselledFace:
      name: Volto scolpito
      desc: Un viso in cui la forma è leggermente più pronunciata.
    makeupFace:
      name: Volto con del trucco
      desc: Un viso con un po' più di trucco!
    moustache:
      name: Volto con baffi
      desc: Un viso con baffi di media lunghezza.
    roundedFace:
      name: Volto arrotondato
      desc: Un viso leggermente arrotondato.
    scarredFace:
      name: Volto con cicatrice
      desc: Viso con una grande cicatrice che attraversa uno degli occhi.
    smallerFace:
      name: Volto più piccolo
      desc: Faccia leggermente più piccola in senso orizzontale.
    goatee:
      name: Faccia con barba a pizzetto
      desc: Questo stile di barba è un classico, vero?
    largeBeard:
      name: Faccia con barba folta
      desc: Un viso con una barba leggermente più folta.
    fancyMoustache:
      name: Faccia con baffi fantasiosi
      desc: Viso con baffi molto eleganti
    blushedFace:
      name: Faccia arrossata
      desc: Viso con un grazioso rossore sulle guance.
    epicBeard:
      name: Barba epica
      desc: Questo fa arrossire persino i nani.
    masculineMerfolkFace:
      name: Volto maschile di tritone
      desc: Un volto maschile con pelle bluastra simile a quella di un delfino.
    feminineMerfolkFace:
      name: Volto femminile di sirena
      desc: Un volto femminile con la pelle bluastra, simile a quella di un delfino.
    merfolkFace:
      name: Volto di sirena
      desc: Viso con pelle bluastra, simile a quella dei delfini.
    singleBraidBeard:
      name: Barba a treccia singola
      desc: Il viso presenta una barba di media lunghezza, intrecciata in un'unica
        unità.
    spikeBeard:
      name: Barba a punta
      desc: Il viso ha una barba tagliata a forma di punte.
  hairstyles:
    assymetrical:
      desc: Un taglio asimmetrico.
      name: Asimmetrico
    bald:
      desc: Una testa calva.
      name: Calvo
    balded:
      desc: Una testa che sta diventando calva.
      name: Stempiato
    bowlCut:
      desc: Un taglio a scodella in stile Beatles.
      name: Taglio a scodella
    braidedPonytail:
      name: Coda intrecciata
      desc: Capelli lunghi raccolti in una coda di cavallo.
    chignonAndTiara:
      name: Chignon & Diadema
      desc: Un taglio di capelli per un reale.
    highPonytail:
      name: Coda Alta
      desc: Un look elegante e raffinato con i capelli raccolti in alto sulla testa.
    lionsMane:
      name: Criniera di Leone
      desc: Canalizza il leone che è in te.
    longAndCatEars:
      name: Lunghi & Orecchie da Gatto
      desc: Capelli lunghi con orecchie da gatto. Miao miao!
    longMiddlePart:
      name: Lunghi Riga in Mezzo
      desc: Capelli lunghi, con la riga in mezzo.
    longerMullet:
      name: Mullet più lungo
      desc: Un taglio di capelli mullet più lungo.
    middlePart:
      name: Riga in mezzo
      desc: Capelli divisi in mezzo.
    mullet:
      name: Cefalo
      desc: Un taglio mullet.
    pixieCut:
      name: Taglio Pixie
      desc: Capelli corti con taglio pixie.
    shortAndCatEars:
      name: Corti & Orecchie da Gatto
      desc: Capelli corti con orecchie da gatto. Miao!
    swoop:
      desc: Un taglio a spazzola con una ciocca ribaltata.
      name: Ciocca ribaltata
    crewCut:
      desc: Un taglio di capelli standard.
      name: Taglio a spazzola
    looseBun:
      desc: Acconciatura a chignon con ciocche sciolte.
      name: Chignon morbido
    bun:
      desc: Capelli raccolti in uno chignon.
      name: Chignon
    highSwoop:
      name: Alta picchiata
      desc: Una bella virata con una dissolvenza.
    waveFade:
      name: Sfumatura ondulata
      desc: Un taglio sfumato ondulato.
    highAndTight:
      name: Alto e stretto
      desc: Solo la parte superiore.
    middlePartAndBangs:
      name: Parte centrale e frangia
      desc: Come una riga in mezzo, ma con due ciocche di frangia che ricadono sui
        lati.
    unevenBowlCut:
      name: Taglio a scodella irregolare
      desc: Come un taglio a scodella, ma leggermente irregolare.
    highAndTightBun:
      name: Alto e stretto e chignon
      desc: Lati rasati e raccolti in uno chignon.
    voluminousAfro:
      desc: Un taglio afro ancora più voluminoso.
      name: Afro voluminoso
    voluminousMiddlePart:
      name: Parte centrale voluminosa
      desc: Capelli lunghi, con riga in mezzo e un po' di volume.
    spaceBuns:
      desc: Un'acconciatura giocosa caratterizzata da due piccoli chignon posizionati
        su ciascun lato della testa.
      name: Chignon spaziali
    fadeAndBun:
      name: Sfumatura e chignon
      desc: Una sfumatura con chignon.
    afro:
      name: Afro
      desc: Un taglio di capelli afro.
    neckLength:
      name: Lunghezza del collo
      desc: Un taglio di capelli più corto, tagliato sul collo.
    voluminousBun:
      desc: Capelli raccolti in uno chignon voluminoso.
      name: Chignon voluminoso
    longMerfolkHair:
      desc: Questi capelli ondulati da sirena sono finemente acconciati con un aggeggio.
      name: Capelli lunghi da sirena
    braidBun:
      name: Chignon intrecciato
      desc: I capelli intrecciati formano un unico grande chignon.
    longHairWithGoggles:
      name: Capelli lunghi con occhiali protettivi
      desc: Capelli lunghi e mossi con occhiali steampunk in testa.
    droopy:
      name: Droopy
      desc: Capelli corti e ricci.
    shortTwoColor:
      name: Corto bicolore
      desc: Il doppio dei colori, il doppio della felicità.
    mediumLengthMiddlePart:
      name: Lunghezza media, parte centrale
      desc: Capelli di media lunghezza, con la riga in mezzo.
    squareCut:
      name: Taglio squadrato
      desc: Taglio di capelli in scatola.
    mohawk:
      name: Moicana
      desc: Un Moicano.
    longHair:
      name: Capelli lunghi
      desc: Bellissimi capelli lunghi classici.
    shortCutWithFade:
      name: Taglio corto con sfumatura
      desc: Taglio corto con elegante sfumatura.
    highAndThightWithSides:
      name: Alto e stretto ai lati
      desc: La parte superiore e i lati.
    shortAndBow:
      desc: Capelli corti con un fiocco.
      name: Corto e con fiocco
    longAndBow:
      name: Lunghi e con un fiocco
      desc: Capelli lunghi con un fiocco.
    twoBunsLongHair:
      name: Due chignon e capelli lunghi
      desc: Questo taglio lungo presenta due graziosi chignon sulla sommità della
        testa.
    assymetricalLongCut:
      name: Capelli lunghi asimmetrici
      desc: L'acconciatura è intrecciata solo su un lato.
    braidedForeheadLongHair:
      name: Capelli lunghi intrecciati sulla fronte
      desc: Una treccia alla francese è realizzata sulla parte superiore della fronte,
        mentre il resto dei capelli scende lungo e libero.
    twoPonytailHair:
      name: Due code di cavallo
      desc: Un'acconciatura giocosa con una coda di cavallo su ciascun lato della
        testa.
    crest:
      name: Cresta
      desc: Un'acconciatura raccolta che ricorda una cresta.
    berserker:
      name: Berserker
      desc: Un'acconciatura di coloro che sono stati traditi dagli altri su un percorso
        di vendetta e resilienza.
    ohayo:
      name: Ohayo
      desc: Un'acconciatura da letto per chi sta per avere una buona giornata.
    sideBangsWithBow:
      name: Frangia laterale con fiocco
      desc: Capelli acconciati con la frangia divisa ai lati e un fiocco.
  headwear:
    chefsHat:
      name: Cappello da cuoco
      desc: Sembra che tu sia pronto per preparare una cena fantastica!
    partyHat:
      name: Cappello da festa
      desc: Da quanto tempo stai in piedi davanti alla banca?
    plagueDoctorMask:
      desc: Mi sento male solo guardandola, fa paura!
      name: Maschera da medico della peste
    swampHat:
      name: Cappello da Palude
      desc: Per gli esploratori delle Grandi Paludi.
    topHat:
      desc: Wall Street è da quella parte, signore.
      name: Cappello a cilindro
    topHatWithGoggles:
      name: Cappello a cilindro con occhialoni
      desc: Se vuoi innovare come un Galeforgiano, ti servono sia il cappello a cilindro
        che gli occhiali protettivi.
    turban:
      desc: Molto pratico da indossare nel deserto.
      name: Turbante
    warmBeanie:
      desc: Protegge molto bene dal freddo. E ha un aspetto fresco.
      name: Berretto caldo
    trellinBushHat:
      desc: Il cappello è fatto di foglie, con un ramoscello da cui spuntano dei grappoli
        d'uva.
      name: Cappello da safari di Trellin
    halflingRebelsBandana:
      desc: Una semplice bandana utilizzata dai ribelli per impedire al sudore di
        colare sul viso mentre combattono la loro battaglia.
      name: Bandana dei Ribelli Halfling
    bambooHat:
      desc: Il cappello è intrecciato con fili di bambù e protegge molto bene dal
        sole grazie alla sua ampia forma rotonda.
      name: Cappello di bambù
    sleepyHat:
      desc: Un cappello per chi è sempre pronto per un pisolino. Ti fa quasi sentire
        come se potessi dormire tranquillamente anche durante un tifone o un'eruzione
        vulcanica.
      name: Cappellino da sonno
    oldWizardHat:
      desc: Un vecchio cappello da mago che proviene da una lunga stirpe di maghi.
        Maghi alla moda.
      name: Cappello da vecchio mago
    tarsiliumHelmet:
      name: Elmo di tarsilio
      desc: Nero e molto robusto.
    cap:
      desc: È un vero classico.
      name: Cappuccio
    pirateHat:
      name: Cappello da pirata
      desc: Ma perché il rum è finito?
    royalGuardHelmet:
      desc: Per coloro che proteggono il confine wallisiano.
      name: Elmo della Guardia Reale
    coffeeHat:
      name: Cappello da caffè
      desc: Perché quando il tuo amore per il caffè è sempre nei tuoi pensieri, ora
        può essere anche sulla tua testa. Niente stress, solo espresso!
    vikingHelm:
      name: Elmo vichingo
      desc: Un elmo vichingo stoico con grandi corna che spuntano dai lati.
    copperHelmet:
      name: Elmo di rame
      desc: Un elmo realizzato in rame. Dall'aspetto semplice, ma molto funzionale.
    diamondHelmet:
      name: Casco di diamante
      desc: Beh, questo sembra molto costoso. Potrebbe persino accecare i tuoi nemici.
    bronzeHelmet:
      name: Elmo in bronzo
      desc: Un casco bello ma dall'aspetto semplice.
    ironHelmet:
      name: Elmo di ferro
      desc: Sembra proprio una guardia, vero?
    steelHelmet:
      name: Elmetto d'acciaio
      desc: Protegge la testa.
    farganiteHelmet:
      name: Elmo di farganite
      desc: Un elmetto blu, realizzato con un metallo raro. Protegge molto bene la
        testa.
    crystalHelmet:
      name: Elmo di cristallo
      desc: Un elmo di cristallo, che brilla di colore viola.
    lightCopperHelmet:
      name: Elmo leggero in rame
      desc: Casco utilitario, dal design leggero.
    lightDiamondHelmet:
      desc: Un casco dall'aspetto molto robusto e costoso.
      name: Casco leggero con diamanti
    lightBronzeHelmet:
      name: Elmo in bronzo chiaro
      desc: Assomiglia un po' a un berretto, ma protegge molto bene la testa.
    lightIronHelmet:
      name: Elmetto leggero in ferro
      desc: Casco molto simile a un elmetto da guardia. E in una confezione leggera!
    steelLightHelmet:
      name: Casco leggero in acciaio
      desc: Protegge la testa con eccellenza.
    tarsiliumLightHelmet:
      name: Elmo leggero in tarsilio
      desc: Un casco nero e leggero.
    farganiteLightHelmet:
      name: Casco leggero in farganite
      desc: Un casco dal design molto leggero realizzato in robusta farganite.
    crystalLightHelmet:
      name: Casco leggero di cristallo
      desc: Casco dal design leggero che brilla di colore viola. Ha un aspetto epico.
    enchantedHat:
      name: Cappello incantato
      desc: Beh, non è un cappello davvero fantastico, perfetto per un vero cowboy!
    dragonLeatherHelmet:
      name: Elmo in pelle di drago
      desc: È rosso. Ed è costoso.
    desertHat:
      name: Cappello da deserto
      desc: Questo è ottimo quando il sole ti brucia il collo.
    arcticHat:
      name: Cappello artico
      desc: Per un vero compagno.
    royalHelmet:
      name: Elmo reale
      desc: Con l'aspetto di un vero membro della famiglia reale di Wallis.
    christmasHat:
      name: Cappello natalizio
      desc: Ratiritiralla, mistäs tuli halla. È una canzone natalizia finlandese.
    bowlerHat:
      name: Cappello a bombetta
      desc: La scelta preferita dagli uomini d'affari.
    wizardHat:
      name: Cappello da mago
      desc: Sempre alla moda tra i maghi.
    chaplinHat:
      name: Cappello di Chaplin
      desc: Il cappello più divertente.
    headwrap:
      name: Foulard
      desc: Un copricapo versatile che protegge, abbellisce e riflette lo stile personale
        di chi lo indossa. Spesso indossato dai Wrentmarkiani.
    warmWoolenHat:
      name: Cappello di lana caldo
      desc: Questo semplice cappello è rivestito in lana per garantire calore durante
        l'inverno.
    hatWithFeather:
      name: Cappello con piuma
      desc: Il cappello leggero ha una piuma attaccata. Porta fortuna.
    treasureHunterHat:
      name: Cappello da cacciatore di tesori
      desc: Nessuno sa dire se sia un cappello fedora o un cappello da cowboy. Qualunque
        cosa sia, ti fa sembrare figo come Indy.
    syrenthianCoralCrown:
      name: Corona di corallo di Syrenthia
      desc: Questa corona di corallo ricorda una corona d'alloro.
    erdwissMerchantsHat:
      name: Cappello da mercante di Erdwiss
      desc: Il cappello dall'aspetto stravagante ha un emblema con una moneta d'oro
        ricamato nella parte superiore.
    jarvonianBearHelmet:
      name: Casco da orso
      desc: Il cappuccio in acciaio è ricoperto dalla testa di un possente orso.
    gemmedCirclet:
      name: Diadema con gemme
      decs: Una gemma color verde acqua brilla al centro di un cerchio di platino.
    aviatorHatWithGoggles:
      name: Cappello da aviatore con occhiali protettivi
      desc: Tipico cappello da aviatore indossato dai piloti Galeforgiani. È dotato
        di occhiali protettivi.
    pieHat:
      name: Cappello a forma di torta
      desc: Questo cappello a forma di torta finta attira sempre l'attenzione alle
        feste!
    pumpkinHat:
      name: Cappello a forma di zucca
      desc: Una zucca decorativa che puoi mettere sulla testa per creare un'atmosfera
        festosa.
    witchCatHat:
      desc: Un gatto con un cappello. Quale gatto? Ma il gatto con il cappello da
        strega nel cappello, ovviamente. In cima alla tua testa ... siederà?
      name: Cappello da stregatto
    expertDivingHelmet:
      name: Casco da subacqueo professionale
      desc: Un casco da subacqueo professionale, sembra fatto di idrillio. Molto meglio
        che indossare una boccia per pesci sott'acqua.
    desertDealerHat:
      name: Cappello da commerciante del deserto
      desc: Un cappello per una persona abituata al deserto e pronta a venderti qualsiasi
        cosa, persino un cappello.
    ruffledWizardHat:
      name: Cappello da mago con volant
      desc: Un cappello da mago. Ce ne sono molti simili, ma questo è mio. Lo si capisce
        perché ci sono ancora i miei capelli dentro.
    antlerHood:
      name: Cappuccio con corna
      desc: Dalla parte superiore di questo cappuccio spuntano delle corna. Ti fa
        sentire maestoso, ma ti fa anche venire voglia di cracker.
    maidCap:
      name: Cappellino da cameriera
      desc: Un pezzo di stoffa indossato sulla testa di una domestica, sempre pronta
        a servire e riordinare.
  noses:
    bigAndPointy:
      desc: Naso un po' grande che è anche appuntito. Non fare del male a nessuno
        con questo!
      name: Grande e appuntito
    biggerNose:
      desc: Un naso un po' più grande!
      name: Naso più grande
    genericNose:
      desc: Un naso generico.
      name: Naso generico
    noseWithBandaid:
      desc: Sembra che ti sia fatto male al naso. Oh no.
      name: Naso con cerotto
    prettyNose:
      desc: Non sapevo esattamente come chiamarlo, ma credo che sia grazioso.
      name: Naso grazioso
    smallAndPointy:
      desc: Un naso più piccolo che è anche appuntito.
      name: Piccolo e appuntito
    smallNose:
      desc: Un naso più piccolo.
      name: Naso piccolo
    tinyNose:
      desc: Naso molto piccolo.
      name: Naso minuscolo
    wideNose:
      desc: Questo è ottimo per annusare le cose.
      name: Naso largo
  outfits:
    blanket:
