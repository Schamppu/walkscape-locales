    partyGown:
      desc: Un abito per girare nelle strade più eleganti.
      name: Abito lungo da Festa
    rancherOveralls:
      desc: Tuta per allevare e radunare il bestiame.
      name: Tuta da Cowboy
    scarfShirt:
      desc: Una camicia con una sciarpa. Calda!
      name: Camicia con Sciarpa
    scoopNeckDress:
      desc: Un elegante vestito con scollo ampio.
      name: Vestito con Scollo Ampio
    shirtJacket:
      desc: Una maglietta con una giacca leggera.
      name: Maglia & Giacca
    simplePullover:
      desc: Un maglione semplice.
      name: Maglione Semplice
    simpleShirt:
      desc: Una camicia semplice per un plebeo.
      name: Camicia Semplice
    sleevelessDress:
      desc: Un vestito senza maniche con una collana.
      name: Vestito senza Maniche con Collana
    sleevelessGown:
      desc: Un abito lungo senza maniche.
      name: Abito lungo senza Maniche
    strapelessDress:
      desc: Un vestito senza spalline.
      name: Vestito senza Spalline
    trainingRobes:
      desc: Per studiare gli dei o la lama.
      name: Vesti da Allenamento
    woodworkersApron:
      desc: Un grembiule per lavorare il legno.
      name: Grembiule da Falegname
    botShirt:
      name: Maglietta Bot
      desc: Il personaggio predefinito in un determinato MMO.
    lightBrandedHoodie:
      name: Felpa con cappuccio leggera con marchio
      desc: Felpa leggera con cappuccio e marchio circolare.
    minecraftOutfit:
      name: Attrezzatura mineraria e artigianale
      desc: Questo outfit può sembrare semplicistico e privo di curve, ma i minatori
        e gli artigiani lo adorano.
    hazmatSuit:
      name: Tuta anti-radiazioni
      desc: Sia che tu stia maneggiando nuclei radioattivi, narcotici illegali o visitando
        città in fondo al mare, questa tuta ti terrà al sicuro.
    tailoredBusinessSuit:
      name: Abito su misura
      desc: Questo abito fatto su misura ti calza alla perfezione. Sei pronto per
        fare una buona impressione su chiunque.
    dragonLeatherArmor:
      name: Armatura di pelle di drago
      desc: Questa armatura è creata dalla pelle di un antico drago e mantiene chi
        la indossa al caldo e ben protetto.
    lumberjackShirt:
      name: Camicia da boscaiolo
      desc: La tipica camicia di chi ha abbattuto più di 5000 alberi.
    halflingCloak:
      name: Mantello Halfling
      desc: Quanto ti copri con questo mantello lungo e pesante, diventi indistinguibile
        da un grosso masso.
    warmWoolenCoat:
      desc: Il semplice cappotto è rivestito in lana e offre una protezione extra
        dal freddo intorno al collo.
      name: Caldo cappotto di lana
    treasureHunterJacket:
      desc: Questa giacca in pelle rinforzata ti proteggerà da trappole e fosse. È
        dotata di comode tasche dove riporre il tesoro.
      name: Giacca da cacciatore di tesori
    trellinBushVest:
      desc: Il gilet è realizzato con una trama fitta di vegetazione. Sulle spalle
        sono posizionati dei rinforzi ricoperti di foglie.
      name: Gilet da caccia di Trellin
    chefsUniform:
      name: Divisa da chef
      desc: L'uniforme è pulita e comoda per lavorare in modo efficiente in qualsiasi
        cucina.
    orientalDress:
      name: Abito orientale
      desc: Questo elegante abito ti renderà un vero uomo.
    cloakWithGem:
      name: Mantello con una gemma
      desc: Il lungo mantello è tenuto insieme da una gemma lucente.
    runningPoloShirt:
      name: Maglietta da polo da corsa
      desc: La maglietta è elegante e comoda. Perfetta per correre attraverso i continenti.
    halflingRebelsOutfit:
      desc: L'abito è realizzato con un mix di materiali raccolti nella palude. Fornisce
        protezione di base e mimetizzazione all'interno delle paludi.
      name: Abito da ribelle Halfling
    erdwissMerchantOutfit:
      name: Abito da mercante di Erdwiss
      desc: Questo capo dai toni rossi e gialli è comodo e ha tasche interne nascoste
        per riporre il tuo oro.
    jarvonianFurArmor:
      name: Armatura di pelliccia Jarvoniana
      desc: L'armatura è realizzata in acciaio resistente, mentre le spalline e il
        mantello in pelliccia proteggono dal freddo intenso.
    ninjaOutfit:
      name: Abito da ninja
      desc: Un abito scuro ampio ma aderente, realizzato in seta. Copre gran parte
        del viso.
    merfolkDancingDress:
      name: Abito da ballo da sirena
      desc: Questo vestito aderisce perfettamente al corpo e rimane impeccabile.
    seashellBra:
      name: Reggiseno con conchiglie
      desc: Le conchiglie colorate si adattano perfettamente al tuo busto.
    syrenthianConchArmor:
      name: Armatura di conchiglia sirentiana
      desc: Una grande conchiglia protegge la spalla da possibili attacchi.
    plainBlackTshirt:
      name: Maglietta nera semplice
      desc: Questa maglietta nera è il look più intramontabile che puoi ottenere nell'Arenum.
    hoodedOutfit:
      name: Abito con cappuccio
      desc: Un completo con maschera e cappuccio perfetto per muoversi furtivamente
        o mantenere segreta la propria identità.
    frostGown:
      name: Abito da sera ghiacciato
      desc: Un abito elegante accompagnato da un bellissimo ciondolo d'argento.
    expertDivingSuit:
      name: Muta da sub professionale
      desc: Una muta da sub professionale, sembra fatta di idrillio. Dovrebbe resistere
        bene alla pressione, dillo ai tuoi colleghi!
    tornRags:
      name: Stracci laceri
      desc: Alcuni ritagli di stoffa assemblati insieme per formare un abito. Forse
        la prossima grande novità nel mondo della moda.
    desertDealer:
      name: Abito da commerciante del deserto
      desc: L'abbigliamento di una persona abituata al deserto e sempre pronta a concludere
        una vendita, anche durante una tempesta di sabbia.
    maidOutfit:
      name: Abito da cameriera
      desc: Va bene, non rendere la situazione imbarazzante. Sei qui solo per pulire,
        servire e apparire elegante mentre lo fai.
  eyeAccessories:
    thickGlasses:
      desc: Con questi, puoi quasi vedere il futuro.
      name: Occhiali spessi
    sunGlasses:
      desc: Tutte le persone cool indossano occhiali da sole. Anche al chiuso.
      name: Occhiali da sole
    smokyEyes:
      name: Occhi fumosi
      desc: Vuoi apparire cool e magari un po' spaventoso? Allora questo è sicuramente
        quello che fa per te.
    squareGlasses:
      desc: Sono più simili a semplici montature, ma stanno bene sul tuo viso a prescindere.
      name: Occhiali quadrati
    tintedGlasses:
      name: Occhiali colorati
      desc: Un paio di occhiali con una montatura colorata.
    goldenEyeGlasses:
      name: Occhiali dorati
      desc: La montatura di questi occhiali sembra molto costosa.
    roundGlasses:
      name: Occhiali rotondi
      desc: Per un look classico, da inventore.
