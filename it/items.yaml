singulars:
  consumables:
    cooking:
      bagel:
        desc: Una pagnotta con un buco al centro. In realtà è solo una ciambella senza
          zucchero.
        name: Bagels
      beer:
        desc: La fermentazione potrebbe essere stata una scoperta più importante del
          fuoco.
        name: 'Birra'
      bread:
        desc: La base della piramide alimentare.
        name: Pane
      cheese:
        desc: Ci sono un sacco di buchi in questo blocco di formaggio. Il che è un
          peccato, perché più buchi significa meno formaggio.
        name: 'Formaggio'
      chocolate:
        desc: Una grande tavoletta di delizioso cioccolato al latte, così cremosa
          che ogni morso ti si scioglie sulla lingua.
        name: Cioccolato
      cookedEgg:
        desc: Al forno, fritte, strapazzate, al tegamino, o sode - la scelta è tua!
        name: Uovo all'occhio di bue
      cookedMushrooms:
        desc: Il profumo di funghi ti fa venire una gran fame. Li mangi per uno spuntino
          veloce o li conservi per un altro piatto?
        name: Funghi saltati
      cookedPotato:
        desc: Fuori dal campo, e dritta in forno!
        name: Patata al forno
      cookedTomato:
        desc: Ci sono state parecchie diatribe su cosa sia meglio tra cotto e crudo...
          beh, è pur sempre pratica di cucina.
        name: Pomodoro cotto
      fishSoup:
        desc: Congratulazioni, hai tolto un pesce da un liquido per metterlo in un
          altro.
        name: Zuppa di pesce
      friedFishSandwich:
        desc: Un panino con del pesce impanato e fritto. Occhio alle lische!
        name: Panino al pesce fritto
      friedNoodles:
        desc: Assai piccante ed ancora fumante. Meglio saper usare bene le bacchette.
        name: Spaghetti saltati
      fruitCake:
        desc: Una torta densa e zuccherina, piena di canditi, frutta secca e spezie!
        name: Torta di canditi
      jam:
        desc: Una combinazione spalmabile di frutta e zucchero.
        name: Confettura
      jellySandwich:
        desc: Un panino con uno spesso strato di marmellata. Un classico per tutte
          le età.
        name: Panino con marmellata
      mushroomCurry:
        desc: Una miscela aromatica di funghi e spezie. Perfetta per un pasto sostanzioso.
        name: Curry di funghi
      pancake:
        desc: Una base da farcire con ogni tipo di ingrediente.
        name: Pancakes
      pickles:
        desc: Il più acre fra gli spuntini.
        name: Sottaceti
      pie:
        desc: Crostata di bacche rosse, proprio come la faceva la nonna. Gira una
          leggenda su un clan di nani ormai estinto che adorava questo dolce di frolla.
        name: Crostata
      porridge:
        desc: Una colazione perfetta! In assenza di qualunque altra opzione, s'intende...
        name: Pappa d'avena
      spicyPumpkinJuice:
        desc: Questa bevanda richiama gli abitanti di Arenum in autunno.
        name: Succo di zucca speziato
      tofu:
        desc: Ha una consistenza un po' spugnosa, ma contiene molte proteine, vitamine
          e minerali.
        name: Formaggio Tofu
      veggieSoup:
        desc: Una ciotola di zuppa di verdure. Un piatto umile ma soddisfacente, apprezzato
          da molti in Arenum.
        name: Zuppa di verdure
      wine:
        desc: Il nettare di nobili ed avventurieri. Promette un assaggio sia del passato
          che del presente a coloro che alzano i calici per brindare.
        name: Vino
      troutSoup:
        name: Zuppa di trota
        desc: Una zuppa piuttosto ricca di trote.
      dynamite:
        desc: Che tipo di candele sono quelle? Di-na-mi-te! Devono essere di Wrentmark.
        name: Dinamite
      cookedMeat:
        desc: La carne succulenta, cotta alla perfezione, offre un'esperienza culinaria
          saporita e appagante.
        name: Carne cotta
      hamburger:
        name: Hamburger
        desc: Un hamburger succulento, condito con formaggio, lattuga, pomodoro e
          una salsa speciale, servito su un panino tostato.
      spicyPepper:
        desc: Un peperoncino piccante, ricco di calore intenso e dal sapore deciso,
          aggiunge un tocco di vivacità a qualsiasi piatto.
        name: Pepe piccante
      sweetCarrotPie:
        desc: Carote in una torta, oh mio Dio!
        name: Torta dolce alle carote
      schnitzel:
        desc: Gli storici di Ewerethien sostengono che la Cotoletta abbia avuto origine
          in una piccola baracca a metà strada tra Salsfirth e Granfiddich.
        name: Cotoletta
      stuffedPotato:
        desc: Una patata soffice, cotta alla perfezione, ripiena di un cremoso mix
          di formaggio, burro ed erbe aromatiche e guarnita con pancetta croccante.
        name: Patate ripiene
      saltrum:
        desc: Bevanda alcolica distillata forte che fa ubriacare persino i pesci.
        name: Saltrum
      crabRolls:
        desc: I crab roll, una prelibatezza delicata e saporita, sono panini morbidi
          e burrosi ripieni di succulenta polpa di granchio, spesso accompagnati da
          lattuga fresca e una salsa piccante.
        name: Involtini di granchio
      fireballWine:
        desc: Un vino arancione più brillante, con una sfumatura speziata e calda.
          È diventato più forte grazie a una fermentazione ancora più intensa e all'aggiunta
          di ingredienti pregiati.
        name: Vino PallaDiFuoco
      potato:
        desc: Pa-ta-ta.
        name: Patata
      kelpRolls:
        name: Involtini di alghe
        desc: Famosa prelibatezza di Syrenthia, gli involtini di alghe sono realizzati
          con alghe accuratamente arrotolate nella forma corretta.
      salmonPie:
        name: Torta al salmone
        desc: Pesce in una torta, oh mio Dio!
      spaghettiAndMeatballs:
        name: Spaghetti e polpette
        desc: Un piatto confortante di spaghetti conditi con gustose polpette e una
          ricca salsa di pomodoro.
      egg:
        name: Uovo
        desc: Un uovo utilizzato in innumerevoli ricette sin dall'inizio dei tempi.
      nettleTea:
        name: Tè all'ortica
        desc: Una bevanda calda in un luogo freddo.
      chocolateMilk:
        name: Latte al cioccolato
        desc: Gli halfling furono i primi a scoprire la magia del cioccolato nel latte.
      underwaterSalad:
        name: Insalata subacquea
        desc: Questo mix di verdure sott'acqua è particolarmente rinfrescante.
      jarvonianPastry:
        name: Dolce Jarvoniano
        desc: Un dolce caldo molto apprezzato dai nordici.
      tomato:
        name: Pomodoro
        desc: È un frutto o un ortaggio?
      mudPie:
        name: Torta di fango
        desc: Una delizia semplice e genuina, creata dal fango e dall'immaginazione.
      honeyChicken:
        name: Pollo al miele
        desc: Cosce di pollo dorate e croccanti, glassate con una salsa al miele dolce
          e piccante, offrono un delizioso equilibrio di sapori e consistenze.
      beefStew:
        name: Stufato di manzo
        desc: Un sostanzioso stufato di manzo, cotto a fuoco lento alla perfezione
          con teneri pezzi di manzo, ortaggi a radice e un brodo ricco e saporito.
      bellPepper:
        name: Peperone
        desc: Un ortaggio colorato e croccante, perfetto per insalate o fritture.
      roastedBellPepper:
        name: Peperone arrosto
        desc: Peperoni affumicati e stagionati, ricchi di sapore affumicato.
      cremeBrulee:
        name: Crem brulée
        desc: La crema bruciata non è mai stata così buona, è il piatto nazionale
          di Erdwise.
      fortifiedWine:
        name: Vino fortificato
        desc: Vino scuro dal sapore intenso e terroso. È più forte del vino normale
          grazie agli ingredienti aggiuntivi e al processo di fermentazione a cui
          è stato sottoposto.
      moonshine:
        name: LuceDiLuna
        desc: Una bottiglia di alcol forte che emana un bagliore spettrale. Il solo
          odore è ultraterreno e rischia di inebriarti.
      tastyBreakfast:
        name: Colazione gustosa
        desc: Una colazione con tutti i contorni. Un pasto così sostanzioso sarà un
          ottimo modo per iniziare la giornata, anche se non è più l'inizio effettivo
          della giornata.
    cookedFish:
      cookedTrout:
        name: Trota cotta
        desc: Una trota.
      cookedShrimp:
        name: Gamberetti cotti
        desc: Teneri e succulenti, questi gamberetti cotti sono una prelibatezza a
          base di pesce. Hanno un sapore delicato e leggermente dolce.
      cookedSquid:
        desc: Il calamaro cotto è una meraviglia culinaria, noto per la sua versatilità
          in vari piatti. Se preparato con le tecniche giuste, può risultare tenero
          e saporito.
        name: Calamari cotti
      cookedSeabass:
        desc: Il branzino cotto con le squame argentate è una scelta da buongustai,
          noto per il suo sapore delicato e la carne morbida e succosa.
        name: Branzino cotto
      cookedPike:
        desc: Cotto alla griglia o in padella, il luccio offre una deliziosa consistenza
          friabile e un sapore delicato e leggermente dolce. È un pesce versatile
          che si presta a vari piatti.
        name: Luccio cotto
      cookedLobster:
        desc: L'aragosta cotta, con la sua carne succulenta e saporita, porta con
          sé un tocco di nostalgia con il suo guscio duro e le sue chele robuste.
          Una prelibatezza classica a base di pesce.
        name: Aragosta cotta
      cookedPerch:
        desc: Cotto in padella o alla griglia, il pesce persico offre una deliziosa
          consistenza friabile e un sapore delicato e leggermente dolce. Perfetto
          per un pasto leggero.
        name: Pesce persico cotto
      cookedSalmon:
        name: Salmone cotto
        desc: Il salmone cotto è una prelibatezza raffinata, con la sua carne burrosa
          e vellutata e il suo sapore ricco. È uno dei piatti preferiti dagli amanti
          del pesce.
      cookedAnglerfish:
        desc: Con la sua carne tenera e bianca e il suo sapore delicatamente dolce,
          il pesce rana cucinato è una prelibatezza molto apprezzata. Si abbina perfettamente
          a contorni ricchi per creare un'esperienza culinaria indimenticabile.
        name: Rana pescatrice cotta
      cookedStingray:
        desc: La razza cotta è una prelibatezza in alcune culture, con una carne bianca
          e soda che può essere grigliata, fritta o stufata. Ha un sapore unico, spesso
          paragonato a quello dei crostacei.
        name: Razza cotta
      cookedCrayfish:
        name: Gamberi di fiume cotti
        desc: Questi gamberi cotti sono una delizia per gli amanti dei frutti di mare,
          con la loro carne tenera e dolce e un leggero sentore di salsedine.
      cookedCarp:
        name: Carpa cotta
        desc: La carpa cotta conserva il suo sapore delicato e può essere preparata
          in vari modi, dalla cottura al forno alla frittura. La sua carne tenera
          è una tela culinaria.
      cookedJellyfish:
        name: Medusa cotta
        desc: Trasformata in una prelibatezza unica, la medusa cotta sfida il palato
          con la sua consistenza intrigante e il suo delicato sapore oceanico.
      cookedMoray:
        name: Murena cotta
        desc: L'aspetto misterioso della murena cotta è accompagnato dal suo sapore
          unico. La sua carne è tenera e leggermente dolce, rendendola una prelibatezza
          rara proveniente dalle profondità marine.
      cookedStreamEel:
        name: Anguilla di fiume cotta
        desc: L'anguilla di fiume cotta, adatta ai fiumi e ai torrenti, è una prelibatezza
          unica con la sua carne tenera e friabile, perfetta per chi apprezza il gusto
          del pesce d'acqua dolce.
      cookedSwordfish:
        name: Pesce spada cotto
        desc: Il pesce spada cotto ha un sapore leggermente dolce. Spesso viene grigliato
          o scottato per ottenere una crosta saporita, ed è ottimo se cotto al sangue.
      cookedShark:
        name: Squalo cotto
        desc: Lo squalo cotto ha una consistenza soda e un sapore deciso, piuttosto
          intenso. È un pesce versatile che può essere preparato in vari modi, dalla
          cottura alla griglia allo stufato.
      cookedLargemouthBass:
        desc: Il pesce dalla bocca grande ha un sapore delizioso e torbido, apprezzato
          principalmente solo dagli abitanti delle paludi.
        name: Pesce persico trota cotto
    memosphere:
      carpentryMemosphere:
        desc: All'interno della sfera di vetro è possibile vedere un ricordo del processo
          di creazione di un bellissimo mobile nella segheria.
        name: Memospere della Falegnameria
      cookingMemosphere:
        desc: All'interno della sfera di vetro, si vede il ricordo di quando preparavi
          un brodo sostanzioso in una pentola enorme per tutti.
        name: Memosfera della Cucina
      fishingMemosphere:
        desc: All'interno della sfera di vetro, si vede il ricordo della cattura del
          pesce da record che ha impressionato tutti i pescatori.
        name: Memosfera della Pesca
      woodcuttingMemosphere:
        name: Memosfera del Taglio degli Alberi
        desc: All'interno della sfera di vetro, si vede il ricordo di un grande albero
          abbattuto con un'ascia.
      agilityMemosphere:
        desc: All'interno della sfera di vetro, si vede il ricordo di aver tagliato
          il traguardo di una gara.
        name: Memosfera dell'Agilità
      craftingMemosphere:
        name: Memosfera della Creazione
        desc: All'interno della sfera di vetro, si vede il ricordo di qualcuno che
          armeggia al banco da lavoro fino a quando non crea qualcosa di magnifico.
      foragingMemosphere:
        name: Memosfera della Raccolta
        desc: All'interno della sfera di vetro, si vede il ricordo di un cespuglio
          di bacche in piena fioritura.
      miningMemosphere:
        name: Memosfera della Miniera
        desc: All'interno della sfera di vetro, si vede il ricordo dell'estrazione
          di un ricco filone minerario.
      smithingMemosphere:
        name: Memospere della Forgiatura
        desc: All'interno della sfera di vetro, si vede il ricordo della forgiatura
          di un'arma letale e di una robusta armatura.
      trinketryMemosphere:
        name: Memosfera della Gioielleria
        desc: All'interno della sfera di vetro, si vede il ricordo della lucidatura
          di una gemma scintillante.
    misc:
      nutMix:
        desc: Un mix di frutta secca che fornisce un ottimo apporto proteico e un
          gusto gradevole. Allergie in sospeso.
        name: Miscela di frutta secca
      driedFruit:
        name: Frutta secca
        desc: Un mix di frutta diversa che è stata disidratata per evitare che si
          deteriorasse. Il sapore è ancora ottimo!
  containers:
    skilling:
      foraging:
        foragingChest:
          desc: Un delizioso mix di equipaggiamento e ingredienti che si possono trovare
            in natura.
          name: Forziere della raccolta
        sunkenChest:
          name: Cassa affondata
          desc: Dalle profondità del mare, questo forziere ha trovato la sua strada
            verso la riva.
      regional:
        galeforgeChest:
          desc: Secondo alcune voci, questo baule sarebbe arrotondato così da poterlo
            far rotolare in giro per la città. Ingegnoso!
          name: Forziere di Forgiatempesta
        rustyChest:
          desc: Una vecchia cassa arrugginita trovata e conservata da Herbert. Aspetta
            solo di aiutare i nuovi avventurieri a iniziare la loro avventura.
          name: Cassa arrugginita
        coralChest:
          desc: Coralli multicolori a forma di scrigno. Si muove come se fosse sott'acqua.
          name: Cassa di corallo
        syrenthiaChest:
          name: Cassa di Syrenthia
          desc: Il fondale marino deve nascondere molti tesori acquatici.
        coinPouch:
          name: Porta monete
          desc: Un piccolo sacchetto pieno di monete. È un po' pesante, ma non ti
            lamenti.
        adventureGuildChest:
          name: Cassa della Gilda degli Avventurieri
          desc: Questo robusto baule reca il simbolo della Gilda degli Avventurieri.
        jarvoniaChest:
          name: Cassa di Jarvonia
          desc: Un baule congelato trovato a Jarvonia, freddo al tatto.
        gdteChest:
          name: Cassa di GDTE
          desc: Un baule paludoso che sembra essere stato dragato dalle paludi del
            GDTE.
        trellinChest:
          name: Cassa di Trellin
          desc: Una cassa ricoperta di muschio che rivela le sue origini nella zona
            di Trellin.
        erdwiseChest:
          name: Cassa di Erdwise
          desc: Uno scrigno luccicante che sembra provenire dalle stravaganti ricchezze
            delle coste di Erdwise.
        halflingrebelsChest:
          name: Cassa dei Ribelli Halfling
          desc: Un pettorale temprato dalle battaglie che sembra aver visto lo spirito
            combattivo dei Ribelli Halfling.
      mining:
        miningChest:
          desc: Una gamma solida come la roccia di articoli legati al settore minerario.
          name: Cassa mineraria
        gemPouch:
          name: Sacchetto per gemme
          desc: Un piccolo sacchetto pieno di gemme preziose. Quando lo si tiene in
            mano, si percepisce il peso delle gemme.
      woodcutting:
        woodcuttingChest:
          desc: Una bellissima cassa di legno intagliato, decorata con diversi tipi
            di corteccia d'albero. Era nascosta tra le radici di un albero che hai
            abbattuto.
          name: Cassa del taglio del legno
        birdNest:
          name: Nido d'uccello
          desc: Questo nido è caduto da un albero che stavi tagliando. Il suo proprietario
            non sarà più in grado di ritrovarlo, quindi potresti anche controllare
            cosa c'è dentro.
      trinketry:
        trinketryChest:
          desc: Una scatola piena di oggetti di valore, spero per il tuo bene che
            non sia un mostro sotto mentite spoglie!
          name: Cassa della Gioielleria
      agility:
        agilityChest:
          desc: Uno stivale di pelle marrone caduto proprio accanto a te mentre ti
            allenavi, anche se non sembrava esserci nessuno nei paraggi. Osservandolo
            più da vicino, sembra che ci sia qualcosa nascosto al suo interno.
          name: Cassa dell'Agilità
      carpentry:
        carpentryChest:
          desc: I dettagli raffinati di questa cassa che hai trovato mentre rovistavi
            tra i tuoi attrezzi da falegname indicano che è stata realizzata da un
            maestro falegname.
          name: Cassa del falegname
      cooking:
        cookingChest:
          name: Cassa del cucinare
          desc: Questa grande pentola di ghisa è apparsa all'improvviso tra le pentole
            e i bollitori mentre tu eri più concentrato a non bruciare il tuo piatto.
      crafting:
        craftingChest:
          name: Cassa della creazione
          desc: Mentre stavi realizzando le tue creazioni, hai notato che questa grande
            cassetta degli attrezzi rossa era improvvisamente accanto ai tuoi strumenti.
      fishing:
        fishingChest:
          name: Cassa della pesca
          desc: Il mare è pieno di pesci, ma gli acquari contengono le specie più
            rare.
      smithing:
        smithingChest:
          name: Cassa del fabbro
          desc: Hai trovato questa pesante scatola di metallo a forma di incudine
            nella fornace ardente mentre fondevi i tuoi minerali. Chi l'avrebbe lasciata
            lì?
  crafted:
    equipmentSets:
      bronze:
        chest:
          desc: Il piastrone di bronzo, una formidabile difesa, sfoggia le tradizioni
            d'artigianato dei mastri armaioli.
          name: Corazza di bronzo
        gloves:
          desc: 'Guanti di bronzo, realizzati con maestria e robusti, avvolgono le
            mani degli avventurieri in un abbraccio rassicurante.'
          name: Guanti di bronzo
        heavyHelmet:
          desc: 'Forgiato con incrollabile determinazione, forma un semplice scudo
            per il cranio di chi lo indossa.'
          name: Elmo di bronzo pesante
        legs:
          desc: 'Queste gambe rivestite in bronzo promettono una protezione incrollabile
            per intraprendere qualsiasi missione.'
          name: Schinieri di bronzo
        lightHelmet:
          desc: 'Reca il marchio di coloro che hanno imparato l''arte di realizzare
            copricapi difensivi che non compromettono la velocità e la mobilità.'
          name: Elmo di bronzo leggero
        shoes:
          desc: 'Almeno sono più leggeri di quelli in ferro!'
          name: Calzari di bronzo
        shield:
          name: Uno scudo di bronzo
          desc: Uno scudo.
        sword:
          desc: Una spada.
          name: Spada di bronzo
      copper:
        chest:
          desc: 'Richiede una quantità significativa di rame, ma protegge le parti
            più vitali del corpo.'
          name: Corazza di rame
        gloves:
          desc: 'Coperture in rame per le mani.'
          name: Guanti di rame
        heavyHelmet:
          desc: 'L''elmo pesante in rame, simbolo di resistenza, sacrifica tutta l''agilità
            per garantire la massima difesa.'
          name: Elmo di rame pesante
        legs:
          desc: 'Alcune gambe in rame, realizzate con un mix di robustezza e libertà
            di movimento, garantiscono un livello base di protezione.'
          name: Schinieri di rame
        lightHelmet:
          desc: 'L''elmo leggero in rame, una scintillante corona protettiva, offre
            un equilibrio tra difesa leggera e agilità.'
          name: Elmo di rame leggero
        shoes:
          desc: 'Alcuni stivali pesanti che offrono una protezione minima.'
          name: Calzari di rame
        shield:
          name: Scudo in rame
          desc: Uno scudo leggero.
        sword:
          name: Spada di rame
          desc: Una spada leggera.
      farganite:
        chest:
          desc: 'Una fortezza impenetrabile sul tuo petto, il tuo nemico può vedere
            se stesso sulla sua superficie blu riflettente.'
          name: Corazza di farganio
        gloves:
          desc: 'Un meraviglioso paio di guanti che sembrano riflettere il colore
            attuale del cielo.'
          name: Guanti di farganio
        heavyHelmet:
          desc: 'Un marchio dei guerrieri più abili del Continente Occidentale.'
          name: Elmo di farganio pesante
        legs:
          desc: 'Un perfetto equilibrio tra difesa e peso, garantiscono a chi li indossa
            un''elevata mobilità e un''ottima difesa.'
          name: Schinieri di farganio
        lightHelmet:
          desc: 'Un enigmatico capolavoro di arte orafa, che avvolge il tuo viso in
            un blu scintillante.'
          name: Elmo di farganio leggero
        shoes:
          desc: 'Almeno sono più leggeri di quelli neri!'
          name: Calzari di farganio
        shield:
          desc: Scudo di colore blu che sorprendentemente non è così pesante.
          name: Scudo di farganite
        sword:
          name: Spada di farganite
          desc: Una spada blu simile al ghiaccio realizzata con barre di farganite.
        gemShield:
          name: Scudo di gemme
          desc: Uno scudo incredibilmente leggero, intarsiato con gemme abbaglianti
            che emanano una luce brillante.
      iron:
        chest:
          desc: 'Funge da baluardo inflessibile contro il pericolo, proteggendo il
            torso di chi lo indossa con risoluzione incrollabile.'
          name: Corazza di ferro
        gloves:
          desc: 'Questi guanti, finemente dettagliati e robusti, avvolgono le mani
            degli avventurieri in una rassicurante protezione.'
          name: Guanti di ferro
        heavyHelmet:
          desc: 'Questo elmo funge da protettore per coloro che marciano nel cuore
            del pericolo, infondendo fiducia incrollabile a chi lo indossa.'
          name: Elmo di ferro pesante
        legs:
          desc: 'Le gambe della corazza sono pesanti, ma offrono una protezione moderata
            agli arti.'
          name: Schinieri di ferro
        lightHelmet:
          desc: 'Brilla con la promessa di proteggere gli avventurieri che intraprendono
            le loro missioni.'
          name: Elmo di ferro leggero
        shoes:
          desc: 'I tuoi piedi non sono mai stati così pesanti. Ma sei abbastanza sicuro
            che potrebbero essere investiti da un carro pesante e sopravvivere indenni.'
          name: Calzari di ferro
        sword:
          name: Spada di ferro
          desc: Una spada di ferro, un elemento fondamentale di molte truppe militari.
        shield:
          name: Scudo di ferro
          desc: Uno scudo di ferro pesante da sollevare, ma non vorresti usare uno
            scudo leggero per resistere ai colpi dei tuoi nemici.
      steel:
        chest:
          desc: 'Un potente baluardo per il torso e una testimonianza dello spirito
            indomito di guerrieri e cavalieri.'
          name: Corazza d'acciaio
        gloves:
          desc: 'Realizzati con cura meticolosa, offrono sia resistenza che destrezza,
            consentendo a chi li indossa di maneggiare armi e strumenti con abilità
            magistrale.'
          name: Guanti d'acciaio
        heavyHelmet:
          desc: 'Il riflesso del resto della tua armatura e le piccole fessure rendono
            piuttosto difficile vedere ciò che ti circonda, ma ti senti al sicuro.'
          name: Elmo d'acciaio pesante
        legs:
          desc: 'Brillano della promessa di proteggere gli eroi mentre affrontano
            i pericoli delle loro epiche imprese.'
          name: Schinieri d'acciaio
        lightHelmet:
          desc: 'Un protettore luminoso per la testa, offre un livello medio di protezione
            mantenendo un elevato livello di visibilità.'
          name: Elmo d'acciaio leggero
        shoes:
          desc: 'Almeno sono più leggeri di quelli in ferro!'
          name: Calzari d'acciaio
        sword:
          name: Spada d'acciaio
          desc: Una spada d'acciaio lucida e affilata abbastanza da tagliare il pane.
        shield:
          desc: Uno scudo in acciaio lucido che ti salverà in battaglia, ma che farà
            anche bella mostra di sé nella sala operativa.
          name: Scudo d'acciaio
      tarsilium:
        chest:
          desc: 'Un corpo nero, scelta popolare tra i cavalieri oscuri del regno.'
          name: Corazza di tarsilio
        gloves:
          desc: 'Un paio di guanti neri che consentono movimenti fluidi del palmo
            e delle dita.'
          name: Guanti di tarsilio
        heavyHelmet:
          desc: 'Un casco nero e pesante offre una buona protezione contro i colpi
            al tuo organo preferito, il cervello.'
          name: Elmo di tarsilio pesante
        legs:
          desc: 'Un set di gambe piatte nere, perfette per i cavalieri gotici.'
          name: Schinieri di tarsilio
        lightHelmet:
          desc: 'Un casco nero che non solo offre una buona protezione alla testa,
            ma è anche utile per muoversi senza essere visti al buio.'
          name: Elmo di tarsilio leggero
        shoes:
          desc: 'Un paio di scarpe nere. Almeno sono più leggere di quelle d''acciaio!'
          name: Calzari di tarsilio
        shield:
          desc: Uno scudo nero realizzato in tarsilium è un'ottima scelta per difendersi
            da colpi e pugni.
          name: Scudo di tarsilium
        sword:
          name: Spada di tarsilium
          desc: Una spada nera che non arrugginisce mai.
      basic:
        woodenShield:
          desc: Speri che questo semplice scudo possa difenderti.
          name: Scudo di legno
        woodenSword:
          name: Spada di legno
          desc: Speri che questo semplice bastone possa difenderti.
    skilling:
      fishing:
        basicFishingPole:
          desc: 'Sai come si dice, una brutta giornata al lago è meglio di una bella
            giornata al lavoro.'
          name: Canna da pesca semplice
        fishingSpear:
          desc: 'La lancia incarna la danza tra predatore e preda sotto la superficie,
            offrendo un mezzo diretto e formidabile per procurarsi il sostentamento
            dalle acque.'
          name: Fiocina da pesca
        largeFishingNet:
          desc: 'La grande rete da pesca, creata dalle comunità costiere, è una rete
            di aspirazioni gettata sulle maree in continuo mutamento.'
          name: Rete da pesca grande
        oakFishingRod:
          desc: 'La canna da pesca in quercia, capolavoro di artigiani esperti, racchiude
            l''essenza degli alberi secolari e la loro saggezza senza tempo.'
          name: Canna da pesca in quercia
        pineFishingRod:
          desc: 'Una canna dal profumo fresco in grado di resistere anche ai pesci
            più pesanti.'
          name: Canna da pesca in pino
        smallFishingNet:
          desc: 'Una rete semplice, un umile strumento di un semplice pescatore. Poco
            più che alcuni pezzi di corda legati insieme.'
          name: Rete da pesca piccola
        lobsterPot:
          name: Nacella per aragoste
          desc: Mettilo in mare e lì ci sarà un'aragosta.
        advancedFishingRod:
          name: Canna da pesca avanzata
          desc: La canna avanzata è destinata all'uso da parte di pescatori professionisti.
        willowFishingRod:
          desc: La canna da pesca realizzata in salice è leggera e morbida al tatto.
          name: Canna da pesca in salice
        coralFishingSpear:
          name: Lancia da pesca per coralli
          desc: Questa lancia da pesca è realizzata con coralli e idrillio. Ha diverse
            punte affilate per facilitare la cattura dei pesci.
        tidalLure:
          name: Esca di marea
          desc: L'esca sembra un vortice. Molto efficace nell'attirare i pesci.
        bectoFishingRod:
          desc: Ossa assemblate in modo certosino su vertebre e tenute insieme dalla
            forza dell'ectoplasma così da creare un nuovo potere nel modo di pescare.
          name: Canna da pesca spettrale
        elderhideFishingNet:
          name: Rete da pesca di pelle antica
          desc: Una rete da pesca creata con durevole pelle antica.
        bectoFishingCagespear:
          name: Lancia da pesca spettrale
          desc: Una lunga sezione di osso dotata di una versatile punta artigliata
            in ectoplasma, ideale sia per la pesca con la lancia che con la gabbia.
      mining:
        basicPickaxe:
          desc: Il piccone, umile strumento dei minatori. Difficilmente più di un
            bastone, una pietra e un po' di corda per legare il tutto.
          name: Piccone semplice
        bronzePickaxe:
          desc: 'Il piccone di bronzo emana un fascino rustico e una forza incrollabile.'
          name: Piccone di bronzo
        copperPickaxe:
          desc: 'Un''ascia fragile e leggera per l''estrazione mineraria. Fa il suo
            dovere.'
          name: Piccone di rame
        farganitePickaxe:
          desc: 'Un perfetto riflesso delle tonalità del cielo durante il giorno,
            un piccone davvero raro.'
          name: Piccone di farganio
        ironPickaxe:
          desc: 'Con la sua testa pesante, è un fedele compagno per chi cerca di domare
            la natura selvaggia o affrontare l''ignoto.'
          name: Piccone di ferro
        steelPickaxe:
          desc: 'Il piccone d''acciaio brilla della determinazione del suo creatore,
            pronto a eseguire i suoi ordini.'
          name: Piccone d'acciaio
        tarsiliumPickaxe:
          desc: 'Il piccone di metallo scuro si abbina molto bene alla musica heavy
            metal.'
          name: Piccone di tarsilio
        adamantPickaxe:
          name: Piccone di adamantio
          desc: Questo piccone di colore verde minaccia i minerali inferiori che lo
            circondano. Sembra arrabbiato per essere solo un piccone.
        hydriliumPickaxe:
          name: Piccone di idrillio
          desc: Un piccone realizzato con un raro materiale sottomarino chiamato idrillio.
        bectoPickaxe:
          desc: Un pezzo di osso resistente potenziato con ectoplasma per assumere
            la forma di un piccone. Dovrebbe rimuovere un pezzo considerevole di roccia
            ad ogni colpo.
          name: Piccone spettrale
        hydriliumMagnet:
          name: Magnete di idrillio
          desc: Un magnete da minatore infuso con idrillio.
        petrifiumHatchet:
          name: Piccone di violite
          desc: Questo piccone di violite ha raggiunto uno stato che solo altri strumenti
            possono sognare. Ti permette di spaccare le rocce con precisione distruttiva.
        violitePickaxe:
          name: Piccone di violite
          desc: Questo piccone di violite ha raggiunto uno stato che solo altri strumenti
            possono sognare. Ti permette di spaccare le rocce con precisione distruttiva.
      woodcutting:
        basicHatchet:
          desc: L'accetta, umile strumento dei boscaioli. Difficilmente più di un
            bastone, una pietra e una corda per legare il tutto.
          name: Accetta semplice
        bronzeHatchet:
          desc: Ottima per i principianti per iniziare ad abbattere qualche albero.
          name: Accetta di bronzo
        copperHatchet:
          desc: Fragile e piuttosto leggero per tagliare della legna, ma fa il suo
            lavoro.
          name: Accetta di rame
        farganiteHatchet:
          desc: 'Un perfetto riflesso delle tonalità del cielo durante il giorno,
            un oggetto davvero raro.'
          name: Accetta di farganio
        ironHatchet:
          desc: 'Con la sua lama pesante, è un fedele compagno per chi vuole domare
            la natura selvaggia o affrontare l''ignoto.'
          name: Accetta di ferro
        steelHatchet:
          desc: 'L''ascia d''acciaio brilla della determinazione del suo creatore,
            pronta a eseguire i suoi ordini.'
          name: Accetta d'acciaio
        tarsiliumHatchet:
          desc: 'La testa dell''ascia in metallo scuro non riflette molto la luce,
            ma taglia molto bene il legno.'
          name: Accetta di tarsilio
        adamantHatchet:
          name: Ascia di adamantio
          desc: "Un'ascia di metallo verde adamantio: forse non è un colore molto
            creativo, ma è ottima per tagliare la legna."
        hydriliumHatchet:
          desc: Un'ascia realizzata con un raro materiale sottomarino chiamato idrillio.
          name: Ascia di idrillio
        bectoHatchet:
          desc: Un ammasso di ossa a cui l'ectoplasma ha conferito il potere di assumere
            la forma di un'ascia. Non sembra, dato che è piuttosto trasparente, ma
            la sua lama è piuttosto affilata.
          name: Ascia spettrale
        hydriliumLogSplitter:
          name: Spaccalegna di idrillio
          desc: Uno spaccalegna rinforzato con idrillio.
        petrifiumHatchet:
          name: Accetta di violite
          desc: Questa ascia di violite sembra molto pericolosa, vista la sua affilatura.
            Meglio stare attenti a non inciampare mentre la si trasporta.
        violiteHatchet:
          desc: Questa ascia di violite sembra molto pericolosa, vista la sua affilatura.
            Meglio stare attenti a non inciampare mentre la si trasporta.
          name: Ascia di violite
      foraging:
        adamantSickle:
          desc: La falce di adamantio brilla con una tonalità verdastra, garantendo
            sia durata che affilatura per un raccolto efficiente.
          name: Falce di adamantio
        stoneSickle:
          name: Falce di base
          desc: Uno strumento fondamentale per raccogliere i frutti della natura.
            Il suo bordo grezzo non è molto efficiente.
        mangroveBasket:
          desc: Il cesto di mangrovia è stato realizzato con due cesti diversi, ma
            le assi di mangrovia nascondono perfettamente le giunture.
          name: Cesto di mangrovia
        copperSickle:
          name: Falce di rame
          desc: Offre una discreta efficienza nel taglio di piante di base.
        ironSickle:
          name: Falce di ferro
          desc: Robusto e affidabile, taglia con facilità anche i gambi più resistenti.
        steelSickle:
          name: Falce in acciaio
          desc: Robusto e resistente, offre prestazioni affidabili per un foraggiamento
            esteso.
        hydriliumSickle:
          name: Falce di idrillio
          desc: Una falce realizzata con un raro materiale sottomarino chiamato idrillio.
        bectoSickle:
          name: Falce spettrale
          desc: Un osso rinforzato con il potere dell'ectoplasma per assumere la forma
            di una falce. Sembra fragile, ma taglia le piante con tale facilità che
            sembrerebbe che siano state trovate già così.
        petrifiumSickle:
          name: Falce di violite
          desc: La falce di violite vanta un metallo viola molto resistente. È sorprendentemente
            leggera nonostante la sua robustezza.
        violiteSickle:
          desc: Questa falce di violite sfoggia il suo robusto metallo viola. Le sue
            curve sembrano quasi formare sorrisi di gioia ad ogni taglio che effettua.
          name: Falce di violite
      miscellaneous:
        bagOfRocks:
          name: Sacco di pietre
          desc: È difficile trascinarlo in giro, perché lo stai facendo di nuovo?
      hunting:
        oakHuntingBow:
          name: Arco da caccia in quercia
          desc: Un arco da caccia realizzato in quercia, una scelta molto apprezzata
            dai cacciatori.
        elmHuntingBow:
          desc: Un arco da caccia realizzato in legno di olmo flessibile ma resistente.
          name: Arco da caccia in olmo
        bambooHuntingBow:
          name: Arco da caccia in bambù
          desc: Un arco da caccia realizzato in bambù, molto diffuso nelle zone in
            cui il bambù è facilmente reperibile. È molto leggero e costituisce un'arma
            precisa.
        birchBirdhouse:
          name: Casetta per uccelli in betulla
          desc: Una tipica casetta per uccelli che anche un dilettante potrebbe costruire.
            Tuttavia, è un ottimo rifugio per i piccoli uccelli durante il periodo
            di nidificazione.
        pineBirdhouse:
          name: Casetta per uccelli in pino
          desc: Una casetta per uccelli realizzata in legno di pino, la cui tonalità
            marrone la rende una dimora attraente per vari uccelli.
        spruceBirdhouse:
          name: Casetta per uccelli in abete rosso
          desc: Una casetta per uccelli ben realizzata in legno di abete rosso, la
            cui forma è adatta alla nidificazione degli uccelli.
        teakBirdhouse:
          name: Casetta per uccelli in teak
          desc: Una casetta per uccelli più avanzata che richiede abilità per essere
            realizzata. È un'ottima dimora per uccelli dello stesso piumaggio.
        farganiteArrows:
          name: Frecce di farganite
          desc: Le punte blu delle frecce le rendono quasi magiche. Sono realizzate
            con il famoso metallo farganite.
        simpleBowstring:
          name: Corda d'arco semplice
          desc: Componente fondamentale dell'arco e delle frecce, fornisce la tensione
            necessaria per scoccare una freccia.
        mahoganyHuntingBow:
          desc: Questo arco da caccia ben realizzato è un'ottima arma per un cacciatore
            esperto.
          name: Arco da caccia in mogano
        mapleBirdhouse:
          desc: Una casetta per uccelli in legno d'acero ha un odore caratteristico
            che attira uccelli di varie dimensioni.
          name: Casetta per uccelli in acero
        copperArrows:
          desc: Solo le frecce fatte con dei bastoncini sono peggiori di queste, ma
            ogni cacciatore deve pur iniziare da qualche parte.
          name: Frecce di rame
        tarsiliumArrows:
          desc: Frecce nere, preferite dai ranger oscuri e spigolosi dei boschi.
          name: Frecce di Tarsilium
        steelArrows:
          desc: Le punte lucide di queste frecce indicano la loro affilatura. Non
            vorresti certo essere colpito da una freccia del genere.
          name: Frecce d'acciaio
        mangroveBirdhouse:
          name: Casetta per uccelli in mangrovia
          desc: Le mangrovie non vengono spesso utilizzate per costruire casette per
            uccelli, perché sono difficili da lavorare. Tuttavia, se realizzate da
            un artigiano esperto, sono ottime casette per uccelli.
        bronzeArrows:
          name: Frecce di bronzo
          desc: Il bronzo non è il materiale ideale per fabbricare armi destinate
            a durare nel tempo, ma per frecce come queste funziona piuttosto bene.
        ironArrows:
          name: Frecce di ferro
          desc: Le frecce di base di molte unità militari a distanza.
        kelpDriftNet:
          name: Rete fissa in alghe
          desc: Una rete da pesca a strascico quasi infinita realizzata con alghe
            sottomarine.
      tailoring:
        basicHide:
          name: Strisce di pelle base
          desc: Un materiale naturale noto per la sua resistenza e la sua texture
            unica.
        basicLeather:
          desc: Un pezzo di pelle pronto per essere trasformato in qualcosa di più
            utile.
          name: Pelle base
        hideScraps:
          desc: Pezzi di pelle rovinata che potevano essere assemblati in materiale
            utilizzabile.
          name: Nascondere ritagli
        qualityLeather:
          name: Pelle di qualità
          desc: <PLACEHOLDER>
        elderHideScraps:
          name: Strisce di pelle antica
          desc: Pezzi di pelle antica e rovinata che potrebbero essere assemblati
            in materiale utilizzabile da un esperto.
        elderHide:
          name: Pelle antica
          desc: Striscia di pelle di una bestia maestosa.
        elderhideLeather:
          name: Cuoio di pelle antica
          desc: Materiale flessibile che è stato conciato per prevenirne il deterioramento.
        apprenticeHandwear:
          name: Guanti dell'apprendista
          desc: Un guanto molto apprezzato dagli apprendisti artigiani di vari mestieri.
        apprenticeBreeches:
          name: Calzoni dell'apprendista
          desc: I pantaloni sono comodi da indossare per lunghe ore e hanno comode
            tasche per riporre tanti piccoli oggetti.
        linenCloth:
          desc: Un pezzo di tessuto semplice, solitamente utilizzato dai sarti alle
            prime armi per confezionare abiti.
          name: Tessuto di lino
        grassknotMitts:
          desc: Guanti in tessuto con fili d'erba intrecciati, che li rendono speciali.
          name: Guanti Grassknot
        tattyChaps:
          desc: Gambali di stoffa lacera, comodi da indossare, ma il tessuto provoca
            prurito alla pelle.
          name: Gambali logori
        grassknotChaps:
          name: Gambali di Grassknot
          desc: Gambali di lino intrecciati con erba, progettati per essere indossati
            sopra i leggings.
        grassknotTunic:
          name: Tunica di Grassknot
          desc: Una tunica migliorata con l'aggiunta di erba, una scelta insolita
            ma sorprendentemente efficace.
        apprenticeVest:
          name: Gilet dell'apprendista
          desc: Il gilet semplice lascia le braccia libere per svolgere lavori artigianali
            che richiedono precisione.
        tattyMitts:
          name: Guanti logori
          desc: Guanti di stoffa laceri, realizzati da qualcuno con abilità discutibili.
        tattyTunic:
          name: Tunica logora
          desc: Tunica di stoffa lacera, spesso indossata dai contadini e da altre
            persone povere.
        rootweaveMitts:
          name: Guanti con trama a radice
          desc: Questi guanti, rinforzati dall'aggiunta di radici, sono sorprendentemente
            comodi e offrono una maggiore protezione per le dita.
        journeymanHandwear:
          name: Guanti del viaggiatore
          desc: Guanti ben realizzati, utili per vari lavori artigianali.
        spikescaleMitts:
          name: Guanti chiodati
          desc: I guanti sono stati migliorati con l'aggiunta di pelle e scaglie appuntite,
            che garantiscono una buona protezione durante la raccolta.
        shadowquillMitts:
          name: Guanti piuma ombra
          desc: Questi guanti scuri con piume sono ideali per i raccoglitori furtivi.
        spikescaleChaps:
          name: Gambali a punte
          desc: Questi pantaloni chaps appuntiti offrono una buona protezione contro
            graffi e intemperie durante le attività all'aperto.
        shadowquillChaps:
          name: Gambali piuma d'ombra
          desc: Questi gambali piumati fanno sembrare che le tue gambe abbiano le
            ali, ma purtroppo non puoi volare con questi.
        spikescaleTunic:
          name: Tunica con scaglie appuntite
          desc: Una tunica migliorata dall'aggiunta di scaglie appuntite, che la rendono
            dall'aspetto intimidatorio.
        shadowquillTunic:
          name: Tunica piuma d'ombra
          desc: La tunica, impreziosita dall'aggiunta di piume scure, ti fa sembrare
            un uomo-uccello.
        aerofibrilMitts:
          name: Guanti di fibra aerodinamica
          desc: I guanti sono stati migliorati con un filo aerodinamico che rende
            le tue mani più veloci del solito.
        rootweaveChaps:
          name: Gambali con trama a radice
          desc: Gambali rinforzati con radici, che proteggono le gambe quando sei
            nella natura selvaggia.
        journeymanBreeches:
          name: Pantaloni del viaggiatore
          desc: Pantaloni realizzati da abili sarti per fabbri, falegnami e altri
            artigiani esperti.
        elderhideBreeches:
          desc: Questi pantaloni, realizzati con pelle antica, conferiscono una protezione
            eccellente verso tutti gli elementi.
          name: Pantaloni in pelle antica
        elderhideMitts:
          desc: Questi guanti sono stati creati utilizzando la leggendaria pelle antica,
            attirando gli sguardi degli altri collezionisti quando passi loro accanto.
          name: Guanti in pelle antica
        elderhideTunic:
          name: Tunica di pelle antica
          desc: La tunica creata con pelle antica è indossata dai collezionisti che
            si avventurano a raccogliere risorse in luoghi impervi.
        aerofibrilChaps:
          name: Gambali in aerofibrilla
          desc: Questi pantaloni sono molto leggeri da indossare, quasi come se non
            li indossassi affatto. Assicurati di averli addosso!
        rootweaveTunic:
          name: Tunica con intreccio a onda
          desc: Una tunica migliorata aggiungendo delle radici al tessuto. Ti fa sembrare
            un cespuglio senza foglie.
        journeymanVest:
          name: Veste da viandante
          desc: Questa veste ha moltissime tasche interne per contenere strumenti
            e altre cose utili per tutti i tipi di attività.
        aerofibrilTunic:
          name: Tunica in aerofibrilla
          desc: Il tessuto aerodinamico fa brillare leggermente la tunica quando il
            vento soffia su di essa.
      carpentry:
        bectoSaw:
          name: Sega spettrale
          desc: I raccapriccianti denti ectoplasmatici di questa sega sembrano meno
            minacciosi rispetto ad altre seghe e, anche se commetti degli errori,
            non sembrano mai ferirti. Eppure taglia il legno con facilità.
        bronzeSaw:
          name: Sega in bronzo
          desc: Una volta hai visto una sega e hai pensato che sarebbe stata più bella
            in bronzo.
        tarsiliumSaw:
          name: Sega di tarsilio
          desc: I denti scuri simili all'ossidiana della sega sono pronti a mordere!
      crafting:
        bectoWrench:
          desc: Le ganasce ectoplasmiche di questa chiave sembrano sempre avere una
            presa perfetta su qualsiasi cosa vi venga applicata. Un po' inquietante.
          name: Chiave inglese spettrale
        bronzeWrench:
          name: Chiave inglese di bronzo
          desc: La chiave universale misura dieci, realizzata in bronzo. È quella
            che manca sempre.
        hydriliumWrench:
          desc: Il materiale subacqueo è sorprendentemente ottimo per realizzare chiavi
            inglesi artigianali.
          name: Chiave inglese di idrillio
      cooking:
        bectoPan:
          name: Padella spettrale
          desc: Gli esperti non sono sicuri che cucinare su una superficie ectoplasmatica
            abbia effetti collaterali, ma sicuramente crea una bella doratura, quindi
            probabilmente ne vale la pena.
        bronzePan:
          name: Padella di bronzo
          desc: Grazie al caldo tono bronzo, il cibo ha sempre un aspetto migliore
            in questa padella.
        jadeTippedSteelPan:
          name: Padella in acciaio con bordo in giada
          desc: Il manico di questa padella in acciaio è impreziosito da una gemma
            di giada incastonata.
      smithing:
        reinforcedBellows:
          desc: Sei stanco del tuo mantice che continua a consumarsi, ma si scopre
            che aveva solo bisogno di alcuni rinforzi!
          name: Mantice rinforzata
        tarsiliumToeBoots:
          name: Stivali con punta di tarsilium
          desc: Non pensavi che si potesse ottenere una protezione migliore rispetto
            alle scarpe con la punta di acciaio, ma invece eccoci qui.
        bectoHammer:
          name: Martello spettrale
          desc: Il robusto manico in osso risulta leggero nonostante la spessa testa
            in ectoplasma che sembra morbida quando non viene brandita e utilizzata
            come strumento dai fabbri.
        bronzeHammer:
          name: Martello di bronzo
          desc: Un martello leggero con una testa di bronzo perfetta per forgiare
            e inchiodare qualcosa.
        tarsiliumHammer:
          name: Martello in tarsilium
          desc: Lo scuro metallo che compone la testa di questo martello riflette
            a malapena la luce.
      trinketry:
        silverOpalRing:
          desc: Questa semplice fede in argento con la giusta luce luccica con bagliori
            iridescenti.
          name: Anello di opale argentato
        silverWrentmarineRing:
          desc: Il luccichio dell'argento completa il taglio della gemma di colore
            blu incastonato su di esso.
          name: Anello d'argento con wrentmarine
        silverStarPearlRing:
          name: Anello d'argento con perla a forma di stella
          desc: Un anello d'argento con una perla a forma di stella. Quando la luce
            la colpisce, essa mostra la sua delicata bellezza.
        silverTopazRing:
          name: Anello d'argento con topazio
          desc: Il topazio scintillante e l'argento lucidato fanno sembrare di avere
            il sole e la luna avvolti intorno al tuo dito.
        silverJadeRing:
          name: Anello d'argento con giada
          desc: Un anello d'argento decorato con una gemma di giada che si dice porti
            protezione a buona sorte.
        silverRubyRing:
          name: Anello d'argento con rubino
          desc: Una vista comune che adorava le dita della piccola nobiltà, l'argento
            e il rosso intenso erano un segno distintivo di coloro che avevano fame
            di potere.
        goldWrentmarineRing:
          name: Anello con occhio di perla in oro
          desc: L'oro che incornicia la gemma brilla alla luce come un tesoro affondato
            nelle profondità nascoste.
        silverSunStoneRing:
          name: Anello con pietra solare d'argento
          desc: Un anello in argento con una pietra solare più piccola incastonata,
            che brilla in modo radioso, specialmente alla luce del giorno.
        silverEtherniteRing:
          name: Anello in eternite argentata
          desc: Un anello d'argento con un'eternite dal taglio netto. Il suo bagliore
            ipnotico è allo stesso tempo affascinante e inquietante.
        goldOpalRing:
          name: Anello con opale dorato
          desc: Una fascia in oro protegge l'opale infuocato incastonato, invitando
            chi è in grado di apprezzarne la profonda luminosità a osservarlo più
            da vicino.
        goldStarPearlRing:
          name: Anello con perla e stella dorata
          desc: Un anello d'oro con una perla a forma di stella finemente tagliata
            aggiunge un tocco di eleganza e classe a chi lo indossa.
        goldTopazRing:
          name: Anello con topazio oro
          desc: Una fascia dorata con un topazio baciato dal sole, quasi troppo brillante
            per essere guardata.
        goldJadeRing:
          name: Anello in oro e giada
          desc: Una pietra di giada sagomata è incastonata su questo intricato anello
            d'oro, che possa portarti fortuna e salute.
        goldRubyRing:
          name: Anello con rubino e oro
          desc: Un pesante anello d'oro con un rubino regale, un'aura di comando sembra
            precedere chi lo indossa.
        goldSunStoneRing:
          name: Anello con pietra solare dorata
          desc: Questa pietra solare più grande sembra infondere nell'oro la luce
            del sole, brillando anche nei luoghi più bui.
        goldEtherniteRing:
          name: Anello d'oro di eternite
          desc: Una fascia dorata che racchiude una gemma di eternite ultraterrena.
            Quando indossi questo anello, noti che gli sguardi delle persone intorno
            a te sono attratti dal tuo dito.
        amuletOfTheEel:
          name: Amuleto dell'anguilla
          desc: Un amuleto splendente con il potere di un'anguilla.
        amuletOfTheBat:
          name: Amuleto del pipistrello
          desc: Un amuleto splendente con il potere di un pipistrello.
        cutStarPearl:
          desc: Raffigurata nel famoso dipinto “La ragazza con l'orecchino di perla”
            di un pittore wallisiano.
          name: Perla stellata
        cutJade:
          desc: Il suo colore verde brillante lo rende una pietra preziosa perfetta
            per i gioielli, che secondo alcune credenze popolari allontana gli spiriti
            maligni quando viene indossata.
          name: Giada
        bectoChisel:
          desc: La punta spettrale di ectoplasma sembra instabile, ma in qualche modo
            è comunque di grande aiuto nel lavoro di precisione richiesto nella manipolazione
            delle gemme o altro.
          name: Scalpello spettrale
        amuletOfTheLuckyRabbitFoot:
          desc: Un amuleto scintillante con il potere di una zampa di coniglio portafortuna.
          name: Amuleto della zampa di coniglio portafortuna
        amuletOfTheAnimalKingdom:
          name: Amuleto del regno animale
          desc: Un amuleto splendente con il potere di molti animali.
        cutSunStone:
          desc: Non proviene dal sole, ma con il bagliore dei suoi colori brillanti
            e infuocati, si potrebbe pensare che sia così.
          name: Pietra del sole
        amuletOfTheRoot:
          desc: Un amuleto splendente con il potere di una radice circolare.
          name: Amuleto della radice circolare
        flowerNecklace:
          name: Collana con fiori di Jarvonia
          desc: Una ghirlanda di fiori di Jarvonia, decorata con margherite lunari
            e bucaneve, da indossare al collo.
        amuletOfTheCoolingIce:
          name: Amuleto di ghiaccio rinfrescante
          desc: Un amuleto splendente con il potere di un ghiacciolo.
        cutWrentmarine:
          desc: Quando lo si muove, sembra che l'acqua scorra da un lato all'altro
            sulla superficie di questa roccia blu oceano.
          name: Wrentmarine
        amuletOfTheHeron:
          name: Amuleto dell'airone
          desc: Un amuleto splendente con il potere di un airone.
        amuletOfTheShrimp:
          name: Amuleto del gamberetto
          desc: Un amuleto splendente con il potere di un gamberetto.
        amuletOfTheMeasuringSpoons:
          name: Amuleto del misurino
          desc: Un amuleto splendente con il potere di un misurino.
        amuletOfTheSharkTooth:
          desc: Un amuleto splendente con il potere di un dente di squalo.
          name: Amuleto con dente di squalo
        amuletOfTheBeaver:
          name: Amuleto del castoro
          desc: Un amuleto splendente con il potere di un castoro.
        amuletOfThePinkPearl:
          name: Amuleto della perla rosa
          desc: Un amuleto splendente con il potere di una perla rosa.
        cutOpal:
          name: Opale
          desc: Splendidi colori iridescenti brillano sulla sua superficie quando
            viene esposta alla luce del sole.
        cutTopaz:
          name: Topazio
          desc: Gemma brillante dai colori che ricordano il sole. Potrebbe persino
            ferire gli occhi se la si fissa troppo a lungo.
        cutRuby:
          name: Rubino
          desc: Questa gemma di colore rosso è molto popolare tra i nobili. Il colore
            rosso simboleggia il potere e la passione.
        cutEthernite:
          name: Eternite
          desc: Una preziosa gemma viola vitrea. Guardandola si prova una sensazione
            terribile, eppure è molto difficile distogliere lo sguardo da essa.
        silverRing:
          desc: Un semplice anello in argento, elegante e senza pretese.
          name: Anello in argento
        goldRing:
          desc: Un semplice anello d'oro, intramontabile e prezioso nella sua purezza.
          name: Anello d'oro
        topazTippedChisel:
          desc: Il bordo dello scalpello è realizzato in topazio, che lo rende molto
            affilato.
          name: Scalpello con punta in topazio
        bronzeChisel:
          name: Scalpello in bronzo
          desc: Il bronzo e il burro dell'industria degli scalpelli.
        wraithwaterFlowerNecklace:
          name: Collana con fiori di Spettracqua
          desc: Una composizione di fiori dall'aspetto cupo. Indossarla ti fa sentire
            un leggero legame con i defunti.
  looted:
    equipmentSets:
      dimensional:
        chest:
          desc: 'Il colletto e i polsini di questa camicia sono ricoperti di polvere
            di stelle, mentre onde di vuoto lambiscono lentamente il resto della camicia.'
          name: Maglietta dimensionale
        feet:
          desc: 'La polvere di stelle sulle scarpe le fa brillare ad ogni passo.'
          name: Scarpe dimensionali
        head:
          desc: 'Le costellazioni punteggiano il bordo di questo cappello, scintillando
            delicatamente durante il giorno e vorticosamente nel vuoto che si muove
            di notte.'
          name: Cappello dimensionale
        legs:
          desc: 'Stardust e paillettes sembrano tenere insieme questi pantaloni alla
            moda con facilità.'
          name: Pantaloni dimensionali
      enchanted:
        chest:
          desc: 'Ogni volta che alzi il colletto, sembri un po'' più cool. Soprattutto
            con il primo bottone allacciato.'
          name: Camicia incantata
        feet:
          desc: 'Cliccando due volte sui tacchi non si torna a casa, ma il suono che
            producono quando si cammina è davvero fantastico.'
          name: Scarpe incantate
        head:
          desc: 'Questo cappello può contenere fino a dieci galloni. Di cosa? Nessuno
            lo ha ancora capito.'
          name: 'Cappello incantato'
        legs:
          desc: 'Questi pantaloni calzano sempre alla perfezione e hanno anche le
            tasche!'
          name: Pantaloni incantati
      adventurersTools:
        adventuringSaw:
          name: Seghetto dell'Avventuriero
          desc: Una sega con lo stemma della Gilda degli Avventurieri. La scelta degli
            avventurieri per tagliare il legno.
        adventurersAmulet:
          name: Amuleto dell'Avventuriero
          desc: Un amuleto con il simbolo della Gilda degli Avventurieri.
        adventuringHatchet:
          name: Ascia da avventura
          desc: Un'ascia con lo stemma della Gilda degli Avventurieri. Ha una lama
            affilata e un manico robusto.
        adventuringFishingPole:
          desc: Una canna da pesca con lo stemma della Gilda degli Avventurieri. È
            perfetta per pescare pesci selvatici.
          name: Canna da pesca del'Avventuriero
        adventuringFryingPan:
          desc: Una padella con lo stemma della Gilda degli Avventurieri sul manico.
            Ideale per cucinare i pasti sul fuoco da campo.
          name: Padella dell'Avventuriero
        adventuringSander:
          desc: Una levigatrice con lo stemma della Gilda degli Avventurieri. Può
            essere utilizzata per levigare superfici ruvide.
          name: Levigatrice dell'Avventuriero
        adventuringPickaxe:
          name: Piccone dell'Avventuriero
          desc: Un piccone con un robusto manico su cui è inciso il simbolo della
            Gilda degli Avventurieri. È perfetto per rompere le rocce e estrarre minerali.
        adventuringSickle:
          name: Falce dell'Avventuriero
          desc: Una falce con l'insegna della Gilda degli Avventurieri incisa sulla
            lama. Può essere utilizzata per raccogliere erbe e altre piante.
        adventuringHammer:
          name: Martello dell'Avventuriero
          desc: Un martello con l'insegna della Gilda degli Avventurieri incisa alla
            base del manico. Può essere utilizzato per la lavorazione del ferro.
        adventuringWrench:
          name: Chiave inglese dell'Avventuriero
          desc: Una chiave inglese decorata con l'insegna della Gilda degli Avventurieri.
            Utile per effettuare riparazioni e regolazioni sul campo.
        adventurersRing:
          name: Anello dell'Avventuriero
          desc: Un anello con lo stemma della Gilda degli Avventurieri.
    skilling:
      agility:
        exerciseHeadband:
          desc: 'Questa fascia per capelli ci ricorda che la forza nasce dalla dedizione
            e che il guerriero che è in noi può superare qualsiasi sfida, non importa
            quanto fantastica o impegnativa possa essere.'
          name: Fascia sportiva
        medievalSneakers:
          desc: 'Ad ogni passo, offrono a chi le indossa un viaggio silenzioso e agile
            attraverso regni antichi e contemporanei, colmando il divario tra le epoche.'
          name: Scarpe da ginnastica medievali
        clayFrisbee:
          name: Disco ghiacciato di argilla
          desc: È piuttosto pesante e fragile. Speriamo che non ci siano tiratori
            al piattello nelle vicinanze!
        goldenFrisbee:
          name: Disco ghicchiato d'oro
          desc: È solo placcato in oro, il che lo rende piuttosto leggero ma resistente.
            Ci si aspetterebbe che quando viene lanciato emetta una scia arcobaleno,
            ma purtroppo non è così.
        ironThermos:
          name: Thermos di ferro
          desc: Puoi riempirlo con caffè, latte, vino, brandy, o ogni altro liquido
            ti venga in mente, anche combinandone diversi. Oppure puoi riempirlo d'acqua
            e tornare sano e salvo dalla spedizione.
        flowyTrousers:
          name: Pantaloni fluidi
          desc: Ampi dove serve e stretti dove serve, questi pantaloni sono perfetti
            per le manovre pericolose tra gli arredi urbani.
        simpleRope:
          desc: La corda ha molti usi, ad esempio nell'alpinismo.
          name: Corda semplice
        walkingStick:
          desc: Un robusto bastone in legno con un comodo manico in metallo, per fornire
            un supporto extra durante le vostre escursioni.
          name: Bastone da passeggio
        mapOfJarvonia:
          name: Mappa di Jarvonia
          desc: La mappa mostra le terre e le città del continente di Jarvonia.
        mapOfGDTE:
          name: Mappa di GDTE
          desc: La mappa mostra la forma geografica del Granducato di Trellin-Erdwise.
            Compilata con tutti i dettagli disponibili sull'area.
        featherCape:
          name: Cappa di piume
          desc: Questo mantello è leggero come una piuma, perché è fatto proprio con
            delle piume.
        mountaineeringGuidebook:
          name: Guida all'alpinismo
          desc: Questo libro è rinforzato, sia nel dorso che nelle copertine, per
            resistere a lunghe spedizioni. Sulla copertina appare la silhouette riconoscibile
            delle montagne Frostbite. All'interno è raccolta una serie di consigli
            forniti da alpinisti esperti.
        parkourGloves:
          name: Guanti da parkour
          desc: Questi guanti migliorano la presa dell'800%. Almeno così è scritto
            sull'etichetta.
        simpleTorch:
          name: Torcia semplice
          desc: Con un bastoncino di legno, un panno e una sostanza infiammabile avrai
            una luce portatile. Non potrebbe essere più semplice.
        birchSkis:
          name: Sci in betulla
          desc: Un paio di sci per principianti. Difficili da controllare e non molto
            veloci, ma ti permettono comunque di scendere da un pendio innevato più
            rapidamente che a piedi.
        oakSkis:
          name: Sci in quercia
          desc: Sci pesanti, che li rendono veloci ma difficili da manovrare. Almeno
            la loro resistenza li rende difficili da rompere in caso di caduta!
        pineSkis:
          name: Sci in pino
          desc: Sci robusti e leggeri. Realizzati con il legno degli stessi alberi
            che stai cercando di evitare.
        runningShorts:
          name: Pantaloncini da corsa
          desc: Sono comodi e facili da indossare! Il loro colore blu brillante ti
            rende anche più visibile.
        runningShirt:
          name: Maglietta da corsa
          desc: Quando si va a correre è molto importante indossare un abbigliamento
            adeguato. Una maglietta come questa è indispensabile.
        waterBottle:
          desc: Una bottiglia di vetro piena di acqua potabile fresca e pulita. Idratati!
          name: Borraccia
        mapOfArenum:
          name: Mappa di Arenum
          desc: Una mappa di Arenum. Compilata con tutte le mappe dettagliate necessarie
            per avere un quadro più ampio del mondo conosciuto.
        mapOfTrellin:
          name: Mappa di Trellin
          desc: Questo frammento occidentale strappato di una mappa più grande che
            mostra le aree dettagliate delle zone di Trellin.
        mapOfErdwise:
          name: Mappa di Erdwise
          desc: Questo frammento strappato nella parte orientale di una mappa più
            grande mostra le aree dettagliate delle zone di Erdwiss.
        mapOfHalfling:
          name: Mappa dei Ribelli Halfling
          desc: Questo frammento strappato di una mappa più grande mostra le aree
            dettagliate delle zone Ribelli Halfling.
        toughRope:
          desc: Con questa robusta corda potrai scalare anche le montagne più alte.
          name: Corda resistente
        grapplingHook:
          name: Gancio da arrampicata
          desc: All'estremità della corda è fissato un gancio metallico a quattro
            vie.
        swiftSightGoggles:
          name: Occhiali vista rapida
          desc: Questi occhiali sono progettati per migliorare la tua visione e offrirti
            una visione chiara dell'ambiente circostante.
        stepring:
          name: Anello del passo
          desc: Non è un anello del gioco del poker.
        toeShoes:
          name: Scarpe a punta
          desc: Scarpe con spazi individuali per ciascuna delle dita dei piedi. La
            definizione di funzionalità prima della forma.
        featherBoots:
          name: Stivali con piume
          desc: Contrariamente a quanto si crede comunemente, questi stivali non conferiscono
            la capacità di volare, ma ciò non impedisce alle persone di provarci.
            Sono molto alla moda se abbinati a un mantello di piume.
        mapOfSyrenthia:
          name: Mappa di Syrenthia
          desc: La mappa mostra i dettagli della città e delle aree sommerse nelle
            zone di Syrenthia.
      carpentry:
        handsaw:
          desc: 'Questa sega incarna l''armonia tra artigiano e natura, garantendo
            la possibilità di modellare il legno con precisione ed eleganza.'
          name: Sega a mano
        protectiveGloves:
          desc: 'È meglio quando la possibilità di farsi tagliare le dita con una
            sega è ridotta allo 0%.'
          name: Guanti protettivi
        toolbelt:
          desc: 'Un accessorio multifunzionale che racchiude una vasta gamma di strumenti
            per la lavorazione del legno'
          name: Cintura porta attrezzi
        woodworkingGlasses:
          desc: 'Quando indossati, questi occhiali rivelano i motivi intricati e le
            storie racchiuse in ogni tavola.'
          name: Occhiali per falegnameria
        iceSaw:
          desc: Perfetto per tagliare il ghiaccio, questo strumento è molto comodo
            se vuoi costruire un igloo.
          name: Taglia ghiaccio
        sharpChisel:
          name: Scalpello affilato
          desc: Questo strumento affilato viene utilizzato per scolpire e modellare.
        preciseRuler:
          desc: Le tacche di misurazione sono incise con precisione nel legno e riportano
            sia i centimetri che i pollici.
          name: Righello di precisione
        protractor:
          name: Goniometro
          desc: Si tratta di uno strumento per misurare gli angoli spesso utilizzato
            in falegnameria.
        simpleSaw:
          name: Sega semplice
          desc: Questa sega funzionerà abbastanza a lungo finché non ne troverai una
            migliore.
        protectivePants:
          name: Pantaloni protettivi
          desc: Questi pantaloni hanno delle protezioni cucite sopra.
        dullChisel:
          name: Scalpello smussato
          desc: Ha un manico in legno e una lama in acciaio opaco, ma è comunque in
            grado di produrre splendidi oggetti artigianali.
        protectiveShirt:
          name: Camicia protettiva
          desc: Questa maglietta ha delle protezioni cucite sopra.
        goldenChisel:
          name: Scalpello dorato
          desc: A quanto pare, i soldi crescono davvero sugli scalpelli.
        compressedCharcoal:
          name: Carbone compresso
          desc: Una spessa scheggia di carbone, perfetta per segnare il legno per
            misurarlo e tagliarlo.
        carpentersClogs:
          name: Zoccoli da falegname
          desc: Zoccoli sapientemente intagliati che riflettono la loro dedizione
            ad ogni passo.
        hookhat:
          desc: Sembra che qualcuno abbia semplicemente attaccato un gancio a un cappello.
            Almeno tiene meglio i tuoi sogni di quanto facciano alcuni genitori.
          name: Cappello con gancio
        simpleRuler:
          name: Righello fragile
          desc: Un righello di legno, strumento indispensabile nella cassetta degli
            attrezzi di un falegname. Può essere utilizzato per misurare oggetti o
            tracciare linee rette.
        protectiveGlasses:
          name: Occhiali protettivi
          desc: Questi occhiali impediranno agli oggetti che volano veloci di ferirti
            gli occhi. Si spera.
      cooking:
        chefsApron:
          desc: 'Con questo grembiule, ogni pasto diventa un capolavoro e ogni piatto
            un''opera d''arte.'
          name: Grembiule da cuoco
        chefsHat:
          desc: 'Questo cappello stravagante sembra canalizzare la magia della cucina,
            ispirando meraviglie culinarie ad ogni movimento della spatola.'
          name: Cappello da cuoco
        meatCleaver:
          desc: 'La sua affilata lama in acciaio può tagliare pezzi di carne in pezzi
            più piccoli. Come le tue dita, se non stai attento.'
          name: Mannaia da macellaio
        eberhartCorkscrew:
          desc: Questo classico cavatappi mostra una qualità nettamente superiore
            a tutti gli altri che hai visto. Il manico è ergonomico e realizzato con
            legno pregiato, la spirale è in acciaio inossidabile con una rifinitura
            impeccabile.
          name: Cavatappi Eberhart
        measuringSpoonsNecklace:
          desc: Tre misurini saranno sempre a tua disposizione. Non lavabile in lavastoviglie.
          name: Collana di misurini
        florasSilverSpoon:
          name: Cucchiaio d'argento di Flora
          desc: Un cucchiaio d'argento speciale. Flora deve averlo in cucina un giorno.
            Adesso è tuo!
        simplePan:
          name: Semplice padella
          desc: Questa padella non è antiaderente, ma ti tirerà fuori dai guai.
        ovenMittens:
          name: Guanti da forno
          desc: Belli e caldi, ma non quanto le cose per cui ti serviranno.
        dullKnife:
          name: Coltello non affilato
          desc: Niente è più pericoloso di un coltello non affilato. O almeno così
            dicono.
        sharpKnife:
          name: Coltello affilato
          desc: Ha un manico rustico in legno e la lama sembra essere stata affilata
            di recente.
        rottenEggplant:
          name: Melanzana marcia (oggetto di prova)
          desc: Solo per tester. Conferisce potere illimitato.
        rottenWrentmarine:
          name: Wrentmarine marcio (oggetto di prova)
          desc: Solo per tester. Concede inventario illimitato.
        northernSpices:
          desc: Il forte aroma di queste spezie fa brontolare lo stomaco così forte
            che se fossi in missione segreta saresti spacciato.
          name: Spezie del nord
        lavaCookingPan:
          name: Padella per cottura alla lava
          desc: Questa padella è stata forgiata in un vulcano. La lava con cui è stata
            realizzata la rende sempre calda e pronta per cucinare.
        sturdyWhisk:
          name: Frusta robusta
          desc: I suoi fili d'acciaio sono saldamente fissati al manico antiscivolo,
            potresti sbattere migliaia di uova con questo.
        cuttingBoard:
          name: Tagliere
          desc: Un tagliere quadrato in legno per tagliare carne, frutta e verdura.
        largePot:
          name: Pentola grande
          desc: Realizzato in acciaio e abbastanza capiente da contenere cibo per
            una dozzina di persone.
        chefsLegApron:
          name: Grembiule da chef
          desc: Un grembiule da indossare sulla gamba, con una tasca per riporre alcuni
            utensili da cucina.
        nonSlipShoes:
          name: Scarpe antiscivolo
          desc: Non proprio alla moda, ma garantiscono una maggiore aderenza, riducendo
            il rischio di scivolare.
        flippySpatula:
          desc: Non una spatola qualsiasi, ma una spatola ribaltabile. Quante rotazioni
            riesci a fare con un solo movimento?
          name: Spatola ribaltabile
        recipeBook:
          name: Ricettario
          desc: Questo libro contiene centinaia di ricette che coprono ogni tipo di
            cucina immaginabile, da quella jarvoniana a quella di Rid Raddakian.
        spiceRackpack:
          name: Confezione di spezie
          desc: "Un'invenzione molto diffusa a Wrentmarkeen: uno zaino in cui è possibile
            riporre file di confezioni di spezie."
      crafting:
        candlehat:
          desc: 'È un cappello con una candela attaccata. Cos''altro si può desiderare?'
          name: Candelmo
        craftingGuidebook:
          desc: 'Il manuale di artigianato, un tomo di creatività senza limiti, è
            un archivio di conoscenze tramandate da generazioni di artigiani e inventori.'
          name: Manuale dell'artigiano
        grippyGloves:
          desc: 'Questi guanti offrono una presa salda su qualsiasi superficie e,
            secondo quanto si dice, aiutano a non far cadere mai viti o piccoli componenti.'
          name: Guanti antiscivolo
        magnifyingLens:
          desc: 'Uno strumento utilizzato dai maestri artigiani che cercano di svelare
            i segreti di macchinari complessi e studiare il mondo a livello microscopico.'
          name: Lente d'ingrandimento
        craftingShirt:
          name: Camicia da creazione
          desc: Una camicia perfetta per un artigiano. Facile da pulire e abbastanza
            resistente ai danni comunemente causati dagli strumenti da lavoro.
        adjustableWrench:
          name: Chiave inglese regolabile
          desc: Realizzato interamente in acciaio di alta qualità proveniente dalla
            Braemercia, il che lo rende praticamente indistruttibile.
        simpleWrench:
          desc: Uno strumento adatto per gli artigiani dilettanti.
          name: Chiave inglese semplice
        simpleChisel:
          name: Semplice scalpello
          desc: Con questo strumento puoi plasmare il mondo con una piccola spesa.
        wireSaw:
          name: Segatrice a filo
          desc: Questa sega utilizza un filo metallico per il taglio meccanico di
            materiali solidi sfusi quali pietra, legno, vetro, cemento, metalli, ecc.
            Perfetta per migliorare l'efficienza nella vostra officina.
        carvingKnife:
          name: Coltello da intaglio
          desc: Questo coltello ha una lama molto piccola e ricurva che lo rende perfetto
            per pelare pezzi di legno. Il suo manico è relativamente molto più grande.
            Usarlo per tagliare la carne (o peggio ancora il pane) sarebbe un sacrilegio
            davvero poco pratico.
        craftingPants:
          name: Pantaloni da creatore
          desc: Pantaloni larghi che rendono più comodo esercitare le tue arti artigianali.
        craftingBoots:
          name: Stivali del creatore
          desc: È dotata di una suola spessa che resiste a ore e ore di camminata
            in officina.
        slideRuler:
          name: Regolo scorrevole
          desc: Una sofisticata calcolatrice meccanica che offre funzionalità per
            eseguire calcoli complessi che ti aiutano a sviluppare le tue creazioni.
        modifiedPlatformShoes:
          name: Scarpe con plateau modificate
          desc: Alcune scarpe regolabili che consentono di impostare diverse altezze
            a proprio piacimento. Ottime per aiutare a raggiungere tutti gli oggetti
            sugli scaffali che prima erano fuori portata.
      fishing:
        fishermansHat:
          desc: 'Questo cappello è un simbolo della pazienza dei pescatori e del loro
            legame con le correnti sempre fluenti della natura.'
          name: Cappello da pescatore
        fishermansTrousers:
          desc: 'Realizzati in materiale resistente e impermeabile, offrono protezione
            dagli agenti atmosferici consentendo al contempo movimenti agili.'
          name: Pantaloni da pescatore
        bugBait:
          desc: L'insetto sarà la cena del pesce, e il pesce sarà la tua cena. Ma
            di chi sarai la cena?
          name: Esca insetto
        frozenBait:
          desc: È un pesciolino minuscolo che attira pesci più grandi. C'è una metafora
            nascosta da qualche parte...
          name: Esca congelata
        coolSunglasses:
          name: Occhiali da sole alla moda
          desc: Occhiali da sole molto eleganti che rendono molto più confortevole
            pescare sulla spiaggia al tramonto.
        breezyShirt:
          desc: Questa camicia leggera ti farà risaltare su qualsiasi spiaggia.
          name: Camicia leggera
        fishingGuidebook:
          name: Guida alla pesca
          desc: Il libro include immagini di vari pesci ed elenca le esche e gli ami
            adatti per ogni specie.
        wadingShoes:
          name: Scarpe da guado
          desc: Queste scarpe leggere sono un'ottima scelta per le avventure di pesca.
        fishingStringer:
          desc: Una corda sottile con un ago lungo e robusto all'estremità, utilizzata
            per infilzare il pesce catturato. Su questa corda è possibile infilare
            decine e decine di pesci.
          name: Filo per pesci
        anglerGloves:
          desc: Esistono davvero! Guanti leggendari con punte delle dita luminose,
            che attirano ogni tipo di presa con il loro fascino.
          name: Guanti da pesca
        fishnetShirt:
          desc: La rete da pesca è spettacolare sul tuo torso nudo sotto. Sembri un
            grazioso pesciolino rimasto intrappolato nella rete.
          name: Camicia a rete
        rustyFishingRod:
          desc: Una vecchia canna da pesca malconcia, arrugginita e con una lenza
            a malapena intatta. Può ancora essere usata per pescare, ma potrebbe non
            riuscire a catturare nemmeno un pesce!
          name: Canna da pesca arrugginita
        babyPenguinIceLure:
          desc: 'Un pinguino bambino che ha accettato di aiutarti nella pesca come
            esca vivente. La sua missione è chiara: trovare solo i pesci migliori
            per te.'
          name: Esca di ghiaccio per pinguini neonati
        squishyFlipFlops:
          name: Infradito morbide
          desc: Il morbido strato di tessuto funge da scudo tra i piedi e la sabbia
            rovente anche sulle spiagge più calde di Wrentmark.
        eyePatch:
          name: Benda sull'occhio
          desc: A quanto pare è più facile pescare con un occhio solo aperto.
        pirateHat:
          name: Cappello da pirata
          desc: Terra in vista!
        rodOfMoss:
          name: Bastone di muschio
          desc: L'anello è ricoperto di muschio.
        rustyFishingNet:
          name: Rete da pesca arrugginita
          desc: Una piccola rete da pesca, arrugginita e logora. Può ancora essere
            utilizzata per pescare, quindi meglio di niente.
        iceNetRod:
          name: Rete da ghiaccio
          desc: Una canna da pesca con una rete dall'aspetto ghiacciato intrecciata
            alla lenza per il lancio. Un design ingegnoso ideato dai pinguini per
            massimizzare la quantità di pesce di qualità che catturano.
        catchBucket:
          name: Secchio di raccolta
          desc: Un secchio di dimensioni adeguate utilizzato per riporre il pescato
            appena catturato.
        sturdyFishingRodRest:
          name: Robusto supporto per canna da pesca
          desc: Può essere conficcato nel terreno e utilizzato per sostenere una canna
            da pesca e mantenerla in posizione nell'acqua. Utile quando la pazienza
            sta per esaurirsi.
        shinySpinner:
          name: Spinner Luccicante
          desc: Quando non è utilizzato per pescare può essere utilizzato come fidget
            spinner.
      foraging:
        halflingsFeetSlippers:
          desc: 'Queste pantofole comode e affascinanti sono progettate per imitare
            i piedi pelosi degli halfling, completi di piccole dita e dettagli stravaganti.'
          name: Pantofole di mezzuomo
        hatWithAFeather:
          desc: 'La sua presenza evoca lo spirito di avventura e il fascino di terre
            lontane, promettendo che ovunque venga indossato, seguiranno sicuramente
            storie di audaci avventure.'
          name: Cappello con piuma
        blueIceSickle:
          name: Falce di ghiaccio blu
          desc: Questa falce è fatta di ghiaccio e ha un colore blu intenso, come
            il cielo limpido in una giornata estiva. Taglia come le migliori falci,
            ma raffredda la mano quando la si usa, anche se non si scioglie. Cosa
            ci faceva una falce su un ghiacciaio?
        wildernessShirt:
          name: Camicia della Natura Selvaggia
          desc: Una comoda maglietta verde abbinata a un fazzoletto rosso da collo
            che ti fa sentire in sintonia con la natura.
        camouflageCape:
          name: Cappa mimetica
          desc: Potresti anche chiamarlo mantello dell'invisibilità, dato che ti rende
            praticamente invisibile mentre vaghi alla ricerca di tesori.
        foragingShirt:
          desc: Ti mantiene fresco quando cerchi cibo in ambienti caldi, ma caldo
            in ambienti freddi.
          name: Camicia da raccolta
        dullMachete:
          name: Machete non affilato
          desc: La lama non è in buone condizioni, come se fosse già stata utilizzata
            per abbattere intere foreste.
        waterproofBoots:
          name: Stivali impermeabili
          desc: Stivali di gomma gialli come un canarino che mantengono i calzini
            asciutti. E non ci sono molte cose peggiori dei calzini bagnati.
        longSpade:
          desc: Una vanga robusta con manico in legno resistente e lama in acciaio
            inossidabile. Con questa potresti sicuramente scavare una grande buca.
          name: Vanga lunga
        bigBasket:
          name: Cesto grande
          desc: Realizzato con cura in vimini. Può contenere facilmente tutti i tuoi
            raccolti.
        sharpMachete:
          desc: La sua lama affilata come un rasoio trasforma il taglio della vegetazione
            fitta in una passeggiata nel parco.
          name: Machete affilato
        compassNecklace:
          desc: Una bussola funzionale su un cordino che puoi legare al collo. Se
            sai come usarla, potrai sempre trovare la strada di casa.
          name: Amuleto della ricerca
        pickersGloves:
          name: Guanti da raccoglitore
          desc: Comodi guanti in pelle che proteggono le mani dalle spine e da altri
            sistemi di difesa naturali durante la ricerca di tesori nascosti dal fogliame.
        wildernessGuideBook:
          desc: È ricco di consigli su come sopravvivere nella natura selvaggia, trattando
            argomenti quali animali, piante, fonti d'acqua e altro ancora.
          name: Guida alla natura selvaggia
        dragonflyCatchingNet:
          desc: Questa robusta rete su un bastone è più grande di quelle utilizzate
            per catturare insetti più piccoli. È stata progettata per facilitare la
            cattura delle veloci e bellissime libellule.
          name: Rete per catturare libellule
        simpleBugCatchingNet:
          name: Semplice rete per catturare insetti
          desc: Non è molto, ma cattura gli insetti.
        wildernessPants:
          name: Pantaloni della Natura Selvaggia
          desc: Un paio di pantaloni verdi progettati per esplorare la natura a quattro
            zampe.
        foragingShorts:
          name: Pantaloncini da raccolta
          desc: Pantaloncini resistenti e comodi, perfetti per esplorare qualsiasi
            terreno.
        pointyShears:
          name: Forbici appuntite
          desc: Usando questi strumenti, potresti trovare tesori che sono stati completamente
            ricoperti da cespugli e altro fogliame.
        nonWaterproofBoots:
          name: Stivali non impermeabili
          desc: Sebbene offrano una certa protezione dal vento e dai terreni accidentati
            durante la ricerca di cibo, non vi è alcuna garanzia che manterranno i
            vostri piedi asciutti.
        gardeningGloves:
          name: Guanti da giardinaggio
          desc: Guanti impermeabili antiscivolo perfetti per tutte le attività di
            giardinaggio come piantare, annaffiare, potare e rimuovere le erbacce.
        smallSack:
          name: Sacco piccolo
          desc: Un piccolo sacchetto di iuta che puoi portare con te e che può contenere
            un oggetto extra.
        rustySickle:
          name: Falce arrugginita
          desc: Un falcetto un tempo eccellente, ormai arrugginito. Può ancora essere
            utilizzato per la raccolta, ma non con la stessa efficacia di un tempo.
      mining:
        miningHelm:
          desc: 'Il casco da minatore, un faro nelle profondità della terra, emana
            una luce costante che squarcia l''oscurità dei regni sotterranei.'
          name: Casco da minatore
        shovelAxe:
          desc: 'Un compagno indispensabile per gli avventurieri che cercano di portare
            alla luce segreti sepolti sotto la superficie e difendersi dai pericoli
            che potrebbero presentarsi.'
          name: Pala-ascia
        handLantern:
          name: Lanterna a mano
          desc: Spero che tu abbia portato dei fiammiferi di riserva, perché se la
            candela si spegne mentre sei nelle profondità delle caverne, sei finito.
        rustyPickaxe:
          desc: Un piccone un tempo eccellente, ormai arrugginito. Può ancora essere
            utilizzato per estrarre minerali, ma non è più molto efficiente a causa
            delle sue condizioni.
          name: Piccone arrugginito
        minersShirt:
          desc: Maglietta ad alta visibilità per aiutarti a farti trovare rapidamente
            quando inevitabilmente ti perderai nei labirinti delle grotte minerarie.
          name: Camicia da minatore
        minersMagnet:
          desc: Estremamente utile per individuare metalli preziosi nascosti nelle
            pareti rocciose.
          name: Magnete da minatore
        simpleMiningShovel:
          desc: Puoi usarlo per rimuovere parte delle macerie dal terreno ricco di
            minerali, rendendo più facile individuare i minerali preziosi.
          name: Pala da miniera leggera
        miningCartpack:
          desc: Un carrello da miniera adattato per essere trasportato sulla schiena.
            Un vero e proprio passo avanti nell'innovazione.
          name: Carrello da miniera
        simpleMagnet:
          name: Magnete semplice
          desc: Puoi pescare con esso, ma non aspettarti di prendere pesci.
        simpleGoldPan:
          name: Semplice padella per l'oro
          desc: Questa padella ti aiuterà a trovare l'oro nei fiumi.
        steelToeBoots:
          name: Stivali con puntale in acciaio
          desc: Questi stivali faranno deragliare i carrelli da miniera invece di
            schiacciarti le dita dei piedi.
        minersPants:
          name: Pantaloni da minatore
          desc: Questi hanno le ginocchia imbottite, così puoi sederti comodamente
            su di essi mentre scavi alla ricerca di minerali senza farti male.
        goldPan:
          name: Padella per l'oro
          desc: Metteteci dentro alcune pietre e un po' d'acqua, agitate e i grumi
            d'oro vi appariranno.
        minersBeard:
          name: Barba del minatore
          desc: Si può davvero essere considerati minatori se non si ha la barba?
        fingerpick:
          name: Piccone da dito
          desc: Il piccone più piccolo per le rocce più piccole.
        heavyPickHandle:
          name: Manico per piccone pesante
          desc: Un manico extra robusto che può essere fissato a un piccone.
        iceAxe:
          desc: Brucia al tatto. Indossare guanti!
          name: Accetta di ghiaccio
      smithing:
        smeltingGoggles:
          desc: 'Uno scudo per gli occhi per poter guardare il bagliore accecante
            del metallo fuso.'
          name: Occhiali da fabbro
        smithsApron:
          desc: 'Copertura protettiva della fucina, il grembiule è un intreccio di
            resistenza e maestria artigianale.'
          name: Grembiule da fabbro
        simpleHammer:
          name: Martello semplice
          desc: È un martello standard. Ha una testa in acciaio e un manico in legno.
            È semplice, ma è meglio di niente.
        smithsPants:
          desc: Sebbene siano piuttosto caldi, impediranno alle tue gambe di scottarsi
            mentre trascorri l'intera giornata davanti a una fornace.
          name: Pantaloni da fabbro
        jarvonianSmithsHammer:
          desc: Martello blu ghiaccio con manico lungo, per poter imprimere una forza
            maggiore ad ogni colpo.
          name: Martello da fabbro di Jarvonia
        blacksmithsHandbook:
          desc: Il libro include immagini di varie fucine, martelli e mantici. L'arte
            della lavorazione del ferro è spiegata in modo molto dettagliato.
          name: Guida alla lavorazione del ferro
        meltdownMask:
          desc: Una maschera perfetta per la fucina. Consente una visibilità molto
            migliore e una presa quasi innata sui metalli lavorati.
          name: Maschera da fusione
        coolingIceAmulet:
          name: Amuleto di ghiaccio rinfrescante
          desc: Questo amuleto irradia un freddo costante.
        wolfJawTongs:
          desc: Con questi puoi maneggiare metalli incandescenti. Nessun lupo è stato
            danneggiato durante la realizzazione di questo articolo.
          name: Pinze mascella di lupo
        forgeBellows:
          name: Soffietto per fucina
          desc: Utilizzato per soffiare aria in una fucina, per aumentare letteralmente
            il calore.
        metalworkingGloves:
          name: Guanti per la lavorazione dei metalli
          desc: Indossando questi guanti, puoi mettere le mani in una fornace ardente
            senza procurarti vesciche. Lo stesso non si può dire per le braccia, però.
        jarvonianPoker:
          name: Poker di Jarvonia
          desc: Non è un gioco di carte, puoi tenere i vestiti addosso.
        fireResistantCloak:
          name: Mantello resistente al fuoco
          desc: Può aiutarti a proteggerti dal rischio di incendio, soprattutto dalle
            scintille vaganti. Non ti aiuterà però contro tutti gli sguardi che riceverai.
      woodcutting:
        lumberjackShirt:
          desc: 'Robusto e a quadri, è sia uno scudo contro gli elementi atmosferici
            sia una testimonianza della resilienza del boscaiolo.'
          name: Camicia da boscaiolo
        lumberjackBoots:
          name: Stivali del boscaiolo
          desc: Gli stivali da boscaiolo, una fusione di resistenza e praticità, sono
            l'abbigliamento preferito da chi sfida le terre selvagge delle foreste
            (dis)incantate.
        lumberjackSandals:
          name: Sandali da boscaiolo
          desc: Queste scarpe aperte ti fanno sentire più connesso alla natura, come
            se l'energia dell'ambiente circostante arrivasse al tuo cuore attraverso
            i piedi.
        woodcuttingGuidebook:
          desc: Questo libro contiene immagini di vari tipi di legno provenienti da
            tutti i regni.
          name: Guida al taglio del legno
        lumberjackPants:
          name: Pantaloni da boscaiolo
          desc: Per i boscaioli che dormono tutta la notte e lavorano tutto il giorno,
            questi pantaloni vanno benissimo.
        forestersPants:
          desc: Questi pantaloni verdi sono realizzati per resistere a graffi e abrasioni
            causati da rami e rametti.
          name: Pantaloni da guardaboschi
        heavyAxeHandle:
          name: Manico di ascia pesante
          desc: Un manico robusto da fissare a un'ascia.
        logBasket:
          desc: Una piattaforma di legno con una maniglia per trasportarla. Perfetta
            per trasportare alcuni ceppi, ma adatta anche per altri oggetti. Come
            un altro cesto per la legna.
          name: Cestino portalegna
        logSplitter:
          name: Spaccalegna
          desc: La lama più larga dell'ascia la rende efficace per spaccare i tronchi.
        lumberjackHat:
          name: Cappello da boscaiolo
          desc: Il cappello perfetto per le avventure nel taglio della legna.
        forestersFlannelShirt:
          name: Camicia di flanella da guardaboschi
          desc: Questa camicia di flanella verde è calda e confortevole. Ideale per
            lavorare immersi nella natura.
        forestersBoots:
          desc: Questi stivali sono quasi completamente impermeabili. Sono resistenti
            ed eleganti.
          name: Stivali da guardia forestale
        forestersHat:
          desc: Questo cappello verde, intarsiato con lana di pecora, è perfetto per
            l'inverno.
          name: Cappello da guardaboschi
        rustyHatchet:
          name: Accetta arrugginita
          desc: Un accetta un tempo potente, ormai arrugginita. È ancora utilizzabile
            per tagliare la legna, ma ha decisamente conosciuto giorni migliori.
        rootedRing:
          name: Anello di radici
          desc: L'anello è formato da radici magiche che si intrecciano tra loro.
      trinketry:
        roughSandpaper:
          name: Carta vetrata ruvida
          desc: La carta vetrata ruvida può danneggiare la pelle se la si tiene troppo
            stretta.
        gemTippedTweezers:
          name: Pinzette con punta in gemma
          desc: Un set di pinzette rinforzate con piccoli frammenti di gemme.
        prettyPliers:
          name: Pinze graziose
          desc: Un best-seller ad Erdwise! Oggi con uno sconto del 10% alla Gioielleria.
        zipPouch:
          desc: Un modo sicuro di trasportare gemme di alta qualità dal banco al mercato.
          name: Astuccio con cerniera
        gemistryGuidebook:
          name: Guida alla gemmologia
          desc: Le fonti per imparare la chimica della gioielleria.
        autoAdjustingMandrel:
          desc: Una meraviglia tecnologica di Galeforge, è difficile immaginare che
            un tempo la regolazione venisse effettuata a mano.
          name: Mandrino autoregolante
        handFile:
          name: Pratica lima manuale
          desc: Molto maneggevole, assicurati di pulire la polvere dopo l'uso.
        darWittsMonocle:
          name: Il monocolo di Dar Witt
          desc: Un cimelio di famiglia di Dar Witt, una delle famiglie più influenti
            di Blackspell Port.
    versatile:
      backpack:
        desc: 'Uno zaino in pelle di alta qualità con tasche aggiuntive e molto spazio
          per riporre oggetti.'
        name: Zaino
      bugCatchingNet:
        desc: 'È utile per catturare molti tipi di insetti, o anche... meduse?'
        name: Retino per insetti
      comfySlippers:
        desc: 'Ogni passo fatto con queste pantofole è come camminare sulle nuvole.'
        name: Pantofole comode
      fishingLure:
        desc: 'Realizzato a mano da abili artigiani, brilla di colori e motivi che
          danzano come scaglie iridescenti alla luce del sole.'
        name: Esca da pesca
      hatOfWisdom:
        desc: 'Quando viene indossato, questo cappello conferisce a chi lo indossa
          una maggiore comprensione del mondo.'
        name: Copricapo della saggezza
      mosquitoNethat:
        desc: 'Questo cappello permette a chi lo indossa di viaggiare in tutta tranquillità
          anche nelle regioni più infestate dagli insetti, concentrandosi sulle meraviglie
          della natura selvaggia.'
        name: Cappello con rete anti-zanzare
      protectiveEarmuffs:
        desc: 'Questi paraorecchie sono un simbolo di buon senso e della capacità
          di mantenere la calma anche nel caos più totale.'
        name: Paraorecchie protettivi
      recipeBook:
        desc: 'Questo libro è un compagno culinario per aspiranti cuochi, che offre
          le chiavi per svelare i sapori del mondo e creare piatti a dir poco incantevoli.'
        name: Ricettario
      snowshoes:
        desc: 'Le racchette da neve assicurano che anche nelle bufere più violente
          chi le indossa possa viaggiare senza ostacoli ed esplorare le gelide meraviglie
          del mondo.'
        name: Ciaspole
      utilityPants:
        desc: 'Pantaloni verdi con innumerevoli tasche, un capo indispensabile per
          un avventuriero completo.'
        name: Pantaloni cargo
      warmBeanie:
        desc: 'Tessuto con fili resistenti al gelo, avvolge la testa di chi lo indossa
          come un abbraccio confortante davanti al fuoco del camino.'
        name: Berretto caldo
      warmJacket:
        desc: 'Una giacca molto calda per il freddo intenso.'
        name: Giubbotto imbottito
      waterproofPants:
        desc: 'Garantiscono che chi li indossa rimanga asciutto e comodo anche sotto
          la pioggia più torrenziale o quando si attraversa una palude insidiosa.'
        name: Pantaloni impermeabili
      rustyDivingHelm:
        desc: 'Sebbene vecchio e arrugginito: questo elmo da sub sembra adatto alle
          immersioni.'
        name: Casco da palombaro arrugginito
      herbertsPants:
        desc: Un vecchio paio di jeans, di una taglia più grande della tua. Fortunatamente
          è dotato di una cintura in pelle, quindi non è un problema.
        name: Pantaloni di Herbert
      oldCopperRing:
        name: Vecchio anello di rame
        desc: Questo anello ha visto giorni migliori. Forse il banco dei pegni ti
          darà qualcosa in cambio. O forse potrai trovarne un altro uso.
      luckyRabbitsFootNecklace:
        name: Collana con piede di coniglio portafortuna
        desc: Una zampa di coniglio essiccata che porta fortuna. Usala con parsimonia.
      oldGoldRing:
        desc: Questo anello ha perso la sua lucentezza dorata e mostra chiari segni
          di deterioramento. Doveva essere importante per qualcuno.
        name: Anello antico in oro
      treeScalingClaws:
        desc: Dotato di questi artigli speciali, nessun nido di uccelli sarà fuori
          dalla sua portata.
        name: Artigli per arrampicarsi sugli alberi
      simpleLifeVest:
        name: Giubbotto di salvataggio semplice
        desc: Ideale per il kayak. È dotato di un ugello per gonfiarlo.
      herbertsCape:
        desc: È un po' impolverato, il che dimostra che Herbert non lo usa da secoli.
          Forse potresti dargli una seconda vita.
        name: Il mantello di Herbert
      adoringFanStatue:
        name: Statua di un fan adorante
        desc: "Una statua di un fan che ti adora. È un po' inquietante, ma allo stesso
          tempo stranamente lusinghiero. Puoi sentirla dire:\n<i>“Sì, oh grande e
          potente Gran Campione? Hai bisogno di qualcosa? Posso portare la tua arma?
          Lucidare i tuoi stivali? Un massaggio ai piedi, forse?”</i>"
      kelpDivingMask:
        name: Maschera da immersione di alghe
        desc: Questa maschera da sub leggera è realizzata in alghe indurite.
      ringOfBat:
        desc: Questo anello con sigillo è inciso con un pipistrello in volo.
        name: Anello del Pipistrello
      ringOfEel:
        desc: Questo anello con sigillo è inciso con un'anguilla in posizione di nuoto.
        name: Anello dell'Anguilla
      shrimpRing:
        desc: Forse Sorgo non lo saprà se l'hai venduto al negozio di gamberetti -
          ho sentito che hanno un venditore di gamberetti, ma è davvero un tipo schivo.
        name: Anello di gamberetti
      veryLongBoots:
        name: Stivali molto lunghi
        desc: A seconda della tua altezza, questi potrebbero arrivare fino agli stinchi,
          sopra le ginocchia o persino fino ai fianchi.
      trustyTent:
        desc: Questa vecchia tenda è stata utilizzata da numerosi proprietari. Viene
          sempre tramandata a chi ha bisogno di una tenda affidabile.
        name: Tenda affidabile
      sailorsHat:
        desc: Questo cappello è bianco e completamente immacolato. È un regalo di
          un tipo piuttosto magro. Quando lo avvicini al viso per indossarlo, profuma
          di sale e un po' di... spinaci?
        name: Cappello da marinaio
      flowingPocketwatch:
        desc: L'orologio esce dalla tasca quando pronunci la parola di comando. Non
          è molto affidabile nel dare l'ora.
        name: Orologio da tasca scorrevole
      ringOfAsh:
        desc: L'anello è realizzato in carbone compresso. Sebbene indistruttibile,
          lascia per sempre un segno nero sul dito su cui viene indossato.
        name: Anello di cenere
      screwdriver:
        desc: In che direzione ruotare per stringere la vite? Me lo dimentico sempre.
        name: Cacciavite
      simpleAmulet:
        desc: Una collana color ottone con un ciondolo dello stesso colore su cui
          sono incise alcune forme irregolari di colore più chiaro.
        name: Amuleto semplice
      hydriliumDivingHelm:
        desc: Questo elmo da sub è realizzato con il famoso idrilium di Syrenthia.
        name: Casco da immersione in idrilium
      herbertsShirt:
        desc: Una camicia rossa a maniche lunghe, con colletto che può essere alzato.
          Mancano alcuni bottoni, ma almeno ti permette di vestirti.
        name: La camicia di Herbert
      properHat:
        desc: Un berretto lavorato a maglia che ti aiuta a mantenere la testa fresca
          durante le tue avventure invernali.
        name: Cappello adeguato
      rustyDivingLegs:
        desc: La parte inferiore della muta da sub arrugginita è piuttosto scomoda,
          ma non lascia entrare l'acqua.
        name: Leggings da immersione arrugginiti
      pearlAmulet:
        desc: Bellissima collana di perle bianche che riflettono alla luce bagliori
          di colori traslucidi.
        name: Amuleto di perla
      properBoots:
        desc: Stivali robusti e comodi, progettati per essere eleganti e funzionali.
          Che tu stia passeggiando per Galeforge o facendo trekking nella giungla
          di Rid Raddak, questi stivali proteggeranno i tuoi piedi.
        name: Stivali adeguati
      hydriliumDivingBody:
        desc: La parte superiore di questa muta da sub è molto più leggera di quanto
          sembri. È in grado di resistere a pressioni elevate.
        name: Torso da immersione in idrilium
      oxygenTank:
        desc: La bombola che si indossa sulla schiena è riempita di ossigeno e consente
          all'utente di nuotare sott'acqua per lunghi periodi di tempo.
        name: Bombole di ossigeno
      pentafrostAmulet:
        desc: Un simbolo degli Ordinati di alto rango realizzato in ghiaccio solido
          a forma di stella a cinque punte. Dove l'hai preso?
        name: Amuleto PentaGhiacciato
      zippyKicksled:
        desc: Una slitta veloce ed efficiente per svolgere attività in zone innevate
          o ghiacciate. Particolarmente utile per lo slittino.
        name: Slitta a pedali Zippy
      flippers:
        desc: Queste pinne rendono il nuoto subacqueo veloce e divertente.
        name: Pinne
      halflingGloves:
        name: Guanti Halfling
        desc: Guanti molto usati dagli halfling, calzano perfettamente sulle mani
          di dimensioni normali.
      lifeVest:
        name: Giubbotto di salvataggio
        desc: La missione di questo giubbotto è quella di salvarti la vita. Consideralo
          il tuo angelo custode.
      sharkToothNecklace:
        name: Collana con dente di squalo
        desc: Niente comunica meglio il messaggio “Combatto a mani nude contro gli
          squali” di una collana con i loro denti incastonati.
      firefliesInJar:
        name: Lucciole in un barattolo
        desc: Un modo molto creativo e naturale per illuminare il tuo cammino. Non
          hanno una parola di comando per spegnerli.
      jellyfishingNet:
        name: Rete per la pesca delle meduse
        desc: Il giorno più bello della vita!
      herbertsBoots:
        name: Gli stivali di Herbert
        desc: Stivali di pelle molto consumati che avrebbero bisogno di una lucidata,
          ma sono comunque degli stivali da lavoro decenti.
      herbertsHat:
        name: Il cappello di Herbert
        desc: Un cappello di lana marrone che ti terrà al caldo anche le orecchie.
          Non è vecchio, è vintage.
      simpleRing:
        name: Anello semplice
        desc: Un anello lucido color ottone. Non presenta dettagli intricati né gemme
          preziose, ma la sua semplicità lo rende elegante.
      properShirt:
        name: Camicia adeguata
        desc: Una camicia dall'aspetto gradevole, ma senza eccessi. Adatta a qualsiasi
          occasione informale.
      properPants:
        name: Pantaloni adeguati
        desc: Non vorrai macchiarli, sono davvero eleganti!
      properCape:
        name: Cappa adeguata
        desc: Un elegante mantello che aggiunge un tocco di eleganza al tuo outfit,
          perfetto per eventi formali o quando vuoi fare una dichiarazione di moda
          audace.
      smellySocks:
        name: Calzini puzzolenti
        desc: I calzini perfetti per liberare un elfo.
      capeOfTheTrailblazer:
        name: Capo del pioniere
        desc: Questo mantello è un simbolo del coraggio e della determinazione dei
          pionieri, promettendo che ovunque venga indossato, seguiranno sicuramente
          storie di audaci avventure.
      rustyDivingBody:
        name: Torso arrugginito da immersione
        desc: Questa è la parte superiore di una vecchia muta da sub, è pesante da
          indossare.
      kelpDivingBody:
        name: Maglietta da immersione di alghe
        desc: La maglia da immersione in alghe marine aderisce perfettamente al corpo.
      kelpDivingLegs:
        name: Pantaloni da immersione in alghe
        desc: Questi pantaloni da immersione sono aderenti alle gambe, ma non si avverte
          quasi alcuna resistenza dell'acqua.
      hydriliumDivingLegs:
        name: Leggings da immersione in idrilium
        desc: La parte inferiore della muta da sub in idrilium. Nonostante il suo
          aspetto pesante, è facile muoversi indossandola.
      finGloves:
        name: Guanti con pinne
        desc: Questi guanti hanno delle pinne simili a quelle dei pesci sui lati per
          facilitare il nuoto in acqua.
      merfolkDress:
        name: Abito da tritone
        desc: Il vestito aderisce perfettamente al corpo, stringendo le gambe quasi
          come se fossero un unico elemento.
      algaeRing:
        name: Anello di alghe
        desc: L'anello ha un enorme pezzo di alga attaccato che si muove come se fosse
          sott'acqua anche quando sei in superficie.
      coralCape:
        name: Cappuccio corallo
        desc: Il mantello è tessuto con coralli di diversi colori. È comodo da indossare
          sia sott'acqua che in superficie.
      tentacleCrown:
        name: Corona tentacolare
        desc: I tentacoli sulla corona continuano a muoversi e a torcersi rendendo
          piuttosto scomodo indossarlo.
      shellSnatcher:
        name: Ladro di conchiglie
        desc: Lo strumento perfetto per raccogliere le conchiglie. Vibra quando ci
          sono conchiglie nelle vicinanze.
      glowstick:
        name: Bastoncino luminoso
        desc: Agitando rapidamente il bastoncino, è possibile farlo brillare di un
          colore verde brillante.
      aerofibrilCape:
        name: Cappa do aerofibril
        desc: Il mantello piumato, intarsiato con filo aerodinamico, ti permette di
          andare davvero veloce.
      oldSilverRing:
        name: Anello antico in argento
        desc: Questo anello ha perso l'incisione e appare annerito. Chissà da quanto
          tempo è qui?
      ringOfHeron:
        name: Anello dell'Airone
        desc: Questo anello con sigillo è inciso con un airone in posizione di caccia.
    achievements:
      ringOfHomesickness:
        desc: Questo anello ti ricorda che non c'è posto come casa tua.
        name: Anello della Nostalgia di Casa
      shoesOfEscape:
        name: Scarpe della fuga
        desc: Queste scarpe ti permettono di andare molto veloce di tanto in tanto.
      pathfinder:
        name: Esploratore
        desc: Alla collana è attaccata una mappa in miniatura che mostra il percorso
          più breve.
      capeOfHalfAchiever:
        desc: Questo magnifico mantello blu rappresenta qualcuno pieno di determinazione
          nel raggiungere la grandezza.
        name: Capo del Mezzo Raggiunto
      bootsOfSpeed:
        desc: Grazie a queste scarpe i tuoi piedi saranno più leggeri e il tuo passo
          più veloce.
        name: Stivali da velocità
      absorbingAmulet:
        desc: Questo amuleto, realizzato in metallo antico, è noto per attrarre oggetti
          di pregio.
        name: Amuleto assorbente
      gemBracelet:
        desc: Sei gemme colorate formano un braccialetto.
        name: Bracciale con gemme
      omniTool:
        desc: Questo strumento, che può essere fissato all'avambraccio, è progettato
          per assistere l'utente in varie attività su suo comando.
        name: Omni-strumento
      capeOfAchiever:
        name: Capo dei Realizzatori
        desc: Il mantello color rosa suscita l'interesse di chiunque lo veda. Il proprietario
          del mantello ha realizzato ciò che altri possono solo sognare.
      adventurersBoots:
        desc: Questi robusti stivali sono realizzati per resistere a un uso intensivo
          e a condizioni climatiche avverse.
        name: Stivali da avventuriero
      amuletOfLightness:
        desc: Questo amuleto irradia una luce brillante e ti riempie di speranza anche
          nei luoghi più bui.
        name: Amuleto della luminosità
      adventurersPants:
        name: Pantaloni da avventuriero
        desc: Questi pantaloni in pelle resistente sono dotati di varie cinghie, sia
          per motivi pratici che estetici.
      runningVisor:
        desc: Questa visiera rossa protegge gli occhi dal sole, consentendo comunque
          alla testa di rinfrescarsi attraverso la parte superiore.
        name: Visiera da corsa
      axeOfDestruction:
        desc: La lama di questa ascia ha la forma di una bocca pronta a divorare il
          legno.
        name: Ascia della distruzione
      shinyRing:
        desc: Non è l'anello più elegante, ma è sicuramente brillante.
        name: Anello brillante
      trashGrabber:
        desc: Il design di questo strumento allungato rende facile raccogliere i rifiuti
          senza doversi chinare.
        name: Pinza per rifiuti
      trekkingPoles:
        desc: Questi bastoncini aiutano a mantenere l'equilibrio e ad attraversare
          terreni accidentati.
        name: Bastoncini da trekking
      treasureHunterJacket:
        desc: Sembra essere una classica giacca di pelle che non passa mai di moda.
        name: Giacca da cacciatore di tesori
      travelersKit:
        name: Kit da viaggio
        desc: Questa valigia è piena di tutto l'essenziale per qualsiasi destinazione
          di viaggio.
      adventurersHat:
        name: Cappello da avventuriero
        desc: Questo cappello a secchiello in pelle ti proteggerà dal sole, dal vento
          e dalla pioggia.
      adventurersShirt:
        name: Camicia dell'avventuriero
        desc: Questa camicia in pelle è di colore marrone chiaro e ha diverse tasche
          per riporre oggetti.
      adventurersGloves:
        name: Guanti da avventuriero
        desc: Questi guanti in pelle hanno un cinturino regolabile per una vestibilità
          perfetta.
      adventurersCape:
        name: Cappa dell'avventuriero
        desc: Questo resistente mantello in pelle proteggerà chi lo indossa dalle
          intemperie. È dotato di cinturini per una facile regolazione.
      otherSock:
        name: Altro calzino
        desc: L'altro calzino che non hai dato a Dobby.
      tinyBackpack:
        name: Zainetto piccolo
        desc: È uno zaino di dimensioni normali se sei un bambino.
      rustySpyglass:
        name: Cannocchiale arrugginito
        desc: Uno strumento ben utilizzato, come questo cannocchiale arrugginito,
          ha un certo fascino.
      pantsOfHaste:
        name: Pantaloni della fretta
        desc: Devo andare veloce!
      treasureHunterHat:
        name: Cappello da cacciatore di tesori
        desc: Sebbene non sia chiaro se si tratti di un cappello da cowboy o di un
          fedora, sicuramente trasmette quella caratteristica atmosfera alla “Indy”.
      treasureHunterPants:
        name: Pantaloni da cacciatore di tesori
        desc: Questi pantaloni aderenti in pelle mettono in risalto i muscoli delle
          gambe.
      jugglingBalls:
        name: Palle da giocoleria
        desc: Tre palline multicolori riempite di grani sono l'oggetto ideale per
          fare giocoleria.
      greedyPiggyBank:
        name: Salvadanaio avido
        desc: Ogni volta che ci si lascia cadere dentro una moneta, questo salvadanaio
          dorato emette un forte cigolio.
      conservationistHat:
        desc: Questo cappello blu offre una buona protezione dagli elementi.
        name: Cappello dell'Ambientalista
      conservationistShirt:
        name: Maglia dell'Ambientalista
        desc: Questa maglietta offre comfort e tasche extra per riporre le tue scoperte.
      conservationistShorts:
        name: Pantaloni dell'Ambientalista
        desc: Questi pantaloncini ti permettono di muoverti liberamente e sono dotati
          di ampie tasche per gli attrezzi.
      conservationistBoots:
        name: Stivali dell'Ambientalista
        desc: Questi stivali blu sono comodi e resistenti.
      cursedAwl:
        desc: All'utilizzo, il punteruolo emana fumo in sfumature di blu e violetto.
        name: Punteruolo Maledetto
      rockstarAmulet:
        name: Amuleto delle Rock-star
        desc: Questo amuleto o è una roccia a forma di stella o una stella a forma
          di roccia.
      finePearlRing:
        name: Anello di perla raffinato
        desc: Una perla del genere è solitamente utilizzata per degli orecchini, ma
          è eccellente anche come anello.
      treasureGrabber:
        name: Afferratore di tesori
        desc: Non è mai stato così facile raccogliere forzieri leggermente fuori portata
          da qualsiasi luogo mentre si fa qualsiasi cosa.
    agGuildSpecials:
      ghostTrapPack:
        desc: Il grosso zaino è provvisto di un tubo che viene utilizzato per catturare
          particelle fantasma.
        name: Pacchetto trappola fantasmi
      bertssuperskis:
        name: Super sci di Bert
        desc: Questi sci sono i più veloci quando usati sulla super neve.
      sethsSwampCompass:
        name: Compasso della palude di Seth
        desc: Il compasso punta sempre verso il centro della palude, una necessità
          per ogni avventuriero che si rispetti.
    supporter:
      woodpucker:
        name: Arriccialegno
        desc: <i>“Preparati a dominare sia il ghiaccio che la foresta con il leggendario
          bastone da hockey Woodpucker. Realizzato per garantire prestazioni d'élite
          sul ghiaccio e non solo, questo bastone innovativo è dotato della tecnologia
          TimberTech, una tecnologia all'avanguardia che gli consente di fungere anche
          da potente strumento per tagliare gli alberi.”</i>
      crustaceanCall:
        name: Richiamo dei crostacei
        desc: <i>“Il richiamo della carcinizzazione scorre anche dentro di te, peccato
          che tu non sia un crostaceo.”</i>
      sleeperFishingPole:
        name: Canna da pesca del Dormiente
        desc: <i>"Questa innocua canna da pesca era un tempo la preziosa compagna
          di un pescatore itinerante. Molti maghi usano i loro poteri per perseguire
          la conoscenza o il potere, ma questo mago in particolare usava la sua magia
          per rintracciare, inseguire e catturare alcune delle creature più leggendarie
          degli abissi."</i>
      lavendersInsight:
        name: L'intuizione di Lavender
        desc: <i>"Un comodo cappello creato per la giovane maga Lavender da suo padre
          Blake. Egli vi incise delle rune per permetterle di comprendere meglio il
          viaggio che l'attendeva. Inoltre, queste gli consentono di controllare sua
          figlia di tanto in tanto."</i>
      doctuhsLuckyCharm:
        name: Il portafortuna del dottore
        desc: <i>"Trovato su un corpo congelato incredibilmente lontano, oltre il
          ghiacciaio Winter Waves... accanto a una falce artigianale."</i>
      ringOfPandemonium:
        desc: <i>"Tendiamo a sopravvalutare le cose che possiamo misurare e a sottovalutare
          quelle che non possiamo misurare."</i>
        name: Anello del pandemonio
      theKakesWalkingStick:
        name: Bastone da passeggio VogliaDiViaggiare
        desc: <i>«Devi andare. Nessun ospite può rimanere per sempre nello stesso
          posto. L'amore andrà perduto se rimani troppo a lungo seduto davanti al
          fuoco di un amico».</i>
      flatpackShark:
        desc: <i>"Ora il mio dolce cerbiatto è scomparso\nDove vanno i cigni e le
          tartarughe"</i>
        name: Squalo imballato in pacchi piatti
      stickyFingerShorts:
        name: Pantaloncini con tasche posteriori
        desc: <i>"Non si sa mai cosa Riku abbia messo in queste tasche!"</i>
      alienSqueakyToy:
        name: Giocattolo cigolante alieno
        desc: <i>"Il giocattolo preferito di un cucciolo di nome Emery. Quando lo
          tiene in mano, ti segue ovunque e ti aiuta a cercare il tesoro."</i>
    regional:
      jarvonia:
        frostTouchedGauntlets:
          name: Guanti ricoperti di brina
          desc: Questi guanti sono freddi all'esterno, ma in qualche modo sembrano
            comunque caldi all'interno.
        handWarmingPack:
          name: Impacco riscaldante per le mani
          desc: Una piccola confezione che, una volta ruotata, si riscalda. Può anche
            essere riutilizzata!
        knittedMittens:
          name: Guanti lavorati a maglia
          desc: Questi guanti sono lavorati a maglia con diversi tipi di lana, creando
            splendidi motivi bianchi e blu.
        perfectSnowballs:
          name: Palle di neve perfette
          desc: Non semplici palle di neve, ma palle di neve perfettamente rotonde,
            pronte per essere lanciate contro qualcuno.
        frostTouchedBoots:
          name: Stivali ricoperti di brina
          desc: Questi stivali in metallo argentato brillano di una tonalità blu.
        frostTouchedLeggings:
          name: Leggings ricoperti di brina
          desc: Questi insoliti leggings metallici donano a tutto ciò che li circonda
            una brillantezza blu.
        frostTouchedTorso:
          name: Torso ricoperto di brina
          desc: Questo imponente torso metallico riflette la luce circostante con
            un'aura bluastra.
        frostTouchedHelm:
          name: Elmo toccato dal gelo
          desc: Un elmo metallico ideale per le esplorazioni più profonde nelle miniere
            di Jarvonian.
        wintryPan:
          name: Padella invernale
          desc: Si dice che questa padella metallica bluastra, originariamente utilizzata
            solo per la ricerca dell'oro, attiri le gemme.
      trellin:
        croaker:
          desc: Uno speciale strumento musicale a forma di rana che tiene in mano
            un bastoncino. È possibile staccare il bastoncino e farlo scorrere lungo
            le spine sulla parte superiore dello strumento per produrre un suono simile
            al gracidio di una rana.
          name: Ombrina
        bugAttractingIncense:
          name: Incenso che attira gli insetti
          desc: Questo bastoncino d'incenso verde è molto popolare tra gli entomologi
            locali.
        bugRepellingIncense:
          name: Incenso repellente per insetti
          desc: Questo bastoncino di incenso rosso profuma di eucalipto, che si dice
            abbia proprietà repellenti contro gli insetti.
        firestarter:
          name: Piromane
          desc: Sei un piromane, un piromane perverso.
        lindenLeafBoots:
          desc: Indossandole, sembra che tu abbia due cespugli frondosi ai piedi.
          name: Stivali in foglia di tiglio
        lindenLeafHat:
          name: Cappello in foglie di tiglio
          desc: Solo i più rinomati abitanti di Trellin possiedono un cappello di
            foglie come questo. Da esso spunta persino un ramo dei loro famosi grappoli
            d'uva regionali.
        lindenLeafShorts:
          name: Pantaloni in foglia di tiglio
          desc: Questi pantaloncini ricoperti di foglie ti fanno sentire come un cespuglio.
            Sono anche piuttosto poco pratici per proteggerti dai graffi causati dai
            ramoscelli e dall'erba alta.
        lindenLeafGloves:
          name: Guanti in foglia di tiglio
          desc: Questi guanti fanno sembrare le tue dita dei piccoli ramoscelli.
        lindenLeafVest:
          name: Gilet in foglia di tiglio
          desc: Sebbene sia un costume da cespuglio piuttosto voluminoso, le foglie
            e i rami sono sorprendentemente comodi. Nel peggiore dei casi, possono
            solleticare il collo.
        fungalBackpack:
          name: Zaino fungo
          desc: Questo zaino verde è ricoperto da funghi blu leggermente luminosi.
        trellinBeaver:
          name: Castoro di Trellin
          desc: Li chiamano la soluzione low-tech per il taglio della legna, basta
            ricompensarli per stare dalla loro parte. Gli alberi apprezzerebbero se
            tenessi stretto il loro guinzaglio a catena.
      erdwise:
        royalTraubadourBoots:
          name: Stivali da menestrello reale
          desc: Non saranno dello stesso colore, ma sono sicuramente eleganti.
        royalTraubadourGloves:
          name: Guanti da menestrello reale
          desc: Guanti di seta gialli, che facilitano la manipolazione delle monete.
        royalTraubadourPantaloons:
          name: Pantaloni da menestrello reale
          desc: I pantaloni dai colori diversi sembrano strani all'inizio, ma in realtà
            sono molto di moda nelle città di Edrwiss.
        royalTraubadourHat:
          name: Cappello da menetrello reale
          desc: Tutti i nobili della corte rivolgono lo sguardo verso qualcuno che
            indossa un cappello come questo.
        royalTraubadourCapesuit:
          desc: Questa tunica colorata ha un elegante mantello cucito direttamente
            su di essa. Nessuno ti impedisce di indossarne un altro, però.
          name: Cappa da menestrello reale
        makeupset:
          name: Set trucco
          desc: Molti commercianti di Erdwiss non escono mai di casa senza un leggero
            trucco.
        looseChangePouch:
          name: Borsa portamonete
          desc: La vita quotidiana a Erdwise spesso comporta la necessità di avere
            monete sparse per tutti gli scambi commerciali. Una borsa come questa
            è essenziale per i residenti della città.
        inkPen:
          name: Penna a inchiostro
          desc: Questo è ciò che ti serve per firmare documenti importanti. Non dimenticare
            di leggere le clausole scritte in piccolo!
        chromeWool:
          name: Lana cromata
          desc: La lana di cromo abrasiva come questa è nota per essere perfetta per
            lucidare gemme e metalli rari in pochissimo tempo.
      syrenthia:
        merfolkDanceLeglets:
          desc: Questi gambaletti vengono solitamente indossati durante le danze delle
            sirene, poiché conferiscono maggiore mobilità ai piedi.
          name: Gambaletti da danza dei tritoni
        merfolkDanceSkirt:
          name: Gonna da ballo dei tritoni
          desc: Questa gonna fluida sarebbe considerata alta moda, anche nelle comunità
            superficiali.
        merfolkDanceCirclet:
          desc: Questo cerchietto di metallo argentato ha una bellissima gemma proprio
            al centro. Riesce a rimanere al suo posto anche con forti correnti che
            danzano sott'acqua.
          name: Diadema da danza dei tritoni
        merfolkDanceBracers:
          desc: Sebbene tradizionalmente utilizzati per la danza dei tritoni, questi
            accessori aggiungono fluidità a qualsiasi attività.
          name: Bracciali da ballo dei tritoni
        bubbleBauble:
          name: Pallina di Natale
          desc: Molti Syrentiani sembrano andare alla moda con questo strano accessorio
            che si attacca alla borsa.
        pearlBracelet:
          name: Bracciale di perle
          desc: Questo splendido braccialetto di perle bianche riflette alla luce
            bagliori di colori traslucidi.
        merfolkShellBra:
          name: Coperture a conchiglia dei tritoni
          desc: Due conchiglie che si attaccano molto facilmente al busto.
        merfolkDanceCorslet:
          name: Corpetto da danza dei tritoni
          desc: Capo di abbigliamento coordinato per il busto che incarna lo spirito
            danzante dei tritoni.
      halfling:
        mossChewie:
          desc: Una pallina di muschio masticabile. Gli “estranei” credono che faccia
            male alla salute, ma gli halfling la masticano sin dalla notte dei tempi.
          name: Masticatore di muschio
        bogwoodShorts:
          desc: Questi pantaloncini marroni e verdi offrono una grande libertà di
            movimento alle gambe, perfetti per quando sei immerso nel gioco e stai
            tagliando assi.
          name: Pantaloncini in legno di palude
        lilStool:
          name: Sgabello Lil
          desc: Un pratico sgabello in legno per quando hai bisogno di raggiungere
            gli scaffali più alti.
        fingersaw:
          name: Seghetto manuale
          desc: La sega più piccola per le tavole più piccole.
        bogwoodBoots:
          name: Stivali di legno di palude
          desc: Questi stivali sono robusti e realizzati per garantire il massimo
            comfort durante il lavoro in condizioni di fango.
        bogwoodGloves:
          name: Guanti in legno di palude
          desc: Questi guanti garantiscono una presa salda su tutti i tipi di materiali
            in legno con cui si potrebbe lavorare.
        bogwoodVest:
          name: Gilet in legno di palude
          desc: Questo gilet verde ha delle cinghie marroni che attraversano il petto.
        bogwoodBandana:
          name: Bandana in legno di palude
          desc: Una bandana verde per tenere lontano il sudore mentre si lavora al
            mulino. Solo i più rispettabili possono indossarla.
        lilyPadRope:
          name: Corda di ninfee
          desc: Uno strumento unico dei halfling costituito da una ninfea in fiore
            attaccata a una corda ricavata dal suo stelo. Ottimo per liberarsi quando
            si rimane impantanati nella palude.
        whollyRing:
          name: Anello intero
          desc: Si dice che questo anello provenga dall'unione di due halfling che
            si sono sposati nelle paludi. Stranamente raccontata sia come storia d'amore
            che come storia dell'orrore, sembra dipendere da chi la racconta.
    combat:
      swashbucklerSword:
        name: Spada da spadaccino
        desc: La spada ricurva è perfetta per le battaglie navali. Per essere efficace
          in combattimento richiede una tecnica di taglio.
  materials:
    carpentry:
      birchPlank:
        desc: 'Liscia e dal colore pallido, la tavola di betulla è un esempio di semplicità
          ed eleganza grazie il suo aspetto chiaro e pulito.'
        name: Tavola di betulla
      maplePlank:
        desc: 'Estetica e invitante, la tavola in acero vanta una superficie liscia
          e di colore chiaro, aggiungendo un tocco di raffinatezza a qualsiasi progetto.'
        name: Tavola di acero
      oakPlank:
        desc: 'Una scelta senza tempo per progetti di falegnameria, caratterizzata
          dalla sua ricca tonalità terrosa e dai venature evidenti e intricate.'
        name: Tavola di quercia
      pinePlank:
        desc: 'Caratterizzata da tonalità calde e terrose, la tavola di pino emana
          un fascino rustico grazie alle sue eleganti venature.'
        name: Tavola di pino
      sprucePlank:
        desc: 'Caratterizzata da raffinate venature, la tavola in abete incarna un
          senso di eleganza grazie al suo aspetto pulito e classico.'
        name: Tavola di abete rosso
      willowPlank:
        desc: Con il suo aspetto delicato e pallido e la sue venature sottile, la
          tavola di salice conferisce un tocco di bellezza eterea ai vostri progetti
          di falegnameria.
        name: Tavola di salice
      bambooPlank:
        desc: Ci è voluto un po' di lavoro, ma questa tavola flessibile è stata trasformata
          in un elemento strutturale.
        name: Tavola di bamboo
      woodScrap:
        desc: Alcuni scarti di legno di bassa qualità.
        name: Scarto di legno
      woodShaving:
        desc: Alcuni scarti di legno di media qualità.
        name: Trucioli di legno
      woodFragment:
        desc: Alcuni scarti di legno di alta qualità.
        name: Frammenti di legno
      teakPlank:
        name: Tavola di teak
        desc: Noto per la sua durevolezza e la sua lucente tonalità marrone-dorata,
          il legno di teak è la scelta migliore per realizzare creazioni robuste ed
          eleganti.
      mangrovePlank:
        name: Tavola di mangrovia
        desc: Robuste e resistenti alle intemperie, le assi di mangrovie sono la scelta
          perfetta per la falegnameria da esterno, perché uniscono la resistenza al
          fascino tropicale.
      coralPlank:
        name: Tavola di corallo
        desc: Una tavola realizzata con i coralli più grandi. È robusta sia in superficie
          che sott'acqua.
      elmPlank:
        name: Tavola di olmo
        desc: Una tavola di olmo, utile per la realizzazione di archi da tiro.
      yewPlank:
        name: Assi di tasso
        desc: Una tavola che vanta la sua facilità di essere lavorata in vari scenari
          pur rimanendo resistente.
      mahoganyPlank:
        name: Assi di mogano
        desc: Una tavola di alta qualità che può essere utilizzata in tutti i tipi
          di costruzioni durevoli.
    cooking:
      milk:
        desc: 'Direttamente dalla mucca, dalla capra o dal cammello. O spremuto da
          qualche noce? Solo tu sai dove l''hai trovato.'
        name: Latte
      salt:
        desc: 'Il sale è l''esaltatore di sapidità più diffuso in tutta l''Arenum.'
        name: Sale
      carrot:
        desc: Si dice che questo aiuti la vista.
        name: Carota
      honey:
        name: Miele in favo
        desc: Questo favo grezzo è pieno di miele fresco.
      mushroom:
        name: Fungo
        desc: Questo fungo è tecnicamente un vegetale.
    foraging:
      acidSapling:
        desc: 'Grande appena quanto un ramoscello, questo alberello marroncino può
          ustionarti la pelle al sol tocco.'
        name: Piantina acida
      catsBell:
        desc: 'Un semplice stelo con tre bulbi gialli che emette un suono seducente
          quando mosso dal vento.'
        name: Campanella del gatto
      cotton:
        desc: Materiale soffice e lanuginoso. Offre un tocco delicato e una sensazione
          di comfort.
        name: Cotone
      deathsToll:
        desc: 'Potrebbe sembrare invitante, ma non lo consumerei in questa forma.'
        name: Tocco della morte
      flax:
        desc: Pianta dai delicati fiori blu che produce fibre forti e resistenti.
          Perfetta per la produzione di lino.
        name: Lino
      hemp:
        desc: Pianta alta e frondosa con steli sottili, rinomata per le sue fibre
          versatili e i suoi innumerevoli usi pratici.
        name: Canapa
      iceplum:
        desc: Piccolo frutto dall'esterno ghiacciato, brilla con sfumature viola.
        name: Pescaneve
      moondaisy:
        desc: Un fragile fiore che risplende al chiaro di luna nelle notti più buie.
        name: Margherita lunare
      nettle:
        desc: Pianta alta e snella munita di foglie a forma di cuore e fortemente
          urticante.
        name: Ortica
      nightgem:
        desc: 'Questa gemma scura sembra assorbire magneticamente tutta la luce circostante.'
        name: Gemma notturna
      rotbud:
        desc: 'Come il tartufo richiama il maiale, il germoglio putrido chiama gli
          halfling delle Grandi Paludi.'
        name: Germoglio putrido
      shadowLeaf:
        desc: 'La foglia scura si sbriciola quasi del tutto se sfiorata o se la luce
          la colpisce. Conservare al buio.'
        name: Foglia ombra
      silkwormSilk:
        desc: 'Una seta così ricercata che potrebbe richiedere la costruzione di una
          rotta commerciale attraverso l''intero continente.'
        name: Seta grezza
      snowdrop:
        desc: Un piccolo fiore bianco a campanella che sboccia nel cuore dell'inverno.
          È simbolo di rinascita e speranza.
        name: Bucaneve
      starflower:
        desc: 'Una luminosa stella a cinque punte che poggia su uno stelo frondoso.
          È consuetudine esprimere un desiderio ogni volta che se ne trova una.'
        name: Fiorestella
      stone:
        desc: Una roccia. Forse puoi crearci qualcosa per aiutarti a sopravvivere?
        name: Pietra
      sunblossom:
        desc: Bellissima infiorescenza sui cui petali dorati viene riflessa la luce
          solare.
        name: Solbocciolo
      thistle:
        desc: Pianta robusta munita di foglie appuntite le quali forniscono protezione
          ai suoi coloratissimi fiori.
        name: Cardo
      widowsKiss:
        desc: 'C''è una sensazione inquietante di morbosa paura che ti circonda mentre
          ti avvicini a questo fiore, forse è meglio mantenere le distanze.'
        name: Bacio della vedova
      woodenStick:
        desc: Un pezzo di legno appuntito. Forse puoi crearci qualcosa per aiutarti
          a sopravvivere?
        name: Bastone di legno
      berries:
        desc: Saranno utili per tenervi ragionevolmente sazi in caso di necessità,
          oppure potete usarli come ingrediente per le vostre creazioni culinarie.
        name: Bacche di bosco
      kelp:
        name: Alga
        desc: Le alghe sono note per i loro molteplici utilizzi, sia nella fabbricazione
          di attrezzature resistenti ma elastiche, che nella preparazione di deliziosi
          piatti di mare.
      sweetKelp:
        name: Alga dolce
        desc: L'alga dolce ha un sapore zuccherino e viene utilizzata nella cottura
          subacquea, conferendo alle pietanze un sapore unico e indimenticabile.
      hardenedKelp:
        name: Alga coriacea
        desc: Attraverso l'impiego di varie tecniche, l'alga comune può essere indurita
          diventando un materiale ricercato per la produzione di oggetti.
      seaCabbage:
        name: Cavolo di mare
        desc: Alimento popolare che cresce sott'acqua. Gli abitanti di Syrenthia lo
          utilizzano per preparare il cavolo marino.
      seaSpinach:
        name: Spinaci di mare
        desc: Una pianta commestibile, molto nutriente e gustosa. Non ha affatto il
          sapore dei normali spinaci.
      underwaterLotus:
        name: Loto degli abissi
        desc: Una pianta spesso citata nella poesia di Syrenthia. Nota per la sua
          bellezza e grazia.
      saltyHops:
        name: Luppolo salato
        desc: Il luppolo salato si usa per la produzione di malto salato.
      cucumber:
        name: Cetriolo
        desc: Quanto costa questo dalle tue parti?
      wheat:
        name: Frumento
        desc: Il cereale grazie al quale prosperano la maggior parte delle civiltà.
      grass:
        name: Erba
        desc: Una rigogliosa zolla di erba verde.
      pepper:
        name: Pepe
        desc: Piccole palline di pepe rotonde e non macinate.
      mud:
        name: Fango
        desc: Un pezzo di fango bagnato e viscido. Non importa quanto attentamente
          lo maneggi, ti sporchi.
      milkweed:
        name: Oleandro
        desc: Una pianta fiorita nota per la sua linfa lattiginosa. Farfalle e bruchi
          ne vanno matti!
      wildRice:
        name: Riso selvatico
        desc: Erba selvatica che produce un cereale sottile e scuro.
      waterLotus:
        desc: Un fiore di loto che galleggia sulla superficie dell'acqua. Solitamente
          accompagnato da ninfee.
        name: Loto d'acqua alta
      ironweed:
        desc: Una pianta forte e resistente, le cui proprietà la rendono molto utile
          in diverse applicazioni.
        name: Fildiferro
      cattail:
        name: Code di Gatto
        desc: Una pianta dal fusto lungo con un grappolo all'estremità. Un gatto,
          giusto? Probabilmente non è commestibile.
      loverose:
        name: Rosa canina
        desc: Si dice che avvicini coloro che provano sentimenti forti l'uno per l'altro.
    mining:
      coal:
        desc: Modesto e senza pretese, il carbone è sempre sinonimo di energia.
        name: Carbone
      copperOre:
        desc: Il colore rossastro del rame lo rende facilmente riconoscibile.
        name: Rame grezzo
      farganiteOre:
        desc: Con la sua forza ineguagliabile e l'accattivante colore blu, la farganite
          è simbolo di volontà ferrea.
        name: Farganite grezza
      ironOre:
        desc: Il minerale di ferro ha un aspetto grezzo e ruvido al tatto, ciò rispecchia
          la sua natura di materiale comune e resistente.
        name: Ferro grezzo
      tarsiliumOre:
        desc: La superficie liscia del tarsilio riflette la luce illuminando ciò che
          ha intorno con un bagliore quasi magico.
        name: Tarsilio grezzo
      tinOre:
        desc: Semplice e senza pretese, il minerale di stagno mostra immediatamente
          la propria struttura.
        name: Stagno grezzo
      saltCrystal:
        name: Cristallo di sale
        desc: Versatile una volta finemente macinato, crea bellissime forme intricate
          nella sua forma grezza.
      goldNugget:
        name: Pepita d’oro
        desc: L'oro è uno dei metalli più preziosi, spesso utilizzato nella creazione
          di gioielli.
      silverNugget:
        name: Pepita d’argento
        desc: L'argento è un metallo molto prezioso, spesso utilizzato nella creazione
          di gioielli come anelli, amuleti e orecchini.
      opal:
        name: Opale grezza
        desc: Questa delicata gemma, ancora circondata dalla sabbia e dal fango in
          cui si è formata, custodisce un fuoco interiore che aspetta solo di essere
          svelato.
      ethernite:
        name: Eternite grezza
        desc: Un cristallo viola frastagliato cresciuto all'interno di un geode. Fissarlo
          troppo a lungo ti crea inquietudine.
      jade:
        name: Giada grezza
        desc: Questa dura roccia ultrabasica risuona cristallina quando viene colpita
          da un piccone.
      topaz:
        name: Topazio grezzo
        desc: Una gemma grezza con una leggera sfumatura dorata, in attesa di essere
          tagliata per ottenere qualcosa di abbagliante.
      sunStone:
        name: Pietra del sole grezza
        desc: Questa rara pietra preziosa bicolore sembra un frammento del sole stesso,
          ed emana un bagliore smorzato anche allo stato grezzo.
      ruby:
        desc: Un minerale color cremisi emerge dall'interno della roccia, affascinante
          nella sua bellezza e semplicità
        name: Rubino grezzo
      wrentmarine:
        name: Acquamarina grezza
        desc: Osservando questa roccia grezza si può scorgere un lampo di blu al suo
          interno, come la luce del sole riflessa da un'onda.
      starPearl:
        name: Perla stellare grezza
        desc: Una perla grezza e non lucidata, ma con il potenziale per diventare
          qualcosa di veramente prezioso.
      largeStone:
        name: Macigno
        desc: Una pietra più grande del normale.
      volcanicRock:
        name: Roccia vulcanica
        desc: La roccia è il residuo di un antico vulcano che giace sott'acqua da
          migliaia di anni.
      volcanicAsh:
        name: Cenere vulcanica
        desc: Questa cenere è il residuo di un'antica e violenta eruzione vulcanica.
      goldOre:
        name: Minerali auriferi
        desc: Un pezzo di minerale aurifero. Molto apprezzato e prezioso praticamente
          ovunque. Brilla di potenziale.
      silverOre:
        name: Minerali di argento
        desc: Un pezzo di minerale d'argento. Non prezioso come l'oro, ma brillante
          di una lucentezza tutta sua.
      crystalShards:
        desc: Pezzi di cristallo che racchiudono al loro interno energie deboli. Forse
          il desiderio di trasformarsi in qualcosa di più.
        name: Cristallo di carbone
      adamantOre:
        name: Minerale di adamantio
        desc: Una roccia verde un po' più pesante e resistente rispetto alle altre
          maneggiate fino ad ora. Può essere fusa per diventare ancora più forte.
      petrifiumOre:
        name: Minerale di violite
        desc: Un minerale grezzo di colore viola che si stenta a credere sia reale.
          Emana una grande forza pur non essendo nella sua forma finale.
      crystallizedFlame:
        name: Fiamme cristallizzate
        desc: Un grosso pezzo di cristallo che sembra contenere l'essenza stessa del
          fuoco. Si possono vedere delle fiamme danzare sulla superficie e si può
          sentire il calore che sprigiona anche senza che sia davvero in fiamme.
      ectoRock:
        name: Roccia di ectoplasma
        desc: Questo grande pezzo di roccia è impregnato di ectoplasma e irradia un'aura
          spettrale che trasmette una strana sensazione. Per lavorarlo avrai bisogno
          di una fucina maledetta.
      violiteOre:
        name: Violite
        desc: Una massa minerale viola che sembra quasi impossibile credere sia reale.
          Emana una grande forza e non è nemmeno nella sua forma definitiva.
    rawFish:
      rawCarp:
        desc: Il sapore blando della carpa si presta bene alla preparazione di diversi
          piatti. A questi pesci piace saltare.
        name: Carpa cruda
      rawCrayfish:
        desc: I gamberi di fiume offrono una succulenta delizia per gli amanti dei
          frutti di mare.
        name: Gambero di fiume crudo
      rawJellyfish:
        desc: 'Curiosità culinaria: la medusa con la sua strana consistenza sfida
          gli chef ad esplorare nuovi orizzonti.'
        name: Medusa cruda
      rawLobster:
        desc: L'aragosta ha un carapace duro e chele forti. Non sembra familiare anche
          a te?
        name: Aragosta cruda
      rawMoray:
        desc: La murena ha un lungo corpo simile a un serpente che unito alle sue
          mandibole caratteristiche, le conferiscono un aspetto misterioso da creatura
          degli abissi marini.
        name: Murena cruda
      rawPerch:
        desc: Agile e dai lineamenti gentili il pesce persico è perfetto da catturare
          per i pescatori alle prime armi.
        name: Pesce persico crudo
      rawPike:
        desc: Con la sua carne tenera e sfaldata, il luccio si presta bene alla cottura.
        name: Luccio crudo
      rawSalmon:
        desc: Grazie alla sua carne saporita che si scioglie in bocca il salmone delizia
          il palato accompagnato dalla consistenza ricca e vellutata.
        name: Salmone crudo
      rawSeabass:
        desc: Lo splendore del boccalone è dovuto alle sue scaglie argentate.
        name: Spigola cruda
      rawShrimp:
        desc: Dall'aspetto raffinato i gamberi promettono una portata di pesce deliziosa.
        name: Gamberetto crudo
      rawSquid:
        desc: Il polpo sorprende per la sua capacità di mimetizzarsi.
        name: Calamaro crudo
      rawStreamEel:
        desc: Basta guardare la forma affusolata dell'anguilla di fiume per capire
          come possa risalire le correnti di fiumi e corsi d'acqua.
        name: Anguilla di fiume cruda
      rawTrout:
        desc: Le scaglie della trota hanno affascinanti colori iridescenti dai riflessi
          argento, rosa e maculati.
        name: Trota cruda
      rawSeaBass:
        desc: Il branzino risplende con le sue squame argentate.
        name: Spigola cruda
      rawShark:
        desc: Questo enorme pesce cartilagineo ha molti denti aguzzi disposti su più
          file. Ne avrete visto la testa appesa al muro dell'Emporio di Frosthook.
        name: Squalo crudo
      rawCrab:
        desc: Crostaceo molto diffuso, dal corpo corto e rotondo, con due occhi scuri
          e piccoli e grandi artigli che usa per pizzicare. Ahia!
        name: Granchio crudo
      rawStingray:
        name: Trigone crudo
        desc: Un pesce a forma di frittella che usa tutto il corpo per scivolare nell'acqua.
      rawSwordfish:
        name: Pesce spada crudo
        desc: Questo lungo pesce argentato ha un naso simile a una spada che usa per
          stordire le prede.
      rawAnglerfish:
        name: Rana pescatrice cruda
        desc: Questo strano pesce ha una bocca larga dalla quale sbucano lunghi denti
          affilati. I suoi occhi sembrano ciechi, ma un'escrescenza luminosa gli spunta
          dalla fronte.
      rawLargemouthBass:
        name: Persico trota crudo
        desc: Questo pesce verde è conosciuto per la sua bocca sproporzionata che
          usa per ingurgitare le cose.
      ectoFish:
        desc: Questi vari pesci sono infusi di ectoplasma e hanno un aspetto spettrale.
          Per cucinarli avrai bisogno di una cucina maledetta.
        name: Pesce ectoplasma
    smithing:
      bronzeBar:
        desc: 'Il lingotto di bronzo, reliquia delle fucine naniche, emana un fascino
          rustico e durevole che custodisce i segreti delle mani esperte che lo hanno
          forgiato.'
        name: Lingotto di bronzo
      copperBar:
        desc: 'La barra di rame brilla di una lucentezza rosso-arancio, che riflette
          la sua resistenza metallica e la sua versatilità in varie applicazioni.'
        name: Lingotto di rame
      farganiteBar:
        desc: 'Un lingotto blu brillante.'
        name: Lingotto di farganio
      ironBar:
        desc: 'Il lingotto di ferro è una testimonianza della forza del nucleo terrestre,
          pesante e inflessibile.'
        name: Lingotto di ferro
      steelBar:
        desc: 'Forgiata nel fuoco della determinazione, la barra d''acciaio brilla
          di una lucentezza eterna.'
        name: Lingotto di acciaio
      tarsiliumBar:
        desc: 'La barra di tarsilium brilla come il cielo notturno, con una consistenza
          oleosa che ne ricopre la superficie.'
        name: Lingotto di tarsilio
      goldBar:
        desc: Che siano state utilizzate pepite o minerale, il lingotto d'oro raggiunge
          il limite di finezza 333 imposto dalla Trinketry Factory.
        name: Lingotto d'oro
      silverBar:
        desc: Che siano state utilizzate pepite o minerale, la barra d'argento raggiunge
          il 92,5% di purezza.
        name: Lingotto d'argento
      hydriliumBar:
        desc: Il lingotto di idrillio ha un colore verde chiaro.
        name: Lingotto di idrilium
      metalScrap:
        desc: Alcuni scarti di metallo di bassa qualità.
        name: Rottami metallici
      metalShaving:
        desc: Alcuni scarti di metallo di media qualità.
        name: Limatura di metallo
      metalFragment:
        desc: Alcuni scarti di metallo di alta qualità.
        name: Frammento di metallo
      petrifiumBar:
        desc: Una barra di violite. Sembra quasi che si possa schiacciare, ma è riluttante
          a perdere la sua forma.
        name: Barra di violite
      adamantBar:
        name: Lingotto di adamantio
        desc: Un resistente lingotto di metallo verde. Ora chiede di essere rimodellata
          per continuare a crescere in forza.
      violiteBar:
        desc: Una lingotto di violite. Sembra quasi che si possa schiacciare, ma è
          riluttante a perdere la sua forma.
        name: Lingotto di violite
    woodcutting:
      birchLogs:
        desc: Lisci e pallidi, i tronchi di betulla emanano un'elegante semplicità.
        name: Tronchi di betulla
      mapleLogs:
        desc: I tronchi d'acero presentano molte e spesse venature, un bellissimo
          quadro di madre natura.
        name: Tronchi d'acero
      oakLogs:
        desc: Dall'aspetto inconfondibile i tronchi di quercia emanano un senso di
          eleganza senza tempo.
        name: Tronchi di quercia
      pineLogs:
        desc: I tronchi di pino sono resistenti e pieni di resina che gli conferisce
          il loro tipico aroma.
        name: Tronchi di pino
      spruceLogs:
        desc: I tronchi d'abete rosso sono tinti di un colore caldo e vivace che mette
          in risalto la loro naturale bellezza.
        name: Tronchi di abete rosso
      teakLogs:
        desc: Molto spessi e pesanti, con una corteccia spessa con l’interno molto
          più chiaro del resto del tronco.
        name: Tronchi di teak
      elmLogs:
        desc: Questi tronchi sono conosciuti per la loro flessibilità ed elasticità.
        name: Tronchi di olmo
      heartwood:
        name: Durame
        desc: Questa è la parte più interna del legno, è più scura del resto.
      willowLogs:
        name: Tronchi di salice
        desc: Questi tronchi terrosi sono abbastanza leggeri, rendendoli facili da
          maneggiare e da lavorare.
      mangroveLogs:
        name: Tronchi di mangrovia
        desc: Ancora umidi a causa dell'ambiente in cui un tempo crescevano, presentano
          una splendida lucentezza.
      sturdyBranch:
        name: Ramo
        desc: Un ramo insolitamente robusto.
      coral:
        name: Corallo
        desc: I coralli variano non solo per dimensioni e forma, ma anche per colore.
          Eppure ognuno di loro sembra avere una funzione specifica per vari compiti
          e attività artigianali.
      root:
        name: Radice
        desc: Utili radici di piante che possono essere utilizzati per vari scopi.
      bambooLogs:
        name: Canne di Bamboo
        desc: Il bamboo è flessibile ma resistente, il che lo rende adatto a molteplici
          utilizzi.
      yewLogs:
        desc: Il legno di tasso è denso e resistente, rendendolo ideale per la realizzazione
          di oggetti durevoli.
        name: Tronchi di tasso
      ectoLogs:
        desc: Questi tronchi sono impregnati e permeati di ectoplasma, che conferisce
          loro un aspetto spettrale e proprietà uniche. Per lavorarli è necessaria
          una segheria maledetta.
        name: Tronchi di ectoplasma
      mahoganyLogs:
        name: Tronchi di mogano
        desc: Tronchi provenienti da un albero stabile. Dovrebbero essere utili per
          realizzare oggetti artigianali e costruzioni potenti.
    crafting:
      rope:
        desc: Un kit di sopravvivenza non è completo senza una corda. È essenziale
          per la realizzazione di alcuni attrezzi di base.
        name: Corda
      hydrilium:
        name: Idrillio
        desc: Questo strano materiale viene prodotto combinando roccia vulcanica e
          alghe nel laboratorio delle maree.
      kelpRope:
        name: Corda d'alghe
        desc: Lunghi pezzi di alghe legati a formare una corda.
      elderhideRope:
        name: Corda di pelle antica
        desc: Una corda robusta realizzata in pelle antica.
      ironweedTwine:
        name: Spago di ferro
        desc: Un fascio spesso e resistente di spago ricavato dalla pianta da cui
          prende il nome, il fildiferro.
    hunting:
      animalMeat:
        desc: Un pezzo di carne fresca, pronto per essere cucinato, essiccato o salato.
        name: Carne animale
      bones:
        name: Ossa
        desc: Diversi pezzi di ossa.
      sinew:
        name: Tendine
        desc: Tessuto fibroso e resistente che collega i muscoli alle ossa.
      lizardTail:
        name: Coda di lucertola
        desc: La coda di una lucertola. Si stacca da corpo come meccanismo di difesa.
      feather:
        name: Piuma
        desc: Una piuma d'uccello bella, leggera e aerodinamica.
      darkfeather:
        name: Piuma scura
        desc: Una piuma scura di un uccello, probabilmente di un corvo, di un corvo
          imperiale o di un altro uccello scuro.
      animalFur:
        desc: Questo pezzo di pelliccia animale è morbido e caldo al tatto. Può essere
          trasformato in un capo di abbigliamento.
        name: Pelliccia animale
    tailoring:
      aerodynamicThread:
        name: Filo aerodinamico
        desc: Un filo raro, noto per la sua leggerezza e resistenza.
    trinketry:
      eelTrinket:
        name: Ciondolo anguilla
        desc: Il ciondolo a forma di anguilla brilla alla luce. Un giorno potrebbe
          tornare utile come amuleto.
      batTrinket:
        name: Ciondolo pipistrello
        desc: Il ciondolo a forma di pipistrello brilla alla luce. Potrebbe tornare
          utile come amuleto un giorno.
      heronTrinket:
        name: Ciondolo airone
        desc: Il ciondolo a forma di airone brilla alla luce. Potrebbe tornare utile
          come amuleto un giorno.
      shrimpTrinket:
        name: Ciondolo gambero
        desc: Il ciondolo a forma di gambero brilla alla luce. Potrebbe tornare utile
          come amuleto un giorno.
      sharkToothTrinket:
        name: Ciondolo a forma di dente di squalo
        desc: Il ciondolo a forma di dente di squalo brilla alla luce. Un giorno potrebbe
          tornare utile come amuleto.
      measuringSpoonsTrinket:
        desc: Il ciondolo a forma di cucchiaio dosatore brilla alla luce. Un giorno
          potrebbe tornare utile come amuleto.
        name: Cucchiaini dosatori portagioie
      beaverTrinket:
        name: Ciondolo a forma di castoro
        desc: Il ciondolo a forma di castoro brilla alla luce. Un giorno potrebbe
          tornare utile come amuleto.
      luckyRabbitFootTrinket:
        name: Ciondolo a forma di zampa di coniglio portafortuna
        desc: Il ciondolo a forma di zampa di coniglio portafortuna brilla alla luce.
          Un giorno potrebbe tornare utile come amuleto.
      compassTrinket:
        desc: Il ciondolo a forma di bussola brilla alla luce. Un giorno potrebbe
          tornare utile come amuleto.
        name: Ciondolo bussola
      circularRootTrinket:
        desc: Il ciondolo circolare con la radice brilla alla luce. Un giorno potrebbe
          tornare utile come amuleto.
        name: Ciondolo con radice circolare
      pinkPearlTrinket:
        name: Ciondolo con perla rosa
        desc: Il ciondolo di perla rosa brilla luminoso alla luce. Un giorno potrebbe
          tornare utile come amuleto.
      coolingIceTrinket:
        name: Ciondolo ghiacciolo refrigerante
        desc: Il ciondolo a forma di ghiacciolo brilla luminoso alla luce. Un giorno
          potrebbe tornare utile come amuleto.
    misc:
      glacierMap:
        desc: La mappa assomiglia alla parte settentrionale di Jarvonia. Segnato con
          una linea rossa si vede un sentiero che porta a quello che sembra essere
          un ghiacciaio con un igloo.
        name: Misteriosa mappa del nord
      trash:
        name: Spazzatura
        desc: Una collezione di oggetti inutili e senza valore. Perché mai l'hai preso?
      crosswordPuzzle:
        name: Vecchio cruciverba
        desc: Gioco di parole, nove lettere, inizia con la C.
      clam:
        desc: Bianco perlaceo e perfettamente intatto. Un bellissimo esemplare per
          un collezionista.
        name: Conchiglia
      fishingLine:
        name: Lenza da pesca
        desc: Recuperare questo dalla natura potrebbe aver appena salvato la vita
          di un animale.
      unidentifiedRemains:
        desc: La Gilda degli Avventurieri ti sarebbe grata se restituissi loro questo
          mucchio di ossa, potrebbe aiutarli a risolvere una questione in sospeso.
        name: Resti non identificati
      adventurersPin:
        desc: Una spilla con il simbolo della Gilda degli Avventurieri. È un po' arrugginita,
          ma ancora lucida. La Gilda degli Avventurieri ti sarebbe grata se la restituissi.
        name: Spilla degli avventurieri
      pearls:
        desc: Una serie di denti bianchi come perle. Ottimo materiale per realizzare
          gioielli.
        name: Perle
      fishbone:
        name: Lischia
        desc: Sebbene sia piuttosto raccapricciante e piuttosto maleodorante, sembra
          piuttosto interessante.
      seashell:
        name: Conchiglia marina
        desc: Probabilmente venduto da qualcuno su una spiaggia.
      nameTag:
        name: Targhetta identificativa
        desc: Una targhetta con inciso il nome di un avventuriero scomparso da tempo.
          La Gilda degli Avventurieri potrebbe essere interessata a questo oggetto.
      invasiveSpeciesTag:
        name: Targhetta specie invasive
        desc: Una targhetta metallica con l'immagine della bocca di una creatura simile
          a un verme.
  collectibles:
    fromActivity:
      petrifiedBranch:
        desc: Questo ramo sembra risalire a tempi antichi, quando tutto l'Arenum era
          un unico, enorme continente. All'epoca, solo gli animali vagavano per le
          valli e le foreste.
        name: Ramo pietrificato
      floatingCoral:
        name: Corallo galleggiante
        desc: Una distesa abbagliante di coralli colorati forma un unico ammasso interconnesso.
          Sebbene alcuni credano che questi coralli abbiano proprietà curative, tali
          affermazioni sono probabilmente frutto di superstizione.
      markOfTheTrident:
        name: Il marchio del tridente
        desc: Un gettone circolare simile a una moneta con un tridente inciso sopra.
      letterFromA:
        desc: Dopo un altro meraviglioso momento trascorso al ballo dei tritoni, ricevi
          una strana lettera. È piena di parole di ammirazione per la tua grazia nel
          ballare. È firmata con le iniziali A. A.
        name: Lettera da A. A.
      jarvonianCrosswordPuzzle:
        desc: "Questi cruciverba vengono ideati, copiati e distribuiti tra la popolazione
          di Jarvonia una volta a stagione. C'è grande competitività poiché viene
          assegnato un premio in denaro al primo che riesce a risolverli. 1.- Orizzontale:
          Montagna dove è scomparsa una spedizione mineraria (nove spazi)"
        name: Cruciverba jarvoniano
      tinySwanIceSculpture:
        desc: Questa minuscola scultura di ghiaccio ricorda un bellissimo cigno. Le
          sue ali brillano alla luce del sole. Quest'opera d'arte è importante per
          te, perché l'hai realizzata per una persona speciale.
        name: Piccola scultura di ghiaccio a forma di cigno
      woodenCarvedBearFigurine:
        desc: Questo pezzo delle dimensioni di un pugno è scolpito con cura e raffigura
          un orso in posizione eretta e minacciosa, con la bocca aperta mentre ruggisce.
          I dettagli trasmettono allo spettatore un senso di urgenza, come se l'orso
          fosse presente a grandezza naturale.
        name: Statuetta di orso intagliata in legno
      ancientAnkh:
        desc: Questo manufatto è un pezzo di un'altra epoca. A forma di chiave, l'ankh
          (☥) è un geroglifico proveniente da una cultura perduta che gli storici
          hanno tradotto come “vita”. Le leggende narrano che questa chiave apra la
          porta tra la vita e la morte.
        name: Antico ankh
      expeditionJournal:
        desc: Il giorno in cui abbiamo visto sorgere nuovamente il sole, il morale
          della spedizione si è risvegliato dal suo torpore. Prima di essere sottoposti
          alla notte eterna, non si può immaginare quanto la psiche umana abbia bisogno
          di quella stella radiosa nel cielo.
        name: Diario di spedizione
      treasureHunterToken:
        desc: Gettoni come questo venivano assegnati ai cercatori di tesori più avventurosi.
          È malconcio e ha perso da tempo la sua lucentezza. Il proprietario deve
          essere triste per averlo perso.
        name: Gettone cacciatore di tesori
      dinglehopper:
        desc: Per chi vive in superficie è conosciuto come forchetta, ma per le creature
          che vivono a Syrenthia si chiama Forchetta.
        name: Forchetta
      markOfTheSerpent:
        name: Il marchio del serpente
        desc: Un gettone circolare simile a una moneta con sopra raffigurato un serpente.
      oldWarSword:
        name: Vecchia spada da guerra
        desc: Questa spada lunga è piuttosto arrugginita, ma conserva ancora alcuni
          dettagli riconoscibili, la cui origine sembra essere wallisiana. Forse proviene
          dalla Guerra della Bandiera Cremisi?
      blueLotusButterfly:
        name: Farfalla del Loto Blu
        desc: Questa farfalla non presenta disegni o forme sulle ali, ma il colore
          blu è così intenso che è difficile distogliere lo sguardo da essa. Un esemplare
          magnifico che non si trova spesso.
      veryOldWine:
        name: Vino di 99 anni
        desc: Questa bottiglia di vino è molto antica e l'etichetta è andata perduta
          nel corso del tempo. Rimane solo un marchio, “B.B.”. Potrebbe benissimo
          essere il bottino di qualche pirata pazzo.
      silverPocketWatch:
        name: Orologio da tasca in argento
        desc: Questo orologio era privo di lancette e ingranaggi, aveva il vetro rotto
          di dimensioni non standard e, come se non bastasse, sia la catena d'argento
          che la cassa erano annerite. Non è stato facile, ma l'hai riparato in modo
          tale che ora sembra nuovo e potrebbe essere considerato un cimelio di famiglia
          e durare per diverse generazioni.
      soupKitchenBadge:
        name: Distintivo della mensa dei poveri
        desc: Il badge, sebbene piccolo e semplice, ti identifica come volontario
          nella mensa dei poveri. Indossarlo è motivo di orgoglio e ogni mensa ne
          distribuisce uno proprio, quindi esci e collezionali tutti, battendo tutte
          le palestre, cioè aiutando in tutte le mense.
      easterEgg:
        name: Uovo di Pasqua
        desc: Distrarre gli uccelli abbastanza a lungo da trovare questo uovo speciale
          è stata una vera sfida.
      artificialSnowflake:
        name: Fiocco di neve artificiale
        desc: A differenza di qualsiasi altro fiocco di neve, questo non si scioglie
          nel palmo della mano. È chiaro che qualcuno, da qualche parte, lo ha realizzato
          con un materiale insolitamente resistente. Se riesci a trovare questo, puoi
          trovare qualsiasi cosa.
      markOfTheDeepOne:
        name: Marchio dell'abisso
        desc: Un gettone circolare simile a una moneta con sopra raffigurato un essere
          a forma di polpo.
      seahorseFossil:
        name: Fossile di cavalluccio marino
        desc: A prima vista sembra una pietra dall'aspetto strano, ma osservandola
          più da vicino si scopre che in realtà è un cavalluccio marino fossilizzato.
    visas:
      jarvonianLetterOfPassage:
        desc: Prova che è possibile attraversare il Passo Silenzioso provenendo da
          Jarvonia.
        name: Lettera di passaggio Jarvoniana
      underwaterMapI:
        name: Mappa Subacquea
        desc: La mappa si rivela solo quando viene osservata sott'acqua. Mostra le
          baie, le grotte, i relitti e altri luoghi degni di nota della regione sottomarina.
      westernContinentBoatPass:
        name: Pass per imbarcazioni nel continente occidentale
        desc: Questo pass formale ti garantisce il privilegio di attraversare varie
          località tramite barche e navi. È contrassegnato da un piccolo timbro raffigurante
          una nave.
      blackEyePeakWildernessPermit:
        name: Permesso per l'area selvaggia del Picco Occhio Nero
        desc: Il Picco Occhio Nero è pericoloso e questa registrazione copre i costi
          per avvisare i tuoi familiari nel caso in cui non dovessi tornare.
