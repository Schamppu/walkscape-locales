      adamantBar:
        activityDesc: Con rabbia getti il minerale nello stampo per fonderlo in un
          lingotto di diamante. Non sai bene perché sei arrabbiato, ma senti che è
          l'atteggiamento giusto da assumere in questo momento.
        name: Fondere un lingotto di adamantio
