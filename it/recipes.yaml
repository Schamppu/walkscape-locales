        desc: Realizza un paio di pantaloni robusti e affidabili.
        name: Realizza pantaloni del viaggiatore
      aerofibrilChaps:
        name: Realizza ghette in aerofibril
        desc: Realizza un paio di coprigambe leggeri e isolanti.
        activityDesc: Intreccia con cura le fibre sottili dell'aerofibril, un materiale
