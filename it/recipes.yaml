        desc: Realizza una tavola di abete rosso, nota per la sua resistenza e versatilità.
      maplePlank:
        name: Taglia una tavola di acero
        desc: Modella il legno d'acero in una tavola liscia ed elegante.
        activityDesc: Lavorando meticolosamente il legno d'acero per ottenere una
          tavola liscia, stai realizzando una tavola d'acero.
      oakPlank:
        name: Taglia una tavola di quercia
        desc: Realizza una tavola di quercia, apprezzata per la sua resistenza e bellezza.
        activityDesc: Con cura, stai modellando il legno di quercia in una bella tavola,
          creando una tavola di quercia.
      teakPlank:
        name: Taglia una tavola di teak
        activityDesc: Il legno resistente richiede tempo per essere lavorato, ma la
          tavola è rifinita senza difetti.
        desc: Realizza una tavola di teak, apprezzata per la sua durata e resistenza.
      willowPlank:
        activityDesc: Il legno di salice si taglia facilmente in assi, come se fosse
          fatto di burro.
        name: Taglia una tavola di salice
        desc: Realizza una tavola di salice, il legno è apprezzato per la sua leggerezza.
      bambooPlank:
        name: Taglia una tavola di bambù
        desc: Realizza una tavola di bambù, un prodotto flessibile e versatile.
        activityDesc: È un lavoro difficile, ma tagli e lamini le strisce di bambù
          fino a ottenere una bella tavola.
      mangrovePlank:
        name: Taglia una tavola di mangrovia
        desc: 'Costruisci una tavola di mangrovia: il legno duro e denso è utile per
          gli ambienti difficili.'
        activityDesc: Il legno di mangrovia è spesso e denso. Rischia quasi di distruggere
          il tuo attrezzo, ma con perseveranza viene trasformato in una tavola.
      coralPlank:
        activityDesc: Utilizzando strumenti specializzati, si modella e si rifinisce
          il corallo fino a ottenere una tavola utilizzabile, garantendone la resistenza
          e la durata per l'edilizia.
        name: Taglia una tavola di corallo
        desc: Un materiale da costruzione resistente ricavato dallo scheletro elastico
          del corallo. Richiede un'estrazione e una lavorazione accurate.
      yewPlank:
        name: Taglia una tavola di tasso
        desc: Realizza una tavola di tasso, che rimanga resistente e densa pur conservando
          una certa elasticità.
        activityDesc: Ci vuole un po' di tempo per tagliare il legno, poiché è più
          denso della maggior parte di quelli con cui hai avuto a che fare in precedenza.
          Il tasso è piuttosto resistente. Alla fine cede e diventa una tavola.
      mahoganyPlank:
        name: Taglia una tavola di mogano
        desc: Realizza una tavola di mogano, un legno duro affidabile con un ottimo
          colore e una grande versatilità.
        activityDesc: Ti sei quasi tagliato diverse volte mentre tagliavi i tronchi
          in assi di mogano perfettamente squadrate. Pronte per qualsiasi compito
          tu ritenga opportuno assegnare loro in futuro.
      birchPlank:
        activityDesc: Con precisione, stai modellando il legno di betulla in una tavola
          versatile, creando una tavola di betulla.
        desc: Taglia con cura il legno di betulla in una tavola utile e versatile.
        name: Taglia una tavola di betulla
    misc:
      ectoplasm:
        name: Tagliare in ectoplasma
        desc: Scomponi i tronchi per ricavarne l'ectoplasma e trasformalo in un materiale
          raffinato.
        activityDesc: Tagli i tronchi di ectoplasma, liberando le loro energie ectoplasmatiche
          che poi lavori e raffini.
  hunting:
    bows:
      elmHuntingBow:
        desc: Realizza un arco da caccia agile e preciso utilizzando il legno robusto
          di un olmo.
        name: Costruisci un arco da caccia in olmo
        activityDesc: Selezioni con cura un pezzo di legno di olmo e lo modifichi
          con mani ferme fino a dargli la forma di un arco. Mentre lavori, senti la
          forza e la resistenza naturali del legno. Ad ogni colpo del tuo attrezzo,
          l'arco si avvicina alla sua forma definitiva.
      oakHuntingBow:
        desc: Costruisci un robusto arco da caccia con il durame di una quercia.
        name: Costruisci un arco da caccia in quercia
        activityDesc: Scegliete un pezzo di quercia resistente e lo modellate con
          cura fino a trasformarlo in un arco da caccia. Ad ogni colpo, l'arco si
          avvicina alla sua forma definitiva, uno strumento che vi sarà molto utile
          durante la caccia.
      bambooHuntingBow:
        activityDesc: Con mano ferma, modifichi il bambù fino a dargli la forma di
          un arco elegante, la cui flessibilità promette un tiro fluido e preciso.
        name: Costruisci un arco da caccia in bambù
        desc: Realizza un arco da caccia leggero e agile utilizzando il resistente
          bambù.
      mahoganyHuntingBow:
        name: Costruisci un arco da caccia in mogano
        desc: Realizza un arco da caccia elegante e potente utilizzando il legno scuro
          e pregiato del mogano.
        activityDesc: Con estrema precisione, modifichi il mogano fino a trasformarlo
          in un arco da caccia bello e letale.
