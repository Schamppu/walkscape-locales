          creando una tavola di betulla.
        desc: Trasforma con cura gli scarti di legno in assi utili e versatili.
      pinePlankScrap:
        activityDesc: Modellando abilmente gli scarti in una tavola robusta, stai
          realizzando una tavola di pino.
        name: Crea una tavola di pino (scarto)
        desc: Trasforma gli scarti di legno in una tavola robusta e affidabile.
      sprucePlankScrap:
        desc: Crea una tavola di abete rosso, nota per la sua resistenza e versatilità.
        activityDesc: Con la tua esperienza, stai trasformando gli scarti in una tavola
          versatile, creando una tavola di abete rosso.
        name: Crea una tavola di abete rosso (scarto)
      maplePlankScrap:
        name: Creare una tavola di acero (scarto)
        desc: Modella gli scarti in una tavola liscia ed elegante.
        activityDesc: Trasformando meticolosamente gli scarti di legno in una tavola
          liscia, stai realizzando una tavola di acero.
      oakPlankScrap:
        name: Crea una tavola di quercia (Scarto)
        desc: Crea una tavola di quercia, apprezzata per la sua resistenza e bellezza.
        activityDesc: Con cura, modifichi gli scarti di legno in una bella tavola,
          creando una tavola di quercia.
      teakPlankScrap:
        name: Crea una tavola di teak (Scarto)
        activityDesc: La lavorazione degli scarti di legno richiede tempo, ma la tavola
          viene rifinita senza imperfezioni.
        desc: Crea una tavola di teak, apprezzata per la sua durata e resistenza.
      willowPlankScrap:
        name: Crea una tavola di salice (Scrap)
        desc: Crea una tavola di salice, il legno è apprezzato per la sua leggerezza.
        activityDesc: I ritagli di legno si modellano facilmente in una tavola, come
          se fossero fatti di burro.
      mangrovePlankShavings:
        activityDesc: I trucioli sono spessi e densi. Sembrano quasi voler distruggere
          il tuo strumento, ma con perseveranza si trasformano in una tavola.
        desc: 'Crea una tavola di mangrovia: il legno duro e denso è utile per gli
          ambienti difficili.'
        name: Creare una tavola di mangrovia (Trucioli)
    planks:
      elmPlank:
        name: Taglia una tavola di olmo
        desc: Realizza una tavola di olmo altamente flessibile
        activityDesc: Non è semplice, ma si modella il legno di olmo in una tavola
          utile per prodotti futuri.
      pinePlank:
        name: Taglia una tavola di pino
        activityDesc: Modellando abilmente il legno di pino in una tavola robusta,
          stai creando una tavola di pino.
        desc: Trasforma il legno di pino in una tavola robusta e affidabile.
      sprucePlank:
        name: Taglia una tavola di abete rosso
        activityDesc: Con la tua esperienza, stai trasformando il legno di abete rosso
          in una tavola versatile, creando una tavola di abete rosso.
        desc: Realizza una tavola di abete rosso, nota per la sua resistenza e versatilità.
      maplePlank:
        name: Taglia una tavola di acero
        desc: Modella il legno d'acero in una tavola liscia ed elegante.
        activityDesc: Lavorando meticolosamente il legno d'acero per ottenere una
          tavola liscia, stai realizzando una tavola d'acero.
      oakPlank:
        name: Taglia una tavola di quercia
        desc: Realizza una tavola di quercia, apprezzata per la sua resistenza e bellezza.
        activityDesc: Con cura, stai modellando il legno di quercia in una bella tavola,
          creando una tavola di quercia.
      teakPlank:
        name: Taglia una tavola di teak
        activityDesc: Il legno resistente richiede tempo per essere lavorato, ma la
          tavola è rifinita senza difetti.
        desc: Realizza una tavola di teak, apprezzata per la sua durata e resistenza.
      willowPlank:
        activityDesc: Il legno di salice si taglia facilmente in assi, come se fosse
          fatto di burro.
        name: Taglia una tavola di salice
        desc: Realizza una tavola di salice, il legno è apprezzato per la sua leggerezza.
      bambooPlank:
        name: Taglia una tavola di bambù
        desc: Realizza una tavola di bambù, un prodotto flessibile e versatile.
        activityDesc: È un lavoro difficile, ma tagli e lamini le strisce di bambù
          fino a ottenere una bella tavola.
      mangrovePlank:
        name: Taglia una tavola di mangrovia
        desc: 'Costruisci una tavola di mangrovia: il legno duro e denso è utile per
          gli ambienti difficili.'
        activityDesc: Il legno di mangrovia è spesso e denso. Rischia quasi di distruggere
          il tuo attrezzo, ma con perseveranza viene trasformato in una tavola.
      coralPlank:
        activityDesc: Utilizzando strumenti specializzati, si modella e si rifinisce
          il corallo fino a ottenere una tavola utilizzabile, garantendone la resistenza
          e la durata per l'edilizia.
        name: Taglia una tavola di corallo
        desc: Un materiale da costruzione resistente ricavato dallo scheletro elastico
          del corallo. Richiede un'estrazione e una lavorazione accurate.
      yewPlank:
        name: Taglia una tavola di tasso
        desc: Realizza una tavola di tasso, che rimanga resistente e densa pur conservando
          una certa elasticità.
        activityDesc: Ci vuole un po' di tempo per tagliare il legno, poiché è più
          denso della maggior parte di quelli con cui hai avuto a che fare in precedenza.
          Il tasso è piuttosto resistente. Alla fine cede e diventa una tavola.
      mahoganyPlank:
        name: Taglia una tavola di mogano
        desc: Realizza una tavola di mogano, un legno duro affidabile con un ottimo
          colore e una grande versatilità.
        activityDesc: Ti sei quasi tagliato diverse volte mentre tagliavi i tronchi
          in assi di mogano perfettamente squadrate. Pronte per qualsiasi compito
          tu ritenga opportuno assegnare loro in futuro.
      birchPlank:
        activityDesc: Con precisione, stai modellando il legno di betulla in una tavola
          versatile, creando una tavola di betulla.
        desc: Taglia con cura il legno di betulla in una tavola utile e versatile.
        name: Taglia una tavola di betulla
    misc:
      ectoplasm:
        name: Tagliare in ectoplasma
        desc: Scomponi i tronchi per ricavarne l'ectoplasma e trasformalo in un materiale
          raffinato.
        activityDesc: Tagli i tronchi di ectoplasma, liberando le loro energie ectoplasmatiche
          che poi lavori e raffini.
  hunting:
    bows:
      elmHuntingBow:
        desc: Realizza un arco da caccia agile e preciso utilizzando il legno robusto
          di un olmo.
        name: Costruisci un arco da caccia in olmo
        activityDesc: Selezioni con cura un pezzo di legno di olmo e lo modifichi
          con mani ferme fino a dargli la forma di un arco. Mentre lavori, senti la
          forza e la resistenza naturali del legno. Ad ogni colpo del tuo attrezzo,
          l'arco si avvicina alla sua forma definitiva.
      oakHuntingBow:
        desc: Costruisci un robusto arco da caccia con il durame di una quercia.
        name: Costruisci un arco da caccia in quercia
        activityDesc: Scegliete un pezzo di quercia resistente e lo modellate con
          cura fino a trasformarlo in un arco da caccia. Ad ogni colpo, l'arco si
          avvicina alla sua forma definitiva, uno strumento che vi sarà molto utile
          durante la caccia.
      bambooHuntingBow:
        activityDesc: Con mano ferma, modifichi il bambù fino a dargli la forma di
          un arco elegante, la cui flessibilità promette un tiro fluido e preciso.
        name: Costruisci un arco da caccia in bambù
        desc: Realizza un arco da caccia leggero e agile utilizzando il resistente
          bambù.
      mahoganyHuntingBow:
        name: Costruisci un arco da caccia in mogano
        desc: Realizza un arco da caccia elegante e potente utilizzando il legno scuro
          e pregiato del mogano.
        activityDesc: Con estrema precisione, modifichi il mogano fino a trasformarlo
          in un arco da caccia bello e letale.
    traps:
      birdhouses:
        birchBirdhouse:
          name: Costruisci una casetta per uccelli in legno di betulla
          desc: Costruisci una casetta per gli uccelli accogliente con il legno leggero
            e resistente di betulla.
          activityDesc: Con un tocco delicato, dai forma al legno di betulla per creare
            una casetta per gli uccelli, creando un rifugio sicuro per i tuoi amici
            pennuti. Mentre finisci, immagini gli allegri cinguettii che presto riempiranno
            l'aria.
        mapleBirdhouse:
          name: Costruisci una casetta per uccelli in acero
          desc: Costruisci una classica casetta per uccelli utilizzando il legno robusto
            e bello dell'acero.
          activityDesc: Scegli con cura un pezzo di legno d'acero e trasformalo in
            una classica casetta per uccelli. La bellezza naturale e la durevolezza
            del legno offriranno una casa duratura ai tuoi amici pennuti.
        teakBirdhouse:
          activityDesc: Con cura meticolosa, trasformi il legno di teak in una raffinata
            casetta per uccelli. La bellezza naturale del legno e le sue proprietà
            di resistenza alle intemperie garantiranno una dimora duratura per i tuoi
            amici pennuti.
          name: Costruisci una casetta per uccelli in teak
          desc: Costruisci un'elegante casetta per gli uccelli utilizzando il pregiato
            e resistente legno di teak.
        mangroveBirdhouse:
          activityDesc: Con la massima attenzione ai dettagli, trasformerai il legno
            di mangrovia in una casetta per uccelli unica nel suo genere. La sua naturale
            resistenza all'umidità e ai parassiti offrirà una casa sicura e duratura
            per i tuoi amici pennuti.
          name: Costruisci una casetta per gli uccelli in mangrovia
          desc: Costruisci una casetta per uccelli unica utilizzando il legno robusto
            e resistente di una mangrovia.
        pineBirdhouse:
          name: Costruisci una casetta per gli uccelli in pino
          desc: Costruisci una casetta per uccelli rustica con il caldo e robusto
            legno di pino.
          activityDesc: Con mano ferma, dai forma al legno di pino per trasformarlo
            in un'accogliente casetta per gli uccelli. Mentre lavori, immagini gli
            uccelli che presto la chiameranno casa, trovando conforto e sicurezza
            tra le sue mura.
        spruceBirdhouse:
          name: Costruisci una casetta per uccelli in abete rosso
          desc: Costruisci una resistente casetta per uccelli utilizzando il legno
            robusto e aromatico di un abete rosso.
          activityDesc: Con mano attenta, modellate il legno di abete rosso in una
            robusta casetta per uccelli. La naturale resistenza del legno agli agenti
            atmosferici offrirà una casa sicura e duratura per i vostri amici pennuti.
      net:
        kelpDriftNet:
          name: Costruisci una rete di alghe del drift
          desc: Tessi una rete robusta con le resistenti alghe marine, perfetta per
            catturare i frutti dell'oceano.
          activityDesc: Con mani pazienti, trasformiamo le alghe in una rete resistente
            e flessibile. Ogni nodo promette una pesca abbondante, mentre immagini
            la vivace vita marina che presto riempirà le sue maglie.
    arrows:
      bronzeArrows:
        name: Costruire frecce di bronzo
        activityDesc: Con mano ferma, dai forma al bronzo in punte di freccia, le
          cui punte aguzze brillano alla luce del fuoco. Le fissi con cura alle aste,
          creando armi potenti e precise.
        desc: Crea frecce robuste con la punta in bronzo.
      copperArrows:
        name: Costruire frecce di rame
        desc: Costruisci frecce sottili con la punta in rame.
        activityDesc: Con intento concentrato, dai forma al rame a punte di freccia,
          le cui punte affilate brillano alla luce del fuoco.
      tarsiliumArrows:
        name: Crea frecce di tarsilium
        desc: Crea proiettili minacciosi con punta di scuro tarsilium.
        activityDesc: Modelli il tarsilium scuro in punte di freccia, il cui colore
          nero come l'inchiostro promette una morte silenziosa e rapida. Le piume,
          in netto contrasto con il metallo, vengono attaccate con cura, completando
          queste armi letali.
      ironArrows:
        activityDesc: Si riscalda il ferro sul fuoco, poi lo si modella con mano ferma
          fino a dargli la forma di una punta di freccia. Una volta raffreddato, si
          fissano le aste piumate, creando armi semplici ma efficaci.
        name: Costruire frecce di ferro
        desc: Crea proiettili robusti con punta in ferro.
      farganiteArrows:
        activityDesc: Modelli la farganite, il cui bagliore blu celeste illumina il
          tuo lavoro. Il metallo, intriso di un tocco di freddo, viene modellato in
          punte di freccia. Ogni freccia, un'arma dal potere sottile, viene accuratamente
          piumata e preparata per il volo.
        desc: Crea frecce con punta in farganite.
        name: Crea frecce di farganite
      steelArrows:
        desc: Crea proiettili di qualità superiore con punta in acciaio, progettati
          per perforare i bersagli più resistenti.
        activityDesc: Con mano esperta, modifichi l'acciaio riscaldato trasformandolo
          in punte letali. Il bagliore del fuoco illumina il tuo volto concentrato
          mentre fissi le aste piumate.
        name: Costruire frecce di acciaio
      simpleBowstring:
        name: Realizza una semplice corda per arco
        desc: Crea una semplice corda per tendere il tuo arco.
        activityDesc: Con mani ferme, selezioni fibre resistenti e inizi il meticoloso
          processo di intrecciarle insieme. Ogni filo, accuratamente allineato, contribuisce
          alla resistenza e all'elasticità della corda.
  cooking:
    fish:
      cookedTrout:
        activityDesc: Con cura, friggi la trota fino a renderla croccante, creando
          una deliziosa trota fritta.
        name: Friggi una trota
        desc: Assaporate i sapori affascinanti della trota fritta, con le sue squame
          iridescenti e il suo gusto delizioso.
      cookedSalmon:
        name: Friggi un salmone
        desc: Lasciati conquistare dal gusto ricco e burroso del salmone fritto
        activityDesc: Con delicatezza, friggi il salmone alla perfezione, creando
          un succulento salmone fritto.
      cookedMoray:
        name: Friggi una murena
        activityDesc: Con abilità, friggi la murena fino a renderla croccante, creando
          una deliziosa murena fritta.
        desc: Scopri il gusto unico della murena fritta, con il suo aspetto simile
          a un serpente e il suo sapore misterioso.
      cookedLobster:
        desc: Assaporate la succulenta e gustosa delizia dell'aragosta fritta, una
          classica prelibatezza a base di pesce.
        activityDesc: Con la tua esperienza, friggi l'aragosta alla perfezione, creando
          una succulenta aragosta fritta.
        name: Friggi un'aragosta
      cookedSquid:
        name: Friggi un calamaro
        desc: Abbraccia la versatilità dei calamari fritti, noti per la loro abilità
          nel scomparire.
        activityDesc: Con cura, friggi i calamari fino a renderli croccanti, creando
          un delizioso piatto di calamari fritti.
      cookedStreamEel:
        name: Friggi un'anguilla di fiume
        activityDesc: Con delicatezza, friggi l'anguilla di fiume alla perfezione,
          creando una succulenta anguilla di fiume fritta.
        desc: Gustate la tenerezza e la croccantezza delle anguille fritte, una prelibatezza
          di pesce d'acqua dolce.
      cookedSwordfish:
        name: Friggi un pesce spada
        activityDesc: Rosolate le succulente bistecche di pesce spada in una padella
          calda fino a quando non saranno dorate e cotte alla perfezione.
        desc: Lasciati conquistare dal sapore ricco e burroso delle bistecche di pesce
          spada cotte alla perfezione. Croccanti fuori e morbide dentro. Una delizia
          gourmet pronta in pochi minuti.
      cookedStingray:
        name: Friggi una razza
        desc: Goditi il sapore delicato della razza trasformata in uno snack dorato
          e croccante. Perfetto con una spruzzata di lime.
        activityDesc: Abbassi con cura il filetto di razza nell'olio bollente. La
          sua carne delicata diventa rapidamente croccante, formando una crosta dorata,
          mentre l'interno rimane tenero e succoso.
      cookedShark:
        name: Friggi uno squalo
        desc: Goditi il sapore unico dello squalo trasformato in una delizia dorata
          e croccante. Perfetto con la salsa tartara.
        activityDesc: Abbassi con cura la spessa bistecca di squalo nell'olio bollente.
          Mentre sfrigola e schizza, si forma una crosta dorata, mentre l'interno
          cuoce alla perfezione.
      cookedPerch:
        activityDesc: Con abilità, friggi il pesce fino a renderlo croccante, creando
          un delizioso pesce fritto.
        name: Friggi un pesce persico
        desc: Lasciati conquistare dal gusto del pesce persico fritto, una prelibata
          preda delle acque.
      cookedShrimp:
        name: Friggi un gamberetto
        desc: Assaporate il gusto dei gamberetti fritti, una deliziosa prelibatezza
          a base di pesce.
        activityDesc: Con delicatezza, friggi i gamberetti alla perfezione, creando
          dei deliziosi gamberetti fritti.
      cookedCarp:
        desc: Assaporate il gusto della carpa fritta, nota per il suo sapore delicato
          e la carne tenera.
        name: Friggi una carpa
        activityDesc: Con cura, friggi la carpa alla perfezione, creando una deliziosa
          carpa fritta.
      cookedJellyfish:
        activityDesc: Con la tua esperienza, friggi le meduse alla perfezione, creando
          un intrigante piatto di meduse fritte.
        name: Friggi una medusa
        desc: Scopri la consistenza e il sapore unici delle meduse fritte, una curiosità
          culinaria.
      cookedAnglerfish:
        desc: Scopri la sorprendente delicatezza della rana pescatrice trasformata
          in una prelibatezza dorata e croccante. Un'avventura culinaria unica.
        activityDesc: Rimuovi con cura la grottesca testa della rana pescatrice, rivelando
          la carne bianca e soda che si nasconde sotto. Dopo aver preparato i filetti,
          li immergi nell'olio bollente, ma la strana forma del pesce rende difficile
          girarli.
        name: Friggi un pesce rana
      cookedCrayfish:
        activityDesc: Con la tua esperienza, friggi i gamberi alla perfezione, creando
          un succulento piatto di gamberi fritti.
        name: Friggi un gambero di fiume
        desc: Gustate la succulenza dei gamberi fritti, una prelibatezza per gli amanti
          dei frutti di mare.
      cookedSeabass:
        activityDesc: Con delicatezza, friggi il branzino fino a renderlo croccante,
          creando un delizioso branzino fritto.
        name: Friggi un branzino
        desc: Assaporate la bontà argentata del branzino fritto, una scelta da buongustai.
      cookedPike:
        name: Friggi un luccio
        desc: Gustate il sapore del luccio fritto, noto per la sua carne tenera e
          friabile.
        activityDesc: Con abilità, friggi il luccio alla perfezione, preparando un
          delizioso luccio fritto.
      cookedLargemouthBass:
        name: Friggi un persico trota
        desc: Trasforma il pesce appena pescato in una delizia croccante e dorata.
        activityDesc: Il sibilo dell'olio riempie l'aria mentre ricopri ogni filetto
          con una panatura condita. L'aroma del pesce fritto risveglia i tuoi sensi.
          Con un'attenta girata, ti assicuri che ogni pezzo sia dorato alla perfezione.
    consumables:
      bagel:
        name: Cuocere un bagel
        desc: Croccanti fuori, morbidi e soffici dentro, i bagel fatti in casa sono
          una delizia. Gustali con la tua crema spalmabile preferita!
        activityDesc: Si modella l'impasto in forma di anelli, li si fa bollire brevemente,
          poi li si cuoce al forno fino a ottenere bagel dorati e morbidi.
      chocolateMilk:
        name: Mescolare il latte al cioccolato
        desc: Cremoso e delizioso, il latte al cioccolato è una classica delizia.
          Mescola latte freddo con cioccolato e dolcificante per ottenere una bevanda
          rinfrescante.
        activityDesc: Versate il latte freddo in un bicchiere, aggiungete il cacao
          in polvere e il dolcificante, quindi mescolate energicamente fino a ottenere
          un composto omogeneo e spumoso.
      kelpRolls:
        activityDesc: Avvolgi con cura fogli di alghe dolci e succose, fissandoli
          con un nastro di alghe marine.
        name: Preparare un rotolo di alghe
        desc: Uno snack rinfrescante e salutare. Crea la tua deliziosa combinazione
          di riso, verdure o proteine avvolta in un foglio di alga kelp dolce.
      fruitCake:
        name: Prepara una torta alla frutta
        desc: Ricco e festoso, ricco di frutta secca e noci, il panfrutto è un classico
          dolce natalizio. Da gustare con una tazza di tè o caffè.
        activityDesc: Si mescolano frutta secca, noci e spezie con farina, zucchero
          e uova per ottenere un impasto denso. Dopo la cottura, si lascia maturare
          il panfrutto per ottenere un sapore ottimale.
      saltrum:
        activityDesc: Dopo aver pulito e preparato le alghe, si avvia il processo
          di fermentazione in una botte di legno, aggiungendo lievito e acqua. Con
          pazienza, si cura la miscela, lasciando che si trasformi in una bevanda
          alcolica ricca e corposa.
        name: Prepara il sale
        desc: Una bevanda forte ottenuta dall'essenza dolce delle alghe, fermentata
          alla perfezione. Sapori ricchi e complessi con un leggero sentore di brezza
          marina.
      nettleTea:
        desc: Una bevanda saporita e potenzialmente benefica ottenuta dall'infusione
          di foglie di ortica fresche o essiccate in acqua calda.
        activityDesc: Si mettono in infusione ortiche fresche o essiccate in acqua
          bollente per ottenere una tisana rivitalizzante.
        name: Preparare il tè all'ortica
      milk:
        activityDesc: Si munge il latte fangoso dell'asclepiade e si pastorizza il
          contenuto, lasciando dietro di sé un'erbaccia che viene scartata.
        name: Preparare il latte
        desc: Non darmi bibite, non darmi tè, dammi solo quel latte, muuuuu.
      bread:
        desc: Pane fatto in casa, da zero. Unire farina, acqua, lievito e sale, impastare,
          lasciare lievitare, modellare e cuocere fino a ottenere una crosta dorata
          e croccante.
        name: Cuocere il pane
        activityDesc: Si misurano e si mescolano farina, acqua, lievito e sale fino
          a ottenere un impasto, lo si impasta fino a renderlo omogeneo, lo si lascia
          lievitare, lo si modella in pagnotte e lo si cuoce fino a renderlo dorato
          e croccante.
      underwaterSalad:
        name: Prepara un'insalata subacquea
        desc: Una fresca miscela di prelibatezze sottomarine mescolate insieme in
          un'insalata.
        activityDesc: Raccogli con cura una varietà di piante e creature sottomarine,
          poi le metti in una ciotola e le condisci con una salsa piccante a base
          di alghe.
      jellySandwich:
        name: Prepara un panino alla gelatina
        desc: Una combinazione classica di gelatina dolce e pane morbido per uno spuntino
          veloce e soddisfacente.
        activityDesc: Spalma generosamente la tua marmellata preferita su due fette
          di pane e uniscile per ottenere una deliziosa merenda.
      sweetCarrotPie:
        activityDesc: Grattugiate le carote, unite lo zucchero, le uova e le spezie,
          quindi versate il composto nella base della torta già preparata. Dopo la
          cottura, lasciate raffreddare la torta prima di servirla.
        desc: Una deliziosa miscela di carote dolci, crema pasticcera e pasta sfoglia.
          Perfetta come dessert o per un'occasione speciale.
        name: Prepara una torta dolce alle carote
      troutSoup:
        name: Prepara una zuppa di trota
        desc: Una zuppa sostanziosa e saporita preparata con trota fresca, verdure
          e un brodo ricco. Perfetta per un pasto confortante.
        activityDesc: Pulite e preparate con cura la trota, poi cuocetela a fuoco
          lento in un brodo saporito con un mix di verdure. Condite a piacere e gustate
          una ciotola di zuppa calda e nutriente.
      friedFishSandwich:
        desc: Filetto di pesce croccante e dorato racchiuso in un morbido panino con
          i tuoi condimenti preferiti. Un pasto classico e soddisfacente.
        name: Prepara un panino con pesce fritto
        activityDesc: Ricoprite i filetti di pesce con la pastella, friggeteli fino
          a doratura e disponeteli su panini tostati con salsa tartara, lattuga e
          pomodoro per ottenere un delizioso sandwich.
      pickles:
        desc: Sottaceti croccanti e piccanti, perfetti per panini o come spuntino.
          Realizzati con cetrioli freschi e una salamoia saporita.
        name: Preparare sottaceti
        activityDesc: Lavate e preparate i cetrioli, poi metteteli nei barattoli con
          le spezie e una soluzione salina. Lasciateli riposare affinché sviluppino
          il loro caratteristico sapore piccante.
      bugBait:
        desc: Una miscela seducente di profumi e sapori studiata per attirare i pesci.
          Questa miscela di ingredienti naturali può essere personalizzata in base
          alle diverse specie e alle condizioni dell'acqua.
        name: Preparare l'esca di insetti
        activityDesc: Si combinano con cura vari ingredienti, come vermi, lombrichi
          o profumi artificiali, per creare un'esca appiccicosa e allettante. La miscela
          viene quindi applicata agli ami o ad altre attrezzature da pesca in preparazione
          di una cattura di successo.
      frozenBait:
        desc: Conserva le esche fresche per le future battute di pesca congelandole
          correttamente. Mantieni la loro qualità grazie a un'attenta preparazione
          e conservazione.
        name: Preparare le esche congelate
        activityDesc: Pulite e preparate l'esca, assicurandovi che sia priva di umidità.
          Quindi, la confezionate in contenitori o sacchetti ermetici e la riponete
          nel congelatore per una conservazione a lungo termine.
      porridge:
        desc: Una ciotola di porridge caldo e confortante, cotto nel latte o nell'acqua
          e guarnito con i tuoi ingredienti dolci o salati preferiti.
        name: Prepara il porridge
        activityDesc: Mescolate l'avena o altri cereali, il latte e un pizzico di
          sale in una pentola e portate a ebollizione, mescolando continuamente. Una
          volta addensato, versate il porridge in una ciotola e aggiungete guarnizioni
          come frutta, noci o miele.
      mushroomCurry:
        desc: Un piatto ricco e saporito con funghi teneri in una salsa cremosa e
          aromatica. Perfetto da servire con riso o naan.
        name: Prepara il curry di funghi
        activityDesc: Cuocete cipolle, aglio e zenzero, quindi aggiungete spezie aromatiche.
          Mescolate i funghi affettati fino a renderli teneri prima di versare il
          latte o la crema di cocco. Lasciate cuocere a fuoco lento fino a quando
          la salsa non si addensa, creando un delizioso curry.
      dynamite:
        desc: Una miscela volatile di cristalli instabili, oli potenti e un involucro
          resistente. Richiede un'attenta manipolazione e una tempistica precisa.
        name: Assemblare la dinamite
        activityDesc: Macini meticolosamente cristalli instabili fino a ridurli in
          polvere fine, mescolandoli con oli potenti per creare un composto altamente
          esplosivo. La miscela viene accuratamente confezionata in un involucro resistente,
          creando un potente dispositivo esplosivo.
      spicyPumpkinJuice:
        name: Prepara un succo di zucca piccante
        activityDesc: In una pentola mescolate la purea di zucca, il sidro di mele
          e un mix di spezie calde come cannella, zenzero e chiodi di garofano. Lasciate
          cuocere a fuoco lento fino a quando i sapori si amalgamano, quindi aggiungete
          un tocco piccante con peperoncino in fiocchi o pepe di Cayenna per dare
          una nota speziata.
        desc: Una miscela calda e tonificante di zucca, spezie calde e un pizzico
          di piccante. Perfetta per le giornate fredde.
      schnitzel:
        desc: Carne battuta sottile, impanata e fritta in padella fino a raggiungere
          una doratura perfetta. Un piatto classico con infinite varianti.
        activityDesc: Batti un pezzo di carne fino a ottenere uno spessore sottile
          e uniforme, quindi passalo nella farina, nell'uovo e nel pangrattato. Friggi
          con cura la cotoletta in olio bollente fino a renderla croccante e dorata.
        name: Preparare la cotoletta
      beer:
        name: Produrre birra
        desc: Un processo complesso che coinvolge cereali maltati per creare una bevanda
          alcolica saporita.
        activityDesc: Si schiacciano i chicchi maltati e li si immerge in acqua calda
          per estrarne gli zuccheri. Con pazienza, si aspetta che avvenga la magia,
          ottenendo una deliziosa birra artigianale.
      salmonPie:
        name: Cuocere la torta al salmone
        desc: Un piatto sostanzioso e confortante con salmone a scaglie in un ripieno
          cremoso di patate e verdure, ricoperto da una crosta burrosa.
        activityDesc: Unite il salmone cotto con purè di patate, verdure e una salsa
          cremosa. Versate il composto in una teglia da forno, coprite con una sfoglia
          e infornate fino a quando non sarà dorato e bollente.
      pancakes:
        name: Prepara dei pancake
        desc: Pancake soffici, leggeri e spumosi, perfetti per una deliziosa colazione.
          Da gustare con sciroppo d'acero, burro e i tuoi condimenti preferiti.
        activityDesc: Sbatti insieme la farina, il lievito e lo zucchero, poi aggiungi
          delicatamente il latte, le uova e il burro fuso. Versa con cura la pastella
          su una piastra calda, girando una volta che sarà dorata per ottenere dei
          pancake soffici.
      jarvonianPastry:
        name: Prepara un dolce Jarvoniano
        desc: Una pasta delicata e friabile, una prelibatezza molto amata nella campagna
          Jarvoniana.
        activityDesc: Preparate con cura un impasto burroso e lo stendete con il mattarello.
          La pasta viene poi cotta al forno fino a raggiungere una doratura perfetta,
          creando un delizioso dolcetto.
      moonshine:
        name: Distillare alcolici illegali
        activityDesc: Si mescola l'ectoplasma alla birra e si procede alla distillazione.
          Il processo che ne risulta produce una bevanda particolarmente forte.
        desc: Un potente distillato artigianale ottenuto dalla distillazione di ingredienti
          combinati.
      wine:
        desc: Una bevanda complessa ottenuta dalla fermentazione della frutta, che
          trasforma il succo dolce in una bevanda alcolica dai sapori e dagli aromi
          distintivi.
        name: Fermentare il vino
        activityDesc: Si schiaccia la frutta per estrarne il succo, quindi lo si trasferisce
          in un recipiente di fermentazione. Si controlla attentamente la temperatura
          e si protegge la miscela dalla contaminazione. Con pazienza, si lascia che
          il processo naturale di fermentazione trasformi il succo fruttato in vino.
      fireballWine:
        activityDesc: Macini la fiamma cristallizzata fino a ridurla in una polvere
          fine che ora assomiglia a scintille. La versi nel tuo vino fortificato e
          mescoli il tutto, osservando come il vino assume una nuova tonalità più
          brillante.
        name: Fermentazione del vino “palla di fuoco”
        desc: Il vino fortificato è stato ulteriormente migliorato con una nota speziata
          che esalta il gusto dell'alcol grazie al potere della fiamma cristallizzata.
      friednoodles:
        desc: Un piatto veloce e saporito a base di noodles saltati in padella con
          verdure, proteine e salsa salata a scelta.
        activityDesc: Cuoci i noodles seguendo le istruzioni riportate sulla confezione,
          poi saltali in padella con aglio, zenzero e le verdure che preferisci. Aggiungi
          una salsa saporita e mescola il tutto fino a ricoprire bene gli ingredienti,
          creando un piatto delizioso e soddisfacente.
        name: Prepara i noodles fritti
      cookedMeat:
        activityDesc: Con mano esperta, condisci la bistecca con sale e pepe, assicurandoti
          di distribuirli uniformemente. La padella in ghisa sfrigola mentre aggiungi
          una noce di burro e olio. La bistecca, sfrigolante e fumante, viene cotta
          alla perfezione su entrambi i lati.
        name: Cuocere la carne
        desc: Una tecnica classica per una bistecca cotta alla perfezione.
      spaghettiAndMeatballs:
        desc: Un classico comfort food, perfetto per ogni occasione.
        activityDesc: Rosolate la carne macinata e mescolatela con pangrattato, uova
          e spezie per formare delle polpette. Le polpette vengono cotte a fuoco lento
          in una ricca salsa di pomodoro fino a quando non diventano tenere. Nel frattempo,
          cuocete gli spaghetti in acqua bollente. Il piatto finale, una confortante
          miscela di pasta, salsa e polpette, è pronto per essere servito.
        name: Prepara spaghetti e polpette
      roastedBellPepper:
        activityDesc: Affetta i peperoni e poi arrostiscili con cura sul fuoco. Mentre
          cuociono, girali e condiscili finché non assumono un aspetto ben abbrustolito
          e un aroma invitante.
        name: Prepara un peperone arrosto
        desc: La miscela perfetta di calore di cottura e spezie per esaltare i sapori.
      spicyPepper:
        activityDesc: Con mano attenta, selezioni i peperoncini più piccanti del tuo
          orto. Li affetti sottilmente, riempiendo l'aria del loro aroma pungente.
          Li unisci ad altri ingredienti, bilanciando il piccante con sapori aciduli.
        name: Prepara un peperoncino piccante
        desc: Una miscela infuocata per i più audaci.
      fortifiedWine:
        name: Vino fortificato fermentato
        desc: Vino migliorato con aromi terrosi e resilienza grazie al potere del
          rotbud.
        activityDesc: Si schiaccia il rotbut fino a renderlo abbastanza facile da
          mescolare al vino, scurendolo notevolmente. Si lascia riposare affinché
          assuma la sua forma migliorata, anche se sicuramente qualcuno potrebbe obiettare
          che quello originale ha un sapore migliore.
      hamburger:
        name: Prepara un hamburger
        desc: Un hamburger semplice e soddisfacente.
        activityDesc: Formate degli hamburger con la carne macinata e conditeli con
          sale e pepe. Cuocete gli hamburger alla griglia fino al grado di cottura
          desiderato. Tostate i panini, aggiungete i vostri condimenti preferiti e
          adagiatevi sopra gli hamburger cotti. Aggiungete lattuga, pomodoro e cipolla
          per completare il vostro hamburger.
      stuffedPotato:
        activityDesc: Lavate una patata e bucatela con una forchetta. Cuocetela in
          forno preriscaldato fino a quando non sarà tenera. Una volta cotta, tagliatela
          a metà e schiacciatene l'interno. Aggiungete burro, panna acida, formaggio,
          pezzetti di pancetta e erba cipollina.
        desc: Un piatto sostanzioso e confortante, perfetto per una serata tranquilla
          a casa.
        name: Prepara una patata ripiena
      beefStew:
        name: Prepara uno stufato di manzo
        desc: Un piatto caldo e confortante, perfetto per una fredda giornata invernale.
        activityDesc: Rosolate con cura i pezzi di manzo in una pentola, quindi aggiungete
          cipolle, carote e sedano. Versate un brodo ricco e fate cuocere lo stufato
          a fuoco lento fino a quando la carne è tenera e le verdure sono morbide.
          Condite lo stufato con erbe aromatiche e spezie, creando un piatto caldo
          e saporito.
      crabRolls:
        activityDesc: Selezionate con cura la polpa dai gusci dei granchi, poi la
          mescolate con una salsa cremosa e erbe aromatiche fresche. Tostate i panini,
          li spalmate di burro e li riempite con il composto di granchio. Una delizia
          semplice e appagante.
        name: Preparare involtini di granchio
        desc: Una delizia a base di pesce semplice ma appagante.
      veggieSoup:
        name: Prepara una zuppa di verdure
        desc: Un mix sostanzioso e salutare di verdure varie cotte a fuoco lento in
          un brodo saporito. Personalizzalo con i tuoi ingredienti preferiti.
        activityDesc: Si tagliano vari tipi di verdure e si fanno saltare in padella
          prima di aggiungere il brodo e i condimenti. Si lascia cuocere la zuppa
          a fuoco lento finché le verdure non saranno tenere e i sapori si saranno
          amalgamati.
      mudPie:
        name: Fai una torta di fango
        desc: Una delizia divertente e disordinata preparata da chiunque abbia un
          po' di fantasia.
        activityDesc: Con le mani sporche di fango e risate gioiose, raccogliete manciate
          di terra, aggiungendo acqua per creare una miscela di fango perfetta. Premete
          il fango in una piccola ciotola o in un contenitore, creando un capolavoro
          unico e discutibilmente commestibile.
      honeyChicken:
        name: Prepara il pollo al miele
        desc: Un piatto di pollo dolce e salato.
        activityDesc: Marinate il pollo in una miscela di salsa di soia, miele, aglio
          e zenzero. Quindi, rosolate il pollo in padella fino a quando non sarà dorato
          e cotto. La glassa, una miscela di miele, salsa di soia e aglio, viene fatta
          sobbollire fino a quando non si addensa e poi versata sul pollo.
    misc:
      ectoplasm:
        name: Cucinare in ectoplasma
        desc: Cucina il pesce per ricavarne l'ectoplasma e trasformalo in una forma
          materiale raffinata.
        activityDesc: Cucini il pesce ectoplasma, liberando le sue energie ectoplasmatiche
          che poi lavori e raffini.
  tailoring:
    clothing:
      qualityLeather:
        activityDesc: Trasforma la pelle grezza degli animali in un cuoio di qualità
          superiore. Concia, stira e tratta con cura la pelle, padroneggiando le antiche
          tecniche della lavorazione del cuoio. Ogni fase richiede precisione e pazienza,
          mentre modifichi il cuoio trasformandolo in un materiale versatile e resistente.
        name: Realizza una pelle di qualità
        desc: Crea una pelle di alta qualità, ideale per realizzare armature e attrezzature
          resistenti.
      basicLeather:
        name: Realizza una pelle semplice
        desc: Realizza un oggetto in pelle semplice ma resistente.
        activityDesc: Converti le pelli degli animali in cuoio grezzo, imparando le
          antiche tecniche di conservazione e lavorazione di questa risorsa naturale.
      elderhideLeather:
        name: Crea cuoio di pelle antica
        desc: Realizza del cuoio resistente e durevole, ricavata da una pelle rara
          e resistente.
        activityDesc: Concia e condizionamento di una pelle rara e resistente, creando
          un cuoio forte e durevole. Ogni fase del processo richiede cura e precisione,
          poiché si lavora per sfruttare il potere naturale della pelle.
      linen:
        name: Realizza un panno di lino
        desc: Intreccia fili sottili per ottenere un tessuto morbido e resistente.
        activityDesc: Filate le fibre di lino in fili sottili, quindi intrecciateli
          con cura per ottenere un tessuto di lino morbido e resistente. Ogni fase
          richiede pazienza e precisione, poiché si tratta di trasformare materie
          prime in un tessuto versatile.
      rootweaveMitts:
        activityDesc: Intrecci con cura strisce di fibre vegetali resistenti, modellandole
          in un paio di guanti resistenti. L'intricato intreccio offre calore e protezione
          dagli agenti atmosferici.
        name: Realizza guanti con intreccio a radice
        desc: Realizza un paio di guanti robusti e caldi con le radici.
      shadowquillTunic:
        activityDesc: Cuci con cura piume scure come l'inchiostro e morbido tessuto
          vellutato, modellandoli in una tunica affascinante. Le piume aggiungono
          un tocco di eleganza gotica, mentre il tessuto offre calore e comfort.
        name: Crea una tunica con penne ombra
        desc: Crea una tunica leggera e vaporosa, perfetta per chi cerca stile e comfort.
      aerofibrilMitts:
        activityDesc: Intreccia con cura le fibre sottili dell'aerofibril, un materiale
          leggero e isolante. Questi guanti offrono un calore eccezionale senza aggiungere
          ingombro.
        desc: Realizza un paio di guanti leggeri e isolanti.
        name: Realizza guanti aerofibril
      grassknotMitts:
        activityDesc: Lavori all'uncinetto un paio di guanti resistenti, utilizzando
          un punto semplice ma efficace chiamato “grassknot”. Questo modello intramontabile
          garantisce calore e resistenza, rendendo questi guanti un compagno affidabile.
        desc: Realizza un paio di guanti caldi e pratici con intarsi in erba.
        name: Realizzare guanti con nodi d'erba
      grassknotChaps:
        desc: Realizza un paio di coprigambe resistenti con intarsi in erba.
        name: Realizza dei gambali con nodi d'erba
        activityDesc: Cuci insieme strisce di pelle o tessuto resistente, utilizzando
          un punto semplice ma efficace chiamato “grassknot”. Questi gambali offrono
          protezione e resistenza, rendendoli ideali sia per gli avventurieri che
          per i lavoratori.
      grassknotTunic:
        activityDesc: Cuci insieme pezzi di tessuto resistente, utilizzando un punto
          semplice ma efficace chiamato “grassknot”. Questa tunica offre calore e
          protezione, rendendola ideale per il freddo e le condizioni climatiche avverse.
        name: Realizza una tunica con nodi d'erba
        desc: Realizza una tunica calda e resistente con intarsi in erba.
      apprenticeVest:
        activityDesc: Cuci insieme pezzi di pelle o tessuto resistente per creare
          un giubbotto protettivo. Questo giubbotto proteggerà i tuoi organi vitali
          dai danni mentre lavori diligentemente al tuo mestiere.
        desc: Realizza un giubbotto protettivo per aspiranti artigiani.
        name: Realizza un gilet da apprendista
      spikescaleMitts:
        desc: Realizza un paio di guanti protettivi ed eleganti.
        name: Realizza guanti con punte metalliche
        activityDesc: Cuci con cura pezzi di pelle resistente e squamosa, modellandoli
          in un paio di guanti resistenti. Le squame offrono un'eccellente protezione
          contro graffi e ferite lievi, mentre il motivo unico aggiunge un tocco di
          stile al tuo abbigliamento.
      shadowquillMitts:
        name: Realizza guanti con penne ombra
        activityDesc: Cuci con cura pezzi di tessuto morbido e vellutato, modellandoli
          in un paio di eleganti guanti. La tonalità scura e l'effetto leggermente
          luccicante del tessuto conferiscono a questi guanti un aspetto misterioso
          e affascinante.
        desc: Realizza un paio di guanti eleganti e misteriosi.
      spikescaleChaps:
        name: Realizza ghette con punte metalliche
        desc: Realizza un paio di coprigambe resistenti e protettivi.
        activityDesc: Cuci con cura pezzi di pelle resistente e squamosa, modellandoli
          in un paio di ghette resistenti. Le squame offrono un'eccellente protezione
