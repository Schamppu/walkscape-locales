        name: Realizza una tunica con intreccio a radice
        desc: Tessere un abito con la forza della natura.
      aerofibrilTunic:
        name: Realizza una tunica in aerofibril
        desc: Realizza una tunica leggera.
        activityDesc: Intrecci delicate fibre aerofibril in una tunica leggera e isolante.
          Questo capo arioso offre calore senza appesantire, perfetto per chi cerca
          comfort e stile.
      elderhideChaps:
        name: Realizza ghette in pelle antica
        desc: Crea un paio di robusti gambali in pelle antica.
        activityDesc: Prendi la pelle preparata e inizi il processo di modellatura
          e cucitura. Ogni pezzo viene tagliato e cucito con cura, garantendo una
          vestibilità perfetta. I gambali finiti offrono una protezione eccellente,
          rendendoli ideali per qualsiasi avventuriero.
      elderhideTunic:
        name: Crea una tunica in pelle antica
