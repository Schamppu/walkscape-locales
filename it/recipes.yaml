      ironBar:
        name: Fondere una barra di ferro
        desc: Trasforma il minerale di ferro in una barra di ferro solida e utile.
        activityDesc: Con la tua abilità nel fondere il minerale di ferro in una versatile
          barra metallica, stai creando una barra di ferro.
      steelBar:
        desc: Forgia una barra d'acciaio resistente per varie applicazioni pesanti.
