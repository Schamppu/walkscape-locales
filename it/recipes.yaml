          artigiani che lavorano sodo.
        name: Realizza guanti da viaggiatore
      apprenticeHandware:
        name: Realizza guanti da apprendista
        desc: Realizza un paio di guanti protettivi per aspiranti artigiani.
        activityDesc: Cuci insieme pelle o tessuto resistente per creare un paio di
          guanti protettivi. Questi guanti proteggono le tue mani da tagli, graffi
