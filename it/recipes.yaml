          avventurieri che per i lavoratori.
      spikescaleTunic:
        activityDesc: Cuci meticolosamente insieme pezzi di pelle dura e squamosa,
          modellandoli in una tunica formidabile. Le squame offrono un'eccellente
          protezione contro i danni, rendendola ideale per i più audaci e avventurosi.
        name: Crea una tunica con scaglie appuntite
        desc: Crea una tunica resistente e squamosa.
      journeymanHandwear:
        desc: Realizza un paio di guanti resistenti e pratici.
        activityDesc: Cuci con cura pezzi di pelle o tessuto resistente, rinforzando
