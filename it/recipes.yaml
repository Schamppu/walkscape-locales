        name: Fondere una barra d'acciaio
      tarsiliumBar:
        name: Fondere una barra di tarsilio
        desc: Crea una barra di tarsilium dal minerale raccolto in precedenza.
        activityDesc: Il metallo scuro si scioglie nello stampo, formando un liquido
          torbido e denso. Si raffredda lentamente fino a formare una perfetta barra
          di tarsilio.
      farganiteBar:
        name: Fondere una barra di farganite
        desc: Crea una barra di farganite dal minerale raccolto in precedenza.
        activityDesc: Il minerale di farganite resiste al calore, ma grazie alla tua
          dedizione alla fornace anche esso si scioglie e si trasforma in una morbida
          barra blu.
      hydriliumBar:
        name: Fondere una barra di idrilium
        desc: Crea una barra di idrilium dall'idrilium e dalle alghe
        activityDesc: Si riscalda il minerale di idrilium in un potente forno fino
          a raggiungere temperature estremamente elevate, fondendolo fino a renderlo
          liquido. Versando con cura il metallo fuso in uno stampo, lo si lascia raffreddare
          e solidificare, creando una preziosa barra di idrilium.
      adamantBar:
        activityDesc: Con rabbia getti il minerale nello stampo per fonderlo in un
          lingotto di diamante. Non sai bene perché sei arrabbiato, ma senti che è
          l'atteggiamento giusto da assumere in questo momento.
        name: Fondere un lingotto di adamantio
        desc: Fonde un lingotto di adamantio dal minerale che hai raccolto.
      goldBar:
        activityDesc: Ci vuole una quantità considerevole, ma si riscaldano i pezzi
          d'oro nella fornace fino a formare un lingotto.
        name: Fondere un lingotto d'oro
        desc: Fonde un lingotto d'oro da pepite o minerale aurifero.
      silverBar:
        name: Fondere un lingotto d'argento
        desc: Fonde un lingotto d'argento da pepite o minerale d'argento.
        activityDesc: Ci vuole una quantità considerevole, ma si riscaldano i pezzi
          d'argento nel forno fino a formare una barra.
      violiteBar:
        name: Fondere un lingotto di violite
        desc: Fonde un lingotto di violite dal minerale richiesto.
        activityDesc: Osservi mentre il minerale violaceo di violite ribolle violentemente
          nel metallo fuso nella fornace e si trasforma in una barra.
