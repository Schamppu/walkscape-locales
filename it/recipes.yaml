    bars:
      bronzeBar:
        activityDesc: Fondendo abilmente rame e stagno in una barra metallica versatile,
          stai creando una barra di bronzo.
        name: Fondere una barra di bronzo
        desc: Sciogli e mescola rame e stagno per creare una barra di bronzo versatile.
      copperBar:
        name: Fondere una barra di rame
        desc: Scaldare e modellare il rame in una barra solida per vari usi.
        activityDesc: Con le tecniche giuste, puoi fondere il rame in una barra metallica
