      desc: L'uso dell'arco richiede frecce come munizioni durante la caccia o il
        combattimento.
    bellows:
      name: Soffietto
      requirement: Richiede l'equipaggiamento <object id="bellows" />.
      requirementLevel: Richiede soffietti che abbiano almeno <keywordRequirements
