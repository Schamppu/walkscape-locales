      desc: I cestini sono oggetti che ti consentono di trasportare più oggetti nel
        tuo inventario.
    ring:
      name: Anello
      requirementLevel: Richiede un anello che abbia almeno un <keywordRequirements
        /> nei suoi requisiti.
      requirement: Richiede un <object id="item_ring" /> equipaggiato.
      desc: Si infila al dito.
    frisbee:
      requirement: Richiede un <object id="frisbee" /> equipaggiato.
      name: Disco Ghiacciato
      requirementLevel: Richiede un disco ghiacciato che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Gli skydisc vengono utilizzati per alcune attività sportive, come lo skydisc
