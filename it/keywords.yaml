    skillBook:
      name: Libro delle abilità
      requirement: Richiede un <object id="skillBook" /> equipaggiato.
      requirementlevel: Richiede un libro di abilità che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
  recipes:
    skills:
      cooking:
        name: Ricetta di cucina
        requirement: Richiede un <object id="recipe_cooking" />.
      smithing:
        smelting:
          name: Fusione
          requirement: Richiede materiali che possono essere utilizzati nella fusione
            per <object id="smithing" />.
    products:
      sandwich:
        name: Ricetta per tramezzino
        requirements: Richiede che un <object id="sandwich" /> venga creato con <object
          id="recipe_cooking" />.
        requirement: Richiede che un <object id="sandwich" /> sia creato da un <object
          id="recipe_cooking" />.
  activities:
    fishing:
      name: Pesca
      requirementLevel: Richiede un'attività di pesca che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      requirement: Richiede un'attività <object id="activity_fishing" />.
    miningOres:
      name: Estrazione di minerali
      requirement: Richiede un'attività <object id="activity_mining" />.
      requirementLevel: Richiede un'attività di estrazione mineraria che abbia almeno
        <keywordRequirements /> nei suoi requisiti.
    woodcuttingTrees:
      name: Taglio degli alberi
      requirement: Richiede un'attività <object id="woodcuttingTrees" />.
      requirementLevel: Richiede un'attività di taglio degli alberi che abbia almeno
        <keywordRequirements /> nei suoi requisiti.
    foragingPlants:
      requirement: Richiede un'attività di <object id="activity_foraging" />.
