      name: Attrezzatura da arrampicata
      requirementLevel: Richiede attrezzatura da arrampicata che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      requirement: Richiede <object id="climbingTool" /> equipaggiato.
      desc: L'attrezzatura da arrampicata consente di raggiungere scorciatoie nelle
        zone montuose ed è indispensabile per determinate attività di arrampicata.
    amulet:
      name: Amuleto
      requirement: Richiede un <object id="item_amulet" /> equipaggiato.
      requirementLevel: Richiede un amuleto che abbia almeno un <keywordRequirements
        /> nei suoi requisiti.
      desc: Gli amuleti si indossano al collo.
    basket:
      name: Cestino
      requirement: Richiede un <object id="basket" /> equipaggiato.
      requirementLevel: Richiede un cestino che abbia almeno <keywordRequirements
