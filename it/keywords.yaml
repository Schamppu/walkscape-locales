    skis:
      name: Sci
      requirement: Richiede <object id="skis" /> equipaggiati.
      requirementLevel: Richiede sci che abbiano almeno <keywordRequirements /> nei
        loro requisiti.
      desc: Gli sci ti permettono di spostarti nelle zone innevate e di sbloccare
        scorciatoie a Jarvonia. Sono inoltre indispensabili per alcune attività invernali.
    lifeVest:
      requirement: Richiede un <object id="lifevest" /> equipaggiato.
      name: Giubbotto di salvataggio
      requirementLevel: Richiede un giubbotto di salvataggio che abbia almeno un <keywordRequirements
        /> nei suoi requisiti.
      desc: Ti tengono a galla in acqua! A bordo di un'imbarcazione è obbligatorio
        indossare il giubbotto di salvataggio (per evitare di annegare).
    skillingGear:
      requirement: Richiede equipaggiato <object id="skillingGear" />.
      name: Attrezzatura per l'addestramento
      requirementLevel: Richiede equipaggiamento di abilità che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
    socks:
      name: Calzini
      requirement: Richiede un <object id="item_socks" /> equipaggiato.
      requirementLevel: Richiede calzini che abbiano almeno <keywordRequirements />
        nei loro requisiti.
      desc: Sono disponibili in tanti colori e fantasie. Trovare calzini spaiati può
        aiutarti a sbloccare un obiettivo.
    weapon:
      name: Arma
      requirement: Richiede un <object id="weapon" /> equipaggiato.
      requirementLevel: Richiede un'arma che abbia almeno <keywordRequirements />
        nei suoi requisiti.
      desc: Ottimo in attacco, e quindi anche in difesa.
    shield:
      name: Scudo
      requirement: Richiede un <object id="shield" /> equipaggiato.
      requirementLevel: Richiede uno scudo che abbia almeno <keywordRequirements />
