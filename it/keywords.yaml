      desc: Ottimo per una superficie ampia da dipingere e per resistere agli urti.
    arrows:
      name: Frecce
      requirement: Richiede l'equipaggiamento <object id="arrows" />.
      requirementLevel: Richiede frecce che abbiano almeno <keywordRequirements />
