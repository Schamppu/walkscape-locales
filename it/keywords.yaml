      name: Varie.
    offcut:
      name: Ritagli
      requirement: Richiede un <object id="offcut" />.
      requirementLevel: Richiede un ritaglio che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
  tools:
    fishing:
      name: Pesca
      requirement: Richiede uno strumento per la pesca.
      requirementLevel: Richiede uno strumento per la pesca che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
    fishingCage:
      name: Nassa
      requirement: Richiede una<object id="fishingCage" />.
      requirementLevel: Richiede una nassa che abbia almeno <keywordRequirements />
        nei suoi requisiti.
      desc: Per la pesca in gabbia sono necessarie delle gabbie. Devono essere attrezzate
        per la cattura dei pesci.
    fishingNet:
      name: Rete da pesca
      requirement: Richiede una<object id="fishingNet" />.
      requirementLevel: Richiede una rete da pesca che abbia almeno <keywordRequirements
        /> tra i suoi requisiti.
      desc: Per la pesca con le reti sono necessarie delle reti. È necessario disporre
        dell'attrezzatura necessaria per catturare i pesci.
    fishingRod:
      name: Canna da pesca
      requirement: Richiede una<object id="fishingRod" />.
      requirementLevel: Richiede una canna da pesca che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Per la pesca con la canna da pesca sono necessarie delle canne da pesca.
        È necessario essere attrezzati per catturare i pesci.
    fishingSpear:
      name: Fiocina da pesca
      requirement: Richiede una<object id="fishingSpear" />.
      requirementLevel: Richiede una fiocina da pesca che abbia almeno <keywordRequirements
        /> tra i suoi requisiti.
      desc: Per la pesca subacquea sono necessarie le fiocine. È necessario equipaggiarsene
        per catturare i pesci.
    tool:
      name: Strumento
      requirement: Richiede un <object id="tool" /> equipaggiato.
      requirementLevel: Richiede uno strumento che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
    woodcuttingHatchet:
      name: Accetta
      requirement: Richiede un'<object id="woodcuttingHatchet" />.
      requirementLevel: Richiede un'accetta che abbia almeno <keywordRequirements/>
        nei suoi requisiti.
      desc: Le asce sono necessarie per tagliare la legna. È necessario averne una
        per abbattere gli alberi.
    ruler:
      name: Righello
      requirement: Richiede un<object id="ruler" />.
      requirementLevel: Richiede un righello che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Uno strumento di misurazione utilizzato per effettuare misurazioni precise.
        Utile per <object id="carpentry" />.
    magnetic:
      name: Magnetico
      requirement: Richiede un oggetto <object id="magnetic" /> equipaggiato.
      requirementLevel: Richiede un oggetto magnetico che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Molto interessante. Alcune attività richiedono oggetti dotati di proprietà
        magnetiche.
    cookingSpices:
      name: Spezie
      requirement: Richiede delle<object id="cookingSpices" />.
      requirementLevel: Richiede spezie che abbiano almeno <keywordRequirements />
        nei propri requisiti.
      desc: Un tempo era molto costoso. Oggi è utile in cucina.
    pickaxe:
      requirement: Richiede un<object id="pickaxe" />.
      name: Piccone
      requirementLevel: Richiede un piccone che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: I picconi sono necessari per l'estrazione mineraria. Devono essere equipaggiati
        per estrarre minerali e gemme.
    cuttingBoard:
      requirement: Richiede un<object id="cuttingBoard" />.
      name: Tagliere
      requirementLevel: Richiede un tagliere che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Si usa come piano di lavoro per tagliare gli ingredienti.
    localMap:
      requirement: Richiede una<object id="localMap" />.
      name: Mappa locale
      requirementLevel: Richiede una mappa locale che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Fornisce informazioni su una specifica area del mondo, garantendo dei
        bonus in quell'area.
    knife:
      requirement: Richiede un<object id="knife" />.
      name: Coltello
      requirementLevel: Richiede un coltello che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: È affilato, quindi fai attenzione alle dita! Utile per tagliare oggetti
        e, quindi, per <object id="cooking" />.
    magnifyingLense:
      name: Lente d'ingrandimento
      requirement: Richiede una<object id="magnifyingLense" />.
      requirementLevel: Richiede una lente di ingrandimento che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Le lenti di ingrandimento sono utili per alcune abilità <skillType type="artisan"/>.
    saw:
      requirement: Richiede una<object id="saw" />.
      name: Sega
      requirementLevel: Richiede una sega che abbia almeno <keywordRequirements />
        nei suoi requisiti.
      desc: Le seghe vengono utilizzate principalmente nella <object id="carpentry"
        /> e garantiscono dei bonus a tale abilità.
    cookingPan:
      name: Padella da cucina
      requirement: Richiede un <object id="cookingPan" /> equipaggiato.
      requirementLevel: Richiede una padella che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Ottimo per mescolare il cibo! Le pentole conferiscono bonus all'abilità
        <object id="cooking" />.
    craftingTool:
      requirement: Richiede uno<object id="craftingTool" />.
      name: Strumento da artigianato
      requirementLevel: Richiede uno strumento di creazione che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Gli attrezzi manuali comprendono chiavi inglesi e cacciaviti.
    agilityTool:
      requirement: Richiede uno<object id="agilityTool" />.
      name: Strumento per l'agilità
      requirementLevel: Richiede uno strumento di agilità che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Uno strumento utilizzato per le attività di agilità.
    huntingBow:
      requirement: Richiede un<object id="huntingBow" />.
      name: Arco da caccia
      requirementLevel: Richiede un arco da caccia che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
    logSplitter:
      requirement: Richiede uno<object id="item_log_splitter" />.
      name: Spaccalegna
      requirementlevel: Richiede uno spaccalegna che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
    carpentryTool:
      requirement: Richiede uno<object id="carpentryTool" />.
      name: Strumento da falegnameria
      requirementLevel: Richiede uno strumento da falegnameria che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Gli attrezzi da falegnameria comprendono seghe e scalpelli.
    fishingLure:
      name: Esca
      requirement: Richiede un'<object id="fishingLure" />.
      requirementLevel: Richiede un'esca da pesca che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Puoi usare un'esca artificiale per attirare i pesci più facilmente.
    fishingTool:
      name: Strumento da pesca
      requirement: Richiede uno<object id="fishingTool" /> correlato.
      requirementLevel: Richiede uno strumento correlato alla pesca che abbia almeno
        <keywordRequirements /> nei suoi requisiti.
      desc: Gli attrezzi da pesca comprendono canne da pesca, fiocine, reti e gabbie.
    cookingTool:
      name: Strumento da cucina
      requirement: Richiede uno<object id="cookingTool" />.
      requirementLevel: Richiede uno strumento di cottura che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: Gli utensili da cucina comprendono pentole, coltelli e taglieri.
    cookingKnife:
      name: Coltello da cucina
      requirement: Richiede un<object id="cookingKnife" />.
      requirementLevel: Richiede un coltello da cucina che abbia almeno <keywordRequirements
        /> nei suoi requisiti.
      desc: I coltelli da cucina servono a tagliare gli ingredienti per cucinare.
    screwdriver:
