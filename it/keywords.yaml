      desc: Uno strumento utilizzato per le attività di bigiotteria.
    cookingPot:
      name: Pentola
      requirement: Richiede una <object id="cookingPot" /> equipaggiata.
      requirementLevel: Richiede una pentola che abbia almeno <keywordRequirements
