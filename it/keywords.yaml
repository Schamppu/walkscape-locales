      desc: Strumenti utili per <object id="cooking" />. Noto anche per la sua abilità
        nel riconoscere i bollitori.
    smithingHammer:
      name: Martello da fabbro
      requirement: Richiede un <object id="smithingHammer" /> equipaggiato.
      requirementLevel: Richiede un martello da fabbro che abbia almeno <keywordRequirements
