singulars:
  welcomeMessage:
    pages:
      p0:
        title: Välkommen till WalkScape!
        sections:
          s0: "Jag är väldigt glad att se dig gå med i WalkScapes slutna beta, <c><kamrat/><c/>.\n\
            \nSom du kanske vet är spelet fortfarande under utveckling, och det du
            ser här är bara spelets kärna. Spelet är fortfarande mycket begränsat
            när det gäller funktioner och innehåll, och vi utökar spelet kontinuerligt
            under betan.\n\nDet kan också finnas problem: buggar, exploits och obalanserat
            innehåll. Vissa av dessa kan innebära att vi behöver rulla tillbaka eller
            starta om servern – båda saker vi vill undvika så långt det går, men som
            är viktiga att ha i åtanke att de kan inträffa.\n\nMed allt det sagt:
            tack för att du är med och hjälper oss testa spelet. Du kan fortsätta
            den här handledningen genom att trycka på <hl>NÄSTA</hl> längst ner på
            sidan, eller trycka för att avsluta handledningen. Jag rekommenderar starkt
            att du går igenom handledningen, eftersom spelet fungerar ganska annorlunda.\n"
      p1:
        title: Grundläggande navigering
        imageTexts:
          i0: "Du kan öppna fler menyalternativ i spelet genom att trycka på <hl>hamburgermenyn</hl>
            i huvudvyn.\n"
        sections:
          s0: "Den grundläggande navigeringen i spelet kan skilja sig lite från typiska
            appar och spel, särskilt för iOS-användare. Här är några bra saker att
            komma ihåg:\n\n<li>Vissa vyer i spelet har inga bakåtknappar, till exempel
            tillverkning och inventarium. Du kan gå tillbaka från vyer genom att göra
            ett ”bakåtsvep” genom att svepa från kanten på antingen vänster eller
            höger sida av skärmen.</li>\n\n<li>De flesta vyer i spelet, inklusive
            huvudvyn och inventariet, kan också navigeras genom att svepa vänster
            eller höger mellan de olika flikarna.</li>\n\n<li><hl>Hamburgerknappen</hl>
            nere till höger i huvudvyn öppnar alternativ för att navigera till olika
            menyer, som ledartavlan.</li>\n\n<li>Din karaktärs profilbild uppe till
            vänster kan tryckas på och öppnar din karaktärsinformation.</li>\n\n<li>Inventarie-räknaren,
            den gröna symbolen för tillverkning och minikartan kan tryckas på för
            att öppna inventarium, tillverkning respektive världskarta. Världskartan
            används för att resa.</li>\n"
      p2:
        title: Aktiviteter och moment
        sections:
          s0: "Kärnan i spelet är att du väljer en aktivitet för din karaktär och
            slutför moment genom att gå i verkliga livet. Varje aktivitet kräver ett
            visst antal steg för att slutföra ett moment. Antalet steg som behövs
            kan minskas med utrustning och föremål.\n\n<li>Du kan se information om
            din nuvarande plats genom att svepa åt vänster. Från världskartan kan
            du hitta information om andra platser du tidigare har besökt genom att
            trycka på platser och svepa åt höger.</li>\n\n<li>Insamlingsaktiviteter
            är obegränsade – de upprepas oändligt. Tillverknings- och reseaktiviteter
            är begränsade, vilket innebär att när du når din destination eller får
            slut på tillverkningsmaterial så avslutas aktiviteten.</li>\n\n<li>Om
            du går när din karaktär inte har någon aktivitet vald, så går dina steg
            till <hl>Sparade steg</hl>. Sparade steg förbrukas i framtida aktiviteter,
            så du kan i praktiken aldrig slösa steg i WalkScape.</li>\n\n<li>Om du
            byter aktivitet så avslutas den aktuella aktiviteten. Alla steg som redan
            har bidragit till det aktuella momentet återbetalas till dina <hl>Sparade
            steg</hl></li>\n"
      p3:
        title: Påbörja din resa
        sections:
          s0: "Det var grunderna i spelet! Du kommer att se dessa handledningsmeddelanden
            dyka upp medan du interagerar med nya saker i spelet, om du väljer att
            inte hoppa över handledningen.\n\n<box>Som första sak bör du svepa åt
            vänster till Plats-sidan och skrolla ner till <hl>Besök Hjälpsamma Herberts
            hydda</hl>. Tryck på Hjälp-alternativet där, så ger han dig en gåva som
            hjälper dig att komma igång i WalkScape.</box>\n\nJag hoppas att du gillar
            spelet! Vi har också en Wiki för WalkScape med en guide för nya spelare.\n"
  locationView:
    pages:
      p0:
        title: Välja aktiviteter
