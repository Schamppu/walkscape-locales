singulars:
  materials:
    fish:
      name: Ryba
      requirement: Wymaga <object id="fish" />.
      requirementLevel: Wymaga ryby która, ma co najmniej <keywordRequirements />
        w swoich wymaganiach.
      desc: Mogą być używane w wielu recepturach <object id="cooking" />. Podstawowy
        składnik otrzymywany z <object id="fishing" />.
    logs:
      name: Kłoda
      requirement: Wymaga drewnianych <object id="logs" />.
      requirementLevel: Wymaga drewnianej kłody, która ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Mogą być przetworzone w <object id="plank" />. Podstawowy składnik otrzymywany
        z <object id="woodcutting" />.
    plant:
      name: Roślina
      requirement: Wymaga <object id="plant" />.
      requirementLevel: Wymaga rośliny która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Mogą być użyte w wielu recepturach <skillType type="artisan" />. Główny
        składnik otrzymywany z <object id="foraging" />.
    ore:
      name: Ruda
      requirement: Wymaga <object id="ore" />.
      requirementLevel: Wymaga rudy która ma przynajmniej <keywordRequirements />
        w swoich wymaganiach.
      desc: Mogą być przetworzone w <object id="bar" />. Główny składnik otrzymywany
        z <object id="mining" />.
    plank:
      name: Deska
      requirement: Wymaga <object id="plank" />.
      requirementLevel: Wymaga deski która ma przynajmniej <keywordRequirements />
        w swoich wymaganiach.
      desc: Może być użyta w wielu recepturach <object id="crafting" />. Przetwarzana
        z <object id="logs" />.
    mushroom:
      name: Grzyb
      requirement: Wymaga <object id="mushroom" />.
      requirementLevel: Wymaga grzyba który ma przynajmniej <keywordRequirements />
        w swoich wymaganiach.
      desc: Może cię zabrać do całkiem nowego świata! Grzyby są używane do różnych
        receptur <object id="cooking" />.
    gem:
      requirement: Wymaga <object id="gem" />.
      requirementLevel: Wymaga klejnotu, który ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      name: Klejnot
      desc: Może być użyty w wielu recepturach <object id="trinketry" />.
    bar:
      name: Sztabka
      requirement: Wymaga <object id="bar" />.
      requirementLevel: Wymaga sztabki która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Może być użyta w wielu recepturach <object id="smithing" /> i <skillType
        type="artisan" />. Przetwarzana z <object id="ore" />.
    roughGem:
      name: Szorstki Klejnot
      requirement: Wymaga <object id="rough_gem" />.
      requirementLevel: Wymaga szorstkiego klejnotu który, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Może być przetworzony w <object id="cut_gem" />. Podstawowy składnik otrzymywany
        z <object id="mining" />.
    trinket:
      name: Błyskotka
      requirement: Wymaga <object id="trinket" />.
      requirementLevel: Wymaga błyskotki która ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Błyskotki są używane w wielu recepturach <object id="trinketry" />.
    food:
      name: Jedzenie
      requirement: Wymaga jedzenia.
      requirementLevel: Wymaga jedzenia które, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
    ingredient:
      name: Składnik
      ingredient: Wymaga <object id="ingredient" />.
      requirementLevel: Wymaga składnika który, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Używane jako składniki w recepturach.
    misc:
      name: Różności.
      requirement: Wymaga przedmiotu <object id="misc" />.
      requirementLevel: Wymaga różnorodnych przedmiotów które mają przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Różnorodne materiały, które mogą być wykorzystane w wielu recepturach.
    processed:
      name: Przetworzony
      requirement: Wymaga <object id="processed" /> materiał.
      requirementLevel: Wymaga przetworzonego materiału który ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Materiał, który został przetworzony z podstawowego surowca, taki jak <object
        id="bar" />, <object id="plank" />, <object id="fabric" /> lub <object id="leather"
        />.
    offcut:
      name: Odcięty
      requirement: Wymaga <object id="offcut" />.
      requirementLevel: Wymaga odcięcia które ma co przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Resztki, czyli pozostałości materiałów, które mogą być przetworzone w
        nowe.
    cutGem:
      name: Kawałek Klejnotu
      requirement: Wymaga <object id="cut_gem" />.
      requirementLevel: Wymaga rozciętego klejnotu który, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Może być użyty w różnych recepturach <object id="trinketry" />. Przetwarzany
        z <object id="rough_gem" />.
    nugget:
      name: Samorodek
      requirement: Wymaga <object id="nugget" />.
      requirementLevel: Wymaga samorodka, który ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Może być przetworzona w <object id="bar" />. Podstawowy składnik otrzymywany
        z <object id="mining" />.
    fabric:
      requirementLevel: Wymaga tkaniny, która ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      requirement: Wymaga <object id="fabric" />.
      desc: Arkusz tkaniny typowo używany w recepturach <object id="tailoring" />.
      name: Tkanina
    fibrousPlant:
      desc: Może być użyty w recepturach <object id="tailoring" />, by wytworzyć <object
        id="fabric" />. Może być najczęściej znaleziony poprzez <object id="foraging"
        />.
      name: Włóknista Roślina
      requirement: Wymaga <object id="fibrousPlant" />.
      requirementLevel: Wymaga włóknistej rośliny, która posiada przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
    crustacean:
      name: Skorupiak
      desc: Skorupiak, który może być użyte w wielu recepturach <object id="cooking"
        />.
      requirement: Wymaga <object id="crustacean" />.
      requirementLevel: Wymaga skorupiaka, który ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
    hide:
      name: Skóra
      desc: Część skóry zwierzęcej, która może być użyta do receptur <object id="tailoring"
        />, by wytworzyć <object id="leather" />. Może być otrzymana z <object id="hunting"
        />.
      requirement: Wymaga <object id="hide" />.
      requirementLevel: Wymaga skóry, która posiada przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
  tools:
    fishing:
      name: Wędkarstwo
      requirementLevel: Wymaga narzędzia związanego z wędkarstwem które, ma co najmniej
        <keywordRequirements /> w swoich wymaganiach.
      requirement: Wymaga wyposażonego narzędzia wędkarskiego.
    fishingNet:
      name: Sieć Rybacka
      requirement: Wymaga wyposażenia <object id="fishingNet" />.
      requirementLevel: Wymaga sieci rybackiej która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Sieci rybackie są wymagane do łowienia za ich pomocą. Muszą być wyposażone,
        by łowić ryby.
    fishingRod:
      name: Wędka
      requirement: Wymaga wyposażenia <object id="fishingRod" />.
      requirementLevel: Wymaga wędki która, ma co najmniej <keywordRequirements />
        w swoich wymaganiach.
      desc: Wędki rybackie są wymagane do łowienia ryb za ich pomocą. Muszą być wyposażone,
        by móc łowić ryby.
    fishingSpear:
      name: Włócznia Wędkarska
      requirementLevel: Wymaga włóczni rybackiej która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      requirement: Wymaga wyposażenia <object id="fishingSpear" />.
      desc: Włócznie rybackie wymagane są do łowienia za ich pomocą. Muszą być wyposażone,
        by łowić ryby.
    tool:
      name: Narzędzie
      requirement: Wymaga wyposażenia <object id="tool" />.
      requirementLevel: Wymaga narzędzia które, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
    woodcuttingHatchet:
      name: Siekiera
      requirement: Wymaga wyposażenia <object id="woodcuttingHatchet" />.
      requirementLevel: Wymaga siekiery do rąbania drewna która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Siekiery są wymagane do ścinania drzewa. By móc ścinać musisz ją wyposażyć.
    sickle:
      name: Sierp
      requirement: Wymaga wyposażenia <object id="sickle" />.
      requirementLevel: Wymaga sierpa który, ma co najmniej <keywordRequirements />
        w swoich wymaganiach.
      desc: Narzędzie zbierackie używane w <object id="foraging" />.
    goldPan:
      name: Złota Misa
      requirement: Wymaga wyposażenia <object id="goldPan" />.
      requirementLevel: Wymaga złotej misy która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Solidne sito służące do oddzielania cennych metali od osadu w wodzie.
    magnetic:
      name: Magnetyczny
      requirement: Wymaga wyposażonego przedmiotu <object id="magnetic" />.
      requirementLevel: Wymaga magnetycznego przedmiotu który, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Bardzo atrakcyjne. Część aktywności wymaga przedmiotów z magnetycznymi
        cechami.
    cookingPan:
      name: Patelnia do Gotowania
      requirement: Wymaga wyposażenia <object id="cookingPan" />.
      requirementLevel: Wymaga patelni która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Bardzo przydatne w przygotowywaniu jedzenia! Patelnie do gotowania dają
        bonusy w umiejętności <object id="cooking" />.
    cuttingBoard:
      requirementLevel: Wymaga deski do krojenia która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      name: Deska do Krojenia
      requirement: Wymaga wyposażenia <object id="cuttingBoard" />.
      desc: Używana jako powierzchnia do krojenia składników.
    cookingPot:
      requirementLevel: Wymaga garnka do gotowania który, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      name: Garnek do gotowania
      requirement: Wymaga wyposażenia <object id="cookingPot" />.
      desc: Użyteczne narzędzie do <object id="cooking" />. Znane również jako garnki.
    cookingSpices:
      requirementLevel: Wymaga przypraw które, mają co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      name: Przyprawy
      requirement: Wymaga wyposażenia <object id="cookingSpices" />.
      desc: Dawniej były bardzo drogie. Dziś używa się je w gotowaniu.
    fishingCage:
      name: Klatka do Łowienia
      requirement: Wymaga wyposażenia <object id="fishingCage" />.
      requirementLevel: Wymaga klatki do łowienia która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Skrzynki rybackie są wymagane do połowów za ich pomocą. Muszą być wyposażone,
        by łowić ryby.
    pickaxe:
      name: Kilof
      requirement: Wymaga wyposażenia <object id="pickaxe" />.
      requirementLevel: Wymaga Kilofa, który ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Kilofy są wymagane do górnictwa. Muszą być założone, by móc wydobywać
        złoża i klejnoty.
    cookingTool:
      name: Narzędzie do Gotowania
      requirement: Wymaga wyposażenia <object id="cookingTool" />.
      requirementLevel: Wymaga Narzędzia do Gotowania, które ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzia do gotowania zawierają patelnie, noże oraz deski do krojenia.
    carpentryTool:
      name: Narzędzie Stolarstwa
      requirement: Wymaga wyposażenia <object id="carpentryTool" />.
      requirementLevel: Wymaga narzędzia stolarskiego, które ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzia stolarskie zawierają piły i dłuta.
    magnifyingLense:
      name: Szkło powiększające
      requirement: Wymaga wyposażenia <object id="magnifyingLense" />.
      requirementLevel: Wymaga soczewki powiększającej która, ma co najmniej <keywordRequirements
        />w swoich wymaganiach.
      desc: Szkła powiększające mogą być przydatne w umiejętności <skillType type="artisan"/>.
    ruler:
      requirementLevel: Wymaga linijki, która ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      requirement: Wymaga wyposażenia <object id="ruler" />.
      name: linijka
      desc: Narzędzie miernicze używane do precyzyjnych pomiarów. Przydatne w <object
        id="carpentry" />.
    fishingLure:
      name: Przynęta Wędkarska
      requirement: Wymaga wyposażenia <object id="fishingLure" />.
      requirementLevel: Wymaga przynęty wędkarskiej, która ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Możesz użyć przynęty na ryby, by złapać je łatwiej.
    cookingKnife:
      name: Nóż Kuchenny
      requirement: Wymaga wyposażenia <object id="cookingKnife" />.
      requirementLevel: Wymaga noża kuchennego który, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Noże kuchenne są używane do krojenia składników do gotowania.
    craftingTool:
      name: Narzędzie Rzemieślnicze
      requirement: Wymaga wyposażenia <object id="craftingTool" />.
      requirementLevel: Wymaga narzędzia rzemieślniczego, która ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzia rzemieślnicze zawierają klucze i śrubokręty.
    chisel:
      name: Dłuto
      requirement: Wymaga wyposażenia <object id="chisel" />.
      requirementLevel: Wymaga dłuta które, ma co najmniej <keywordRequirements />
        w swoich wymaganiach.
      desc: Dłuta używane są w <object id="carpentry" /> oraz <object id="trinketry"
        /> i dają bonusy w tych umiejętnościach.
    saw:
      name: Piła
      requirement: Wymaga wyposażenia <object id="saw" />.
      requirementLevel: Wymaga piły która, ma co najmniej <keywordRequirements />
        w swoich wymaganiach.
      desc: Piły używane są głownie w <object id="carpentry" /> i dają bonusy w tej
        umiejętności.
    screwdriver:
      name: Śrubokręt
      requirement: Wymaga wyposażenia <object id="screwdriver" />.
      requirementLevel: Wymaga śrubokręta który, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Śrubokręty są używane w <object id="crafting" /> i dają bonusy w tej umiejętności.
    smithingHammer:
      name: Młot kowalski
      requirement: Wymaga wyposażenia <object id="smithingHammer" />.
      requirementLevel: Wymaga młota kowalskiego który, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Ciężki młot używany do kształtowania stali w formy. Przydatny w <object
        id="smithing" />.
    foragingTool:
      name: Narzędzie do zbierania
      requirement: Wymaga wyposażenia <object id="foragingTool" />.
      requirementLevel: Wymaga narzędzia do zbierania które, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzie używane w aktywnościach zbieractwa.
    localMap:
      name: Lokalna mapa
      requirement: Wymaga wyposażenia <object id="localMap" />.
      requirementLevel: Wymaga lokalnej mapy która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Dostarcza informacji o konkretnym obszarze świata, dając bonusy w tej
        części.
    knife:
      name: Nóż
      requirement: Wymaga wyposażenia <object id="knife" />.
      requirementLevel: Wymaga noża który, ma co najmniej<keywordRequirements /> w
        swoich wymaganiach.
      desc: Ostry, więc uważaj na swoje palce! Przydatny do przecinania rzeczy, dzięki
        temu ma wiele zastosowań.
    wrench:
      name: Klucz
      requirement: Wymaga wyposażenia <object id="wrench" />.
      requirementLevel: Wymaga klucza który ma przynajmniej <keywordRequirements />
        w swoich wymaganiach.
      desc: Narzędzie przydatne przy skręcaniu lub odkręcaniu śrub i nakrętek. Przydaje
        się w <object id="crafting" />.
    logSplitter:
      name: Drzewna Łuparka
      requirement: Wymaga wyposażenia <object id="item_log_splitter" />.
      requirementlevel: Wymaga łuparki do drewna, która ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzie, które może być użyte w <object id="woodcutting" />, jako dodatek
        do toporów.
    trinketryTool:
      requirement: Wymaga wyposażenia <object id="trinketryTool" />.
      name: Narzędzie Jubilerstwa
      requirementLevel: Wymaga narzędzia jubilerstwa które, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzie używane w aktywnościach jubilerstwa.
    agilityTool:
      requirement: Wymaga wyposażenia <object id="agilityTool" />.
      name: Narzędzie Zwinności
      requirementLevel: Wymaga narzędzia zwinności, które ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzie używane w aktywnościach zręczności.
    huntingTrap:
      requirement: Wymaga wyposażenia <object id="huntingTrap" />.
      name: Pułapka Myśliwska
      requirementLevel: Wymaga pułapki myśliwskiej która, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Pułapka używana do <object id="hunting" />.
    fishingTool:
      name: Narzędzie Wędkarskie
      requirement: Wymaga wyposażenia <object id="fishingTool" />.
      requirementLevel: Wymaga narzędzia związanego z wędkarstwem które, ma co najmniej
        <keywordRequirements /> w swoich wymaganiach.
      desc: Narzędzia rybackie mogą wliczać się do wędek, oszczepów, siatek i skrzynek.
    skillBook:
      name: Księga Umiejętności
      requirement: Wymaga wyposażenia <object id="skillBook" />.
      requirementlevel: Wymaga narzędzia zwinności które, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Dostarcza zarówno bonus, jak i karę do odpowiedniej umiejętności.
    miningTool:
      name: Narzędzie Górnicze
      requirement: Wymaga wyposażenia <object id="miningTool" />.
      requirementLevel: Wymaga narzędzia górnictwa które, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzie używane w aktywnościach górnictwa.
    smithingTool:
      name: Narzędzie Kowalstwa
      requirement: Wymaga wyposażenia <object id="smithingTool" />.
      requirementLevel: Wymaga narzędzia kowalstwa które, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzie używane w aktywnościach kowalstwa.
    woodcuttingTool:
      name: Narzędzie drwalnictwa
      requirement: Wymaga wyposażenia <object id="woodcuttingTool" />.
      requirementLevel: Wymaga narzędzia drwalnictwa które, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzie używane w aktywnościach drwalnictwa.
    huntingBow:
      name: Łuk Myśliwski
      requirement: Wymaga wyposażenia <object id="huntingBow" />.
      requirementLevel: Wymaga łuku myśliwskiego który, ma co najmniej <keywordRequirements
        /> w swoich wymaganiach.
      desc: Łuk używany do <object id="hunting" /> (oraz innych rzeczy, które mogą
        cię irytować).
    sander:
      requirement: Wymagana założonej <object id="sander" />.
      name: Szlifierka
      requirementLevel: Wymaga szlifierki, która posiada przynajmniej /<keywordRequirements
        /> w swoich wymaganiach.
      desc: Narzędzie użyteczne w polerowaniu powierzchni. Przydatne w <object id="trinketry"
        />.
    birdhouse:
      name: Dom dla Ptaków
      desc: Domki dla Ptakó mogą znaleźć swoją drogę do gry nieco później.
      requirement: Wymaga <object id="birdhouse" />.
      requirementLevel: Wymaga Domku dla Ptaków, który ma przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
    needle:
      name: Igła
      desc: Narzędzie używane do szycia. Przydatne w <object id="tailoring" />.
      requirement: Wymaga wyekwipowanej <object id="needle" />.
      requirementLevel: Wymaga igły, która ma przynajmniej <keywordRequirements />
        w swoich wymaganiach.
    pins:
      name: Guziki
      desc: Guziki są używane w <object id="tailoring" />.
      requirement: Wymaga wyposażonych <object id="pins" />.
      requirementLevel: Wymaga guzików, które mają przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
    scissors:
      name: Nożyczki
      desc: Nożyczki są używane do cięcia. Przydają się w <object id="tailoring" />.
      requirement: Wymaga wyposażenia <object id="scissors" />.
      requirementLevel: Wymaga nożyczek, które mają przynajmniej <keywordRequirements
        /> w swoich wymaganiach.
    cuttingMat:
      name: Mata do krojenia
      desc: Maty do krojenia są przydatne w <object id="tailoring" />.
