singulars:
  camel:
    name: Wielbłąd
    desc: Wytrzymały wielbłąd, idealny do podróży po pustyni.
    rareName: Wielbłąd Dwugarbny
    rareDesc: Zwykłe wielbłądy mają tylko garb, ale co za rzadki okaz! Ten wielbłąd
      ma ich <c>dwa razy więcej</c>!
    defaultNames:
      "0": Piasek
      "1": Wielbcia
      "2": Kleofas
      "3": Alek
      "4": Garbuś
      "5": Sahara
      "6": Sułtan
      "7": Walduś
      "8": Bakuś
      "9": Leoś
      "10": Justyś
      "11": Olek
      "12": Sprytuś
      "13": Maciek
      "14": Kacper
      "15": Błażej
      "16": Laurenty
      "17": Dżoł
  chicken:
    name: Kurczak
    rareDesc: Ten kurczak absolutnie <c>cię kocha</c>! Niezbyt pomocne, ale ukazuje
      to nawet na zewnątrz.
    rareName: Nadmiłosny Kurczak
    desc: Uroczy kurczaczek, znany ze swoich nietypowych jaj oraz zdolności zbieractwa.
    defaultNames:
      "0": Szejk
      "1": Kinek
      "2": Gertrud
      "3": Henes
      "4": Czak
      "5": Kluki
      "6": As
      "7": Kamila
      "8": Rudziel
      "9": Roki
  goose:
    rareDesc: Ta gęś zdaje się być bardzo przyjazna, zdaje się nawet <c>wyciągać swoją
      szyję</c> dla ciebie!
    desc: Bardziej przyjazna gęś, prawdopodobnie jedna z tych, które nie zaatakują
      cię od razu.
    rareName: Długa Gęś
    defaultNames:
      "1": Lucyna
      "0": Grzęś
    name: Gęś
  gecko:
    desc: Tajemniczy gekon, skrywa wszystkie rodzaje sekretów, które na pewno pozostaną
      tajemnicą.
    rareName: Granatowy Gekon
    rareDesc: Ten gekon jest nieco bardziej intensywny niż pozostałe. Posiada unikalny
      <c>kolor i kolczasty grzebień</c>!
    name: Geko
  mummy:
    desc: Nieporuszona mumia, może wyglądać na ubraną w szmaty, ale wie doskonale
      jak je utrzymać.
    rareDesc: Mumia jest przyozdobiona w nieco dobrego <c>jedwabiu</c>! Zdaje się,
      że było to ekstremalnie modne w tamtej erze.
    rareName: Jedwabna Mumia
    name: Mumia
    defaultNames:
      "0": Mumford
      "1": Ramzeas
      "2": Immahoptep
      "3": Teal'c
      "4": Neferatari
      "5": Kleopatr
      "6": Hatszeepsuit
      "7": Setlik
      "8": Szeszetsziet
      "9": Bandażosientin
  tortoise:
    desc: Nieco wycofany żółwik, po prostu spokojny. Powolny, ale wytrwały.
    name: Żółwik
    rareName: Cenny Żółwik
    rareDesc: Skorupa tego żółwia ma połysk <c>cennych metali w kształcie kwiatu</c>!
  dolphin:
    rareDesc: Ten delfin zawsze wybiera rzeczy, by się <c>odbijały oraz do trików</c>!
      Patrz jak pędzi!
    desc: Inteligentny delfin, potrafi poruszać się szybko przez wody. Zawsze podziękuje
      ci za każdą rybę.
    rareName: Trikowy Delfin
  reindeer:
    rareDesc: Ten renifer ukazuje nieco wiary i jest bardzo <c>świąteczny</c>! Wygląda
      jakby mógł latać, ale nie powinieneś tego sprawdzać.
    name: Renifer
    desc: Pocieszny renifer, potrafi galopować przez zaśnieżone miejsca z łatwością
      i wciąż ma energię, by się nią dzielić.
    rareName: Świąteczny Renifer
  snake:
    desc: Niesforny wąż, dasz radę go utrzymać pod pazuchą?
    rareName: Rogowy Wąż
    rareDesc: Wąż taki jak ten musi mieć złe zamiary, nawet posiada <c>ostre rogi</c>!
  tiger:
    name: Tygrys
    desc: Potężny tygrys, emanujący siłą, skradaniem i szybkością - wszystko w jednym.
    rareName: Tygrys Królewski
    rareDesc: <c>Złoty</c> tygrys! Powinieneś czuć spore szczęście, by otrzymać łaskę
      takiego stworzenia.
