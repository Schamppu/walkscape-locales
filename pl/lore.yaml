singulars:
  firstBirthdayLetter:
    p1: "Cześć!\n\nTu twój dobry kumpel, Herbert! Nie mogę uwierzyć,że minął już cały
      rok odkąd jesteś tu, w Arenum.\n\nMam nadzieję, że za tobą tylko dobry progres,
      który będzie się dalej rozwijał. Najpewniej już nie będą ci potrzebne, ale wiedz,
      że pozostałe mi drewniane patyki, kamienie i sznurek, które znajduję każdego
      dnia są dalej tutaj, dla ciebie, jeżeli tylko ich potrzebujesz.\n\nGdy tylko
      wpadniesz zawsze możesz ogrzać się przy moim palenisku i złapać mnie w trakcie
      swoich podróży. Jestem pewien, że musisz teraz powrócić na trakt, więc tu skończę.\n\
      \nDbaj o siebie <icon i=\"Favorited\" />, pogadamy następnym razem! \n\n- *Herbert*\n"
  secondBirthdayLetter:
    p1: "Witaj ponownie!\n\nCzy to minął kolejny rok? Czas tak szybko leci, pewnie
      w chwilę minie kolejny.\n\nZ pewnością robisz kolejny dobry progres, by ulepszać
      siebie. Wpadnij kiedyś i opowiedz mi z pierwszej ręki opowieści ze swoich podróży.\n\
      \nZ pewnością udało ci się dotrzeć dalej niż większość handlarzy nawet próbowało
      dotrzeć. Pisząc o handlarzach, lokalni znów przyszli próbując kupić moją chatę.
      Mówią, że byłoby to świetne miejsce na jakiś duży sklep, ale ja nie planuję
      nigdzie iść, możesz wszak potrzebować miejsca na odpoczynek w trakcie podróży!\n\
      \nCóż, to na razie tyle z grymasów starego człowieka, dbaj o siebie!\n- *Herbert*\n"
  thirdBirthdayLetter:
    p1: "O, patrzcie państwo!\n\nTo już trzeci rok minął! Większość nie daje rady
      aż tyle, więc tobie się dobrze udało.\n\nTamci zazwyczaj się poddają i proszą
      mnie o zakończenie ich cierpienia, to często załamujące, gdy do tego dochodzi.\n\
      \nCzy możesz to dla mnie zrobić i wpadać czasami dowodząc, że dajesz radę, wraz
      z opowieściami z przygód? Możemy świętować twoją rocznicę przy smacznej herbacie
      i ciastkach.\n\nDbaj o siebie i strzeż się udawania w ciemność, skrada się powoli
      nawet, gdy z nią walczysz.\n\n- *Herbert*"
