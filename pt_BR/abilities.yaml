singulars:
  takeMeHome:
    name: Me Leve Para Casa
    desc: Te teletransporta para <object id="location-kallaheim-094c9ec8-fdd2-4471-bacc-fabb71e6d654"
      />.
    completed: Você esfrega o <item id="item-ring_of_homesickness-dfd0d52b-c064-4860-ae77-2f9c0cab7382"
      /> e de repente percebe que você está em <location i="location-kallaheim-094c9ec8-fdd2-4471-bacc-fabb71e6d654"
      />.
  downGoesTheTrees:
    desc: Conclui {count} ações de <skill skill="woodcutting"/> instantaneamente.
    completed: Você balança o <item id="item-axe_of_destruction-a493952f-18b1-442b-be16-0385a014c01c"
      /> e as árvores à sua frente caem com um único golpe. Você sente que conseguiria
      derrubar uma floresta inteira com esse machado.
  memospheres:
    woodcutting:
      desc: Concede experiência em <skill skill="woodcutting"/>.
    trinketry:
      desc: Concede experiência em <skill skill="trinketry"/>.
    smithing:
      desc: Concede experiência em <skill skill="smithing"/>.
    agility:
      name: 'Memosfera: Agilidade'
      desc: Concede experiência em <skill skill="agility"/>.
    cooking:
      desc: Concede experiência em <skill skill="cooking"/>.
    fishing:
      desc: Concede experiência em <skill skill="fishing"/>.
    foraging:
      desc: Concede experiência em <skill skill="foraging"/>.
    carpentry:
      desc: Concede experiência em <skill skill="carpentry"/>.
    mining:
      desc: Concede experiência em <skill skill="mining"/>.
    crafting:
      desc: Concede experiência em <skill skill="crafting"/>.
  rockAndRoll:
    desc: Cria 5 <hl>gemas brutas</hl> aleatórias.
    completed: Você toca o amuleto em forma de estrela e <hl>ele cria algumas gemas</hl>
      na palma da sua mão.
  peckingOrder:
    completed: Com uma velocidade impressionante, você vê seu <h1>Frango</h1> saindo
      em busca de comida pela área, voltando com alguns recursos.
    desc: Conclui {count} ações de <skill skill="foraging"/> instantaneamente.
  shellForge:
    completed: Seu <h1>Tartaruga</h1> recolhe um punhado dos seus materiais de fundição
      e se esconde no casco, ao lado da fornalha. Você sente uma onda de calor repentina
      e a vê retornar com os itens produzidos.
    desc: Conclui {count} ações de <object id="recipe_smelting"/> instantaneamente.
  navigateDesert:
    name: Navegue pelo Deserto
    desc: Permite explorar e interagir nos ambientes de <object id="location_desert"
      />.
  iMissTheSun:
    name: Eu sinto falta do sol
    desc: Te teletransporta para <object id="ed6a76d4-5135-459e-a6d7-bbd7cb1af1b6"
      />.
    completed: Você sente o calor do sol ao chegar em <object id="ed6a76d4-5135-459e-a6d7-bbd7cb1af1b6"
      />.
  mermaidsNeedMe:
    desc: Te teletransporta para <object id="location-vastalume-cf2f38ec-88d4-4129-a164-4deb5f0955d5"
      />.
  torpedoAway:
    desc: Conclui {count} ações de <hl>Viagem Subaquática</hl> instantaneamente.
    completed: Seu <h1>Golfinho</h1> se lança à sua frente rumo ao seu próximo destino
      aquático. A corrente de arrasto o leva junto, e você chega lá em um instante,
      sem esforço algum.
  presentRain:
    completed: Seu <h1>Rena</h1> olha para o céu e sacode seus chifres. Vários presentes
      parecem cair do alto, pousando aos seus pés. Com um empurrãozinho da sua rena,
      você os abre e revela os itens que estavam dentro!
  needToGoFast:
    desc: Completa {count} ações de <hl>Viagem</hl> instantaneamente.
